# Prometheus configuration for Heady platform
# Scrape interval: FIB[8] = 21 seconds

global:
  scrape_interval: 21s
  evaluation_interval: 21s
  scrape_timeout: 13s # FIB[7]
  external_labels:
    platform: heady
    environment: production

# Rule files
rule_files:
  - alerting-rules.yml

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093
      timeout: 8s # FIB[6]

# Scrape configurations for all Heady services
scrape_configs:
  # ─── Core Services ───
  - job_name: auth-session-server
    metrics_path: /health
    scrape_interval: 21s
    static_configs:
      - targets: ["auth-session-server:3380"]
        labels:
          service: auth-session-server
          domain: auth

  - job_name: notification-service
    metrics_path: /health
    scrape_interval: 21s
    static_configs:
      - targets: ["notification-service:3381"]
        labels:
          service: notification-service
          domain: realtime

