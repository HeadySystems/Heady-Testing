version: "3.9"

# Heady Platform — Services + Infrastructure
# All health check intervals, retries, and resource limits use φ-math / Fibonacci values.

x-common-env: &common-env
  NODE_ENV: production
  LOG_LEVEL: info
  LOG_FORMAT: json

x-healthcheck-defaults: &healthcheck-defaults
  interval: 21s       # FIB[8]
  timeout: 8s         # FIB[6]
  retries: 5          # FIB[5]
  start_period: 13s   # FIB[7]

networks:
  heady-internal:
    driver: bridge
  heady-data:
    driver: bridge

volumes:
  postgres-data:
  nats-data:
  pgbouncer-tls:

services:
  # ─── Infrastructure ───────────────────────────────────────

  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: heady
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: heady_auth
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD-SHELL", "pg_isready -U heady"]
    networks:
      - heady-data
    deploy:
      resources:
        limits:
          memory: 610M   # FIB[15]
          cpus: "1.618"  # PHI

  pgbouncer:
    image: edoburu/pgbouncer:1.22
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "6432:6432"
    volumes:
      - ./infra/pgbouncer/pgbouncer.ini:/etc/pgbouncer/pgbouncer.ini:ro
      - pgbouncer-tls:/etc/pgbouncer/tls:ro
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -p 6432"]
    networks:
      - heady-data
    deploy:
      resources:
        limits:
          memory: 89M    # FIB[11]
          cpus: "0.618"  # PSI

  nats:
    image: nats:2.10-alpine
    restart: unless-stopped
    command: ["-c", "/etc/nats/nats-server.conf"]
    ports:
      - "4222:4222"
      - "8222:8222"
    volumes:
      - ./infra/nats/nats-server.conf:/etc/nats/nats-server.conf:ro
      - nats-data:/data/nats
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:8222/healthz"]
    networks:
      - heady-internal
    deploy:
      resources:
        limits:
          memory: 233M   # FIB[13]
          cpus: "0.618"  # PSI

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--maxmemory", "89mb", "--maxmemory-policy", "allkeys-lru"]
    ports:
      - "6379:6379"
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD", "redis-cli", "ping"]
    networks:
      - heady-data
    deploy:
      resources:
        limits:
          memory: 144M   # FIB[12]
          cpus: "0.618"  # PSI

  # ─── Application Services ─────────────────────────────────

  auth-session-server:
    build:
      context: ./services/auth-session-server
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "3380:3380"
    environment:
      <<: *common-env
      PORT: 3380
      DATABASE_URL: postgresql://heady_auth_svc:${AUTH_DB_PASS}@pgbouncer:6432/heady_auth
      REDIS_URL: redis://redis:6379/0
      FIREBASE_SERVICE_ACCOUNT: ${FIREBASE_SERVICE_ACCOUNT}
      SESSION_SECRET: ${SESSION_SECRET}
      HMAC_SECRET: ${HMAC_SECRET}
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD-SHELL", "wget --spider -q http://127.0.0.1:3380/health"]
    networks:
      - heady-internal
      - heady-data
    deploy:
      resources:
        limits:
          memory: 233M   # FIB[13]
          cpus: "1.0"

  notification-service:
    build:
      context: ./services/notification-service
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      nats:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "3381:3381"
    environment:
      <<: *common-env
      PORT: 3381
      NATS_URL: nats://notification-service:${NOTIFICATION_NATS_PASS}@nats:4222
      REDIS_URL: redis://redis:6379/1
      HMAC_SECRET: ${HMAC_SECRET}
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD-SHELL", "wget --spider -q http://127.0.0.1:3381/health"]
    networks:
      - heady-internal
      - heady-data
    deploy:
      resources:
        limits:
          memory: 233M   # FIB[13]
          cpus: "1.0"

  analytics-service:
    build:
      context: ./services/analytics-service
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "3382:3382"
    environment:
      <<: *common-env
      PORT: 3382
      DATABASE_URL: postgresql://heady_analytics_svc:${ANALYTICS_DB_PASS}@pgbouncer:6432/heady_analytics
      REDIS_URL: redis://redis:6379/2
      HMAC_SECRET: ${HMAC_SECRET}
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD-SHELL", "wget --spider -q http://127.0.0.1:3382/health"]
    networks:
      - heady-internal
      - heady-data
    deploy:
      resources:
        limits:
          memory: 233M   # FIB[13]
          cpus: "1.0"

  billing-service:
    build:
      context: ./services/billing-service
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      pgbouncer:
        condition: service_healthy
    ports:
      - "3383:3383"
    environment:
      <<: *common-env
      PORT: 3383
      DATABASE_URL: postgresql://heady_billing_svc:${BILLING_DB_PASS}@pgbouncer:6432/heady_billing
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      HMAC_SECRET: ${HMAC_SECRET}
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD-SHELL", "wget --spider -q http://127.0.0.1:3383/health"]
    networks:
      - heady-internal
      - heady-data
    deploy:
      resources:
        limits:
          memory: 233M   # FIB[13]
          cpus: "1.0"

  scheduler-service:
    build:
      context: ./services/scheduler-service
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      pgbouncer:
        condition: service_healthy
      nats:
        condition: service_healthy
    ports:
      - "3384:3384"
    environment:
      <<: *common-env
      PORT: 3384
      DATABASE_URL: postgresql://heady_scheduler_svc:${SCHEDULER_DB_PASS}@pgbouncer:6432/heady_scheduler
      NATS_URL: nats://scheduler-service:${SCHEDULER_NATS_PASS}@nats:4222
      HMAC_SECRET: ${HMAC_SECRET}
      AUTH_SERVICE_URL: http://auth-session-server:3380
      NOTIFICATION_SERVICE_URL: http://notification-service:3381
      ANALYTICS_SERVICE_URL: http://analytics-service:3382
      BILLING_SERVICE_URL: http://billing-service:3383
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD-SHELL", "wget --spider -q http://127.0.0.1:3384/health"]
    networks:
      - heady-internal
      - heady-data
    deploy:
      resources:
        limits:
          memory: 233M   # FIB[13]
          cpus: "1.0"

  # ─── Wave 2+3 Services ─────────────────────────────────────

  search-service:
    build:
      context: ./services/search-service
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "3385:3385"
    environment:
      <<: *common-env
      PORT: 3385
      DATABASE_URL: postgresql://heady_search_svc:${SEARCH_DB_PASS}@pgbouncer:6432/heady_vectors
      REDIS_URL: redis://redis:6379/3
      HMAC_SECRET: ${HMAC_SECRET}
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD-SHELL", "wget --spider -q http://127.0.0.1:3385/health"]
    networks:
      - heady-internal
      - heady-data
    deploy:
      resources:
        limits:
          memory: 377M   # FIB[14] — heavy vector workloads
          cpus: "1.618"  # PHI

  migration-service:
    build:
      context: ./services/migration-service
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      pgbouncer:
        condition: service_healthy
    ports:
      - "4020:4020"
    environment:
      <<: *common-env
      PORT: 4020
      DATABASE_URL: postgresql://heady_migration_svc:${MIGRATION_DB_PASS}@pgbouncer:6432/heady_auth
      HMAC_SECRET: ${HMAC_SECRET}
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD-SHELL", "wget --spider -q http://127.0.0.1:4020/health"]
    networks:
      - heady-internal
      - heady-data
    deploy:
      resources:
        limits:
          memory: 233M   # FIB[13]
          cpus: "1.0"

  saga-coordinator:
    build:
      context: ./services/saga-coordinator
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      pgbouncer:
        condition: service_healthy
      nats:
        condition: service_healthy
    ports:
      - "4030:4030"
    environment:
      <<: *common-env
      PORT: 4030
      DATABASE_URL: postgresql://heady_saga_svc:${SAGA_DB_PASS}@pgbouncer:6432/heady_saga
      NATS_URL: nats://saga-coordinator:${SAGA_NATS_PASS}@nats:4222
      HMAC_SECRET: ${HMAC_SECRET}
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD-SHELL", "wget --spider -q http://127.0.0.1:4030/health"]
    networks:
      - heady-internal
      - heady-data
    deploy:
      resources:
        limits:
          memory: 233M   # FIB[13]
          cpus: "1.0"

  nats-consumers:
    build:
      context: ./services/nats-consumers
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      nats:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "4040:4040"
    environment:
      <<: *common-env
      PORT: 4040
      NATS_URL: nats://nats-consumers:${CONSUMERS_NATS_PASS}@nats:4222
      REDIS_URL: redis://redis:6379/4
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD-SHELL", "wget --spider -q http://127.0.0.1:4040/health"]
    networks:
      - heady-internal
      - heady-data
    deploy:
      resources:
        limits:
          memory: 233M   # FIB[13]
          cpus: "1.0"

  # ─── Monitoring ────────────────────────────────────────────

  prometheus:
    image: prom/prometheus:v2.50.0
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./infra/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./infra/monitoring/alerting-rules.yml:/etc/prometheus/alerting-rules.yml:ro
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=89d'
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:9090/-/healthy"]
    networks:
      - heady-internal
    deploy:
      resources:
        limits:
          memory: 377M   # FIB[14]
          cpus: "0.618"  # PSI

  grafana:
    image: grafana/grafana:10.3.1
    restart: unless-stopped
    depends_on:
      prometheus:
        condition: service_healthy
    ports:
      - "3000:3000"
    volumes:
      - ./infra/monitoring/grafana-dashboard.json:/etc/grafana/provisioning/dashboards/heady.json:ro
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD}
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:3000/api/health"]
    networks:
      - heady-internal
    deploy:
      resources:
        limits:
          memory: 233M   # FIB[13]
          cpus: "0.618"  # PSI
