# NATS Server configuration for Heady platform
# All buffer sizes, limits, and thresholds use φ-math / Fibonacci values
#
# FIB[9]=34    → max_connections
# FIB[13]=233  → max_payload (×1024 = 238,592 bytes)
# FIB[8]=21    → ping_interval
# FIB[4]=3     → DLQ retry threshold
# FIB[7]=13    → max_pending (×1MB)

# --- Server ---
listen: 0.0.0.0:4222
http_port: 8222

# Maximum client connections: FIB[13]=233
max_connections: 233

# Max payload: FIB[13]=233 KB
max_payload: 238592

# Ping interval: FIB[8]=21 seconds
ping_interval: "21s"

# Max outstanding pings: FIB[5]=5
ping_max: 5

# Write deadline: FIB[8]=21 seconds
write_deadline: "21s"

# Max pending buffer per connection: FIB[7]=13 MB
max_pending: 13631488

# --- Authentication ---
authorization {
  # Service accounts for inter-service messaging
  users: [
    { user: "auth-service",         password: "$AUTH_NATS_PASS" }
    { user: "notification-service",  password: "$NOTIFICATION_NATS_PASS" }
    { user: "analytics-service",     password: "$ANALYTICS_NATS_PASS" }
    { user: "billing-service",       password: "$BILLING_NATS_PASS" }
    { user: "scheduler-service",     password: "$SCHEDULER_NATS_PASS" }
  ]
  timeout: 8  # FIB[6]=8 seconds
}

# --- JetStream (persistent messaging) ---
jetstream {
  # Store directory
  store_dir: "/data/nats/jetstream"

  # Max memory: FIB[13]=233 MB
  max_mem: 244318208

  # Max file storage: FIB[16]=987 MB
  max_file: 1034944512

  # Domain for multi-cluster
  domain: "heady"
}

# --- Logging ---
logtime: true
logfile_size_limit: 104857600
debug: false
trace: false

# --- TLS ---
tls {
  cert_file: "/etc/nats/tls/server.crt"
  key_file: "/etc/nats/tls/server.key"
  ca_file: "/etc/nats/tls/ca.crt"
  verify: true
  timeout: 8  # FIB[6]=8 seconds
}

# --- Subject permissions and streams ---
# Configured via nats CLI or management API at startup:
#
# Stream: HEADY_MEMORY
#   Subjects: heady.memory.>
#   Retention: limits
#   MaxMsgs: 987 (FIB[16])
#   MaxAge: 377m (FIB[14] minutes)
#   Replicas: 3 (FIB[4])
#   MaxMsgSize: 238592 (FIB[13]×1024)
#
# Stream: HEADY_INFERENCE
#   Subjects: inference.>
#   Retention: workqueue
#   MaxMsgs: 233 (FIB[13])
#   MaxAge: 55m (FIB[10] minutes)
#   Replicas: 3 (FIB[4])
#   AckWait: 21s (FIB[8])
#   MaxDeliver: 3 (FIB[4]) — then DLQ
#
# Stream: HEADY_AGENTS
#   Subjects: agents.>
#   Retention: limits
#   MaxMsgs: 610 (FIB[15])
#   MaxAge: 144m (FIB[12] minutes)
#   Replicas: 3 (FIB[4])
#   MaxDeliver: 3 (FIB[4]) — then DLQ
#
# Stream: HEADY_EVENTS
#   Subjects: events.>
#   Retention: limits
#   MaxMsgs: 1597 (FIB[17])
#   MaxAge: 377m (FIB[14] minutes)
#   Replicas: 3 (FIB[4])
#
# Dead Letter Queue:
# Stream: HEADY_DLQ
#   Subjects: dlq.>
#   Retention: limits
#   MaxMsgs: 4181 (FIB[19])
#   MaxAge: 2584m (FIB[18] minutes)
#   Messages arrive here after FIB[4]=3 delivery retries fail
