name: Heady Deploy

on:
  release:
    types: [published]

env:
  NODE_VERSION: "20"
  GCP_PROJECT: heady-platform
  GCP_REGION: us-central1
  ARTIFACT_REGISTRY: us-central1-docker.pkg.dev/heady-platform/heady
  # Canary traffic percentages: φ-scaled rollout
  # 6.18% → 38.2% → 61.8% → 100%
  CANARY_STEP_1: 6
  CANARY_STEP_2: 38
  CANARY_STEP_3: 62

jobs:
  build-and-push:
    name: Build & Push (${{ matrix.service }})
    runs-on: ubuntu-latest
    timeout-minutes: 21
    strategy:
      fail-fast: true
      matrix:
        service:
          - auth-session-server
          - notification-service
          - analytics-service
          - billing-service
          - scheduler-service
    permissions:
      contents: read
      id-token: write
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v4
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.ARTIFACT_REGISTRY }}/${{ matrix.service }}
          tags: |
            type=semver,pattern={{version}}
            type=sha,prefix=

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: services/${{ matrix.service }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-canary:
    name: Canary Deploy (${{ matrix.service }})
    needs: build-and-push
    runs-on: ubuntu-latest
    timeout-minutes: 34 # FIB[9]
    strategy:
      fail-fast: true
      matrix:
        service:
          - auth-session-server
          - notification-service
          - analytics-service
          - billing-service
          - scheduler-service
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v4
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v4

      - name: Get image tag
        id: tag
        run: echo "TAG=${{ github.event.release.tag_name }}" >> $GITHUB_OUTPUT

      # Step 1: 6.18% canary (≈PSI² × 0.1618)
      - name: "Canary Step 1: ${{ env.CANARY_STEP_1 }}% traffic"
        run: |
          gcloud run services update-traffic ${{ matrix.service }} \
            --region=${{ env.GCP_REGION }} \
            --to-revisions=${{ matrix.service }}-${{ steps.tag.outputs.TAG }}=${{ env.CANARY_STEP_1 }}

      - name: "Verify canary step 1 (wait 21s = FIB[8])"
        run: |
          sleep 21
          SERVICE_URL=$(gcloud run services describe ${{ matrix.service }} \
            --region=${{ env.GCP_REGION }} --format='value(status.url)')
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "$SERVICE_URL/health")
          if [ "$HTTP_CODE" != "200" ]; then
            echo "::error::Canary health check failed with HTTP $HTTP_CODE"
            exit 1
          fi
          echo "Canary step 1 healthy"

      # Step 2: 38.2% canary (≈PSI²)
      - name: "Canary Step 2: ${{ env.CANARY_STEP_2 }}% traffic"
        run: |
          gcloud run services update-traffic ${{ matrix.service }} \
            --region=${{ env.GCP_REGION }} \
            --to-revisions=${{ matrix.service }}-${{ steps.tag.outputs.TAG }}=${{ env.CANARY_STEP_2 }}

      - name: "Verify canary step 2 (wait 21s)"
        run: |
          sleep 21
          SERVICE_URL=$(gcloud run services describe ${{ matrix.service }} \
            --region=${{ env.GCP_REGION }} --format='value(status.url)')
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "$SERVICE_URL/health")
          if [ "$HTTP_CODE" != "200" ]; then
            echo "::error::Canary step 2 health check failed — rolling back"
            gcloud run services update-traffic ${{ matrix.service }} \
              --region=${{ env.GCP_REGION }} --to-latest
            exit 1
          fi

      # Step 3: 61.8% canary (≈PSI)
      - name: "Canary Step 3: ${{ env.CANARY_STEP_3 }}% traffic"
        run: |
          gcloud run services update-traffic ${{ matrix.service }} \
            --region=${{ env.GCP_REGION }} \
            --to-revisions=${{ matrix.service }}-${{ steps.tag.outputs.TAG }}=${{ env.CANARY_STEP_3 }}

      - name: "Verify canary step 3 (wait 21s)"
        run: |
          sleep 21
          SERVICE_URL=$(gcloud run services describe ${{ matrix.service }} \
            --region=${{ env.GCP_REGION }} --format='value(status.url)')
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "$SERVICE_URL/health")
          if [ "$HTTP_CODE" != "200" ]; then
            echo "::error::Canary step 3 health check failed — rolling back"
            gcloud run services update-traffic ${{ matrix.service }} \
              --region=${{ env.GCP_REGION }} --to-latest
            exit 1
          fi

      # Step 4: 100% — full rollout
      - name: "Full rollout: 100% traffic"
        run: |
          gcloud run services update-traffic ${{ matrix.service }} \
            --region=${{ env.GCP_REGION }} \
            --to-revisions=${{ matrix.service }}-${{ steps.tag.outputs.TAG }}=100

      - name: "Final verification"
        run: |
          sleep 13
          SERVICE_URL=$(gcloud run services describe ${{ matrix.service }} \
            --region=${{ env.GCP_REGION }} --format='value(status.url)')
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "$SERVICE_URL/health")
          if [ "$HTTP_CODE" != "200" ]; then
            echo "::error::Post-deploy health check failed — rolling back"
            gcloud run services update-traffic ${{ matrix.service }} \
              --region=${{ env.GCP_REGION }} --to-latest
            exit 1
          fi
          echo "Deployment complete for ${{ matrix.service }}"

  rollback:
    name: Rollback on failure
    needs: deploy-canary
    if: failure()
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - auth-session-server
          - notification-service
          - analytics-service
          - billing-service
          - scheduler-service
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v4
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v4

      - name: Rollback to previous revision
        run: |
          echo "Rolling back ${{ matrix.service }}..."
          gcloud run services update-traffic ${{ matrix.service }} \
            --region=${{ env.GCP_REGION }} --to-latest
          echo "Rollback complete for ${{ matrix.service }}"
