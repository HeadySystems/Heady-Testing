; PgBouncer configuration for Heady platform
; All pool sizes and thresholds use φ-math / Fibonacci values
;
; FIB[9]=34   → default_pool_size
; FIB[10]=55  → min_pool_size
; FIB[13]=233 → max_client_conn
; FIB[8]=21   → reserve_pool_timeout
; FIB[7]=13   → server_idle_timeout (×60 = 780s)
; FIB[6]=8    → server_login_retry

[databases]
; Production databases — connect through PgBouncer for connection pooling
heady_auth     = host=127.0.0.1 port=5432 dbname=heady_auth     auth_user=heady_auth_svc
heady_analytics = host=127.0.0.1 port=5432 dbname=heady_analytics auth_user=heady_analytics_svc
heady_billing  = host=127.0.0.1 port=5432 dbname=heady_billing  auth_user=heady_billing_svc
heady_scheduler = host=127.0.0.1 port=5432 dbname=heady_scheduler auth_user=heady_scheduler_svc
heady_vectors  = host=127.0.0.1 port=5432 dbname=heady_vectors  auth_user=heady_vectors_svc

[pgbouncer]
; --- Listening ---
listen_addr = 0.0.0.0
listen_port = 6432
unix_socket_dir = /var/run/pgbouncer

; --- Authentication ---
auth_type = scram-sha-256
auth_file = /etc/pgbouncer/userlist.txt

; --- Pool mode ---
; transaction mode: connections returned to pool after each transaction
; Required for serverless / high-concurrency microservice workloads
pool_mode = transaction

; --- Pool sizing (φ-scaled) ---
; FIB[9]=34 connections per user/database pair
default_pool_size = 34

; FIB[10]=55 minimum pool connections maintained
min_pool_size = 55

; FIB[5]=5 reserve pool connections for burst traffic
reserve_pool_size = 5

; FIB[8]=21 seconds before reserve pool connections are used
reserve_pool_timeout = 21

; --- Connection limits (φ-scaled) ---
; FIB[13]=233 max client connections across all pools
max_client_conn = 233

; FIB[11]=89 max connections to PostgreSQL per pool
max_db_connections = 89

; FIB[10]=55 max connections per user across pools
max_user_connections = 55

; --- Timeouts (φ-scaled) ---
; FIB[7]=13 × 60 = 780 seconds idle before server connection closed
server_idle_timeout = 780

; FIB[8]=21 seconds to wait for a connection from pool
client_idle_timeout = 21

; FIB[6]=8 seconds between login retries on connection failure
server_login_retry = 8

; FIB[8]=21 seconds to wait for server to respond to connect
server_connect_timeout = 21

; FIB[7]=13 seconds query timeout (0 = disabled in production)
query_timeout = 0

; FIB[8]=21 seconds to wait for client query before closing
client_login_timeout = 21

; --- Logging ---
log_connections = 1
log_disconnections = 1
log_pooler_errors = 1
stats_period = 21
verbose = 0

; --- TLS ---
; Enable TLS for client connections
client_tls_sslmode = prefer
client_tls_key_file = /etc/pgbouncer/tls/server.key
client_tls_cert_file = /etc/pgbouncer/tls/server.crt

; Require TLS for upstream PostgreSQL connections
server_tls_sslmode = require

; --- Housekeeping ---
; DNS lookup caching: FIB[8]=21 seconds
dns_max_ttl = 21

; TCP keepalive interval: FIB[8]=21 seconds
tcp_keepalive = 21
tcp_keepidle = 21
tcp_keepintvl = 8
tcp_keepcnt = 5

; Admin access for monitoring
admin_users = heady_admin
stats_users = heady_monitor

; Process settings
pidfile = /var/run/pgbouncer/pgbouncer.pid
