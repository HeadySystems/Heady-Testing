name: validate-registry
on:
  push:
    branches: ["**"]
  pull_request:
permissions:
  contents: read
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - run: |
          python -m pip install --upgrade pip
          pip install "dvc[s3]"
      - run: dvc doctor
      - name: Optional remote check
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.HEADY_B2_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.HEADY_B2_APPLICATION_KEY }}
        run: |
          if [[ -n "${AWS_ACCESS_KEY_ID}" && -n "${AWS_SECRET_ACCESS_KEY}" ]]; then
            dvc status -c
          else
            echo "No secrets; skipping remote check."
          fi
