# ═══════════════════════════════════════════════════════════════════════════════
# Heady™ Latent OS — Domain Routing Configuration
# Maps each Heady domain to its architectural role, projection repo, and services.
#
# © 2026-2026 HeadySystems Inc. All Rights Reserved. 60+ Provisional Patents.
# ═══════════════════════════════════════════════════════════════════════════════

domains:

  # ─── Command Center ──────────────────────────────────────────────────────────
  headyme:
    url:             https://headyme.com
    role:            command_center
    description:     "Primary user-facing dashboard — manages all Heady™ sessions, agents, and outputs"
    projection_repo: headyme-projection
    services:
      - session-manager
      - dashboard-api
      - user-auth
      - notification-service
    csl_gate:        0.809   # CSL_THRESHOLDS.MEDIUM — moderate alignment required
    pool:            hot      # latency-critical

  # ─── Architecture Engine ─────────────────────────────────────────────────────
  headysystems:
    url:             https://headysystems.com
    role:            architecture_engine
    description:     "Core platform engineering — deploys and scales the Heady™ Latent OS"
    projection_repo: headysystems-projection
    services:
      - infra-provisioner
      - swarm-coordinator
      - liquid-scheduler
      - deployment-api
    csl_gate:        0.882   # CSL_THRESHOLDS.HIGH — strong alignment required
    pool:            warm

  # ─── Nonprofit Hub ───────────────────────────────────────────────────────────
  headyconnection:
    url:             https://headyconnection.org
    role:            nonprofit
    description:     "Nonprofit community platform — education, outreach, and open initiatives"
    projection_repo: headyconnection-projection
    services:
      - content-cms
      - community-api
      - donation-service
      - volunteer-portal
    csl_gate:        0.618   # PSI — standard CSL gate
    pool:            warm

  # ─── Companion AI ────────────────────────────────────────────────────────────
  headybuddy:
    url:             https://headybuddy.org
    role:            companion
    description:     "AI companion layer — empathic interaction, emotional support, personal assistant"
    projection_repo: headybuddy-projection
    services:
      - companion-agent
      - emotional-model
      - memory-bridge
      - voice-interface
    csl_gate:        0.809   # CSL_THRESHOLDS.MEDIUM
    pool:            hot

  # ─── MCP Layer ───────────────────────────────────────────────────────────────
  headymcp:
    url:             https://headymcp.com
    role:            mcp_layer
    description:     "Model Context Protocol gateway — routes tool calls and model context across the OS"
    projection_repo: headymcp-projection
    services:
      - mcp-gateway
      - tool-registry
      - context-router
      - json-rpc-dispatcher
    csl_gate:        0.927   # CSL_THRESHOLDS.CRITICAL — near-certain alignment
    pool:            hot

  # ─── Developer Platform ──────────────────────────────────────────────────────
  headyio:
    url:             https://headyio.com
    role:            developer_platform
    description:     "SDK, CLI tools, and developer experience for the Heady™ ecosystem"
    projection_repo: headyio-projection
    services:
      - sdk-registry
      - cli-service
      - docs-api
      - sandbox-runner
    csl_gate:        0.691   # CSL_THRESHOLDS.LOW
    pool:            warm

  # ─── Automation Platform ─────────────────────────────────────────────────────
  headybot:
    url:             https://headybot.com
    role:            automation
    description:     "Workflow automation hub — n8n-style pipelines, bots, scheduled tasks"
    projection_repo: headybot-projection
    services:
      - workflow-engine
      - bot-registry
      - trigger-service
      - scheduler
    csl_gate:        0.809   # CSL_THRESHOLDS.MEDIUM
    pool:            warm

  # ─── API Gateway ─────────────────────────────────────────────────────────────
  headyapi:
    url:             https://headyapi.com
    role:            api_gateway
    description:     "Unified API gateway — rate limiting, auth, versioning, and routing"
    projection_repo: headyapi-projection
    services:
      - api-proxy
      - rate-limiter
      - auth-middleware
      - api-analytics
    csl_gate:        0.927   # CSL_THRESHOLDS.CRITICAL
    pool:            hot

  # ─── Intelligence Hub ────────────────────────────────────────────────────────
  headyai:
    url:             https://heady-ai.com
    role:            intelligence_hub
    description:     "AI model orchestration — inference, fine-tuning, vector search, and learning loops"
    projection_repo: headyai-projection
    services:
      - inference-router
      - vector-store
      - fine-tune-manager
      - monte-carlo-validator
    csl_gate:        0.882   # CSL_THRESHOLDS.HIGH
    pool:            hot

# ─── Routing Rules ────────────────────────────────────────────────────────────
# Applied by csl-router.js when dispatching cross-domain requests
routing:
  default_csl_gate: 0.618   # PSI — fallback gate for unregistered domains
  inter_domain_log: true    # log all cross-domain routing decisions
  max_hops:         8       # fib(6) — maximum routing hops before reject
  timeout_ms:       6854    # φ⁴ × 1000ms — cross-domain request timeout
