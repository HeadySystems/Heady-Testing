# ─── System Identity ───────────────────────────────────────────────────────────
system:
  name:    heady-latent-os
  version: "1.0.0"
  env:     "${NODE_ENV:-development}"   # override via environment variable

# ─── Phi Constants ─────────────────────────────────────────────────────────────
# Single source of truth — mirrors phi-math.js exports
phi_constants:
  PHI:       1.6180339887498948   # φ = (1 + √5) / 2
  PSI:       0.6180339887498949   # ψ = 1/φ  (conjugate ratio)
  PHI_SQ:    2.618033988749895    # φ² = φ + 1
  PHI_CUBED: 4.23606797749979     # φ³ = 2φ + 1
  SQRT5:     2.23606797749979     # √5

  # First 20 Fibonacci terms (0-indexed: fib(0)…fib(19))
  fibonacci:
    - 0   # fib(0)
    - 1   # fib(1)
    - 1   # fib(2)
    - 2   # fib(3)
    - 3   # fib(4)  ← MAX_RETRIES_CYCLE
    - 5   # fib(5)
    - 8   # fib(6)  ← MAX_RETRIES_TOTAL
    - 13  # fib(7)  ← AUTO_SUCCESS.CATEGORIES
    - 21  # fib(8)  ← PIPELINE.STAGES
    - 34  # fib(9)
    - 55  # fib(10)
    - 89  # fib(11) ← BEE.TYPES
    - 144 # fib(12) ← AUTO_SUCCESS.TASKS_TOTAL, EVENT_BUS ring buffer
    - 233 # fib(13)
    - 377 # fib(14)
    - 610 # fib(15) ← LOG_ROTATION_THRESHOLD (≈ fib(16) × PSI)
    - 987 # fib(16) ← LOG_BUFFER_CAPACITY
    - 1597 # fib(17)
    - 2584 # fib(18)
    - 4181 # fib(19)

# ─── Resource Pools (φ-weighted) ───────────────────────────────────────────────
# Percentages are φ-geometric: 34/21/13/8/5 ≈ fib(9)/fib(8)/fib(7)/fib(6)/fib(5)
pools:
  hot:        0.34    # 34% — user-facing, latency-critical   (≈ fib(9)/fib(10))
  warm:       0.21    # 21% — important background             (≈ fib(8)/fib(10))
  cold:       0.13    # 13% — batch, analytics                 (≈ fib(7)/fib(10))
  reserve:    0.08    # 8%  — burst capacity                   (≈ fib(6)/fib(10))
  governance: 0.05    # 5%  — HeadyCheck/HeadyAssure always-on (≈ fib(5)/fib(10))
  # Total: 81% — remaining 19% floats as unallocated headroom (PSI² ≈ 0.382)

# ─── Auto-Success Engine ───────────────────────────────────────────────────────
auto_success:
  cycle_ms:         29034  # φ⁷ × 1000ms  — PHI_TIMING.PHI_7
  task_timeout_ms:  4236   # φ³ × 1000ms  — PHI_TIMING.PHI_3
  categories:       13     # fib(7)
  tasks_total:      144    # fib(12)
  tasks_per_cat:    11     # floor(144 / 13)
  max_retries_cycle: 3     # fib(4) — per-cycle retry limit
  max_retries_total: 8     # fib(6) — escalation threshold

  category_names:
    - CodeQuality
    - Security
    - Performance
    - Availability
    - Compliance
    - Learning
    - Communication
    - Infrastructure
    - Intelligence
    - DataSync
    - CostOptimization
    - SelfAwareness
    - Evolution

# ─── Processing Pipeline ───────────────────────────────────────────────────────
pipeline:
  stages:         21    # fib(8)
  max_concurrent: 8     # fib(6)
  max_retries:    3     # fib(4)
  context_gate:   0.92  # embedding density gate

  timeouts_ms:
    recon:     6854    # φ⁴ × 1000ms
    intake:    4236    # φ³ × 1000ms
    trial:     17944   # φ⁶ × 1000ms
    execute:   120000  # 2 minutes (hard wall)
    awareness: 11090   # φ⁵ × 1000ms
    search:    29034   # φ⁷ × 1000ms
    evolution: 29034   # φ⁷ × 1000ms
    receipt:   6854    # φ⁴ × 1000ms
    default:   29034   # φ⁷ × 1000ms

  backoff_ms:     [1618, 2618, 4236]   # φ¹, φ², φ³ × 1000ms
  max_backoff_ms: 11090                # φ⁵ × 1000ms

# ─── Vector Memory ─────────────────────────────────────────────────────────────
vector_memory:
  dims:             384    # embedding dimensions (all-MiniLM-L6 / similar)
  projection:       3      # 3D spatial projection (xyz octant space)
  drift_threshold:  0.809  # CSL_THRESHOLDS.MEDIUM = phiThreshold(2) ≈ φ⁻²
  dedup_threshold:  0.972  # CSL_THRESHOLDS.DEDUP — semantic identity floor
  min_score:        0.618  # PSI — minimum retrieval relevance

# ─── Token Budgets ─────────────────────────────────────────────────────────────
token_budgets:
  working:   8192    # base context window
  session:   21504   # base × φ²  ≈ 8192 × 2.618
  memory:    56000   # base × φ⁴  ≈ 8192 × 6.854
  artifacts: 152000  # base × φ⁶  ≈ 8192 × 17.944

# ─── Cost Budgets ──────────────────────────────────────────────────────────────
budgets:
  daily:       50.00   # USD per day — hard ceiling
  per_request: 0.001   # USD per inference request — soft target

# ─── Bee & Swarm Scaling ───────────────────────────────────────────────────────
bee:
  pre_warm:   [5, 8, 13, 21]   # fib(5)…fib(8) — tier pre-warm levels
  scale_up:   1.618            # queue > pool × φ → scale up
  scale_down: 0.382            # idle > pool × PSI² → scale down
  stale_ms:   60000            # 60s no heartbeat → dead
  max_total:  10000            # absolute bee ceiling
  swarms:     17               # number of active swarm groups
  types:      89               # fib(11) bee types

# ─── Server ────────────────────────────────────────────────────────────────────
server:
  port:          3301          # default HTTP port
  host:          "0.0.0.0"
  body_limit_mb: 4             # request body size limit

# ─── Logging ───────────────────────────────────────────────────────────────────
logging:
  level:          INFO
  buffer_capacity: 987         # fib(16) log ring buffer entries
  rotation_ratio:  0.618       # PSI — trigger rotation at 61.8% capacity
