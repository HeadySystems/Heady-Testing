  1:  1
  2:  1
  3:  2
  4:  3    # fib(4)  — MAX_RETRIES_CYCLE
  5:  5    # fib(5)  — BEE.PRE_WARM[0]
  6:  8    # fib(6)  — MAX_RETRIES_TOTAL, PIPELINE.MAX_CONCURRENT
  7:  13   # fib(7)  — AUTO_SUCCESS.CATEGORIES
  8:  21   # fib(8)  — PIPELINE.STAGES
  9:  34   # fib(9)
  10: 55   # fib(10) — EventEmitter.maxListeners
  11: 89   # fib(11) — BEE.TYPES
  12: 144  # fib(12) — AUTO_SUCCESS.TASKS_TOTAL, EventBus ring buffer
  13: 233  # fib(13)
  14: 377  # fib(14)
  15: 610  # fib(15) — LOG_ROTATION_THRESHOLD approx
  16: 987  # fib(16) — LOG_BUFFER_CAPACITY
  17: 1597 # fib(17)
  18: 2584 # fib(18)
  19: 4181 # fib(19)
  20: 6765 # fib(20)

# ─── Phi Timing (φⁿ × 1000ms) ────────────────────────────────────────────────
timing:
  phi_1:  1618    # φ¹ × 1000 — quick retries
  phi_2:  2618    # φ² × 1000 — short operations
  phi_3:  4236    # φ³ × 1000 — task timeout (AUTO_SUCCESS.TASK_TIMEOUT_MS)
  phi_4:  6854    # φ⁴ × 1000 — API calls, webhooks, recon
  phi_5:  11090   # φ⁵ × 1000 — complex operations, teardown timeout
  phi_6:  17944   # φ⁶ × 1000 — trial execution
  phi_7:  29034   # φ⁷ × 1000 — heartbeat cycle (AUTO_SUCCESS.CYCLE_MS)
  phi_8:  46979   # φ⁸ × 1000 — long operations
  phi_9:  75025   # φ⁹ × 1000 — extended operations  (= fib(25) × 1000)
  phi_10: 121393  # φ¹⁰× 1000 — max single operation (≈ fib(26) × 1000)

# ─── CSL Gate Thresholds (phiThreshold(n) = 1 − ψⁿ × 0.5) ───────────────────
thresholds:
  minimum:   0.500  # phiThreshold(0) — noise floor
  low:       0.691  # phiThreshold(1) — weak alignment  (ALIVE gate)
  medium:    0.809  # phiThreshold(2) — moderate alignment (READY gate, DRIFT)
  high:      0.882  # phiThreshold(3) — strong alignment
  critical:  0.927  # phiThreshold(4) — near-certain
  default:   0.618  # PSI — standard CSL gate (1/φ)
  dedup:     0.972  # semantic identity threshold
  coherence: 0.809  # drift detection threshold (= medium)

# ─── Pressure Levels (utilisation bands) ─────────────────────────────────────
pressure_levels:
  nominal:
    min:   0.000   # 0
    max:   0.382   # ψ² = PSI²
    label: NOMINAL
  elevated:
    min:   0.382   # ψ²
    max:   0.618   # ψ  = PSI
    label: ELEVATED
  high:
    min:   0.618   # ψ
    max:   0.854   # 1 − ψ³
    label: HIGH
  critical:
    min:   0.910   # 1 − ψ⁴
    max:   1.000
    label: CRITICAL

# ─── Alert Thresholds ────────────────────────────────────────────────────────
alert_thresholds:
  warning:  0.618  # PSI        — first alert
  caution:  0.764  # 1 − ψ²     — yellow
  critical: 0.854  # 1 − ψ³     — orange
  exceeded: 0.910  # 1 − ψ⁴     — red
  hard_max: 1.000  # absolute ceiling

# ─── Resource Allocation Pools ───────────────────────────────────────────────
# Φ-geometric: 34/21/13/8/5 mirrors fib(9)/fib(8)/fib(7)/fib(6)/fib(5)
resource_allocation:
  hot:        0.34   # user-facing, latency-critical
  warm:       0.21   # important background
  cold:       0.13   # batch, analytics
  reserve:    0.08   # burst capacity
  governance: 0.05   # HeadyCheck / HeadyAssure
  # headroom:  0.19  # = 1 − sum above ≈ PSI²

# ─── Scoring Weights (phi-fusion) ────────────────────────────────────────────
scoring_weights:
  judge:
    correctness: 0.34   # highest weight (≈ fib(9)/fib(10))
    safety:      0.21   # (≈ fib(8)/fib(10))
    performance: 0.21
    quality:     0.13   # (≈ fib(7)/fib(10))
    elegance:    0.11   # (≈ fib(6)/fib(10) rounded)

  cost:
    time:    0.382   # ψ²
    money:   0.382   # ψ²
    quality: 0.236   # ψ³

  eviction:
    importance: 0.486  # ≈ ψ⁻¹ × ψ²
    recency:    0.300
    relevance:  0.214  # ≈ ψ³

# ─── Bee Scaling ─────────────────────────────────────────────────────────────
bee_scaling:
  pre_warm:    [5, 8, 13, 21]  # fib(5)…fib(8) — tier pre-warm levels
  scale_up:    1.618           # PHI — trigger: queue > pool × φ
  scale_down:  0.382           # ψ²  — trigger: idle  > pool × ψ²
  stale_ms:    60000           # 60 000ms = 60s — heartbeat stale threshold
  max_total:   10000
  swarms:      17              # number of swarm groups
  types:       89              # fib(11) distinct bee types
  lifecycle:
    - SPAWN
    - INITIALIZE
    - READY
    - ACTIVE
    - DRAINING
    - SHUTDOWN
    - DEAD

# ─── UI Typography Scale ─────────────────────────────────────────────────────
# Base 16px scaled by successive powers of φ
ui_typography:
  scale_ratio: 1.618   # φ — one step up multiplies size by φ
  sizes_px:
    xs:   6.10    # base / φ³    ≈  6px
    sm:   9.89    # base / φ²    ≈ 10px
    base: 16.00   # 16px
    md:   25.89   # base × φ     ≈ 26px
    lg:   41.89   # base × φ²    ≈ 42px
    xl:   67.77   # base × φ³    ≈ 68px
    xxl:  109.66  # base × φ⁴    ≈ 110px

# ─── UI Spacing (Fibonacci sequence px) ──────────────────────────────────────
ui_spacing:
  fibonacci: [1, 2, 3, 5, 8, 13, 21, 34]   # fib(1)…fib(9) in pixels
  # Maps to: xs=1, sm=2, base=3, md=5, lg=8, xl=13, 2xl=21, 3xl=34
