# ─── Golden Ratio Core ────────────────────────────────────────────────────────
golden_ratio:
  phi:       1.6180339887498948   # φ  = (1+√5)/2  — the golden ratio
  psi:       0.6180339887498949   # ψ  = 1/φ = φ-1 — conjugate / PSI
  phi_sq:    2.618033988749895    # φ² = φ+1
  phi_cubed: 4.23606797749979     # φ³ = 2φ+1
  phi_4:     6.854101966249685    # φ⁴ = 3φ+2
  phi_5:     11.09016994374948    # φ⁵ = 5φ+3
  phi_6:     17.944271909999157   # φ⁶ = 8φ+5
  phi_7:     29.034441853748627   # φ⁷ = 13φ+8
  phi_8:     46.97871376374778    # φ⁸ = 21φ+13
  phi_9:     76.0131556174964     # φ⁹ = 34φ+21
  phi_10:    122.99186938124418   # φ¹⁰= 55φ+34
  sqrt5:     2.23606797749979     # √5

