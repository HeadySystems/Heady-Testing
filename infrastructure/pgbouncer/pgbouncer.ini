# PgBouncer Configuration — Heady™ Connection Pooler
# Sits between 50 services and pgvector
# Fibonacci-scaled pool sizes
# © 2026 HeadySystems Inc.

[databases]
heady_vector = host=postgres port=5432 dbname=heady_vector auth_user=heady

[pgbouncer]
# Connection pooling mode: transaction (default for microservices)
pool_mode = transaction

# Fibonacci-scaled pool sizes
default_pool_size = 34
min_pool_size = 8
reserve_pool_size = 13
reserve_pool_timeout = 5

# Max connections
max_client_conn = 233
max_db_connections = 89

# Timeouts (φ-scaled)
server_connect_timeout = 2
server_idle_timeout = 89
server_lifetime = 610
client_idle_timeout = 55
client_login_timeout = 13
query_timeout = 21
query_wait_timeout = 34

# Logging
log_connections = 1
log_disconnections = 1
log_pooler_errors = 1
stats_period = 13

# Auth
auth_type = md5
auth_file = /etc/pgbouncer/userlist.txt

# Admin
admin_users = heady
listen_addr = 0.0.0.0
listen_port = 6432
