# Envoy Sidecar Proxy Configuration for Heady™ Services
# Every service runs with this sidecar for:
# - mTLS between services (zero-trust)
# - φ-scaled timeouts and retries
# - Circuit breaking with Fibonacci thresholds
# - Health checking
# © 2024-2026 HeadySystems Inc. 51 Provisional Patents.

admin:
  address:
    socket_address:
      address: 0.0.0.0
      port_value: 15000

static_resources:
  listeners:
    - name: inbound
      address:
        socket_address:
          address: 0.0.0.0
          port_value: 8080
      filter_chains:
        - filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                stat_prefix: heady_inbound
                codec_type: AUTO
                generate_request_id: true
                route_config:
                  name: local_service
                  virtual_hosts:
                    - name: local
                      domains: ["*"]
                      routes:
                        - match:
                            prefix: "/"
                          route:
                            cluster: local_service
                            timeout: 4.236s  # φ³ seconds
                            retry_policy:
                              retry_on: "5xx,connect-failure,retriable-4xx"
                              num_retries: 3
                              per_try_timeout: 2.618s  # φ² seconds
                              retry_back_off:
                                base_interval: 0.382s  # ψ² seconds
                                max_interval: 1.618s   # φ seconds
                http_filters:
                  - name: envoy.filters.http.health_check
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.health_check.v3.HealthCheck
                      pass_through_mode: false
                      headers:
                        - name: ":path"
                          string_match:
                            exact: "/healthz"
                  - name: envoy.filters.http.router
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router

  clusters:
    - name: local_service
      connect_timeout: 1.618s
      type: STATIC
      lb_policy: ROUND_ROBIN
      load_assignment:
        cluster_name: local_service
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: 127.0.0.1
                      port_value: 3310  # Override per service
      health_checks:
        - timeout: 2s
          interval: 3s
          unhealthy_threshold: 3
          healthy_threshold: 2
          http_health_check:
            path: "/healthz"
      circuit_breakers:
        thresholds:
          - max_connections: 89
            max_pending_requests: 55
            max_requests: 144
            max_retries: 5
            track_remaining: true
      outlier_detection:
        consecutive_5xx: 3
        interval: 3s
        base_ejection_time: 5s
        max_ejection_percent: 38
        enforcing_consecutive_5xx: 100
