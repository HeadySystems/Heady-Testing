# Heady™ Envoy Sidecar Configuration
# © 2026 HeadySystems Inc. — Eric Haywood (eric@headysystems.com) — 51 Provisional Patents
# φ-scaled timeouts: connect=1618ms(φ¹×1000), request=4236ms(φ³×1000)
# Fibonacci circuit breakers: consecutive_5xx=5(fib(5)), max_connections=89(fib(11)),
#   max_pending=55(fib(10)), max_requests=144(fib(12)), max_retries=3(fib(4))
# All constants derive from φ (1.618) or Fibonacci — ZERO magic numbers.
# ═══════════════════════════════════════════════════════════════════════════════

static_resources:

  # ═══ LISTENERS ═══════════════════════════════════════════════════════════════

  listeners:

    # ─── Public HTTP Ingress (port 8080) ──────────────────────────────────────
    - name: heady_ingress
      address:
        socket_address:
          address: 0.0.0.0
          port_value: 8080
      filter_chains:
        - filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                stat_prefix: heady_ingress
                codec_type: AUTO
                route_config:
                  name: heady_routes
                  virtual_hosts:
                    - name: heady_services
                      domains: ["*"]
                      rate_limits:
                        - actions:
                            - remote_address: {}
                      routes:
                        # Inference domain — φ⁷ timeout for complex model operations
                        - match: { prefix: "/api/v1/brain" }
                          route:
                            cluster: inference_cluster
                            timeout: 29.034s     # φ⁷ × 1000ms = 29034ms
                        - match: { prefix: "/api/v1/infer" }
                          route:
                            cluster: inference_cluster
                            timeout: 29.034s     # φ⁷ × 1000ms
                        # Memory domain — φ⁵ timeout for embedding/vector ops
                        - match: { prefix: "/api/v1/memory" }
                          route:
                            cluster: memory_cluster
                            timeout: 11.090s     # φ⁵ × 1000ms = 11090ms
                        - match: { prefix: "/api/v1/embed" }
                          route:
                            cluster: memory_cluster
                            timeout: 11.090s     # φ⁵ × 1000ms
                        # Agents domain — φ⁶ timeout for swarm coordination
                        - match: { prefix: "/api/v1/agents" }
                          route:
                            cluster: agents_cluster
                            timeout: 17.944s     # φ⁶ × 1000ms = 17944ms
                        - match: { prefix: "/api/v1/bees" }
                          route:
                            cluster: agents_cluster
                            timeout: 17.944s     # φ⁶ × 1000ms
                        # Orchestration domain — φ⁷ timeout for pipeline execution
                        - match: { prefix: "/api/v1/orchestrate" }
                          route:
                            cluster: orchestration_cluster
                            timeout: 29.034s     # φ⁷ × 1000ms
                        - match: { prefix: "/api/v1/pipeline" }
                          route:
                            cluster: orchestration_cluster
                            timeout: 29.034s     # φ⁷ × 1000ms
                        # Security domain — φ³ timeout for fast auth checks
                        - match: { prefix: "/api/v1/security" }
                          route:
                            cluster: security_cluster
                            timeout: 4.236s      # φ³ × 1000ms = 4236ms
                        - match: { prefix: "/auth" }
                          route:
                            cluster: security_cluster
                            timeout: 4.236s      # φ³ × 1000ms
                        # Monitoring domain — φ² timeout for health probes
                        - match: { prefix: "/health" }
                          route:
                            cluster: monitoring_cluster
                            timeout: 2.618s      # φ² × 1000ms = 2618ms
                        - match: { prefix: "/metrics" }
                          route:
                            cluster: monitoring_cluster
                            timeout: 2.618s      # φ² × 1000ms
                        # Web domain — φ⁴ timeout for user-facing pages
                        - match: { prefix: "/app" }
                          route:
                            cluster: web_cluster
                            timeout: 6.854s      # φ⁴ × 1000ms = 6854ms
                        - match: { prefix: "/onboard" }
                          route:
                            cluster: web_cluster
                            timeout: 6.854s      # φ⁴ × 1000ms
                        # Integration domain — φ⁴ timeout for external API calls
                        - match: { prefix: "/api/v1/mcp" }
                          route:
                            cluster: integration_cluster
                            timeout: 6.854s      # φ⁴ × 1000ms = 6854ms
                        # Default catch-all to API gateway — φ³ timeout
                        - match: { prefix: "/" }
                          route:
                            cluster: api_gateway_cluster
                            timeout: 4.236s      # φ³ × 1000ms = 4236ms
                http_filters:
                  - name: envoy.filters.http.cors
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.cors.v3.Cors
                  - name: envoy.filters.http.local_ratelimit
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.local_ratelimit.v3.LocalRateLimit
                      stat_prefix: heady_rate_limit
                      token_bucket:
                        max_tokens: 233          # fib(13) = 233 — burst capacity
                        tokens_per_fill: 89      # fib(11) = 89 — sustained rate
                        fill_interval: 1s
                      filter_enabled:
                        runtime_key: local_rate_limit_enabled
                        default_value:
                          numerator: 100
                          denominator: HUNDRED
                      filter_enforced:
                        runtime_key: local_rate_limit_enforced
                        default_value:
                          numerator: 100
                          denominator: HUNDRED
                  - name: envoy.filters.http.router
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router

    # ─── mTLS Internal Ingress (port 8443) ────────────────────────────────────
    - name: heady_tls_ingress
      address:
        socket_address:
          address: 0.0.0.0
          port_value: 8443
      filter_chains:
        - transport_socket:
            name: envoy.transport_sockets.tls
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.transport_sockets.tls.v3.DownstreamTlsContext
              common_tls_context:
                tls_params:
                  tls_minimum_protocol_version: TLSv1_3
                  tls_maximum_protocol_version: TLSv1_3
                tls_certificates:
                  - certificate_chain:
                      filename: /etc/envoy/certs/server.crt
                    private_key:
                      filename: /etc/envoy/certs/server.key
                validation_context:
                  trusted_ca:
                    filename: /etc/envoy/certs/ca.crt
              require_client_certificate: true
          filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                stat_prefix: heady_mtls
                codec_type: AUTO
                route_config:
                  name: heady_internal_routes
                  virtual_hosts:
                    - name: internal
                      domains: ["*"]
                      routes:
                        - match: { prefix: "/internal/inference" }
                          route:
                            cluster: inference_cluster
                            timeout: 29.034s     # φ⁷ × 1000ms
                        - match: { prefix: "/internal/memory" }
                          route:
                            cluster: memory_cluster
                            timeout: 11.090s     # φ⁵ × 1000ms
                        - match: { prefix: "/internal/agents" }
                          route:
                            cluster: agents_cluster
                            timeout: 17.944s     # φ⁶ × 1000ms
                        - match: { prefix: "/internal/orchestrate" }
                          route:
                            cluster: orchestration_cluster
                            timeout: 29.034s     # φ⁷ × 1000ms
                        - match: { prefix: "/internal/security" }
                          route:
                            cluster: security_cluster
                            timeout: 4.236s      # φ³ × 1000ms
                        - match: { prefix: "/internal/monitor" }
                          route:
                            cluster: monitoring_cluster
                            timeout: 2.618s      # φ² × 1000ms
                        - match: { prefix: "/" }
                          route:
                            cluster: api_gateway_cluster
                            timeout: 4.236s      # φ³ × 1000ms
                http_filters:
                  - name: envoy.filters.http.router
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router

  # ═══ CLUSTERS ═══════════════════════════════════════════════════════════════
  # Each cluster uses φ-scaled connect timeout (1.618s = φ¹ × 1000ms)
  # Fibonacci circuit breakers protect against cascading failures

  clusters:

    # ─── Inference Cluster (heady-brain:3310, heady-brains:3311, heady-infer:3312, ai-router:3313, model-gateway:3314)
    - name: inference_cluster
      connect_timeout: 1.618s            # φ¹ × 1000ms = 1618ms
      type: STRICT_DNS
      lb_policy: ROUND_ROBIN
      circuit_breakers:
        thresholds:
          - max_connections: 89           # fib(11) = 89
            max_pending_requests: 55      # fib(10) = 55
            max_requests: 144             # fib(12) = 144
            max_retries: 3               # fib(4) = 3
            retry_budget:
              budget_percent:
                value: 38.2              # ψ² × 100 = 38.2%
              min_retry_concurrency: 3   # fib(4)
      outlier_detection:
        consecutive_5xx: 5               # fib(5) = 5 — eject after 5 consecutive errors
        interval: 4.236s                 # φ³ × 1000ms = 4236ms
        base_ejection_time: 6.854s       # φ⁴ × 1000ms = 6854ms
        max_ejection_percent: 34         # fib(9) = 34 — max 34% ejected
      load_assignment:
        cluster_name: inference_cluster
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address: { address: heady-brain, port_value: 3310 }
              - endpoint:
                  address:
                    socket_address: { address: heady-brains, port_value: 3311 }
              - endpoint:
                  address:
