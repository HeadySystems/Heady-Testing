# Envoy Proxy — Heady Systems mTLS + Routing
# Eric Haywood — Sacred Geometry v4.0
# Timeouts: connect=1.618s, request=4.236s (phi-scaled)

admin:
  address:
    socket_address:
      address: 0.0.0.0
      port_value: 9901

static_resources:
  listeners:
    - name: heady_listener
      address:
        socket_address:
          address: 0.0.0.0
          port_value: 8080
      filter_chains:
        - filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                stat_prefix: heady_ingress
                codec_type: AUTO
                route_config:
                  name: heady_routes
                  virtual_hosts:
                    - name: heady_services
                      domains: ["*"]
                      routes:
                        - match: { prefix: "/api/" }
                          route:
                            cluster: api-gateway
                            timeout: 4.236s
                        - match: { prefix: "/health" }
                          route:
                            cluster: heady-health
                            timeout: 1.618s
                        - match: { prefix: "/" }
                          route:
                            cluster: heady-web
                            timeout: 4.236s
                http_filters:
                  - name: envoy.filters.http.cors
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.cors.v3.Cors
                  - name: envoy.filters.http.router
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router

  clusters:
    - name: api-gateway
      connect_timeout: 1.618s
      type: STRICT_DNS
      lb_policy: ROUND_ROBIN
      circuit_breakers:
        thresholds:
          - max_connections: 89
            max_pending_requests: 55
            max_requests: 144
            max_retries: 8
      load_assignment:
        cluster_name: api-gateway
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: api-gateway
                      port_value: 3345
    - name: heady-health
      connect_timeout: 1.618s
      type: STRICT_DNS
      lb_policy: ROUND_ROBIN
      load_assignment:
        cluster_name: heady-health
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: heady-health
                      port_value: 3334
    - name: heady-web
      connect_timeout: 1.618s
      type: STRICT_DNS
      lb_policy: ROUND_ROBIN
      load_assignment:
        cluster_name: heady-web
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: heady-web
                      port_value: 3338
