name: Security Scanning

on:
  schedule:
    # Run every Monday at 2 AM UTC
    - cron: "0 2 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

env:
  REGISTRY: gcr.io
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}

jobs:
  dependency-audit:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: npm audit --audit-level=moderate
        continue-on-error: true

      - name: Check for high/critical vulnerabilities
        run: |
          npm audit --json > audit-report.json
          CRITICAL=$(jq '.metadata.vulnerabilities.critical' audit-report.json)
          HIGH=$(jq '.metadata.vulnerabilities.high' audit-report.json)

          if [ "$CRITICAL" -gt 0 ] || [ "$HIGH" -gt 0 ]; then
            echo "Found critical or high vulnerabilities"
            jq '.vulnerabilities' audit-report.json
            exit 1
          fi

      - name: Run Snyk scan
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high --json-file-output=snyk-report.json
        continue-on-error: true

      - name: Upload Snyk results
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: snyk-report.sarif
        continue-on-error: true

  container-scanning:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    strategy:
      matrix:
        service:
          - auth
          - api-gateway
          - user-service
          - notification-service
          - payment-service
          - content-service
          - analytics-service
          - search-service

    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v4
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v4

      - name: Get latest image tag
        id: image
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/heady-${{ matrix.service }}:latest"
          echo "image=$IMAGE" >> $GITHUB_OUTPUT

      - name: Scan container image
        run: |
          gcloud container images scan ${{ steps.image.outputs.image }} --remote
        continue-on-error: true

      - name: Get scan results
        run: |
          gcloud container images describe ${{ steps.image.outputs.image }} \
            --format='value(image_summary.vulnerability_counts)' \
            --remote

  sast-scan:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Run CodeQL analysis
        uses: github/codeql-action/init@v4
        with:
          languages: javascript,typescript

      - name: Autobuild
        uses: github/codeql-action/autobuild@v4

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4

  license-check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check licenses
        run: |
          npx license-checker \
            --onlyAllow "MIT;Apache-2.0;ISC;BSD;BSD-2-Clause;BSD-3-Clause" \
            --excludePackages "heady" \
            --production
        continue-on-error: true

  secret-scanning:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run truffleHog
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD

      - name: Run GitGuardian
        uses: GitGuardian/github-action@main
        env:
          GITGUARDIAN_API_KEY: ${{ secrets.GITGUARDIAN_API_KEY }}
        continue-on-error: true

  infrastructure-scan:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: config
          scan-ref: ./infrastructure
          format: sarif
          output: trivy-results.sarif

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-results.sarif
        continue-on-error: true

  report-summary:
    needs: [dependency-audit, container-scanning, sast-scan, license-check, secret-scanning, infrastructure-scan]
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: Post scan summary
        uses: 8398a7/action-slack@v4
        with:
          status: custom
          custom_payload: |
            {
              text: `Security scan completed`,
              attachments: [{
                color: 'warning',
                fields: [{
                  title: 'Workflow',
                  value: process.env.AS_WORKFLOW,
                  short: true
                }]
              }]
            }
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
        continue-on-error: true
