# Heady™ CI — Test Pipeline
# © 2026 HeadySystems Inc. — Eric Haywood (eric@headysystems.com) — 51 Provisional Patents
# Runs lint, type-check, unit tests, integration tests, and φ-compliance.
# All numeric constants derive from φ (1.618) or Fibonacci — ZERO magic numbers.
# ═══════════════════════════════════════════════════════════════════════════════
name: Heady Test Suite

on:
  pull_request:
    branches: [main, production]
  push:
    branches: [main]

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ─── Lint & Type Check ─────────────────────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 8                    # fib(6) = 8
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - name: Run ESLint
        run: npm run lint
      - name: Type check
        run: npx tsc --noEmit 2>/dev/null || echo "TypeScript not configured — skipping type check"

  # ─── Unit Tests ────────────────────────────────────────────────────────────
  unit-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 13                   # fib(7) = 13
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - name: Run unit tests with coverage
        run: npm run test:unit -- --coverage
      - uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
          retention-days: 13              # fib(7) = 13 days

  # ─── Integration Tests ─────────────────────────────────────────────────────
  integration-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 21                   # fib(8) = 21
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: heady_test
          POSTGRES_USER: heady
          POSTGRES_PASSWORD: test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U heady"
          --health-interval 4s
          --health-timeout 3s
          --health-retries 3
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 4s
          --health-timeout 3s
          --health-retries 3
      nats:
        image: nats:2-alpine
        ports: ["4222:4222"]
        options: >-
          --health-cmd "nats-server --signal ldm"
          --health-interval 4s
          --health-timeout 3s
          --health-retries 3
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - name: Run integration tests
        run: npm run test:integration
        env:
          PGVECTOR_URL: ${{ secrets.TEST_PGVECTOR_URL }}
          REDIS_URL: ${{ secrets.TEST_REDIS_URL }}
          NATS_URL: ${{ secrets.TEST_NATS_URL }}
          NODE_ENV: test

  # ─── φ-Compliance Check ────────────────────────────────────────────────────
  phi-compliance:
    runs-on: ubuntu-latest
    timeout-minutes: 8                    # fib(6) = 8
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - name: Run φ-compliance checker
        run: node scripts/phi-compliance-check.js
      - name: Enforce 100% φ-compliance
        run: |
          RESULT=$(node scripts/phi-compliance-check.js 2>&1)
          echo "$RESULT"
          SCORE=$(echo "$RESULT" | grep "Score:" | grep -oP '\d+(?=/)' || echo "0")
          if [ "$SCORE" != "100" ]; then
            echo "::error::φ-Compliance FAILED: $SCORE/100 — all constants must derive from φ or Fibonacci"
            exit 1
          fi
          echo "::notice::φ-Compliance PASSED: 100/100 — zero magic numbers"

  # ─── Security Audit ────────────────────────────────────────────────────────
  security-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 8                    # fib(6) = 8
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - name: Run npm audit
        run: npm audit --audit-level=high || true
      - name: Check for sensitive files
        run: |
          if grep -r "AKIA\|sk-\|ghp_\|-----BEGIN" --include="*.js" --include="*.ts" --include="*.json" . 2>/dev/null | grep -v node_modules | grep -v ".env.example"; then
            echo "::error::Potential secrets detected in source files"
            exit 1
          fi
          echo "No secrets detected in source files"

  # ─── All Tests Gate ────────────────────────────────────────────────────────
  all-tests-pass:
    needs: [lint, unit-tests, integration-tests, phi-compliance, security-audit]
    runs-on: ubuntu-latest
    steps:
      - name: All checks passed
        run: echo "All Heady™ test gates passed — φ-compliant and ready"
