# ═══════════════════════════════════════════════════════════════════════════════
# Heady™ CI/CD — Build, Test, Deploy Pipeline
# © 2026 HeadySystems Inc. — Eric Haywood (eric@headysystems.com) — 51 Provisional Patents
# Builds all 50 services in parallel, pushes to GCR, deploys to Cloud Run.
# All numeric constants derive from φ (1.618) or Fibonacci — ZERO magic numbers.
# ═══════════════════════════════════════════════════════════════════════════════
name: Heady Deploy Pipeline

on:
  push:
    branches: [main, production]
  pull_request:
    branches: [main]

env:
  GCP_PROJECT: gen-lang-client-0920560496
  GCP_REGION: us-east1
  REGISTRY: gcr.io/gen-lang-client-0920560496
  HEADY_VERSION: "5.1.0"

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ─── Lint & Unit Tests ──────────────────────────────────────────────────────
  lint-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 13                   # fib(7) = 13
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm run lint
      - run: npm run test:unit

  # ─── φ-Compliance Verification ─────────────────────────────────────────────
  phi-compliance:
    runs-on: ubuntu-latest
    timeout-minutes: 8                    # fib(6) = 8
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: node scripts/phi-compliance-check.js
      - name: Verify zero magic numbers
        run: |
          SCORE=$(node scripts/phi-compliance-check.js 2>&1 | grep "Score:" | grep -oP '\d+(?=/)')
          if [ "$SCORE" != "100" ]; then
            echo "φ-Compliance failed: $SCORE/100"
            exit 1
          fi

  # ─── Integration Tests ─────────────────────────────────────────────────────
  integration-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 21                   # fib(8) = 21
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: heady_test
          POSTGRES_USER: heady
          POSTGRES_PASSWORD: test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U heady"
          --health-interval 4s
          --health-timeout 3s
          --health-retries 3
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 4s
          --health-timeout 3s
          --health-retries 3
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm run test:integration
        env:
          PGVECTOR_URL: ${{ secrets.TEST_PGVECTOR_URL }}
          REDIS_URL: ${{ secrets.TEST_REDIS_URL }}
          NATS_URL: ${{ secrets.TEST_NATS_URL }}

  # ─── Build & Push All 50 Services ──────────────────────────────────────────
  build-and-push:
    needs: [lint-and-test, phi-compliance, integration-tests]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/production'
    runs-on: ubuntu-latest
    timeout-minutes: 34                   # fib(9) = 34
    strategy:
      fail-fast: false
      max-parallel: 8                     # fib(6) = 8 — concurrent builds
      matrix:
        service:
          # Inference domain
          - heady-brain
          - heady-brains
          - heady-infer
          - ai-router
          - model-gateway
          # Memory domain
          - heady-embed
          - heady-memory
          - heady-vector
          - heady-projection
          # Agents domain
          - heady-bee-factory
          - heady-hive
          - heady-federation
          # Orchestration domain
          - heady-soul
          - heady-conductor
          - heady-orchestration
          - auto-success-engine
          - hcfullpipeline-executor
          - heady-chain
          - prompt-manager
          # Security domain
          - heady-guard
          - heady-security
          - heady-governance
          - secret-gateway
          # Monitoring domain
          - heady-health
          - heady-eval
          - heady-maintenance
          - heady-testing
          # Web domain
          - heady-web
          - heady-buddy
          - heady-ui
          - heady-onboarding
          - heady-pilot-onboarding
          - heady-task-browser
          # Data domain
          - heady-cache
          # Integration domain
          - api-gateway
          - domain-router
          - mcp-server
          - google-mcp
          - memory-mcp
          - perplexity-mcp
          - jules-mcp
          - huggingface-gateway
          - colab-gateway
          - silicon-bridge
          - discord-bot
          # Specialized domain
          - heady-vinci
          - heady-autobiographer
          - heady-midi
          - budget-tracker
          - cli-service
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - uses: google-github-actions/setup-gcloud@v2
      - run: gcloud auth configure-docker
      - name: Build and push ${{ matrix.service }}
        run: |
          docker build \
            --build-arg SERVICE_NAME=${{ matrix.service }} \
            -f infrastructure/docker/Dockerfile.service \
            -t $REGISTRY/${{ matrix.service }}:${{ github.sha }} \
            -t $REGISTRY/${{ matrix.service }}:latest \
            .
          docker push $REGISTRY/${{ matrix.service }}:${{ github.sha }}
          docker push $REGISTRY/${{ matrix.service }}:latest

  # ─── Deploy to Cloud Run ────────────────────────────────────────────────────
  deploy-cloud-run:
    needs: build-and-push
    if: github.ref == 'refs/heads/production'
    runs-on: ubuntu-latest
    timeout-minutes: 34                   # fib(9) = 34
    strategy:
      fail-fast: false
      max-parallel: 8                     # fib(6) = 8 — concurrent deploys
      matrix:
        service:
          # Inference — always-on, high concurrency
          - { name: heady-brain, port: 3310, memory: 610Mi, min: 1, max: 13, concurrency: 89 }
          - { name: heady-brains, port: 3311, memory: 610Mi, min: 1, max: 13, concurrency: 89 }
          - { name: heady-infer, port: 3312, memory: 233Mi, min: 0, max: 8, concurrency: 55 }
          - { name: ai-router, port: 3313, memory: 233Mi, min: 1, max: 8, concurrency: 89 }
          - { name: model-gateway, port: 3314, memory: 233Mi, min: 1, max: 13, concurrency: 89 }
          # Memory — always-on for embedding ops
          - { name: heady-embed, port: 3315, memory: 610Mi, min: 1, max: 8, concurrency: 55 }
          - { name: heady-memory, port: 3316, memory: 610Mi, min: 1, max: 8, concurrency: 55 }
          - { name: heady-vector, port: 3317, memory: 233Mi, min: 0, max: 5, concurrency: 34 }
          - { name: heady-projection, port: 3318, memory: 233Mi, min: 0, max: 5, concurrency: 34 }
          # Agents
          - { name: heady-bee-factory, port: 3319, memory: 233Mi, min: 1, max: 8, concurrency: 55 }
          - { name: heady-hive, port: 3320, memory: 233Mi, min: 0, max: 5, concurrency: 34 }
          - { name: heady-federation, port: 3321, memory: 233Mi, min: 0, max: 5, concurrency: 34 }
          # Orchestration — always-on core
          - { name: heady-soul, port: 3322, memory: 610Mi, min: 1, max: 8, concurrency: 55 }
          - { name: heady-conductor, port: 3323, memory: 610Mi, min: 1, max: 8, concurrency: 89 }
          - { name: heady-orchestration, port: 3324, memory: 233Mi, min: 0, max: 5, concurrency: 34 }
          - { name: auto-success-engine, port: 3325, memory: 233Mi, min: 1, max: 5, concurrency: 34 }
          - { name: hcfullpipeline-executor, port: 3326, memory: 610Mi, min: 1, max: 8, concurrency: 55 }
          - { name: heady-chain, port: 3327, memory: 233Mi, min: 0, max: 5, concurrency: 34 }
          - { name: prompt-manager, port: 3328, memory: 233Mi, min: 0, max: 5, concurrency: 34 }
          # Security — always-on
          - { name: heady-guard, port: 3329, memory: 233Mi, min: 1, max: 8, concurrency: 89 }
          - { name: heady-security, port: 3330, memory: 233Mi, min: 1, max: 8, concurrency: 89 }
          - { name: heady-governance, port: 3331, memory: 233Mi, min: 0, max: 5, concurrency: 34 }
          - { name: secret-gateway, port: 3332, memory: 233Mi, min: 1, max: 5, concurrency: 55 }
          # Monitoring
          - { name: heady-health, port: 3333, memory: 233Mi, min: 1, max: 5, concurrency: 55 }
          - { name: heady-eval, port: 3334, memory: 233Mi, min: 0, max: 5, concurrency: 34 }
          - { name: heady-maintenance, port: 3335, memory: 233Mi, min: 0, max: 3, concurrency: 21 }
          - { name: heady-testing, port: 3336, memory: 233Mi, min: 0, max: 3, concurrency: 21 }
          # Web — user-facing
          - { name: heady-web, port: 3337, memory: 233Mi, min: 1, max: 13, concurrency: 89 }
          - { name: heady-buddy, port: 3338, memory: 233Mi, min: 1, max: 8, concurrency: 55 }
          - { name: heady-ui, port: 3339, memory: 233Mi, min: 1, max: 8, concurrency: 55 }
          - { name: heady-onboarding, port: 3340, memory: 233Mi, min: 0, max: 5, concurrency: 34 }
          - { name: heady-pilot-onboarding, port: 3341, memory: 233Mi, min: 0, max: 5, concurrency: 34 }
          - { name: heady-task-browser, port: 3342, memory: 233Mi, min: 0, max: 5, concurrency: 34 }
          # Data
          - { name: heady-cache, port: 3343, memory: 233Mi, min: 1, max: 8, concurrency: 89 }
          # Integration
          - { name: api-gateway, port: 3344, memory: 610Mi, min: 1, max: 13, concurrency: 89 }
          - { name: domain-router, port: 3345, memory: 233Mi, min: 1, max: 8, concurrency: 55 }
          - { name: mcp-server, port: 3346, memory: 233Mi, min: 1, max: 8, concurrency: 34 }
          - { name: google-mcp, port: 3347, memory: 233Mi, min: 0, max: 5, concurrency: 34 }
          - { name: memory-mcp, port: 3348, memory: 233Mi, min: 0, max: 5, concurrency: 34 }
          - { name: perplexity-mcp, port: 3349, memory: 233Mi, min: 0, max: 5, concurrency: 34 }
          - { name: jules-mcp, port: 3350, memory: 233Mi, min: 0, max: 5, concurrency: 34 }
          - { name: huggingface-gateway, port: 3351, memory: 233Mi, min: 0, max: 5, concurrency: 34 }
          - { name: colab-gateway, port: 3352, memory: 610Mi, min: 1, max: 8, concurrency: 55 }
          - { name: silicon-bridge, port: 3353, memory: 233Mi, min: 0, max: 5, concurrency: 34 }
          - { name: discord-bot, port: 3354, memory: 233Mi, min: 0, max: 3, concurrency: 21 }
          # Specialized
          - { name: heady-vinci, port: 3355, memory: 610Mi, min: 1, max: 8, concurrency: 55 }
          - { name: heady-autobiographer, port: 3356, memory: 233Mi, min: 0, max: 5, concurrency: 34 }
          - { name: heady-midi, port: 3357, memory: 233Mi, min: 0, max: 3, concurrency: 21 }
          - { name: budget-tracker, port: 3358, memory: 233Mi, min: 0, max: 5, concurrency: 34 }
          - { name: cli-service, port: 3359, memory: 233Mi, min: 0, max: 3, concurrency: 21 }
    steps:
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - uses: google-github-actions/setup-gcloud@v2
      - name: Deploy ${{ matrix.service.name }}
        run: |
          gcloud run deploy ${{ matrix.service.name }} \
            --image $REGISTRY/${{ matrix.service.name }}:${{ github.sha }} \
            --region $GCP_REGION \
            --port ${{ matrix.service.port }} \
            --min-instances ${{ matrix.service.min }} \
            --max-instances ${{ matrix.service.max }} \
            --memory ${{ matrix.service.memory }} \
            --concurrency ${{ matrix.service.concurrency }} \
            --cpu-boost \
            --set-env-vars NODE_ENV=production,HEADY_VERSION=${{ env.HEADY_VERSION }},SERVICE_NAME=${{ matrix.service.name }},SERVICE_PORT=${{ matrix.service.port }} \
            --allow-unauthenticated

  # ─── Cloudflare DNS Updates ─────────────────────────────────────────────────
  update-dns:
    needs: deploy-cloud-run
    if: github.ref == 'refs/heads/production'
    runs-on: ubuntu-latest
    timeout-minutes: 8                    # fib(6) = 8
    steps:
      - uses: actions/checkout@v4
      - name: Update Cloudflare DNS for all domains
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
        run: |
          CLOUD_RUN_URL=$(gcloud run services describe api-gateway \
            --region $GCP_REGION \
            --format 'value(status.url)' 2>/dev/null | sed 's|https://||')

          for DOMAIN in headyme.com headysystems.com headyconnection.org headybuddy.org headymcp.com headyio.com headybot.com headyapi.com headyai.com; do
            curl -s -X PUT \
              "https://api.cloudflare.com/client/v4/zones/${CF_ZONE_ID}/dns_records" \
              -H "Authorization: Bearer ${CF_API_TOKEN}" \
              -H "Content-Type: application/json" \
              --data "{
                \"type\": \"CNAME\",
                \"name\": \"${DOMAIN}\",
                \"content\": \"${CLOUD_RUN_URL}\",
                \"proxied\": true,
                \"ttl\": 1
              }" || echo "DNS update for ${DOMAIN} — check manually"
          done
