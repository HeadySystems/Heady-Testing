# Heady™ CI/CD Pipeline — GitHub Actions
# Sacred Geometry build pipeline with phi-scaled parallelism
# Author: Eric Haywood — HeadySystems Inc.

name: Heady CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"
  GCP_PROJECT: gen-lang-client-0920560496
  GCP_REGION: us-east1
  CLOUDFLARE_ACCOUNT: 8b1fa38f282c691423c6399247d53323
  REGISTRY: us-east1-docker.pkg.dev/gen-lang-client-0920560496/heady

jobs:
  # ─── Stage 1: Validate (Quality Gate) ──────────────────────
  validate:
    name: "Quality Gate"
    runs-on: ubuntu-latest
    timeout-minutes: 13  # fib(7)
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Phi compliance check
        run: node src/tools/phi-compliance-validator.js --strict

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Unit tests
        run: npm test -- --coverage --maxWorkers=5

      - name: Security audit
        run: npm audit --production

  # ─── Stage 2: Build & Test (Parallel) ─────────────────────
  build:
    name: "Build"
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 21  # fib(8)
    strategy:
      matrix:
        service-group:
          - inference
          - memory
          - agents
          - orchestration
          - security
          - monitoring
          - web
          - data
          - integration
      max-parallel: 5    # fib(5)
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v4
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev

      - name: Build ${{ matrix.service-group }} services
        run: |
          docker compose -f infrastructure/docker/docker-compose.yml \
            build --parallel \
            $(cat .service-groups/${{ matrix.service-group }}.txt)

      - name: Push images
        if: github.ref == 'refs/heads/main'
        run: |
          for service in $(cat .service-groups/${{ matrix.service-group }}.txt); do
            docker tag heady-${service}:latest ${{ env.REGISTRY }}/${service}:${{ github.sha }}
            docker push ${{ env.REGISTRY }}/${service}:${{ github.sha }}
          done

  # ─── Stage 3: Integration Tests ───────────────────────────
  integration:
    name: "Integration Tests"
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 21  # fib(8)
    steps:
      - uses: actions/checkout@v4

      - name: Start test environment
        run: |
          docker compose -f infrastructure/docker/docker-compose.yml up -d \
            heady-pgvector heady-nats heady-redis heady-pgbouncer
          sleep 21  # fib(8) seconds for services to start

      - name: Run integration tests
        run: npm run test:integration

      - name: Run E2E health checks
        run: |
          for port in $(seq 3310 3396); do
            curl -sf http://localhost:${port}/health/live || echo "Port ${port} not responding"
          done

      - name: Tear down
        if: always()
        run: docker compose -f infrastructure/docker/docker-compose.yml down -v

  # ─── Stage 4: Deploy to Cloud Run ─────────────────────────
  deploy:
    name: "Deploy"
    needs: integration
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 34  # fib(9)
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v4
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Deploy to Cloud Run
        run: |
          # ── HOT Pool: Always-on critical services (min-instances=1) ──
          for service in heady-inference heady-memory heady-conductor heady-auth; do
            gcloud run deploy ${service} \
              --image ${{ env.REGISTRY }}/${service}:${{ github.sha }} \
              --region ${{ env.GCP_REGION }} \
              --platform managed \
              --allow-unauthenticated \
              --min-instances 1 \
              --max-instances 8 \
              --memory 1Gi \
              --cpu 1 \
              --timeout 34s \
              --concurrency 21 \
              --startup-cpu-boost \
              --execution-environment gen2
          done

          # ── WARM Pool: Scale-to-zero secondary services ──
          for service in heady-web heady-monitor mcp-server heady-buddy; do
            gcloud run deploy ${service} \
              --image ${{ env.REGISTRY }}/${service}:${{ github.sha }} \
              --region ${{ env.GCP_REGION }} \
              --platform managed \
              --allow-unauthenticated \
              --min-instances 0 \
              --max-instances 5 \
              --memory 512Mi \
              --cpu 1 \
              --timeout 34s \
              --concurrency 55 \
              --startup-cpu-boost \
              --execution-environment gen2
          done

      - name: Deploy Cloudflare Workers
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
        run: |
          npx wrangler deploy --config infrastructure/cloudflare/wrangler.toml

      - name: Verify deployment
        run: |
          sleep 13  # fib(7) wait for rollout
          curl -sf https://api.headysystems.com/health || exit 1

      - name: Update deployment record
        run: |
          echo "{\"sha\": \"${{ github.sha }}\", \"timestamp\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\", \"status\": \"deployed\"}" \
            > deployment-record.json

  # ─── Stage 5: Post-Deploy Validation ──────────────────────
  post-deploy:
    name: "Post-Deploy Validation"
    needs: deploy
    runs-on: ubuntu-latest
    timeout-minutes: 13  # fib(7)
    steps:
      - uses: actions/checkout@v4

      - name: Smoke tests
        run: |
          curl -sf https://api.headysystems.com/health
          curl -sf https://api.headysystems.com/health/ready

      - name: Coherence check
        run: node scripts/coherence-check.js --threshold 0.809

      - name: Notify deployment
        if: success()
        run: |
          curl -X POST ${{ secrets.SLACK_WEBHOOK }} \
            -H 'Content-Type: application/json' \
            -d '{"text": "Heady deployed: ${{ github.sha }}"}'
