# Heady™ Cloudflare Workers Configuration v6.0
# Account: set via CLOUDFLARE_ACCOUNT_ID env var
# Edge AI inference, routing, and caching
# 
# @author Eric Haywood — HeadySystems Inc.

# ═══════════════════════════════════════════════════════════
# GLOBAL CONFIGURATION
# ═══════════════════════════════════════════════════════════

name = "heady-edge"
main = "src/edge/worker.js"
compatibility_date = "2026-03-01"
# account_id — set via CF_ACCOUNT_ID env var or wrangler.toml local override
# account_id = "CF_ACCOUNT_ID"

# Workers settings
workers_dev = false
usage_model = "bundled"

[build]
command = "npm run build:edge"
cwd = "."

# ═══════════════════════════════════════════════════════════
# PRODUCTION ENVIRONMENT
# ═══════════════════════════════════════════════════════════

[env.production]
name = "heady-edge-prod"

routes = [
  { pattern = "api.headysystems.com/*", zone_name = "headysystems.com" },
  { pattern = "headysystems.com/*", zone_name = "headysystems.com" },
  { pattern = "headyme.com/*", zone_name = "headyme.com" },
  { pattern = "headyai.com/*", zone_name = "headyai.com" },
  { pattern = "headybuddy.com/*", zone_name = "headybuddy.com" },
  { pattern = "headybuddy.org/*", zone_name = "headybuddy.org" },
  { pattern = "headymcp.com/*", zone_name = "headymcp.com" },
  { pattern = "headyio.com/*", zone_name = "headyio.com" },
  { pattern = "headybot.com/*", zone_name = "headybot.com" },
  { pattern = "headyapi.com/*", zone_name = "headyapi.com" },
  { pattern = "headylens.com/*", zone_name = "headylens.com" },
  { pattern = "headyfinance.com/*", zone_name = "headyfinance.com" },
  { pattern = "headyconnection.org/*", zone_name = "headyconnection.org" },
  { pattern = "headyconnection.com/*", zone_name = "headyconnection.com" },
  { pattern = "admin.headysystems.com/*", zone_name = "headysystems.com" },
]

[env.production.vars]
ENVIRONMENT = "production"
ORIGIN_URL = "https://api-origin.headysystems.com"
GCP_REGION = "us-east1"
# Phi-scaled cache TTL in seconds
CACHE_TTL_HOT = "13"      # fib(7) seconds for hot content
CACHE_TTL_WARM = "89"     # fib(11) seconds for warm content
CACHE_TTL_COLD = "610"    # fib(15) seconds for cold content
# Rate limiting
RATE_LIMIT_RPM = "377"    # fib(14) requests per minute
RATE_LIMIT_BURST = "55"   # fib(10) burst

# ═══════════════════════════════════════════════════════════
# STAGING ENVIRONMENT
# ═══════════════════════════════════════════════════════════

[env.staging]
name = "heady-edge-staging"

routes = [
  { pattern = "staging-api.headysystems.com/*", zone_name = "headysystems.com" },
]

[env.staging.vars]
ENVIRONMENT = "staging"
ORIGIN_URL = "https://staging-origin.headysystems.com"
GCP_REGION = "us-east1"
CACHE_TTL_HOT = "8"
CACHE_TTL_WARM = "34"
CACHE_TTL_COLD = "144"
RATE_LIMIT_RPM = "144"
RATE_LIMIT_BURST = "21"

# ═══════════════════════════════════════════════════════════
# VECTORIZE — Edge vector search
# ═══════════════════════════════════════════════════════════

[[vectorize]]
binding = "VECTORIZE_INDEX"
index_name = "heady-embeddings"

# ═══════════════════════════════════════════════════════════
# KV NAMESPACES — Edge caching
# ═══════════════════════════════════════════════════════════

[[kv_namespaces]]
binding = "EDGE_CACHE"
id = "heady-edge-cache-prod"
preview_id = "heady-edge-cache-preview"

[[kv_namespaces]]
binding = "SESSION_CACHE"
id = "heady-session-cache-prod"
preview_id = "heady-session-cache-preview"

# ═══════════════════════════════════════════════════════════
# DURABLE OBJECTS — Agent state at edge
# ═══════════════════════════════════════════════════════════

[durable_objects]
bindings = [
  { name = "AGENT_STATE", class_name = "HeadyAgentState" },
  { name = "RATE_LIMITER", class_name = "HeadyRateLimiter" },
]

[[migrations]]
tag = "v1"
new_classes = ["HeadyAgentState", "HeadyRateLimiter"]

# ═══════════════════════════════════════════════════════════
# R2 BUCKETS — Object storage
# ═══════════════════════════════════════════════════════════

[[r2_buckets]]
binding = "BACKUPS"
bucket_name = "heady-backups"

[[r2_buckets]]
binding = "ASSETS"
bucket_name = "heady-assets"

# ═══════════════════════════════════════════════════════════
# AI BINDINGS — Workers AI inference
# ═══════════════════════════════════════════════════════════

[ai]
binding = "AI"

# ═══════════════════════════════════════════════════════════
# D1 DATABASE — Edge-local SQLite
# ═══════════════════════════════════════════════════════════

[[d1_databases]]
binding = "D1"
database_name = "heady-edge-db"
database_id = "heady-d1-prod"

# ═══════════════════════════════════════════════════════════
# SECRETS — Referenced from Cloudflare dashboard (never in file)
# ═══════════════════════════════════════════════════════════
# Run: wrangler secret put <NAME>
# Required secrets:
#   ORIGIN_AUTH_TOKEN
#   SESSION_SIGNING_KEY
#   FIREBASE_API_KEY
#   NATS_AUTH_TOKEN

# ═══════════════════════════════════════════════════════════
# OBSERVABILITY
# ═══════════════════════════════════════════════════════════

[observability]
enabled = true

[observability.logs]
enabled = true
invocation_logs = true
head_sampling_rate = 0.618  # PSI — golden ratio sampling

# ═══════════════════════════════════════════════════════════
# LIMITS
# ═══════════════════════════════════════════════════════════

[limits]
cpu_ms = 50
