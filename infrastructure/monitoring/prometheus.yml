global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'heady-platform'
    environment: 'production'
  query_timeout: 1m

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - localhost:9093

rule_files:
  - "/etc/prometheus/alerting-rules.yml"

scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    scrape_interval: 10s
    static_configs:
      - targets: ['localhost:9090']
    metric_path: '/metrics'

  # Envoy proxy metrics
  - job_name: 'envoy'
    static_configs:
      - targets: ['localhost:8001']
    scrape_interval: 10s
    metrics_path: '/stats/prometheus'

  # API Gateway
  - job_name: 'api-gateway'
    static_configs:
      - targets: ['api-gateway:3311']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        regex: '([^:]+)(?::\d+)?'
        replacement: '${1}'
      - source_labels: [__scheme__, __address__]
        target_label: __param_target
        regex: '(.+);(.+)'
        replacement: '${1}://${2}'

  # Auth Service
  - job_name: 'auth-service'
    static_configs:
      - targets: ['auth:3310']

  # User Service
  - job_name: 'user-service'
    static_configs:
      - targets: ['user-service:3312']

  # Notification Service
