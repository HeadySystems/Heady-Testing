groups:
  - name: heady_platform_alerts
    interval: 15s
    rules:
      # High error rate alerts
      - alert: HighErrorRate
        expr: |
          (
            sum(rate(http_requests_total{status=~"5.."}[5m])) by (service)
            /
            sum(rate(http_requests_total[5m])) by (service)
          ) > 0.05
        for: 5m
        labels:
          severity: critical
          component: application
        annotations:
          summary: "High error rate detected in {{ $labels.service }}"
          description: "Service {{ $labels.service }} has error rate of {{ $value | humanizePercentage }}"

      # High latency alerts
      - alert: HighLatency
        expr: |
          histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket[5m])) by (service, le)) > 4.236
        for: 5m
        labels:
          severity: warning
          component: performance
        annotations:
          summary: "High latency in {{ $labels.service }}"
          description: "P95 latency for {{ $labels.service }} is {{ $value | humanizeDuration }}"

      - alert: VeryHighLatency
        expr: |
          histogram_quantile(0.99, sum(rate(http_request_duration_seconds_bucket[5m])) by (service, le)) > 8.472
        for: 3m
        labels:
          severity: critical
          component: performance
        annotations:
          summary: "Very high latency in {{ $labels.service }}"
          description: "P99 latency for {{ $labels.service }} is {{ $value | humanizeDuration }}"

      # Service down alerts
      - alert: ServiceDown
        expr: |
          up{job=~".*-service"} == 0
        for: 2m
        labels:
          severity: critical
          component: availability
        annotations:
          summary: "Service {{ $labels.job }} is down"
          description: "{{ $labels.job }} has been unreachable for more than 2 minutes"

      # Circuit breaker open alerts
      - alert: CircuitBreakerOpen
        expr: |
          circuit_breaker_state{state="open"} == 1
        for: 1m
        labels:
          severity: critical
          component: resilience
        annotations:
          summary: "Circuit breaker open for {{ $labels.service }}"
          description: "Circuit breaker is open for {{ $labels.service }}, blocking requests"

      # Disk space alerts
      - alert: LowDiskSpace
        expr: |
          (
            node_filesystem_avail_bytes{fstype=~"ext4|xfs"} /
            node_filesystem_size_bytes{fstype=~"ext4|xfs"}
          ) < 0.15
        for: 5m
        labels:
          severity: warning
          component: infrastructure
        annotations:
          summary: "Low disk space on {{ $labels.instance }}"
          description: "Only {{ $value | humanizePercentage }} disk space remaining on {{ $labels.device }}"

      - alert: CriticalDiskSpace
        expr: |
          (
            node_filesystem_avail_bytes{fstype=~"ext4|xfs"} /
            node_filesystem_size_bytes{fstype=~"ext4|xfs"}
          ) < 0.05
        for: 2m
        labels:
          severity: critical
          component: infrastructure
        annotations:
          summary: "Critical disk space on {{ $labels.instance }}"
          description: "Only {{ $value | humanizePercentage }} disk space remaining"

      # Memory usage alerts
      - alert: HighMemoryUsage
        expr: |
          (
            (node_memory_MemTotal_bytes - node_memory_MemAvailable_bytes) /
            node_memory_MemTotal_bytes
          ) > 0.85
        for: 5m
        labels:
          severity: warning
          component: infrastructure
        annotations:
          summary: "High memory usage on {{ $labels.instance }}"
          description: "Memory usage is {{ $value | humanizePercentage }} on {{ $labels.instance }}"

      - alert: CriticalMemoryUsage
        expr: |
          (
            (node_memory_MemTotal_bytes - node_memory_MemAvailable_bytes) /
            node_memory_MemTotal_bytes
          ) > 0.95
        for: 2m
        labels:
          severity: critical
          component: infrastructure
        annotations:
          summary: "Critical memory usage on {{ $labels.instance }}"
          description: "Memory usage is {{ $value | humanizePercentage }} on {{ $labels.instance }}"

      # CPU usage alerts
      - alert: HighCPUUsage
        expr: |
          (100 - (avg by (instance) (irate(node_cpu_seconds_total{mode="idle"}[5m])) * 100)) > 80
        for: 5m
        labels:
          severity: warning
          component: infrastructure
        annotations:
          summary: "High CPU usage on {{ $labels.instance }}"
          description: "CPU usage is {{ $value | humanize }}% on {{ $labels.instance }}"

      # Database connection pool alerts
      - alert: HighDatabaseConnections
        expr: |
          pg_stat_activity_count{state="active"} > 190
        for: 5m
        labels:
          severity: warning
          component: database
        annotations:
          summary: "High database connections"
          description: "{{ $value }} active database connections"

      - alert: DatabaseConnectionPoolExhausted
        expr: |
          pg_stat_activity_count{state="active"} > 220
        for: 2m
        labels:
          severity: critical
          component: database
        annotations:
          summary: "Database connection pool nearly exhausted"
          description: "{{ $value }} active connections out of 233 max"

      # Cache hit ratio alerts
      - alert: LowCacheHitRatio
        expr: |
          (
            sum(rate(redis_keyspace_hits_total[5m])) /
            (sum(rate(redis_keyspace_hits_total[5m])) + sum(rate(redis_keyspace_misses_total[5m])))
          ) < 0.7
        for: 10m
        labels:
          severity: warning
          component: cache
        annotations:
          summary: "Low Redis cache hit ratio"
          description: "Cache hit ratio is {{ $value | humanizePercentage }}"

      # Queue backlog alerts
      - alert: HighQueueBacklog
        expr: |
          nats_jetstream_messages_total{queue="heady-queue"} > 10000
        for: 5m
        labels:
          severity: warning
          component: messaging
        annotations:
          summary: "High message queue backlog"
          description: "Queue has {{ $value }} pending messages"

      # Request rate alerts
      - alert: HighRequestRate
        expr: |
          sum(rate(http_requests_total[5m])) > 10000
        for: 5m
        labels:
          severity: warning
          component: traffic
        annotations:
          summary: "High request rate detected"
          description: "Request rate is {{ $value | humanize }} req/s"

      # Database query duration alerts
      - alert: SlowDatabaseQueries
        expr: |
          histogram_quantile(0.95, sum(rate(database_query_duration_seconds_bucket[5m])) by (le)) > 1
        for: 5m
        labels:
          severity: warning
          component: database
        annotations:
          summary: "Slow database queries detected"
          description: "P95 query duration is {{ $value | humanizeDuration }}"

      # Goroutine count alerts (Go services)
      - alert: HighGoroutineCount
        expr: |
          go_goroutines > 10000
        for: 5m
        labels:
          severity: warning
          component: runtime
        annotations:
          summary: "High goroutine count in {{ $labels.job }}"
          description: "{{ $labels.job }} has {{ $value }} goroutines"

      # Garbage collection alerts
      - alert: HighGCFrequency
        expr: |
          rate(go_gc_duration_seconds_count[5m]) > 10
        for: 5m
        labels:
          severity: warning
          component: runtime
        annotations:
          summary: "High garbage collection frequency in {{ $labels.job }}"
          description: "{{ $labels.job }} is running GC {{ $value }} times per second"

      # TLS certificate expiration alerts
      - alert: TLSCertificateExpiring
        expr: |
          (ssl_expire_time_seconds - time()) / 86400 < 30
        for: 1h
        labels:
          severity: warning
          component: security
        annotations:
          summary: "TLS certificate expiring soon"
          description: "Certificate expires in {{ $value | humanize }} days"

      - alert: TLSCertificateExpiringSoon
        expr: |
          (ssl_expire_time_seconds - time()) / 86400 < 7
        for: 1h
        labels:
          severity: critical
          component: security
        annotations:
          summary: "TLS certificate expiring very soon"
          description: "Certificate expires in {{ $value | humanize }} days"

      # WebSocket connection alerts
      - alert: HighWebSocketConnections
        expr: |
          websocket_connections_active > 8000
        for: 5m
        labels:
          severity: warning
          component: realtime
        annotations:
          summary: "High number of WebSocket connections"
          description: "{{ $value }} active WebSocket connections"

      # API gateway errors
      - alert: HighAPIGatewayErrors
        expr: |
          (
            sum(rate(http_requests_total{job="api-gateway", status=~"5.."}[5m])) /
            sum(rate(http_requests_total{job="api-gateway"}[5m]))
          ) > 0.10
        for: 5m
        labels:
          severity: critical
          component: api_gateway
        annotations:
          summary: "API Gateway has high error rate"
          description: "Error rate is {{ $value | humanizePercentage }}"

      # Authentication service errors
      - alert: AuthServiceErrors
        expr: |
          (
            sum(rate(http_requests_total{job="auth-service", status=~"5.."}[5m])) /
            sum(rate(http_requests_total{job="auth-service"}[5m]))
          ) > 0.05
        for: 3m
        labels:
          severity: critical
          component: auth
        annotations:
          summary: "Auth Service has high error rate"
          description: "Auth service error rate is {{ $value | humanizePercentage }}"

      # Payment service errors
      - alert: PaymentServiceErrors
        expr: |
          (
            sum(rate(http_requests_total{job="payment-service", status=~"5.."}[5m])) /
            sum(rate(http_requests_total{job="payment-service"}[5m]))
          ) > 0.05
        for: 3m
        labels:
          severity: critical
          component: payments
        annotations:
          summary: "Payment Service has high error rate"
          description: "Payment service error rate is {{ $value | humanizePercentage }}"

      # Backup failures
      - alert: BackupFailure
        expr: |
          backup_last_run_status != 1
        for: 1h
        labels:
          severity: critical
          component: backup
        annotations:
          summary: "Database backup failed"
          description: "Last backup run did not complete successfully"

      # Replication lag alerts
      - alert: HighDatabaseReplicationLag
        expr: |
          pg_replication_lag_seconds > 30
        for: 5m
        labels:
          severity: warning
          component: database
        annotations:
          summary: "High database replication lag"
          description: "Replication lag is {{ $value | humanizeDuration }}"

      # Service dependency failures
      - alert: ServiceDependencyDown
        expr: |
          up{job=~"postgres|redis|nats|consul"} == 0
        for: 2m
        labels:
          severity: critical
          component: infrastructure
        annotations:
          summary: "Critical service dependency down: {{ $labels.job }}"
          description: "{{ $labels.job }} has been unavailable for more than 2 minutes"
