# Heady™ OpenTelemetry Collector Configuration
# Author: Eric Haywood — HeadySystems Inc.

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    send_batch_size: 144    # fib(12)
    timeout: 13s            # fib(7)

  memory_limiter:
    check_interval: 13s     # fib(7)
    limit_mib: 987          # fib(16)
    spike_limit_mib: 233    # fib(13)

  attributes:
    actions:
      - key: heady.phi
        value: "1.6180339887"
        action: upsert
      - key: heady.embedding_dim
        value: "384"
        action: upsert

exporters:
  logging:
    loglevel: info

  prometheus:
    endpoint: 0.0.0.0:8889
    namespace: heady
    send_timestamps: true
    metric_expiration: 89m  # fib(11) minutes

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, batch, attributes]
      exporters: [logging]
    metrics:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [prometheus, logging]
    logs:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [logging]
