# © 2026 HeadySystems Inc. — Eric Haywood — 51 Provisional Patents
# φ-scaled health checks: interval=4236ms(φ³×1000), timeout=2618ms(φ²×1000), retries=3(fib(4))

version: "3.9"

x-heady-healthcheck: &heady-healthcheck
  interval: 4236ms      # φ³ × 1000
  timeout: 2618ms       # φ² × 1000
  retries: 3            # fib(4)
  start_period: 6854ms  # φ⁴ × 1000

x-heady-service: &heady-service
  restart: unless-stopped
  logging:
    driver: json-file
    options:
      max-size: "13m"   # fib(7)
      max-file: "5"     # fib(5)
  deploy:
    resources:
      limits:
        memory: 233M    # fib(13)
      reservations:
        memory: 89M     # fib(11)

services:

  # ═══ Infrastructure ═══════════════════════════════════════════════════

  pgvector:
    image: pgvector/pgvector:pg16
    ports: ["5432:5432"]
    environment:
      POSTGRES_DB: heady
      POSTGRES_USER: heady
      POSTGRES_PASSWORD: ${PGVECTOR_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U heady"]
      <<: *heady-healthcheck
    networks: [heady-internal]

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    command: redis-server --maxmemory 233mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      <<: *heady-healthcheck
    networks: [heady-internal]

  nats:
    image: nats:2-alpine
    ports: ["4222:4222", "8222:8222"]
    command: --jetstream --store_dir /data --max_mem 233MB
    volumes:
      - natsdata:/data
    healthcheck:
      test: ["CMD", "nats-server", "--signal", "ldm"]
      <<: *heady-healthcheck
    networks: [heady-internal]

  envoy:
    image: envoyproxy/envoy:v1.29-latest
    ports: ["8080:8080", "8443:8443", "9901:9901"]
    volumes:
      - ./infrastructure/envoy/envoy.yaml:/etc/envoy/envoy.yaml:ro
    networks: [heady-internal, heady-external]

  consul:
    image: hashicorp/consul:1.17
    ports: ["8500:8500"]
    command: agent -server -bootstrap-expect=1 -ui -client=0.0.0.0
    networks: [heady-internal]

  prometheus:
    image: prom/prometheus:v2.49.0
    ports: ["9090:9090"]
    volumes:
      - ./infrastructure/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks: [heady-internal]

  grafana:
    image: grafana/grafana:10.3.0
    ports: ["3000:3000"]
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD}
    volumes:
      - ./infrastructure/grafana/dashboards:/var/lib/grafana/dashboards
    networks: [heady-internal]

  # ═══ INFERENCE ═══════════════════════════════════════════════════

  heady-brain:
    <<: *heady-service
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.service
      args:
        SERVICE_NAME: heady-brain
    ports: ["3310:3310"]
    environment:
      SERVICE_NAME: heady-brain
      SERVICE_PORT: "3310"
      HEADY_DOMAIN: inference
      NODE_ENV: production
      PGVECTOR_URL: postgresql://heady:${PGVECTOR_PASSWORD}@pgvector:5432/heady
      REDIS_URL: redis://redis:6379
      NATS_URL: nats://nats:4222
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3310/health',r=>{r.statusCode===200?process.exit(0):process.exit(1)}).on('error',()=>process.exit(1))"]
      <<: *heady-healthcheck
    depends_on:
      pgvector: { condition: service_healthy }
      redis: { condition: service_healthy }
      nats: { condition: service_healthy }
    networks: [heady-internal]
    deploy:
      resources:
        limits:
          memory: 610M

