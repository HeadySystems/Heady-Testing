version: "3.9"

services:
  postgres:
    environment:
      POSTGRES_INITDB_ARGS: -c max_connections=233 -c shared_buffers=256MB
    volumes:
      - ./init-db.sql:/docker-entrypoint-initdb.d/init.sql
      - postgres-data:/var/lib/postgresql/data
    command: postgres -c log_statement=all -c log_duration=on

  redis:
    command: redis-server --appendonly yes --loglevel debug

  # Development service configurations with hot reload and debug ports
  auth:
    image: ${REGISTRY}/heady-auth:${IMAGE_TAG:-latest}
    volumes:
      - ../../../services/auth/src:/app/src
      - ../../../services/auth/package.json:/app/package.json
    environment:
      NODE_ENV: development
      DEBUG: heady:*
      ENABLE_PROFILING: "true"
    ports:
      - "3310:3310"
      - "9229:9229"  # Node debugger
      - "6310:6310"  # Profiler port
    command: npm run dev
    stdin_open: true
    tty: true

  api-gateway:
    image: ${REGISTRY}/heady-api-gateway:${IMAGE_TAG:-latest}
    volumes:
      - ../../../services/api-gateway/src:/app/src
