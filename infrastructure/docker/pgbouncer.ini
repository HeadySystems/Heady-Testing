[databases]
# Main application database
heady = host=postgres port=5432 user=heady password=${DB_PASSWORD} dbname=heady

[pgbouncer]
# Connection pooling configuration
pool_mode = transaction
default_pool_size = 34
min_pool_size = 10
reserve_pool_size = 5
reserve_pool_timeout = 3

# Client configuration
max_client_conn = 233
max_idle_connections = 100
max_db_connections = 100
max_user_connections = 100

# Connection lifetime configuration
server_lifetime = 3600
server_idle_timeout = 600
server_connect_timeout = 15
server_login_timeout = 15
client_idle_timeout = 0
client_login_timeout = 60

# Query timeout configuration
query_timeout = 0
query_wait_timeout = 120
idle_in_transaction_session_timeout = 0

# TCP configuration
tcp_keepalives = 1
tcp_keepidles = 30
tcp_keepintvls = 10
tcp_keepcnts = 5

# Pooling behavior
server_check_delay = 20
server_check_query = select 1
server_fast_close = 0
so_reuseport = 0
disable_pqexec = 0

# Logging configuration
log_connections = 1
log_disconnections = 1
log_pooler_errors = 1
log_stats = 1
stats_period = 60
stats_holdings_mode = all

# Admin configuration
admin_users = postgres
stats_users = postgres
auth_user = postgres

# Timeout and connection settings
pkt_buf = 4096
sbuf_loopcnt = 5
max_packet_size = 2147483647
listen_backlog = 1024
backlog_timeout = 0
autodb_idle_timeout = 3600
autodb = 1

# TLS/SSL configuration (uncomment if needed for secure connections)
# client_tls_sslmode = disable
# client_tls_ciphers = HIGH:!aNULL
# client_tls_protocols = TLSv1.2,TLSv1.3
# server_tls_sslmode = disable
# server_tls_protocols = TLSv1.2,TLSv1.3
# client_tls_ca_file = /etc/pgbouncer/ca.crt
# client_tls_cert_file = /etc/pgbouncer/client-cert.pem
# client_tls_key_file = /etc/pgbouncer/client-key.pem
# server_tls_ca_file = /etc/pgbouncer/ca.crt
# server_tls_cert_file = /etc/pgbouncer/server-cert.pem
# server_tls_key_file = /etc/pgbouncer/server-key.pem

# Application database-specific settings
# [heady:max_connections]
# 100

# [heady:pool_size]
# 34

# Connection string parameters
; Host binding configuration
listen_addr = *
listen_port = 6432

; Database settings
ignore_startup_parameters = application_name,extra_float_digits

; Advanced connection management
dns_nxdomain_ttl = 15
dns_zone_check_period = 0
dns_user_check_period = 0

; Connection pooling logic
pool_error_query = ROLLBACK; SELECT 1
pool_cancel_query = SELECT 1
pool_success_query = SELECT 1

; Statement limit (0 = unlimited)
statement_lifetime = 0
statement_timeout = 0

; Memory configuration
max_mem = 104857600

; Pause clients when backends are getting overloaded
# pause_mode = pause
pause_mode = off
pause_query = SELECT pg_sleep(1)

; Function configuration
# function_blacklist_regex =
; Semicolon-delimited list of function names that PgBouncer must not use prepared statements for
sql_quote_cstring_off = 0

; Zone/realm options (advanced)
# variable_list =

; Connection info cache
# connection_info_cache = on|off
connection_info_cache = on

; Strict parameters checking
strict_parameters = off

; Per-pool client flag enforcement
# auth_type = md5|pam|plain|cert|scram-sha-256
auth_type = md5

; Command filtering
# pgbouncer_admin_filter = on|off
pgbouncer_admin_filter = off

; Feature flags
; pkt_buf = 4096  ; packet buffer size
; sbuf_loopcnt = 5  ; socket buffer loop count
