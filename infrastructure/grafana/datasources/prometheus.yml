# Heady™ Grafana Datasource Provisioning v6.0
# Auto-configure Prometheus as default datasource on Grafana startup
# 
# @author Eric Haywood — HeadySystems Inc.

apiVersion: 1

datasources:
  - name: Heady Prometheus
    type: prometheus
    access: proxy
    url: http://heady-prometheus:9090
    isDefault: true
    editable: false
    jsonData:
      httpMethod: POST
      timeInterval: "13s"              # fib(7) seconds — matches HOT scrape interval
      queryTimeout: "89s"              # fib(11) seconds
      incrementalQuerying: true
      incrementalQueryOverlapWindow: "21m"  # fib(8) minutes
      exemplarTraceIdDestinations:
        - name: traceID
          datasourceUid: heady-tempo
    version: 1

  - name: Heady Loki
    type: loki
    access: proxy
    url: http://heady-loki:3100
    isDefault: false
    editable: false
    jsonData:
      maxLines: 377                    # fib(14)
      derivedFields:
        - datasourceUid: heady-tempo
          matcherRegex: '"correlationId":"([a-f0-9]+)"'
          name: TraceID
          url: '$${__value.raw}'
    version: 1

  - name: Heady Tempo
    type: tempo
    access: proxy
    url: http://heady-tempo:3200
    uid: heady-tempo
    isDefault: false
    editable: false
    jsonData:
      tracesToLogs:
        datasourceUid: heady-loki
        filterByTraceID: true
        filterBySpanID: false
      serviceMap:
        datasourceUid: heady-prometheus
      nodeGraph:
        enabled: true
    version: 1
