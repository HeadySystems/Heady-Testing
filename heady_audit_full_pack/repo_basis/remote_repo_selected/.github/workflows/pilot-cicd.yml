name: Heady™ Pilot CI/CD Pipeline

on:
  push:
    branches: [main, pilot]
  pull_request:
    branches: [main, pilot]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: headysystems

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck

  test:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: npm test
      - uses: codecov/codecov-action@v4

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Snyk
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: \${{ secrets.SNYK_TOKEN }}

  build:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: [lint, test, security]
    if: github.ref == 'refs/heads/pilot'
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v4
        with:
          registry: \${{ env.REGISTRY }}
          username: \${{ github.actor }}
          password: \${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push API Gateway
        uses: docker/build-push-action@v5
        with:
          context: ./services/heady-api-gateway
          push: true
          tags: \${{ env.REGISTRY }}/\${{ env.IMAGE_NAME }}/heady-api-gateway:3.2.0

  deploy:
    name: Deploy to Pilot
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/pilot'
    environment:
      name: pilot
      url: https://pilot.headyme.com
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-kubectl@v4

      - name: Configure kubectl
        run: |
          echo "\${{ secrets.KUBE_CONFIG }}" | base64 -d > kubeconfig
          export KUBECONFIG=./kubeconfig

      - name: Deploy to Kubernetes
        run: |
          kubectl apply -f infra/kubernetes/ -n heady-pilot
          kubectl rollout status deployment/heady-api-gateway -n heady-pilot
          kubectl rollout status deployment/heady-conductor -n heady-pilot

      - name: Verify Health
        run: |
          curl -f https://pilot.headyapi.com/health || exit 1
