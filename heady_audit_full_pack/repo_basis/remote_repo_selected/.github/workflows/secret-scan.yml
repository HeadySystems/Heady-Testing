name: Secret Scan

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for blocked file extensions
        run: |
          echo "🔒 Checking for private keys and certificates..."
          BLOCKED=$(find . -type f \( -name '*.pem' -o -name '*.key' -o -name '*.p12' -o -name '*.pfx' \) \
            -not -path './node_modules/*' -not -path './.git/*' \
            -not -path './_archive/*' -not -path './Heady-pre-production*' || true)
          if [ -n "$BLOCKED" ]; then
            echo "::error::Private keys or certificates found in commit:"
            echo "$BLOCKED"
            exit 1
          fi
          echo "✅ No private keys or certificates found"

      - name: Check for .env files
        run: |
          echo "🔒 Checking for .env files..."
          ENV_FILES=$(find . -name '.env' -not -name '*.example' -not -name '*.template' \
            -not -path './node_modules/*' -not -path './.git/*' \
            -not -path './_archive/*' -not -path './Heady-pre-production*' || true)
          if [ -n "$ENV_FILES" ]; then
            echo "::warning::Non-example .env files found (ensure they contain only variable references):"
            echo "$ENV_FILES"
          fi
          echo "✅ .env check complete"

      - name: Scan for hardcoded secrets
        run: |
          echo "🔒 Scanning for secret patterns..."
          VIOLATIONS=0

          # OpenAI / Anthropic API keys
          if grep -rnE 'sk-[a-zA-Z0-9]{20,}' --include='*.js' --include='*.ts' --include='*.json' \
            --exclude-dir=node_modules --exclude-dir=.git . 2>/dev/null; then
            echo "::error::Potential API key found (sk-*)"
            VIOLATIONS=$((VIOLATIONS + 1))
          fi

          # AWS access keys
          if grep -rnE 'AKIA[0-9A-Z]{16}' --include='*.js' --include='*.ts' --include='*.json' \
            --exclude-dir=node_modules --exclude-dir=.git . 2>/dev/null; then
            echo "::error::AWS access key found (AKIA*)"
            VIOLATIONS=$((VIOLATIONS + 1))
          fi

          # PEM private key blocks
          if grep -rnE '-----BEGIN (RSA |EC )?PRIVATE KEY-----' --include='*.js' --include='*.ts' \
            --include='*.json' --include='*.yaml' --exclude-dir=node_modules --exclude-dir=.git . 2>/dev/null; then
            echo "::error::Private key block found in source file"
            VIOLATIONS=$((VIOLATIONS + 1))
          fi

          if [ $VIOLATIONS -gt 0 ]; then
            echo "::error::$VIOLATIONS secret pattern(s) detected. Fix before merging."
            exit 1
          fi
          echo "✅ No hardcoded secrets detected"
