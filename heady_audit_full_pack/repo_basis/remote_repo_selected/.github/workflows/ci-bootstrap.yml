# All CI/CD functionality has been consolidated into a single unified pipeline.
# See: .github/workflows/ci-unified.yml
# This file is retained for reference only and should be removed in a future cleanup.
# Heady™ Production — CI/CD Pipeline [DEPRECATED]
# Matches the security gates from the context file:
# TruffleHog → CodeQL SAST → npm audit → SBOM CycloneDX → Trivy Container Scan

name: Heady™ CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '22'
  GCP_PROJECT: heady-production
  GCP_REGION: us-central1
  CLOUD_RUN_SERVICE: heady-manager
  CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

jobs:
  # ── Security Scan ──────────────────────────────
  security:
    name: Security Gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: TruffleHog Secret Scan
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --only-verified

      - name: npm audit
        run: |
          npm ci --ignore-scripts
          npm audit --audit-level=high

      - name: Generate SBOM (CycloneDX)
        uses: CycloneDX/gh-node-module-generatebom@v1
        with:
          output: sbom.json

      - name: Upload SBOM
        uses: actions/upload-artifact@v7
        with:
          name: sbom
          path: sbom.json

  # ── Code Quality ───────────────────────────────
  quality:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci
      - run: npm run lint
      - run: npm test

  # ── Build & Deploy Cloud Run ───────────────────
  deploy-cloud-run:
    name: Deploy to Cloud Run
    needs: [security, quality]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3

      - name: Configure Docker
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev

      - name: Build Docker Image
        run: |
          docker build \
            -t ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT }}/heady/${{ env.CLOUD_RUN_SERVICE }}:${{ github.sha }} \
            -t ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT }}/heady/${{ env.CLOUD_RUN_SERVICE }}:latest \
            -f infra/docker/Dockerfile \
            .

      - name: Trivy Container Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT }}/heady/${{ env.CLOUD_RUN_SERVICE }}:${{ github.sha }}
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH

      - name: Push Docker Image
        run: |
          docker push ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT }}/heady/${{ env.CLOUD_RUN_SERVICE }}:${{ github.sha }}
          docker push ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT }}/heady/${{ env.CLOUD_RUN_SERVICE }}:latest

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.CLOUD_RUN_SERVICE }}
          region: ${{ env.GCP_REGION }}
          image: ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT }}/heady/${{ env.CLOUD_RUN_SERVICE }}:${{ github.sha }}

      - name: Verify Deployment
        run: |
          SERVICE_URL=$(gcloud run services describe ${{ env.CLOUD_RUN_SERVICE }} \
            --region=${{ env.GCP_REGION }} \
            --format='value(status.url)')
          echo "Service URL: ${SERVICE_URL}"
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "${SERVICE_URL}/health")
          echo "Health check: HTTP ${HTTP_CODE}"
          if [ "$HTTP_CODE" != "200" ]; then
            echo "Health check failed!"
            exit 1
          fi

  # ── Deploy Cloudflare Workers ──────────────────
  deploy-workers:
    name: Deploy Cloudflare Workers
    needs: [security, quality]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Wrangler
        run: npm install -g wrangler

      - name: Deploy Edge Workers
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          for worker_dir in cloudflare/workers/*/; do
            if [ -f "${worker_dir}wrangler.toml" ]; then
              echo "Deploying: ${worker_dir}"
              cd "${worker_dir}"
              wrangler deploy
              cd -
            fi
          done

  # ── Domain Verification ────────────────────────
  verify-domains:
    name: Verify All Domains
    needs: [deploy-cloud-run, deploy-workers]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Run Domain Verification
        run: node domain-verification/verify-all-domains.mjs

      - name: Upload Results
        if: always()
        run: node domain-verification/verify-all-domains.mjs --json > domain-results.json

      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: domain-verification
          path: domain-results.json
