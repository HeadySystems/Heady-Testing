version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
      POSTGRES_DB: heady
    ports:
      - "5432:5432"
    volumes:
      - heady_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d heady"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - heady-net

  redis:
    image: redis:7-bookworm
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - heady-net

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.120.0
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ./infra/otel/collector.yaml:/etc/otelcol/config.yaml:ro
    ports:
      - "4316:4316"
      - "9464:9464"
    networks:
      - heady-net

  heady-manager:
    build:
      context: .
      dockerfile: Dockerfile.production
    environment:
      NODE_ENV: production
      HEADY_ENV: production
      PORT: 3301
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/heady
      REDIS_URL: redis://redis:6379
      OBSERVABILITY_EXPORT_URL: http://otel-collector:4316/v1/traces
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4316
      OTEL_SERVICE_NAME: heady-manager
    ports:
      - "3301:3301"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3301/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - heady-net
    restart: unless-stopped

  api-gateway:
    build:
      context: .
      dockerfile: services/domain-router/Dockerfile
    environment:
      PORT: 4301
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/heady
      REDIS_URL: redis://redis:6379
      HEADY_MANAGER_URL: http://heady-manager:3301
    ports:
      - "4301:4301"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      heady-manager:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:4301/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - heady-net
    restart: unless-stopped

  domain-router:
    build:
      context: .
      dockerfile: services/domain-router/Dockerfile
    environment:
      PORT: 4301
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/heady
      REDIS_URL: redis://redis:6379
    ports:
      - "4311:4301"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - heady-net

  observability-kernel:
    build:
      context: .
      dockerfile: services/observability-kernel/Dockerfile
    environment:
      PORT: 4302
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/heady
      REDIS_URL: redis://redis:6379
    ports:
      - "4302:4302"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - heady-net

  budget-tracker:
    build:
      context: .
      dockerfile: services/budget-tracker/Dockerfile
    environment:
      PORT: 4303
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/heady
      REDIS_URL: redis://redis:6379
    ports:
      - "4303:4303"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - heady-net

  heady-memory:
    build:
      context: .
      dockerfile: services/heady-memory/Dockerfile
    environment:
      PORT: 4304
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/heady
      REDIS_URL: redis://redis:6379
    ports:
      - "4304:4304"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - heady-net

  heady-health:
    build:
      context: .
      dockerfile: services/heady-health/Dockerfile
    environment:
      PORT: 4305
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/heady
      REDIS_URL: redis://redis:6379
    ports:
      - "4305:4305"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - heady-net

  heady-conductor:
    build:
      context: .
      dockerfile: services/heady-conductor/Dockerfile
    environment:
      PORT: 4306
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/heady
      REDIS_URL: redis://redis:6379
    ports:
      - "4306:4306"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - heady-net

  heady-brains:
    build:
      context: .
      dockerfile: services/heady-brains/Dockerfile
    environment:
      PORT: 4307
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/heady
      REDIS_URL: redis://redis:6379
    ports:
      - "4307:4307"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - heady-net

  heady-soul:
    build:
      context: .
      dockerfile: services/heady-soul/Dockerfile
    environment:
      PORT: 4308
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/heady
      REDIS_URL: redis://redis:6379
    ports:
      - "4308:4308"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - heady-net

volumes:
  heady_postgres:

networks:
  heady-net:
    driver: bridge
