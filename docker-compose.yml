# ═══════════════════════════════════════════════════════════════════════════════
# Heady™ Docker Compose — Full Stack
# ═══════════════════════════════════════════════════════════════════════════════
# Usage:
#   docker compose up -d --build        # Build and start all services
#   docker compose ps                   # Check service status
#   docker compose logs -f heady-manager # Follow manager logs
#   docker compose down                 # Stop all services
# ═══════════════════════════════════════════════════════════════════════════════

services:
  # ─── Infrastructure Layer ────────────────────────────────────────────────────

  postgres:
    image: pgvector/pgvector:pg16
    container_name: heady-postgres
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
      POSTGRES_DB: heady
    ports:
      - "5432:5432"
    volumes:
      - heady-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d heady"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - heady-net
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: heady-redis
    ports:
      - "6379:6379"
    volumes:
      - heady-redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - heady-net
    restart: unless-stopped

  # ─── Observability Layer ─────────────────────────────────────────────────────

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.120.0
    container_name: heady-otel
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ./infra/otel/collector.yaml:/etc/otelcol/config.yaml:ro
    ports:
      - "4316:4316"
      - "9464:9464"
    networks:
      - heady-net
    restart: unless-stopped

  # ─── Core: Heady Manager (API Gateway + Swarm Orchestrator) ──────────────────

  heady-manager:
    build:
      context: .
      dockerfile: Dockerfile.production
    container_name: heady-manager
    environment:
      NODE_ENV: production
      HEADY_ENV: production
      PORT: 3300
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/heady
      REDIS_URL: redis://redis:6379
      OBSERVABILITY_EXPORT_URL: http://otel-collector:4316/v1/traces
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4316
      OTEL_SERVICE_NAME: heady-manager
      HEADY_TARGET: Docker
    ports:
      - "3300:3300"
    volumes:
      - heady-data:/app/.heady-memory
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3300/api/health"]
      interval: 15s
