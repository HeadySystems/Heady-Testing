#
# Default compose file — starts heady-manager with persistent volumes.
# Usage: docker compose up -d

services:
  heady-manager:
    build: .
    ports:
      - "3300:3300"
    environment:
      - NODE_ENV=production
      - PORT=3300
      - DATABASE_URL=${DATABASE_URL:-}
      - REDIS_URL=${REDIS_URL:-}
      - HEADY_API_KEY=${HEADY_API_KEY:-}
      - ADMIN_TOKEN=${ADMIN_TOKEN:-}
      - RENDER_API_KEY=${RENDER_API_KEY:-}
      - HF_TOKEN=${HF_TOKEN:-}
      - USE_HEADY_MANAGER=${USE_HEADY_MANAGER:-true}
      - HEADY_TARGET=${HEADY_TARGET:-CloudOnly}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3300/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    hostname: heady-manager
    networks:
      heady-net:
        aliases:
          - heady-manager
    volumes:
      - heady-data:/app/data
      - heady-logs:/app/logs
      - heady-cache:/app/.cache
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  heady:
    image: python:3.11-alpine
    container_name: Heady
    command: python3 -m http.server 8000
    networks:
      - heady-net

networks:
  heady-net:
    driver: bridge

volumes:
  heady-data:
    driver: local
  heady-logs:
    driver: local
  heady-cache:
    driver: local
