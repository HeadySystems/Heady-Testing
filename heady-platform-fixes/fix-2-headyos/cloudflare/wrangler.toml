# HeadyOS Worker — headyos.com
# Fixes 530 origin error by providing a Worker-based origin

name = "heady-os-worker"
main = "worker.js"
compatibility_date = "2026-03-01"

# Routes
routes = [
  { pattern = "headyos.com/*", zone_name = "headyos.com" },
  { pattern = "*.headyos.com/*", zone_name = "headyos.com" },
]

# Environment variables
[vars]
HEADY_SERVICE = "heady-os"
HEADY_VERSION = "2.0.0"

# Production environment
[env.production]
routes = [
  { pattern = "headyos.com/*", zone_name = "headyos.com" },
  { pattern = "kernel.headyos.com/*", zone_name = "headyos.com" },
  { pattern = "runtime.headyos.com/*", zone_name = "headyos.com" },
  { pattern = "scheduler.headyos.com/*", zone_name = "headyos.com" },
  { pattern = "memory.headyos.com/*", zone_name = "headyos.com" },
]
