# Heady™ Prometheus Configuration v5.0
# Sacred Geometry scrape intervals — all timing phi-derived
# Author: Eric Haywood — HeadySystems Inc.

global:
  scrape_interval: 34s      # fib(9) = 34 seconds
  evaluation_interval: 21s  # fib(8) = 21 seconds
  scrape_timeout: 13s       # fib(7) = 13 seconds

rule_files:
  - "alerts.yml"

scrape_configs:
  # ─── Inference Services ───────────────────────────────────
  - job_name: "heady-inference"
    scrape_interval: 13s    # HOT pool — faster scrape
    static_configs:
      - targets:
          - "heady-inference:3310"
          - "heady-embed:3311"
          - "heady-classify:3312"
          - "heady-summarize:3313"
          - "heady-translate:3314"
          - "heady-vision:3315"
          - "heady-speech:3316"
          - "heady-code-gen:3317"
          - "heady-reasoning:3318"
          - "heady-multi-modal:3319"
    metrics_path: /metrics

  # ─── Memory Services ─────────────────────────────────────
  - job_name: "heady-memory"
    scrape_interval: 13s
    static_configs:
      - targets:
          - "heady-memory:3320"
          - "heady-vector-store:3321"
          - "heady-graph-rag:3322"
          - "heady-knowledge-base:3323"
          - "heady-context-manager:3324"
          - "heady-cache:3325"
          - "heady-embedding-router:3326"
          - "heady-search:3327"
          - "heady-index:3328"
          - "heady-rerank:3329"

  # ─── Agent Services ──────────────────────────────────────
  - job_name: "heady-agents"
    scrape_interval: 21s    # WARM pool
    static_configs:
      - targets:
          - "heady-conductor:3330"
          - "heady-bee-factory:3331"
          - "heady-swarm:3332"
          - "heady-soul:3333"
          - "heady-brains:3334"
          - "heady-vinci:3335"
          - "heady-buddy:3336"
          - "heady-manager:3337"
          - "heady-autobiographer:3338"
          - "heady-patterns:3339"

  # ─── Orchestration ───────────────────────────────────────
  - job_name: "heady-orchestration"
    scrape_interval: 21s
    static_configs:
      - targets:
          - "heady-pipeline:3340"
          - "heady-scheduler:3341"
          - "heady-task-decomp:3342"
          - "heady-backpressure:3343"
          - "heady-liquid-mesh:3344"
          - "heady-liquid-gateway:3345"
          - "heady-arena:3346"
          - "heady-consensus:3347"
          - "heady-circuit-breaker:3348"
          - "heady-load-balancer:3349"

  # ─── Security ────────────────────────────────────────────
  - job_name: "heady-security"
    scrape_interval: 21s
    static_configs:
      - targets:
          - "heady-auth:3350"
          - "heady-oauth:3351"
          - "heady-firewall:3352"
          - "heady-audit:3353"
          - "heady-governance:3354"
          - "heady-encryption:3355"
          - "heady-rate-limiter:3356"
          - "heady-identity:3357"
          - "heady-mcp-gateway:3358"
          - "heady-zero-trust:3359"

  # ─── Monitoring ──────────────────────────────────────────
  - job_name: "heady-monitoring"
    scrape_interval: 34s    # Self-monitoring
    static_configs:
      - targets:
          - "heady-health:3360"
          - "heady-metrics:3361"
          - "heady-alerting:3363"
          - "heady-log-aggregator:3365"
          - "heady-trace-collector:3366"
          - "heady-drift-detector:3367"
          - "heady-self-healing:3368"
          - "heady-monte-carlo:3369"

  # ─── Data Services ──────────────────────────────────────
  - job_name: "heady-data"
    scrape_interval: 34s
    static_configs:
      - targets:
          - "heady-analytics:3388"

  # ─── Integration ─────────────────────────────────────────
  - job_name: "heady-integration"
    scrape_interval: 34s    # COLD pool
    static_configs:
      - targets:
          - "heady-notification:3390"
          - "heady-webhook:3391"
          - "heady-colab-bridge:3392"
          - "heady-liquid-deploy:3393"
          - "heady-evolution:3394"
          - "heady-documentation:3395"
          - "heady-auto-success:3396"

  # ─── Infrastructure ──────────────────────────────────────
  - job_name: "postgres"
    scrape_interval: 34s
    static_configs:
      - targets: ["heady-pgvector:3380"]

  - job_name: "nats"
    scrape_interval: 34s
    static_configs:
      - targets: ["heady-nats:8222"]
    metrics_path: /varz

  - job_name: "otel-collector"
    scrape_interval: 34s
    static_configs:
      - targets: ["heady-telemetry:8889"]
