# Heady™ Docker Compose v5.0
# 50+ services on ports 3310-3396
# Sacred Geometry resource allocation — all values phi/fibonacci derived
#
# Author: Eric Haywood — HeadySystems Inc.

version: "3.9"

x-heady-defaults: &heady-defaults
  restart: unless-stopped
  logging:
    driver: json-file
    options:
      max-size: "13m"   # fib(7) = 13
      max-file: "5"     # fib(5) = 5
  networks:
    - heady-mesh
  environment: &heady-env
    NODE_ENV: production
    HEADY_PHI: "1.6180339887"
    HEADY_PSI: "0.6180339887"
    HEADY_EMBEDDING_DIM: "384"
    HEADY_LOG_FORMAT: json
    HEADY_LOG_LEVEL: info
    OTEL_EXPORTER_OTLP_ENDPOINT: http://heady-telemetry:4317
    OTEL_SERVICE_NAME: "${SERVICE_NAME:-heady}"
    NATS_URL: nats://heady-nats:4222
    REDIS_URL: redis://heady-redis:6379
    DATABASE_URL: postgresql://heady:heady@heady-pgbouncer:5432/heady
  healthcheck:
    interval: 34s       # fib(9) = 34
    timeout: 13s        # fib(7) = 13
    retries: 5          # fib(5) = 5
    start_period: 21s   # fib(8) = 21

