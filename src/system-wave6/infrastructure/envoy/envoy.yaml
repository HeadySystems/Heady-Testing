# Heady™ Envoy Proxy Configuration v5.0
# mTLS service mesh with phi-scaled timeouts
# Author: Eric Haywood — HeadySystems Inc.

admin:
  address:
    socket_address: { address: 0.0.0.0, port_value: 9901 }

static_resources:
  listeners:
    - name: heady_gateway
      address:
        socket_address: { address: 0.0.0.0, port_value: 3370 }
      filter_chains:
        - filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                stat_prefix: heady_gateway
                codec_type: AUTO
                access_log:
                  - name: envoy.access_loggers.stdout
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.access_loggers.stream.v3.StdoutAccessLog
                      log_format:
                        json_format:
                          timestamp: "%START_TIME%"
                          method: "%REQ(:METHOD)%"
                          path: "%REQ(:PATH)%"
                          status: "%RESPONSE_CODE%"
                          duration_ms: "%DURATION%"
                          upstream: "%UPSTREAM_HOST%"
                          service: "envoy-gateway"
                route_config:
                  name: heady_routes
                  virtual_hosts:
                    # ─── Website Routes ──────────────────────────
                    - name: headyme
                      domains: ["headyme.com", "www.headyme.com"]
                      routes:
                        - match: { prefix: "/" }
                          route:
                            cluster: web_headyme
                            timeout: 34s

                    - name: headysystems
                      domains: ["headysystems.com", "www.headysystems.com"]
                      routes:
                        - match: { prefix: "/" }
                          route:
                            cluster: web_headysystems
                            timeout: 34s

                    - name: heady_ai
                      domains: ["heady-ai.com", "www.heady-ai.com"]
                      routes:
                        - match: { prefix: "/" }
                          route:
                            cluster: web_heady_ai
                            timeout: 34s

                    - name: headyos
                      domains: ["headyos.com", "www.headyos.com"]
                      routes:
                        - match: { prefix: "/" }
                          route:
                            cluster: web_headyos
                            timeout: 34s

                    - name: headyconnection_org
                      domains: ["headyconnection.org", "www.headyconnection.org"]
                      routes:
                        - match: { prefix: "/" }
                          route:
                            cluster: web_headyconnection_org
                            timeout: 34s

                    - name: headyconnection_com
                      domains: ["headyconnection.com", "www.headyconnection.com"]
                      routes:
                        - match: { prefix: "/" }
                          route:
                            cluster: web_headyconnection_com
                            timeout: 34s

                    - name: headyex
                      domains: ["headyex.com", "www.headyex.com"]
                      routes:
                        - match: { prefix: "/" }
                          route:
                            cluster: web_headyex
                            timeout: 34s

                    - name: headyfinance
                      domains: ["headyfinance.com", "www.headyfinance.com"]
                      routes:
                        - match: { prefix: "/" }
                          route:
                            cluster: web_headyfinance
                            timeout: 34s

                    - name: admin_headysystems
                      domains: ["admin.headysystems.com"]
                      routes:
                        - match: { prefix: "/" }
                          route:
                            cluster: web_admin
                            timeout: 34s

                    # ─── Auth Routes ──────────────────────────────
                    - name: auth
                      domains: ["auth.headysystems.com"]
                      routes:
                        - match: { prefix: "/" }
                          route:
                            cluster: heady_auth
                            timeout: 13s

                    # ─── API Routes ──────────────────────────────
                    - name: api
                      domains: ["api.headysystems.com", "*"]
                      routes:
                        - match: { prefix: "/v1/inference" }
                          route:
                            cluster: heady_inference
                            timeout: 34s
                        - match: { prefix: "/v1/memory" }
                          route:
                            cluster: heady_memory
                            timeout: 34s
                        - match: { prefix: "/v1/agents" }
                          route:
                            cluster: heady_conductor
                            timeout: 233s
                        - match: { prefix: "/v1/pipeline" }
                          route:
                            cluster: heady_pipeline
                            timeout: 233s
                        - match: { prefix: "/v1/search" }
                          route:
                            cluster: heady_search
                            timeout: 34s
                        - match: { prefix: "/v1/mcp" }
                          route:
                            cluster: heady_mcp_gateway
                            timeout: 233s
                        - match: { prefix: "/health" }
                          route:
                            cluster: heady_health
                            timeout: 13s
                        - match: { prefix: "/" }
                          route:
                            cluster: heady_liquid_gateway
                            timeout: 34s

                http_filters:
                  - name: envoy.filters.http.cors
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.cors.v3.Cors
                  - name: envoy.filters.http.router
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router

  clusters:
    # ─── Website Clusters ────────────────────────────────────
    - name: web_headyme
      connect_timeout: 13s
      type: STRICT_DNS
      load_assignment:
        cluster_name: web_headyme
        endpoints:
          - lb_endpoints:
              - endpoint: { address: { socket_address: { address: headyme-com, port_value: 3371 }}}

    - name: web_headysystems
      connect_timeout: 13s
      type: STRICT_DNS
      load_assignment:
        cluster_name: web_headysystems
        endpoints:
          - lb_endpoints:
              - endpoint: { address: { socket_address: { address: headysystems-com, port_value: 3372 }}}

    - name: web_heady_ai
      connect_timeout: 13s
      type: STRICT_DNS
      load_assignment:
        cluster_name: web_heady_ai
        endpoints:
          - lb_endpoints:
              - endpoint: { address: { socket_address: { address: heady-ai-com, port_value: 3373 }}}

    - name: web_headyos
      connect_timeout: 13s
      type: STRICT_DNS
      load_assignment:
        cluster_name: web_headyos
        endpoints:
          - lb_endpoints:
              - endpoint: { address: { socket_address: { address: headyos-com, port_value: 3374 }}}

    - name: web_headyconnection_org
      connect_timeout: 13s
      type: STRICT_DNS
      load_assignment:
        cluster_name: web_headyconnection_org
        endpoints:
          - lb_endpoints:
              - endpoint: { address: { socket_address: { address: headyconnection-org, port_value: 3375 }}}

    - name: web_headyconnection_com
      connect_timeout: 13s
      type: STRICT_DNS
      load_assignment:
        cluster_name: web_headyconnection_com
        endpoints:
          - lb_endpoints:
              - endpoint: { address: { socket_address: { address: headyconnection-com, port_value: 3376 }}}

    - name: web_headyex
      connect_timeout: 13s
      type: STRICT_DNS
      load_assignment:
        cluster_name: web_headyex
        endpoints:
          - lb_endpoints:
              - endpoint: { address: { socket_address: { address: headyex-com, port_value: 3377 }}}

    - name: web_headyfinance
      connect_timeout: 13s
      type: STRICT_DNS
      load_assignment:
        cluster_name: web_headyfinance
        endpoints:
          - lb_endpoints:
              - endpoint: { address: { socket_address: { address: headyfinance-com, port_value: 3378 }}}

    - name: web_admin
      connect_timeout: 13s
      type: STRICT_DNS
      load_assignment:
        cluster_name: web_admin
        endpoints:
          - lb_endpoints:
              - endpoint: { address: { socket_address: { address: admin-headysystems, port_value: 3379 }}}

    # ─── Service Clusters ────────────────────────────────────
    - name: heady_auth
      connect_timeout: 5s
      type: STRICT_DNS
      load_assignment:
        cluster_name: heady_auth
        endpoints:
          - lb_endpoints:
              - endpoint: { address: { socket_address: { address: heady-auth, port_value: 3350 }}}

    - name: heady_inference
      connect_timeout: 13s
      type: STRICT_DNS
      load_assignment:
        cluster_name: heady_inference
        endpoints:
          - lb_endpoints:
              - endpoint: { address: { socket_address: { address: heady-inference, port_value: 3310 }}}

    - name: heady_memory
      connect_timeout: 13s
      type: STRICT_DNS
      load_assignment:
        cluster_name: heady_memory
        endpoints:
          - lb_endpoints:
              - endpoint: { address: { socket_address: { address: heady-memory, port_value: 3320 }}}

    - name: heady_conductor
      connect_timeout: 13s
      type: STRICT_DNS
      load_assignment:
        cluster_name: heady_conductor
        endpoints:
          - lb_endpoints:
              - endpoint: { address: { socket_address: { address: heady-conductor, port_value: 3330 }}}

    - name: heady_pipeline
      connect_timeout: 13s
      type: STRICT_DNS
      load_assignment:
        cluster_name: heady_pipeline
        endpoints:
          - lb_endpoints:
              - endpoint: { address: { socket_address: { address: heady-pipeline, port_value: 3340 }}}

    - name: heady_search
      connect_timeout: 13s
      type: STRICT_DNS
      load_assignment:
        cluster_name: heady_search
        endpoints:
          - lb_endpoints:
              - endpoint: { address: { socket_address: { address: heady-search, port_value: 3327 }}}

    - name: heady_mcp_gateway
      connect_timeout: 13s
      type: STRICT_DNS
      load_assignment:
        cluster_name: heady_mcp_gateway
        endpoints:
          - lb_endpoints:
              - endpoint: { address: { socket_address: { address: heady-mcp-gateway, port_value: 3358 }}}

    - name: heady_health
      connect_timeout: 5s
      type: STRICT_DNS
      load_assignment:
        cluster_name: heady_health
        endpoints:
          - lb_endpoints:
              - endpoint: { address: { socket_address: { address: heady-health, port_value: 3360 }}}

    - name: heady_liquid_gateway
      connect_timeout: 13s
      type: STRICT_DNS
      load_assignment:
        cluster_name: heady_liquid_gateway
        endpoints:
          - lb_endpoints:
              - endpoint: { address: { socket_address: { address: heady-liquid-gateway, port_value: 3345 }}}
