      HEADY_MANAGER_URL: http://heady-manager:3301
      HEADY_AUTH_URL: http://heady-auth:3309
      HEADY_ROUTER_URL: http://heady-router:3308
    ports:
      - "3302:3302"
    networks: [heady]
    depends_on:
      - heady-manager
      - heady-auth
      - heady-router

  heady-mcp:
