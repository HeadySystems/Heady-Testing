name: heady-system-build

services:
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.108.0
    container_name: otel-collector
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ./ops/otel-collector/otel-collector-config.yaml:/etc/otelcol/config.yaml:ro
    ports:
      - "4317:4317"
    networks: [heady]

  heady-manager:
    build:
      context: .
      dockerfile: services/heady-manager/Dockerfile
    container_name: heady-manager
    environment:
      NODE_ENV: local
      SERVICE_NAME: heady-manager
      SERVICE_VERSION: 3.2.3
      HEADY_DOMAIN: headysystems.com
      PORT: 3301
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      HEADY_GATEWAY_URL: http://heady-gateway:3302
      HEADY_MCP_URL: http://heady-mcp:3303
      HEADY_BRAIN_URL: http://heady-brain:3304
    ports:
      - "3301:3301"
    networks: [heady]
    depends_on:
      - heady-gateway
      - heady-mcp
      - heady-brain

  heady-gateway:
    build:
      context: .
      dockerfile: services/heady-gateway/Dockerfile
    container_name: heady-gateway
    environment:
      NODE_ENV: local
      SERVICE_NAME: heady-gateway
