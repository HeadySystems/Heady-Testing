name = "heady-buddy-worker"
main = "src/index.js"
compatibility_date = "2024-12-01"
account_id = "$CLOUDFLARE_ACCOUNT_ID"

[env.production]
routes = [
  { pattern = "buddy.headysystems.com/*", zone_name = "headysystems.com" },
  { pattern = "headybuddy.org/api/*", zone_name = "headybuddy.org" }
]
[env.production.vars]
ENVIRONMENT = "production"
BUDDY_BACKEND = "https://manager.headysystems.com/api/buddy"
SYNC_INTERVAL_MS = "5000"
