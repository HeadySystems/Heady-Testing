id: operations-autonomy-swarm
name: Operations Autonomy Swarm
version: 1.0.0
role: Keep critical Heady services healthy while coordinating response and scaling.
allocation:
  strategy: fibonacci-weighted
  weight: 34
  priorityLevel: 1
includedBeeTemplates: [incident-response-sentinel, swarm-routing-optimizer, autonomous-projection-keeper]
workerAssignments:
  - beeTemplateId: incident-response-sentinel
    role: lead
    instances: 3
  - beeTemplateId: swarm-routing-optimizer
    role: primary
    instances: 2
  - beeTemplateId: autonomous-projection-keeper
    role: support
    instances: 1
communication:
  - target: security-compliance-swarm
    channelType: rpc
    topic: heady.ops.security
    priority: 9
  - target: projection-deployment-swarm
    channelType: event-bus
    topic: heady.ops.projection
    priority: 8
scaling:
  rules:
    - trigger: cpu_utilization
      threshold: 75
      direction: up
      minInstances: 2
      maxInstances: 21
    - trigger: queue_depth
      threshold: 100
      direction: up
      minInstances: 2
      maxInstances: 21
healthChecks:
  - protocol: http
    endpoint: /ops/health
    intervalSeconds: 15
    timeoutSeconds: 5
projection:
  enabled: true
  uiRegion: main-content
  apiSurface: [/api/ops/health, /api/ops/incidents, /api/ops/scaling]
  projectionTargets: [headysystems-core, headyme-core]
observability:
  metrics: [incident_count, avg_recovery_ms, queue_depth, api_p95]
  alerts: [HeadyManagerDown, HighErrorRate, HighLatency]
  receipts: [execution-receipt, critique-report]
governance:
  ownerNode: control-plane-dispatch
  releaseGate: projection-release-gate
  requiredReceipts: [execution-receipt, critique-report, release-gate-report]
