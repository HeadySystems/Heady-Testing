version: '3.8'

services:
  heady-manager:
    build: .
    ports:
      - "3301:3301"
    environment:
      - NODE_ENV=production
      - PORT=3301
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    restart: unless-stopped

  heady-brain:
    build: .
    environment:
      - SERVICE_NAME=heady-brain
      - NODE_ENV=production
    env_file:
      - .env
    depends_on:
      - heady-manager
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - prometheus
