version: 1
layers:
  edge:
    provider: cloudflare
    assets: [heady-mcp-worker, liquid-gateway-worker, heady-buddy-worker, edge-auth-worker]
  execution:
    provider: cloud-run
    assets: [domain-router, observability-kernel, budget-tracker, heady-memory, heady-health, heady-conductor, heady-brains, heady-soul, heady-vinci, heady-governance, heady-guard, heady-autobiographer, heady-bee-factory, hcfullpipeline-executor, auto-success-engine]
  memory:
    provider: postgres_pgvector
    assets: [vector_memory, graph_rag, audit_store]
  cache:
    provider: redis
    assets: [sessions, rate_limits, provider_health]
