# ═══════════════════════════════════════════════════════════════════════════════
# Heady™ Domain Routing Registry — configs/domains.yaml
# ═══════════════════════════════════════════════════════════════════════════════
#
# Complete domain registry. Every request is routed through this map.
# Zero localhost — everything uses branded Heady domains.
#
# © HeadySystems Inc.

# ─── Primary Domains ──────────────────────────────────────────────────────────

domains:

  # Command Center
  headyme.com:
    role: "command-center"
    description: "Heady™ Command Center — primary platform hub"
    target: "cloudflare-pages"
    project: "headyme-production"
    ssl: true
    subdomains:
      app: "Main application"
      api: "Primary API gateway"
      ws: "WebSocket relay"
      heady: "Edge proxy entrypoint"
      docs: "Documentation"

  # Core Architecture Engine
  headysystems.com:
    role: "architecture-engine"
    description: "HeadySystems™ — core architecture and engineering"
    target: "cloudflare-pages"
    project: "heady-production"
    ssl: true
    subdomains:
      api: "Systems API"
      status: "System status page"
      metrics: "Observability dashboard"

  # Nonprofit & Community
  headyconnection.org:
    role: "nonprofit-community"
    description: "HeadyConnection™ — nonprofit, community, mutual aid"
    target: "cloudflare-pages"
    project: "headyconnection-production"
    ssl: true
    subdomains:
      app: "Community app"
      api: "Community API"
      grants: "Grant management"

  # AI Companion
  headybuddy.org:
    role: "companion"
    description: "HeadyBuddy™ — personal AI companion experience"
    target: "cloudflare-pages"
    ssl: true
    subdomains:
      app: "Buddy chat interface"
      api: "Buddy API"
      voice: "Voice relay"

  # MCP Layer
  headymcp.com:
    role: "mcp-gateway"
    description: "HeadyMCP™ — Model Context Protocol gateway"
    target: "cloud-run"
    service: "heady-mcp"
    ssl: true
    subdomains:
      api: "MCP API"
      tools: "Tool registry"
      ws: "MCP WebSocket transport"

  # Developer Platform
  headyio.com:
    role: "developer-platform"
    description: "HeadyIO™ — developer SDK and platform"
    target: "cloudflare-pages"
    ssl: true
    subdomains:
      api: "Developer API"
      docs: "SDK documentation"
      sandbox: "Developer sandbox"

  # Bot & Automation
  headybot.com:
    role: "automation"
    description: "HeadyBot™ — autonomous bot orchestration"
    target: "cloud-run"
    service: "heady-bot"
    ssl: true
    subdomains:
      api: "Bot API"
      hooks: "Webhook receiver"

  # Public API
  headyapi.com:
    role: "public-api"
    description: "HeadyAPI™ — public intelligence interface"
    target: "cloud-run"
    service: "heady-api"
    ssl: true
    subdomains:
      v1: "API v1"
      v2: "API v2"

  # Intelligence Hub
  heady-ai.com:
    role: "intelligence-hub"
    description: "HeadyAI™ — intelligence routing and inference"
    target: "cloudflare-workers"
    worker: "heady-ai-router"
    ssl: true

  # Additional domains
  heady-ai.com:
    role: "ai-research"
    description: "Heady™ AI research and publications"
    target: "cloudflare-pages"
    ssl: true

# ─── Cloud Run Services ──────────────────────────────────────────────────────

cloud_run:
  project: "heady-production"
  region: "us-central1"
  services:
    heady-manager:
      url: "heady-manager-609590223909.us-central1.run.app"
      minInstances: 1
      maxInstances: 8          # fib(6)
      concurrency: 34          # fib(9)
      cpu: 2
      memoryMi: 512
    heady-mcp:
      url: "heady-mcp-609590223909.us-central1.run.app"
      minInstances: 0
      maxInstances: 5          # fib(5)
      concurrency: 21          # fib(8)
      cpu: 1
      memoryMi: 256

# ─── Cloudflare ───────────────────────────────────────────────────────────────

cloudflare:
  zones:
    - headyme.com
    - headyconnection.org
    - heady-ai.com
  workers:
    heady-edge-proxy:
      route: "heady.headyme.com/*"
      purpose: "Edge proxy and routing"
    heady-edge-node:
      route: "*.heady-ai.com/*"
      purpose: "AI inference at edge"
    heady-ai-router:
      route: "heady-ai.com/*"
      purpose: "Intelligence routing"

# ─── HuggingFace Spaces ──────────────────────────────────────────────────────

huggingface:
  spaces:
    heady-ai:
      url: "headyme-heady-ai.hf.space"
      sdk: "docker"
      hardware: "cpu-basic"
    heady-demo:
      url: "headyme-heady-demo.hf.space"
      sdk: "static"

# ─── URL Rewrite Rules ───────────────────────────────────────────────────────
# ENFORCEMENT: No localhost, no C:\, no internal references

url_rules:
  banned_patterns:
    - "localhost"
    - "127.0.0.1"
    - "0.0.0.0"
    - "C:\\"
    - "D:\\"
    - "file://"
    - ".local"
    - ".internal"
  enforcement: "error"   # 'error' = hard fail, 'warn' = log warning
