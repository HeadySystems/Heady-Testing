# Heady™ Projection Monorepo — Local Development Docker Compose
#
# Services:
#   projection-service  — Core projection service  (port 3849)
#   dashboard           — Dashboard server          (port 3850)
#   redis               — Cache layer               (port 6379)
#
# Usage:
#   docker compose up --build
#   docker compose up --build projection-service
#   docker compose logs -f projection-service

version: "3.9"

networks:
  heady-net:
    driver: bridge
    name: heady-net

volumes:
  redis-data:
    name: heady-redis-data

services:

  # ── Projection Service ───────────────────────────────────────────────────
  projection-service:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
      args:
        NODE_VERSION: "20"
        BUILD_SHA: local
        BUILD_DATE: ${BUILD_DATE:-unknown}
    image: heady/projection-service:dev
    container_name: heady-projection-service
    restart: unless-stopped
    ports:
      - "${PROJECTION_PORT:-3849}:3849"
    environment:
      NODE_ENV: development
      LOG_LEVEL: debug
      PROJECTION_PORT: "3849"
      PHI: "1.6180339887"
      REDIS_URL: redis://redis:6379
      CONDUCTOR_URL: ${CONDUCTOR_URL:-}
      PUBSUB_TOPIC: ${PUBSUB_TOPIC:-}
    env_file:
      - .env.local
    volumes:
      # Live reload: mount source for development
      - ./apps/projection-service:/app/apps/projection-service:ro
      - ./packages:/app/packages:ro
      - ./configs:/app/configs:ro
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3849/health"]
      interval: 16s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - heady-net
    labels:
      com.headysystems.service: "projection-service"
      com.headysystems.phi: "1.6180339887"

  # ── Dashboard ────────────────────────────────────────────────────────────
  dashboard:
    build:
      context: .
      dockerfile: apps/dashboard/Dockerfile
      target: runtime
    image: heady/dashboard:dev
    container_name: heady-dashboard
    restart: unless-stopped
    ports:
      - "${DASHBOARD_PORT:-3850}:3850"
    environment:
      NODE_ENV: development
      DASHBOARD_PORT: "3850"
      PROJECTION_SERVICE: http://projection-service:3849
      PHI: "1.6180339887"
    env_file:
      - .env.local
    volumes:
      - ./apps/dashboard:/app/apps/dashboard:ro
    depends_on:
      projection-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3850/_health"]
      interval: 16s
      timeout: 5s
      retries: 3
      start_period: 5s
    networks:
      - heady-net
    labels:
      com.headysystems.service: "dashboard"

  # ── Redis ────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: heady-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 60 100
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    networks:
      - heady-net
    labels:
      com.headysystems.service: "redis"
