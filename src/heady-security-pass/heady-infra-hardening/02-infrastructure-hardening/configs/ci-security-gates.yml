# =============================================================================
# Heady™ CI Security Gates — Drop into .github/workflows/
# =============================================================================
name: Security Gates

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # --- Coverage Gate ---
  coverage-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npx jest --coverage --coverageReporters=json-summary --coverageDirectory=coverage
      - name: Enforce 80% coverage on core orchestration
        run: |
          node -e "
            const c = require('./coverage/coverage-summary.json');
            const total = c.total;
            const metrics = ['lines', 'statements', 'branches', 'functions'];
            let pass = true;
            for (const m of metrics) {
              const pct = total[m].pct;
              console.log(m + ': ' + pct + '%');
              if (pct < 80) {
                console.error('❌ ' + m + ' coverage ' + pct + '% < 80%');
                pass = false;
              }
            }
            if (!pass) process.exit(1);
            console.log('✅ All coverage thresholds met');
          "
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/

  # --- Lockfile Integrity ---
  lockfile-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm ci --ignore-scripts
      - run: |
          git diff --exit-code package-lock.json || {
            echo "❌ package-lock.json is out of sync with package.json"
            exit 1
          }

  # --- SBOM Generation ---
  sbom:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm ci
      - run: npx @cyclonedx/cyclonedx-npm --output-file bom.json
      - uses: actions/upload-artifact@v4
        with:
          name: sbom-cyclonedx
          path: bom.json

  # --- Secret Scanning ---
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --only-verified

  # --- Dependency Audit ---
  dependency-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm ci
      - run: npm audit --audit-level=high
      - run: npx better-npm-audit audit --level high

  # --- Integration Tests with Services ---
  integration-tests:
    runs-on: ubuntu-latest
    needs: [coverage-gate]
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: heady_test
          POSTGRES_USER: heady
          POSTGRES_PASSWORD: test_password
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm ci
      - run: npx jest --testPathPattern='tests/(integration|e2e)' --runInBand --forceExit
        env:
          DATABASE_URL: postgresql://heady:test_password@localhost:5432/heady_test
          REDIS_URL: redis://localhost:6379
          NODE_ENV: test

  # --- Load Test Gate ---
  load-test:
    runs-on: ubuntu-latest
    needs: [integration-tests]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm ci
      - run: npm start &
        env:
          NODE_ENV: test
          PORT: 3848
      - run: sleep 10
      - uses: grafana/k6-action@v0.3.1
        with:
          filename: tests/load/k6-baseline.js
