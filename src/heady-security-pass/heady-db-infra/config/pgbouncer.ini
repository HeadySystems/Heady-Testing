; ============================================================================
; Heady Liquid Architecture v3.1 — PgBouncer Configuration
; © 2026 HeadySystems Inc. PROPRIETARY AND CONFIDENTIAL.
; ============================================================================
;
; PgBouncer sits between the application and PostgreSQL to provide:
;   - Connection pooling (transaction mode for Cloud Run's ephemeral connections)
;   - Connection limiting (protect Postgres from connection storms)
;   - Automatic reconnection on failure
;   - Query queuing during overload
;
; Deployment:
;   - Local: docker-compose (pgbouncer service on port 6432)
;   - Production: Cloud SQL Auth Proxy → PgBouncer → Cloud SQL Postgres
;
; Application connects to PgBouncer on port 6432 instead of Postgres on 5432.
; ============================================================================

[databases]
; ————————————————————————————————————————————————————————————————————————————
; Database Connection Definitions
; ————————————————————————————————————————————————————————————————————————————

; Production database
heady_prod = host=127.0.0.1 port=5432 dbname=heady_prod auth_user=heady_app

; Development database (local Docker)
heady_dev = host=postgres port=5432 dbname=heady_dev auth_user=heady

; Read replica (if available — for vector search offload)
; heady_replica = host=heady-read-replica port=5432 dbname=heady_prod auth_user=heady_readonly

; Staging
; heady_staging = host=127.0.0.1 port=5432 dbname=heady_staging auth_user=heady_app

[pgbouncer]
; ————————————————————————————————————————————————————————————————————————————
; Connection Pool Settings
; ————————————————————————————————————————————————————————————————————————————

; Listen on all interfaces, port 6432
listen_addr = 0.0.0.0
listen_port = 6432

; Transaction pooling — each transaction gets a server connection, then releases.
; Required for Cloud Run where containers are ephemeral and connections are short-lived.
; NOTE: Prepared statements, SET commands, and advisory locks do NOT persist across
; transactions in this mode. The app uses set_config() with is_local=false inside
; each transaction to set tenant context.
pool_mode = transaction

; ————————————————————————————————————————————————————————————————————————————
; Connection Limits
; ————————————————————————————————————————————————————————————————————————————

; Max simultaneous client connections PgBouncer will accept
; Cloud Run can burst to many instances — this is the ceiling.
max_client_conn = 2000

; Default pool size per user/database pair
; This is how many actual Postgres connections PgBouncer maintains.
; Cloud SQL db-f1-micro supports ~25 connections; db-custom-2-4096 supports ~100.
default_pool_size = 25

; Min pool size — keep this many connections warm even when idle
min_pool_size = 5

; Reserve pool connections for admin/critical operations
reserve_pool_size = 5
reserve_pool_timeout = 3

; Max connections to a single database (across all users)
max_db_connections = 50

; Max connections per user (across all databases)
max_user_connections = 40

; ————————————————————————————————————————————————————————————————————————————
; Timeouts
; ————————————————————————————————————————————————————————————————————————————

; How long to wait for a server connection from the pool
server_connect_timeout = 15

; How long a server connection can be idle before being closed
server_idle_timeout = 300

; How long a client can sit idle before being disconnected
client_idle_timeout = 600

; Max time a client can wait in queue for a connection
query_wait_timeout = 30

; Cancel long-running queries after this many seconds (0 = disabled)
query_timeout = 120

; Client login timeout
client_login_timeout = 30

; How long to wait for DNS resolution
dns_max_ttl = 300
dns_nxdomain_ttl = 30

; ————————————————————————————————————————————————————————————————————————————
; Connection Lifecycle
; ————————————————————————————————————————————————————————————————————————————

; Close server connections that have been used this many times
; Prevents connection state buildup.
server_lifetime = 3600

; Check if server connections are alive every N seconds
server_check_delay = 30

; SQL to execute when a connection is assigned to a client
; Resets session state between transactions.
server_reset_query = DISCARD ALL

; SQL to check server connection is alive
server_check_query = SELECT 1

; Reconnect to server automatically on error
server_fast_close = 1

; ————————————————————————————————————————————————————————————————————————————
; Authentication
; ————————————————————————————————————————————————————————————————————————————

; Auth type for clients connecting to PgBouncer
auth_type = scram-sha-256

; User list file (generate with: psql -Atq -c "SELECT usename, passwd FROM pg_shadow")
auth_file = /etc/pgbouncer/userlist.txt

; Query to fetch user credentials from the database itself
; (alternative to auth_file — useful for dynamic user management)
auth_query = SELECT usename, passwd FROM pg_shadow WHERE usename=$1

; PgBouncer admin user (for SHOW commands, RELOAD, etc.)
admin_users = heady_admin
stats_users = heady_monitor,heady_admin

; ————————————————————————————————————————————————————————————————————————————
; TLS Configuration
; ————————————————————————————————————————————————————————————————————————————

; Client-facing TLS (PgBouncer ← Application)
; In production, terminate TLS at PgBouncer to offload from Postgres.
; client_tls_sslmode = require
; client_tls_key_file = /etc/pgbouncer/tls/server.key
; client_tls_cert_file = /etc/pgbouncer/tls/server.crt
; client_tls_ca_file = /etc/pgbouncer/tls/ca.crt

; Server-facing TLS (PgBouncer → Postgres/Cloud SQL)
; Cloud SQL Auth Proxy handles TLS, so this is usually 'disable' for local proxy.
; For direct connections, use 'verify-full'.
; server_tls_sslmode = prefer
; server_tls_ca_file = /etc/pgbouncer/tls/server-ca.crt

; ————————————————————————————————————————————————————————————————————————————
; Logging
; ————————————————————————————————————————————————————————————————————————————

; Log file location
logfile = /var/log/pgbouncer/pgbouncer.log

; PID file
pidfile = /var/run/pgbouncer/pgbouncer.pid

; Log connections and disconnections
log_connections = 1
log_disconnections = 1

; Log pooler errors
log_pooler_errors = 1

; Stats period (seconds) — how often to log statistics
stats_period = 60

; Syslog settings (for Cloud Run / GKE)
; syslog = 1
; syslog_ident = pgbouncer-heady
; syslog_facility = daemon

; ————————————————————————————————————————————————————————————————————————————
; Application Name Tracking
; ————————————————————————————————————————————————————————————————————————————

; Track application_name across pooled connections for debugging
application_name_add_host = 1

; Ignore startup parameters that would break transaction pooling
ignore_startup_parameters = extra_float_digits,search_path,options
