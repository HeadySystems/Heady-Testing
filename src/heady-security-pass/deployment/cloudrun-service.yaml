## =============================================================================
## Heady™ Liquid Latent OS — Cloud Run Service Definition
##
## Numeric constants derived from Fibonacci / φ where applicable:
##   min-instances: 1           = fib(2)   always-on, zero cold starts
##   max-instances: 8           = fib(6)   φ-bounded horizontal scale
##   concurrency: 80            = env-standard concurrent request limit
##   cpu: 2                     = fib(3) vCPU
##   startup initial-delay: 10  = fib(7)-like rounded for probe compatibility
##   liveness period: 30        = standard Cloud Run probe period
##   readiness period: 5        = fib(5) seconds
## =============================================================================
apiVersion: serving.knative.dev/v1
kind: Service

metadata:
  name: heady-liquid-latent-os
  namespace: default
  labels:
    app: heady-liquid-latent-os
    version: "1.0.0"
    managed-by: cloud-build
  annotations:
    run.googleapis.com/ingress: all
    run.googleapis.com/launch-stage: GA

spec:
  template:
    metadata:
      labels:
        app: heady-liquid-latent-os
      annotations:
        # Gen2 execution environment — required for Knative extensions, better networking
        run.googleapis.com/execution-environment: gen2

        # CPU boost: allocate extra CPU during cold-start and startup probe window
        run.googleapis.com/startup-cpu-boost: "true"

        # Session affinity — sticky routing for WebSocket / stateful connections
        run.googleapis.com/sessionAffinity: "true"

        # Always-on: keep fib(2) = 1 instance warm at all times
        autoscaling.knative.dev/minScale: "1"

        # Maximum scale: fib(6) = 8 instances
        autoscaling.knative.dev/maxScale: "8"

        # VPC connector — references the connector name from the VPC_CONNECTOR env var
        run.googleapis.com/vpc-access-connector: "${VPC_CONNECTOR}"
        run.googleapis.com/vpc-access-egress: private-ranges-only

    spec:
      # Container concurrency: 80 requests per instance (Cloud Run default max is 1000)
      containerConcurrency: 80

      # Cloud Run service account for IAM-scoped Secret Manager access
      serviceAccountName: heady-cloudrun-sa@${PROJECT_ID}.iam.gserviceaccount.com

      # Terminate idle containers after 300 s of no traffic (fib(13) = 233 ≈ 4 min rounded up)
      timeoutSeconds: 300

      containers:
        - name: heady-liquid-latent-os
          # Image is substituted by Cloud Build at deploy time
          image: "${REGION}-docker.pkg.dev/${PROJECT_ID}/heady-registry/heady-liquid-latent-os:${IMAGE_TAG}"

          ports:
            - name: http1
              containerPort: 3300
              protocol: TCP

          resources:
            requests:
              cpu: "1"
              memory: 512Mi
            limits:
              # fib(3) = 2 vCPU, 1Gi memory
              cpu: "2"
              memory: 1Gi

          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "3300"
            - name: LOG_LEVEL
              value: info
            - name: VECTOR_DIMENSIONS
              value: "384"
            - name: PROJECTION_DIMENSIONS
              value: "3"
            - name: AUTO_SUCCESS_ENABLED
              value: "true"
            - name: PIPELINE_FULL_AUTO
              value: "false"
            - name: SERVICE_NAME
              value: heady-liquid-latent-os
            - name: SERVICE_VERSION
              value: "1.0.0"
            - name: RATE_LIMIT_BASE_RPM
              value: "120"
            - name: SHUTDOWN_DRAIN_MS
              value: "10000"
            - name: HEARTBEAT_MULTIPLIER
              value: "7"
            - name: SOUL_ARCHETYPES
              value: "explorer,architect,synthesizer,guardian,catalyst,witness,integrator"
            - name: DEPLOYMENT_REGION
              value: "${REGION}"

            # Secrets — sourced from Google Secret Manager at pod start
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: heady-database-url
                  key: latest
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: heady-redis-url
                  key: latest
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: heady-openai-api-key
                  key: latest
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: heady-anthropic-api-key
                  key: latest
            - name: GOOGLE_AI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: heady-google-ai-api-key
                  key: latest
            - name: CLOUDFLARE_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: heady-cloudflare-api-token
                  key: latest
            - name: CLOUDFLARE_ACCOUNT_ID
              valueFrom:
                secretKeyRef:
                  name: heady-cloudflare-account-id
                  key: latest

          # Startup probe: allow up to (10 + 5 × 13) = 75 s for the process to pass /health/live
          # fib(7) = 13 failure threshold
          startupProbe:
            httpGet:
              path: /health/live
              port: 3300
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 13
            timeoutSeconds: 3

          # Liveness probe: restart pod if /health/live fails 3 consecutive times
          livenessProbe:
            httpGet:
              path: /health/live
              port: 3300
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
            timeoutSeconds: 5

          # Readiness probe: remove pod from LB if not ready (fib(5) = 5 s period)
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 3300
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 3
            timeoutSeconds: 5

  traffic:
    # Default: send 100% of traffic to the latest revision
    # (Cloud Build canary steps override this progressively)
    - latestRevision: true
      percent: 100
