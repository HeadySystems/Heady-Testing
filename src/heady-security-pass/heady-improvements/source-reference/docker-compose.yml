# P2-2: Docker Compose for local full-stack development
version: "3.8"

services:
  heady-manager:
    build: .
    ports:
      - "3000:3000"
    env_file: .env
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://heady:heady_dev@postgres:5432/heady_dev
      REDIS_URL: redis://redis:6379
      OTEL_EXPORTER_ENDPOINT: http://otel-collector:4318
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/node_modules
    command: pnpm dev

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: heady
      POSTGRES_PASSWORD: heady_dev
      POSTGRES_DB: heady_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U heady -d heady_dev" ]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 5

  pgbouncer:
    image: edoburu/pgbouncer:latest
    ports:
      - "6432:6432"
    environment:
      DATABASE_URL: postgresql://heady:heady_dev@postgres:5432/heady_dev
      POOL_MODE: transaction
      DEFAULT_POOL_SIZE: 25
    depends_on:
      postgres:
        condition: service_healthy

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    ports:
      - "4317:4317" # gRPC
      - "4318:4318" # HTTP
      - "8889:8889" # Prometheus metrics
    volumes:
      - ./configs/observability/otel-config.yml:/etc/otelcol-contrib/config.yaml

volumes:
  pgdata:
