<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — Page Not Found | Heady</title>
    <meta name="description" content="The page you're looking for doesn't exist. Return to Heady's unified AI platform.">
    <meta http-equiv="refresh" content="5;url=/index.html">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0a;
            color: #e0e0e0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
        }

        .container {
            max-width: 560px;
            padding: 2rem;
        }

        .error-code {
            font-size: 6rem;
            font-weight: 800;
            color: #00d4ff;
            line-height: 1;
            letter-spacing: -0.04em;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 600;
            margin: 1rem 0 0.75rem;
            color: #ffffff;
        }

        p {
            color: #888;
            font-size: 1rem;
            line-height: 1.6;
            margin-bottom: 2rem;
        }

        .redirect-notice {
            font-size: 0.85rem;
            color: #555;
            margin-bottom: 2rem;
        }

        .redirect-notice span {
            color: #00d4ff;
            font-variant-numeric: tabular-nums;
        }

        nav {
            display: flex;
            gap: 1.5rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        nav a {
            color: #00d4ff;
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 500;
            padding: 0.5rem 1rem;
            border: 1px solid rgba(0, 212, 255, 0.25);
            border-radius: 6px;
            transition: background 0.2s, border-color 0.2s;
        }

        nav a:hover {
            background: rgba(0, 212, 255, 0.1);
            border-color: rgba(0, 212, 255, 0.5);
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="error-code">404</div>
        <h1>Page Not Found</h1>
        <p>The page you requested doesn't exist or has been moved. Use the links below to get back on track.</p>
        <p class="redirect-notice">Redirecting to home in <span id="countdown">5</span> seconds...</p>
        <nav>
            <a href="/index.html">Home</a>
            <a href="https://docs.headyio.com">Docs</a>
            <a href="mailto:contact@headysystems.com">Contact</a>
        </nav>
    </div>
    <script>
        (function () {
            var seconds = 5;
            var el = document.getElementById('countdown');
            var timer = setInterval(function () {
                seconds--;
                if (el) el.textContent = seconds;
                if (seconds <= 0) {
                    clearInterval(timer);
                    window.location.href = '/index.html';
                }
            }, 1000);
        })();
    </script>
</body>

</html>
