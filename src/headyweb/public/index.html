<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>HeadyWeb</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: #0b1020;
            color: #d6e2ff;
        }

        main {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            padding: 16px;
        }

        section {
            background: #121b33;
            border-radius: 8px;
            padding: 12px;
        }

        textarea,
        input {
            width: 100%;
            box-sizing: border-box;
            margin: 6px 0;
            background: #0f1730;
            color: #d6e2ff;
            border: 1px solid #2e3e6f;
        }

        textarea {
            min-height: 140px;
        }

        button {
            margin: 6px 0;
            background: #4b7cf7;
            color: #fff;
            border: 0;
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
        }

        pre {
            white-space: pre-wrap;
            background: #081022;
            padding: 8px;
            border-radius: 6px;
        }
    </style>
</head>

<body>
    <main>
        <section>
            <h2>Heady Chat + Persistent Vector Workspace</h2>
            <input id="sessionId" placeholder="session id" value="default" />
            <textarea id="message" placeholder="ask Heady"></textarea>
            <button id="sendChat">Send</button>
            <pre id="chatOut"></pre>
        </section>

        <section>
            <h2>HeadyAI-IDE File Operations</h2>
            <input id="filePath" placeholder="path e.g. notes/example.txt" />
            <textarea id="fileContent" placeholder="file content"></textarea>
            <button id="saveFile">Save File</button>
            <button id="loadFile">Load File</button>
            <button id="listFiles">List Root</button>
            <pre id="ideOut"></pre>
        </section>
    </main>
    <script src="/app.js"></script>
</body>

</html>
