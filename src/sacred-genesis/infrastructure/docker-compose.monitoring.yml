# Heady Monitoring Stack — Sacred Genesis v4.0.0
# All intervals derive from phi (1.618) and Fibonacci sequences
# Author: Eric Haywood, HeadySystems Inc.

version: "3.9"

services:
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: heady-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=89d"
      - "--storage.tsdb.retention.size=13GB"
      - "--web.enable-lifecycle"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/-/healthy"]
      interval: 34s
      timeout: 8s
      retries: 5
    networks:
      - heady-monitoring

  grafana:
    image: grafana/grafana:10.4.0
    container_name: heady-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_ADMIN_PASSWORD}"
      GF_SERVER_ROOT_URL: "https://admin.headysystems.com/grafana"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_INSTALL_PLUGINS: "grafana-clock-panel,grafana-piechart-panel"
      GF_LOG_MODE: "console"
      GF_LOG_LEVEL: "warn"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
      interval: 34s
      timeout: 8s
      retries: 5
    networks:
      - heady-monitoring

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: heady-alertmanager
    restart: unless-stopped
    ports:
      - "9093:9093"
    volumes:
      - ./prometheus/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9093/-/healthy"]
      interval: 34s
      timeout: 8s
      retries: 5
    networks:
      - heady-monitoring

  node-exporter:
    image: prom/node-exporter:v1.7.0
    container_name: heady-node-exporter
    restart: unless-stopped
    ports:
      - "9100:9100"
    command:
      - "--path.rootfs=/host"
    volumes:
      - /:/host:ro
    networks:
      - heady-monitoring

volumes:
  prometheus-data:
  grafana-data:

networks:
  heady-monitoring:
    driver: bridge
    name: heady-monitoring
