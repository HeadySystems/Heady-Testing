;;; Heady PgBouncer Configuration — Sacred Genesis v4.0.0
;;; Pool sizes use Fibonacci numbers
;;; Author: Eric Haywood, HeadySystems Inc.

[databases]
heady = host=${POSTGRES_HOST} port=5432 dbname=${POSTGRES_DB}
heady_vectors = host=${POSTGRES_HOST} port=5432 dbname=${POSTGRES_VECTORS_DB}

[pgbouncer]
listen_addr = 0.0.0.0
listen_port = 6432
auth_type = md5
auth_file = /etc/pgbouncer/userlist.txt

;;; Pool mode — transaction for microservices
pool_mode = transaction

;;; Fibonacci-derived pool sizes
default_pool_size = 21
min_pool_size = 5
reserve_pool_size = 8
max_client_conn = 233
max_db_connections = 89

;;; Timeouts (phi-derived seconds)
server_connect_timeout = 8
server_idle_timeout = 89
server_lifetime = 1597
client_idle_timeout = 233
client_login_timeout = 13
query_timeout = 34
query_wait_timeout = 21

;;; Logging
log_connections = 1
log_disconnections = 1
log_pooler_errors = 1
stats_period = 34

;;; Admin
admin_users = heady_admin
