# Heady NATS Server Configuration — Sacred Genesis v4.0.0
# All buffer/queue sizes use Fibonacci numbers
# Author: Eric Haywood, HeadySystems Inc.

port: 4222
http_port: 8222

server_name: heady-nats

# Logging — structured JSON
logfile_size_limit: 89000000
log_file: "/var/log/nats/nats.log"

# Cluster settings
max_connections: 987
max_payload: 1048576
max_pending: 89000000
write_deadline: "8s"

# JetStream — persistent messaging
jetstream {
  store_dir: "/data/jetstream"
  max_mem: 233000000
  max_file: 1597000000
}

# Authorization
authorization {
  default_permissions = {
    publish = ["heady.>"]
    subscribe = ["heady.>"]
  }
}

# Monitoring
server_tags: ["heady", "sacred-genesis", "v4"]
