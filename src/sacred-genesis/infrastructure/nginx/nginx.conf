# Heady Nginx Configuration — Sacred Genesis v4.0.0
# Buffer sizes use Fibonacci numbers
# Author: Eric Haywood, HeadySystems Inc.

worker_processes auto;
worker_rlimit_nofile 8192;

events {
    worker_connections 987;
    multi_accept on;
    use epoll;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Structured JSON logging
    log_format json_combined escape=json
        '{"time":"$time_iso8601",'
        '"remote_addr":"$remote_addr",'
        '"method":"$request_method",'
        '"uri":"$request_uri",'
        '"status":$status,'
        '"body_bytes":$body_bytes_sent,'
        '"request_time":$request_time,'
        '"upstream_time":"$upstream_response_time",'
        '"user_agent":"$http_user_agent",'
        '"request_id":"$request_id"}';

    access_log /var/log/nginx/access.log json_combined;
    error_log /var/log/nginx/error.log warn;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;

    # Timeouts — phi-derived seconds
    keepalive_timeout 89s;
    client_body_timeout 34s;
    client_header_timeout 21s;
    send_timeout 34s;

    # Buffer sizes — Fibonacci-derived
    client_body_buffer_size 13k;
    client_header_buffer_size 5k;
    large_client_header_buffers 8 8k;
    client_max_body_size 13m;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_min_length 233;
    gzip_types
        text/plain
        text/css
        text/xml
        application/json
        application/javascript
        application/xml
        image/svg+xml;

    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=api:21m rate=34r/s;
    limit_req_zone $binary_remote_addr zone=auth:8m rate=5r/s;
    limit_conn_zone $binary_remote_addr zone=conn:13m;

    # Upstream service pools
    upstream heady_gateway {
        least_conn;
        server heady-gateway:3340 max_fails=5 fail_timeout=34s;
        keepalive 21;
    }

    upstream heady_api {
        least_conn;
        server heady-manager:3317 max_fails=5 fail_timeout=34s;
        keepalive 21;
    }

    upstream heady_buddy {
        least_conn;
        server heady-buddy:3316 max_fails=5 fail_timeout=34s;
        keepalive 13;
    }

    # Main server block
    server {
        listen 80;
        server_name *.headysystems.com *.headyme.com *.headyapi.com;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # Health check
        location /nginx-health {
            access_log off;
            return 200 '{"status":"healthy","service":"heady-nginx"}';
            add_header Content-Type application/json;
        }

        # API routes
        location /api/ {
            limit_req zone=api burst=55 nodelay;
            limit_conn conn 89;

            proxy_pass http://heady_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;

            proxy_connect_timeout 8s;
            proxy_send_timeout 34s;
            proxy_read_timeout 89s;
            proxy_buffering on;
            proxy_buffer_size 8k;
            proxy_buffers 13 8k;
        }

        # Gateway routes
        location /gateway/ {
            limit_req zone=api burst=34 nodelay;

            proxy_pass http://heady_gateway;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Request-ID $request_id;

            proxy_connect_timeout 8s;
            proxy_send_timeout 34s;
            proxy_read_timeout 89s;
        }

        # WebSocket support for HeadyBuddy
        location /ws/ {
            proxy_pass http://heady_buddy;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 233s;
            proxy_send_timeout 233s;
        }

        # SSE support
        location /sse/ {
            proxy_pass http://heady_gateway;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header Connection "";
            proxy_http_version 1.1;
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 233s;
            chunked_transfer_encoding on;
        }

        # Auth routes — stricter rate limiting
        location /auth/ {
            limit_req zone=auth burst=8 nodelay;
            proxy_pass http://heady_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
