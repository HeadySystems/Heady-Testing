# Heady CI/CD Pipeline — Sacred Genesis v4.0.0
# Author: Eric Haywood, HeadySystems Inc.

name: Heady CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  GCP_PROJECT: gen-lang-client-0920560496
  GCP_REGION: us-east1
  REGISTRY: gcr.io
  CLOUDFLARE_ACCOUNT_ID: 8b1fa38f282c691423c6399247d53323

jobs:
  lint-and-validate:
    name: Lint and Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Validate schemas
        run: node scripts/validate-schemas.js

      - name: Check phi-math constants
        run: node scripts/verify-phi-constants.js

  test:
    name: Unit Tests
    needs: lint-and-validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: node tests/runner.js

      - name: Run contract tests
        run: node tests/contracts/contract-runner.js

  security-scan:
    name: Security Scan
    needs: lint-and-validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "."
          severity: "CRITICAL,HIGH"
          exit-code: "1"

      - name: Audit npm dependencies
        run: npm audit --production --audit-level=high

  build-services:
    name: Build Service Images
    needs: [test, security-scan]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - heady-soul
          - heady-brains
          - heady-conductor
          - heady-vinci
          - heady-memory
          - heady-embed
          - heady-buddy
          - heady-manager
          - heady-gateway
          - heady-health
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: "${{ secrets.GCP_SA_KEY }}"

      - name: Configure Docker for GCR
        run: gcloud auth configure-docker

      - name: Build and push image
        run: |
          IMAGE="${REGISTRY}/${GCP_PROJECT}/${{ matrix.service }}:${GITHUB_SHA}"
          docker build -t "${IMAGE}" -f services/${{ matrix.service }}/Dockerfile .
          docker push "${IMAGE}"

  deploy-staging:
    name: Deploy to Staging
    needs: build-services
    if: github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: "${{ secrets.GCP_SA_KEY }}"

      - name: Deploy to Cloud Run (Staging)
        run: |
          for service in heady-soul heady-brains heady-conductor heady-gateway heady-health; do
            gcloud run deploy "${service}-staging" \
              --image "${REGISTRY}/${GCP_PROJECT}/${service}:${GITHUB_SHA}" \
              --region ${GCP_REGION} \
              --platform managed \
              --allow-unauthenticated \
              --memory 512Mi \
              --cpu 1 \
              --max-instances 5 \
              --set-env-vars "NODE_ENV=staging"
          done

  deploy-production:
    name: Deploy to Production
    needs: build-services
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: "${{ secrets.GCP_SA_KEY }}"

      - name: Deploy to Cloud Run (Production)
        run: |
          for service in heady-soul heady-brains heady-conductor heady-gateway heady-health; do
            gcloud run deploy "${service}" \
              --image "${REGISTRY}/${GCP_PROJECT}/${service}:${GITHUB_SHA}" \
              --region ${GCP_REGION} \
              --platform managed \
              --allow-unauthenticated \
              --memory 1Gi \
              --cpu 2 \
              --min-instances 1 \
              --max-instances 21 \
              --set-env-vars "NODE_ENV=production"
          done

      - name: Deploy Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: "${{ secrets.CLOUDFLARE_API_TOKEN }}"
          accountId: "${CLOUDFLARE_ACCOUNT_ID}"
          command: deploy

      - name: Run smoke tests
        run: node tests/smoke/smoke-runner.js --env production
