# Heady Alert Rules — Sacred Genesis v4.0.0
# All thresholds derive from phi (1.618) and psi (0.618)
# Author: Eric Haywood, HeadySystems Inc.

groups:
  - name: heady-service-alerts
    rules:
      # Service down for more than phi^3 minutes (~4.236 min)
      - alert: HeadyServiceDown
        expr: up{job="heady-services"} == 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Heady service {{ $labels.service }} is down"
          description: "Service {{ $labels.service }} has been unreachable for more than 5 minutes."

      # High error rate (above psi threshold = 0.618 = 61.8% success means 38.2% error)
      - alert: HeadyHighErrorRate
        expr: |
          (
            sum(rate(http_requests_total{status=~"5.."}[5m])) by (service)
            /
            sum(rate(http_requests_total[5m])) by (service)
          ) > 0.382
        for: 3m
        labels:
          severity: critical
        annotations:
          summary: "High error rate on {{ $labels.service }}"
          description: "Error rate exceeds psi (38.2%) for service {{ $labels.service }}."

      # Latency above phi^3 * 1000ms = 4236ms for p99
      - alert: HeadyHighLatency
        expr: |
          histogram_quantile(0.99,
            sum(rate(http_request_duration_seconds_bucket[5m])) by (le, service)
          ) > 4.236
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High p99 latency on {{ $labels.service }}"
          description: "p99 latency exceeds phi^3 seconds (4.236s) for {{ $labels.service }}."

  - name: heady-resource-alerts
    rules:
      # Memory usage above psi alert threshold (0.618)
      - alert: HeadyHighMemory
        expr: |
          (node_memory_MemTotal_bytes - node_memory_MemAvailable_bytes)
          / node_memory_MemTotal_bytes > 0.618
        for: 8m
        labels:
          severity: warning
        annotations:
          summary: "Memory usage above psi threshold (61.8%)"
          description: "Node memory utilization has exceeded the psi warning threshold."

      # Memory critical above 1-psi^3 (0.854)
      - alert: HeadyCriticalMemory
        expr: |
          (node_memory_MemTotal_bytes - node_memory_MemAvailable_bytes)
          / node_memory_MemTotal_bytes > 0.854
        for: 3m
        labels:
          severity: critical
        annotations:
          summary: "Memory usage critical (above 85.4%)"
          description: "Node memory utilization has exceeded the critical threshold (1-psi^3)."

      # Disk usage above psi (0.618)
      - alert: HeadyDiskWarning
        expr: |
          (node_filesystem_size_bytes{mountpoint="/"} - node_filesystem_avail_bytes{mountpoint="/"})
          / node_filesystem_size_bytes{mountpoint="/"} > 0.618
        for: 13m
        labels:
          severity: warning
        annotations:
          summary: "Disk usage above psi threshold (61.8%)"

  - name: heady-coherence-alerts
    rules:
      # Vector coherence drift below MEDIUM threshold (0.809)
      - alert: HeadyCoherenceDrift
        expr: heady_coherence_score < 0.809
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Coherence drift detected"
          description: "System coherence score {{ $value }} has dropped below MEDIUM threshold (0.809)."

      # Circuit breaker open
      - alert: HeadyCircuitBreakerOpen
        expr: heady_circuit_breaker_state == 2
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Circuit breaker open for {{ $labels.service }}"
          description: "Circuit breaker for {{ $labels.service }} is in OPEN state."
