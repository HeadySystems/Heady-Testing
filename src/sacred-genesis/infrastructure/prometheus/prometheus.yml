# Heady Prometheus Configuration — Sacred Genesis v4.0.0
# Scrape intervals use Fibonacci-derived values
# Author: Eric Haywood, HeadySystems Inc.

global:
  scrape_interval: 13s        # fib(7) seconds
  evaluation_interval: 21s    # fib(8) seconds
  scrape_timeout: 8s          # fib(6) seconds

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

rule_files:
  - "alerts.yml"

scrape_configs:
  # ── Self monitoring ──
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
    scrape_interval: 34s

  # ── Node metrics ──
  - job_name: "node-exporter"
    static_configs:
      - targets: ["node-exporter:9100"]
    scrape_interval: 21s

  # ── Heady Core Services (ports 3310-3369) ──
  - job_name: "heady-services"
    metrics_path: "/metrics"
    scrape_interval: 13s
    static_configs:
      - targets:
          - "heady-soul:3310"
          - "heady-brains:3311"
          - "heady-conductor:3312"
          - "heady-vinci:3313"
          - "heady-memory:3314"
          - "heady-embed:3315"
          - "heady-buddy:3316"
          - "heady-manager:3317"
          - "heady-coder:3318"
          - "heady-codex:3319"
          - "heady-check:3320"
          - "heady-assure:3321"
          - "heady-aware:3322"
          - "heady-patterns:3323"
          - "heady-risks:3324"
          - "heady-mc:3325"
          - "heady-research:3326"
          - "heady-deploy:3327"
          - "heady-health:3328"
          - "heady-maid:3329"
          - "heady-maintenance:3330"
          - "heady-autobiographer:3331"
          - "heady-copilot:3332"
          - "heady-battle:3333"
          - "heady-refactor:3334"
          - "heady-swarm:3335"
          - "heady-security:3336"
          - "heady-governance:3337"
          - "heady-deep-scan:3338"
          - "heady-auto-success:3339"
          - "heady-gateway:3340"
          - "heady-edge-worker:3341"
          - "heady-voice:3342"
          - "heady-creative:3343"
          - "heady-translate:3344"
          - "heady-analytics:3345"
          - "heady-billing:3346"
          - "heady-notification:3347"
          - "heady-scheduler:3348"
          - "heady-webhook:3349"
          - "heady-search:3350"
          - "heady-cache:3351"
          - "heady-queue:3352"
          - "heady-config:3353"
          - "heady-secret:3354"
          - "heady-audit:3355"
          - "heady-telemetry:3356"
          - "heady-embedding-router:3357"
          - "heady-vector-serve:3358"
          - "heady-graph-rag:3359"
          - "heady-sandbox:3360"
          - "heady-mcp-gateway:3361"
          - "heady-drift-detector:3362"
          - "heady-backpressure:3363"
          - "heady-context-manager:3364"
          - "heady-task-decomp:3365"
          - "heady-consensus:3366"
          - "heady-projection:3367"
          - "heady-finops:3368"
          - "heady-compliance:3369"
    relabel_configs:
      - source_labels: [__address__]
        regex: "(.+):(\\d+)"
        target_label: service
        replacement: "$1"

  # ── Infrastructure services ──
  - job_name: "heady-infrastructure"
    scrape_interval: 21s
    static_configs:
      - targets:
          - "schema-registry:3370"
          - "feature-flags:3371"
          - "nats-bridge:3372"
          - "session-server:3373"

  # ── PgBouncer ──
  - job_name: "pgbouncer"
    scrape_interval: 21s
    static_configs:
      - targets: ["pgbouncer-exporter:9127"]

  # ── NATS ──
  - job_name: "nats"
    scrape_interval: 13s
    static_configs:
      - targets: ["nats:8222"]
    metrics_path: "/varz"
