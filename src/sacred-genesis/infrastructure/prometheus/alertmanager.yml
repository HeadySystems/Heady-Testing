# Heady Alertmanager Configuration — Sacred Genesis v4.0.0
# Author: Eric Haywood, HeadySystems Inc.

global:
  resolve_timeout: 5m

route:
  receiver: "heady-default"
  group_by: ["alertname", "service"]
  group_wait: 21s
  group_interval: 34s
  repeat_interval: 4h
  routes:
    - match:
        severity: critical
      receiver: "heady-critical"
      group_wait: 8s
      repeat_interval: 1h

receivers:
  - name: "heady-default"
    webhook_configs:
      - url: "http://heady-notification:3347/webhooks/alertmanager"
        send_resolved: true

  - name: "heady-critical"
    webhook_configs:
      - url: "http://heady-notification:3347/webhooks/alertmanager"
        send_resolved: true
