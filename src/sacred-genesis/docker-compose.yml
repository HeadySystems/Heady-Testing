    "postgres": {
      "image": "pgvector/pgvector:pg16",
      "container_name": "heady-postgres",
      "ports": [
        "5432:5432"
      ],
      "environment": [
        "POSTGRES_DB=heady",
        "POSTGRES_USER=${POSTGRES_USER:-heady}",
        "POSTGRES_PASSWORD=${POSTGRES_PASSWORD}"
      ],
      "volumes": [
        "pgdata:/var/lib/postgresql/data"
      ],
      "healthcheck": {
        "test": [
          "CMD-SHELL",
          "pg_isready -U heady"
        ],
        "interval": "10s",
        "timeout": "5s",
        "retries": 5
      },
      "restart": "unless-stopped",
      "networks": [
        "heady-net"
      ]
    },
    "redis": {
      "image": "redis:7-alpine",
      "container_name": "heady-redis",
      "ports": [
        "6379:6379"
      ],
      "command": "redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru",
      "healthcheck": {
        "test": [
          "CMD",
          "redis-cli",
          "ping"
        ],
        "interval": "10s",
        "timeout": "5s",
        "retries": 5
      },
      "restart": "unless-stopped",
      "networks": [
        "heady-net"
      ]
    },
    "nats": {
      "image": "nats:2-alpine",
      "container_name": "heady-nats",
      "ports": [
        "4222:4222",
        "8222:8222"
      ],
      "command": "-js -m 8222",
      "healthcheck": {
        "test": [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:8222/healthz"
        ],
        "interval": "10s",
        "timeout": "5s",
        "retries": 5
      },
      "restart": "unless-stopped",
      "networks": [
        "heady-net"
      ]
    },
    "pgbouncer": {
      "image": "edoburu/pgbouncer:latest",
      "container_name": "heady-pgbouncer",
      "ports": [
        "6432:6432"
      ],
      "environment": [
        "DATABASE_URL=postgres://${POSTGRES_USER:-heady}:${POSTGRES_PASSWORD}@postgres:5432/heady",
        "POOL_MODE=transaction",
        "DEFAULT_POOL_SIZE=34",
        "MAX_CLIENT_CONN=233"
      ],
      "depends_on": {
        "postgres": {
          "condition": "service_healthy"
        }
      },
      "restart": "unless-stopped",
      "networks": [
        "heady-net"
      ]
    }
  },
  "networks": {
    "heady-net": {
      "driver": "bridge"
    }
  },
  "volumes": {
    "pgdata": {}
  }
}