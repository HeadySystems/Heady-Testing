    "heady-brain": {
      "build": {
        "context": "./services/heady-brain",
        "dockerfile": "Dockerfile"
      },
      "container_name": "heady-heady-brain",
      "ports": [
        "3310:3310"
      ],
      "environment": [
        "PORT=3310",
        "NODE_ENV=production",
        "SERVICE_NAME=heady-brain",
        "SERVICE_DOMAIN=inference"
      ],
      "healthcheck": {
        "test": [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:3310/health"
        ],
        "interval": "30s",
        "timeout": "5s",
        "retries": 3,
        "start_period": "10s"
      },
      "restart": "unless-stopped",
      "networks": [
        "heady-net"
      ],
      "labels": [
        "heady.domain=inference",
        "heady.port=3310",
        "heady.version=4.0.0"
      ]
    },
