#
# HCFullPipeline - Master Pipeline Definition
# All stages, ordering, checkpoint rules, and stop conditions.

version: "3.1.0"
pipeline:
  name: HCFullPipeline
  description: >
    Intelligent, parallel, dynamically distributed, self-aware, self-optimizing,
    and secure execution pipeline for all Heady workloads (local and remote).
    Integrates HeadySims plan selection, pattern recognition, self-critique,
    multi-channel routing (Headyв„ў Buddy), public domain inspiration mining,
    bottleneck diagnostics, and continuous monitoring feedback loops.
    Treat this as the single source of truth for every idea, service, flow,
    metric, integration, and improvement in the Headyв„ў ecosystem.

  # в”Ђв”Ђв”Ђ GLOBAL RULES в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  global:
    deterministic: true
    seed: "heady-sacred-geometry-seed"
    maxConcurrentTasks: 8
    maxRetries: 3
    retryBackoffMs: [500, 2000, 8000]
    jitterEnabled: true
    costBudgetDaily: 50.00
    rateLimitPerMinute: 120
    proxyPolicy: direct-for-internal
    monteCarloEnabled: true          # Use MC plan selection for task execution
    speedPriority: "on"              # off | on | max
    selfCritiqueEnabled: true        # Post-run self-critique loop
    patternEngineEnabled: true       # Feed stage/task timing into pattern engine
    publicDomainMining: true         # Mine best-practice patterns from public tools
    requireVectorScanFirst: true     # MUST scan 3D persistent vector storage before any action
    userFirstPolicy:
      enabled: true
      hotPoolTasks: [channel-entry, execute-major-phase, recover, deploy_priority]
      warmPoolTasks: [self-critique, optimize, finalize]
      coldPoolTasks: [ingest, plan, monitor-feedback, cross-device-sync]

  # в”Ђв”Ђв”Ђ NODE POOLS в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  nodePools:
    hot:
      description: "User-facing tasks, core pipelines"
      priority: critical
      reservedConcurrency: 6  # Increase reserved concurrency for user tasks
      maxLatencyMs: 2000
      userTaskOnly: true  # Only user tasks can use this pool
    warm:
      description: "Important background tasks"
      priority: high
      reservedConcurrency: 2
      maxLatencyMs: 10000
    cold:
      description: "Async background tasks"
      priority: low
      reservedConcurrency: 0  # Dynamic allocation only when idle
      maxLatencyMs: 60000

  # в”Ђв”Ђв”Ђ STOP RULE в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  stopRule:
    description: >
      Build aggressively when healthy; repair first when not.
      Do NOT keep building when significant errors exist in core infra,
      data integrity, or security.
    conditions:
      - type: error_rate
        threshold: 0.15
        action: enter_recovery
      - type: readiness_score
        threshold: 60
        action: enter_recovery
      - type: critical_alarm
        count: 1
        action: pause_and_escalate
      - type: data_integrity_failure
        action: halt_immediately
      - type: bottleneck_severity
        threshold: "critical"
        action: pause_and_escalate
      - type: user_queue_not_empty
        action: throttle_background
      - type: user_queue_empty
        action: allow_background

  # в”Ђв”Ђв”Ђ STAGES в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  #
  # Flow: channel_entry в†’ ingest в†’ plan_mc в†’ execute в†’ recover
  #       в†’ self_critique в†’ optimize в†’ finalize в†’ monitor_feedback
  #
  stages:

    # в”Ђв”Ђ STAGE 0: Channel Entry (Headyв„ў Buddy / Multi-Channel Gateway) в”Ђв”Ђв”Ђв”Ђв”Ђ
    - id: channel-entry
      name: Channel Entry
      description: >
        Headyв„ў Buddy and multi-channel gateway. Receives requests from any
        channel (IDE extension, web chat, mobile app, API/MCP, email, voice,
        messaging), resolves user identity, syncs cross-device context and
        preferences, and routes to the correct pipeline branch.
        Two main launch modes: Admin+IDE (full cockpit) and IDE-only.
      checkpoint: false
      parallel: true
      tasks:
        - scan_3d_persistent_vector_storage  # MUST run before any action/response
        - resolve_channel_and_identity
        - sync_cross_device_context
        - determine_launch_mode
        - route_to_pipeline_branch
      vectorStorageConfig:
        enabled: true
        requireScanBeforeAction: true
        scanTimeoutMs: 5000
        fallbackBehavior: "proceed_with_warning"
      channelConfig:
        supportedChannels:
          - ide_extension
          - web_chat
          - mobile_app
          - api_mcp
          - email
          - voice
          - messaging
        launchModes:
          admin_ide:
            label: "Admin + IDE"
            description: "Full cockpit: Admin UI + embedded IDE with Headyв„ў services"
            includes: [admin_ui, ide_surface, heady_services, monitoring]
          ide_only:
            label: "IDE Only"
            description: "Code workspace with Headyв„ў services quietly integrated"
            includes: [ide_surface, heady_services]
        crossDeviceSync:
          enabled: true
          syncItems: [preferences, active_project, last_workspace, theme, role]
          resumeBehavior: "suggest_last_context"

    # в”Ђв”Ђ STAGE 1: Ingest в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
    - id: ingest
      name: Ingest
      description: >
        Raw data ingestion from all sources (logs, news, APIs, repos,
        channel events, connection health metrics, public domain patterns).
      checkpoint: true
      parallel: true
      dependsOn: [channel-entry]
      tasks:
        - ingest_news_feeds
        - ingest_repo_changes
        - ingest_external_apis
        - ingest_health_metrics
        - ingest_channel_events
        - ingest_connection_health
        - ingest_system_state
        - ingest_resource_usage
        - ingest_security_logs
        - ingest_public_domain_patterns

    # в”Ђв”Ђ STAGE 2: Plan (HeadySims Powered) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
    - id: plan
      name: Plan (MC-Powered)
      description: >
        Decompose work into task graph with priorities and dependencies.
        Uses HeadySims UCB1 plan selection to choose the fastest viable
        execution strategy for each task type. Mines public domain patterns
        for best-practice sequencing.
      checkpoint: true
      parallel: false
      dependsOn: [ingest]
      tasks:
        - generate_task_graph
        - mc_plan_selection
        - assign_priorities
        - estimate_costs
        - validate_governance
        - check_public_domain_inspiration
      mcConfig:
        speedPriority: "on"
        candidatesPerTask: 6
        adaptiveQuality: true

    # в”Ђв”Ђ STAGE 3: Execute Major Phase в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
    - id: execute-major-phase
      name: Execute Major Phase
      description: >
        Fan out to agents/services via Supervisor pattern (direct routing).
        Each task execution records latency to MC scheduler for feedback.
        Pattern engine observes all task completions and failures.
      checkpoint: true
      parallel: true
      dependsOn: [plan]
      tasks:
        - route_to_agents
        - monitor_agent_execution
        - collect_agent_results
      supervisorConfig:
        directRouting: true
        noProxy: true
        maxParallelAgents: 6
      feedbackConfig:
        recordToMC: true
        observePatterns: true
        trackPerTaskLatency: true

    # в”Ђв”Ђ STAGE 4: Recover в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
    - id: recover
      name: Recover
      description: >
        Handle partial failures, apply saga compensation, circuit breakers.
        On retry, MC scheduler picks a different strategy (not same approach).
      checkpoint: true
      parallel: false
      dependsOn: [execute-major-phase]
      tasks:
        - evaluate_failures
        - apply_compensation
        - mc_replan_failed_tasks
        - retry_recoverable
        - escalate_unrecoverable
      retryConfig:
        useMCReplanning: true
        maxRetries: 3

    # в”Ђв”Ђ STAGE 5: Self-Critique в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
    - id: self-critique
      name: Self-Critique
      description: >
        Post-execution self-awareness loop. System reviews its own run:
        records critiques, identifies weaknesses and blind spots, runs
        bottleneck diagnostics, checks connection health across all channels,
        and proposes targeted improvements.
        Implements: answer в†’ critique в†’ refine в†’ learn cycle.
      checkpoint: true
      parallel: false
      dependsOn: [recover]
      tasks:
        - record_run_critique
        - diagnose_bottlenecks
        - check_all_connection_health
        - identify_improvement_candidates
        - identify_system_gaps
        - analyze_resource_waste
        - evaluate_security_posture
        - run_meta_analysis
      selfCritiqueConfig:
        autoRecordCritique: true
        bottleneckCategories:
          - hidden_bottlenecks
          - fuzzy_goals
          - bad_work_sequencing
          - communication_drag
          - under_over_utilization
          - process_creep
          - cultural_blockers
        confidenceRating: true
        weaknessMinCount: 3

    # в”Ђв”Ђ STAGE 6: Optimize в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
    - id: optimize
      name: Optimize
      description: >
        Apply improvements discovered by self-critique and pattern engine.
        Mine public domain best practices (cross-device assistants, AI tools,
        dashboards, multi-agent orchestrators) and adapt concepts for Headyв„ў.
        Cache invalidation on config drift. Dynamic concurrency adjustment.
      checkpoint: true
      parallel: true
      dependsOn: [self-critique]
      tasks:
        - apply_pattern_improvements
        - mine_public_domain_best_practices
        - adjust_mc_strategy_weights
        - invalidate_stale_caches
        - adjust_worker_pool_concurrency
        - update_channel_optimizations
        - cleanup_orphaned_resources
        - execute_routine_maintenance
        - optimize_storage_utilization
        - enforce_cost_boundaries
      publicDomainConfig:
        inspirationSources:
          - category: "cross-device assistants"
            examples: ["Siri", "Google Assistant", "Alexa", "Copilot"]
            abstractConcepts:
              - persistent_cross_device_session
              - simple_entry_points
              - deep_ecosystem_integration
          - category: "AI coding tools"
            examples: ["GitHub Copilot", "Cursor", "Windsurf", "Cody"]
            abstractConcepts:
              - inline_completions
              - context_aware_chat
              - workspace_understanding
              - command_palette_integration
          - category: "multi-agent orchestrators"
            examples: ["LangGraph", "CrewAI", "AutoGen"]
            abstractConcepts:
              - clear_role_boundaries
              - orchestrator_pattern
              - robust_logging
              - safe_failure_modes
          - category: "monitoring dashboards"
            examples: ["Grafana", "Datadog", "Tableau"]
            abstractConcepts:
              - kpi_sparkline_layout
              - drill_down_navigation
              - real_time_streaming
              - alert_thresholds
        adaptationRule: >
          Do not copy proprietary designs. Abstract concepts and adapt them
          for Headyв„ў's mission (wealth redistribution, impact, behavior change).
          Make them more coherent, more mission-aligned, more owner-friendly.

    # в”Ђв”Ђ STAGE 7: Finalize в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
    - id: finalize
      name: Finalize
      description: >
        Persist results, update registries, sync docs, record all improvements
        and recommendations back into HCFullPipeline as the single source of truth.
      checkpoint: true
      parallel: false
      dependsOn: [optimize]
      tasks:
        - persist_results
        - update_concept_index
        - compute_readiness_score
        - sync_registry_and_docs
        - validate_notebook_integrity
        - run_security_audit
        - perform_system_backup
        - scan_for_threats
        - verify_data_integrity
        - check_doc_owner_freshness
        - record_pipeline_improvements
        - send_checkpoint_email
        - log_run_config_hash

    # в”Ђв”Ђ STAGE 8: Monitor & Feedback Loop в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
    - id: monitor-feedback
      name: Monitor & Feedback Loop
      description: >
        Continuous monitoring stage. Feeds stage-level and task-level timing
        back into MC scheduler as samples. Observes patterns across runs.
        Publishes metrics to all channels (Admin UI, IDE, dashboards).
        Checks seamlessness across channels and proposes micro-upgrades.
      checkpoint: true
      parallel: true
      dependsOn: [finalize]
      tasks:
        - feed_stage_timing_to_mc
        - feed_task_timing_to_patterns
        - publish_metrics_to_channels
        - check_cross_channel_seamlessness
        - propose_micro_upgrades
        - archive_run_to_history
      monitorConfig:
        metricsTargets:
          - admin_ui_dashboard
          - ide_status_bar
          - heady_buddy_notification
          - api_metrics_endpoint
        seamlessnessChecks:
          - shared_identity_across_channels
          - shared_project_context
          - consistent_service_behavior
          - no_redundant_re_entry
        feedbackDestinations:
          - mc_scheduler
          - pattern_engine
          - self_critique_engine

    # в”Ђв”Ђ STAGE 9: Cross-Device Sync в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
    - id: cross-device-sync
      name: Cross-Device Sync
      description: Synchronize state across all devices
      checkpoint: true
      parallel: true
      dependsOn: [monitor-feedback]
      tasks:
        - run: scripts/sync-state.ps1
          args: -env production
        - run: scripts/verify-sync.ps1

    # в”Ђв”Ђ STAGE 10: Sync Priority Changes в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
    - id: sync_priority_changes
      name: Sync Priority Changes
      description: Sync priority changes
      checkpoint: true
      parallel: true
      tasks:
        - run: scripts/sync-priority.ps1

    # в”Ђв”Ђ STAGE 11: Deploy Priority в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
    - id: deploy_priority
      name: Deploy Priority
      description: Deploy priority
      checkpoint: true
      parallel: true
      tasks:
        - run: scripts/deploy-priority.ps1

    # New PQC stage
    - id: pqc-operations
      name: Post-Quantum Cryptography
      description: Handles all PQC key generation, rotation, and validation
      checkpoint: true
      parallel: true
      dependsOn: [plan]
      tasks:
        - generate_pqc_keys
        - rotate_pqc_certificates
        - validate_pqc_configs
      pqcConfig:
        defaultAlgorithm: x25519+kyber768
        rotationSchedule: weekly
        validationRules:
          - minKeyStrength: 128
          - approvedAlgorithms:
              - x25519+kyber768
              - x25519+dilithium5

    # Modified crypto stage
    - id: crypto
      name: Cryptography
      description: Handles all cryptographic operations (now includes PQC)
      checkpoint: true
      parallel: true
      dependsOn: [pqc-operations]
      tasks:
        - generate_keys
        - encrypt_data
        - decrypt_data
      cryptoConfig:
        hybridMode: true
        fallbackToClassical: true

  # в”Ђв”Ђв”Ђ LANES в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  lanes:
    system_operations:
      description: Autonomous system maintenance, cleanup, and optimal state operations
      triggers:
        - schedule: "0 */4 * * *"  # Every 4 hours
        - api_call: POST /api/pipeline/sysops
      stages:
        - check_all_connection_health
        - cleanup_orphaned_resources
        - execute_routine_maintenance
        - optimize_storage_utilization
        - enforce_cost_boundaries
        - run_security_audit
        - scan_for_threats
        - perform_system_backup
        - verify_data_integrity
    pqc:
      description: Post-quantum cryptography certificate deployment and rotation
      triggers:
        - schedule: "0 2 * * *"  # 2AM daily
        - file_change: configs/pki/**
        - api_call: POST /api/pipeline/pqc
      stages:
        - verify_openssl
        - generate_certs
        - deploy_configs
        - validate_connections
      tasks:
        - run: ./.windsurf/workflows/pqc-deployment.md
          args: -mode auto
    priority:
      description: Immediate deployment for urgent changes
      triggers:
        - file_change: configs/priority-tasks.yaml
        - api_call: POST /api/pipeline/priority
      stages:
        - sync_priority_changes
        - deploy_priority
    improvement:
      description: Continuous autonomous improvement tasks (refactoring, optimization, self-healing)
      triggers:
        - schedule: "*/15 * * * *"  # Every 15 minutes
        - api_call: POST /api/pipeline/improvement
      stages:
        - apply_pattern_improvements
        - adjust_mc_strategy_weights
        - invalidate_stale_caches
        - adjust_worker_pool_concurrency
        - update_channel_optimizations

  # в”Ђв”Ђв”Ђ CHECKPOINT PROTOCOL в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  checkpointProtocol:
    description: >
      At each checkpoint, the system deeply re-analyzes state, configs,
      and patterns. This is the primary upgrade and self-correction moment.
      Includes self-awareness checks: the system evaluates its own performance,
      identifies non-optimization, and proposes improvements.
    responsibilities:
      - validate_run_state
      - validate_system_operations_state
      - compare_config_hashes
      - reevaluate_plan_and_health
      - check_concept_alignment
      - update_logs_and_owner
      - apply_approved_patterns
      - sync_registry_entries
      - sync_documentation
      - validate_notebooks
      - check_doc_ownership_freshness
      - evaluate_self_critique_findings
      - check_mc_drift_alerts
      - verify_channel_health
      - check_public_domain_alignment
    configHashSources:
      - configs/hcfullpipeline.yaml
      - configs/resource-policies.yaml
      - configs/service-catalog.yaml
      - configs/governance-policies.yaml
      - configs/concepts-index.yaml
      - configs/HeadySims-scheduler.yaml
      - configs/speed-and-patterns-protocol.yaml
      - configs/system-self-awareness.yaml
      - configs/connection-integrity.yaml
      - configs/extension-pricing.yaml
      - configs/heady-buddy.yaml
      - configs/imagination-engine.yaml
      - configs/hcfp-extension-flow.yaml
    escalationThreshold:
      readinessBelow: 70
      errorRateAbove: 0.10
      costOverBudget: true
      bottleneckSeverity: "high"
      channelHealthDegraded: true

  # в”Ђв”Ђв”Ђ SIGNAL HANDLING в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  signals:
    founder-intent:
      recognition: 
        - buddy
        - ide
        - cli
      priority: highest
      routing: configs/workflows/heady-intent-routing.md
      logging:
        registry_flag: founder-intent
      deployment_rules: configs/founder-intent-policy.yaml

  # в”Ђв”Ђв”Ђ DEPLOYMENT HOOKS в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  deployment_hooks:
    pre_deploy:
      - name: stop_headybuddy
        command: Stop-Service -Name HeadyBuddy
    post_deploy:
      - name: start_headybuddy
        command: Start-Service -Name HeadyBuddy
      - name: trigger_state_sync
        command: Invoke-WebRequest -Uri http://api.headysystems.com:3300/api/buddy/sync-events
