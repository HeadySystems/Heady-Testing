auth_gate:
  require_signed_commits: true
  block_unknown_emails: true
  require_dev_token: true
  auto_approve_owners: true
  audit_all_attempts: true
  audit_log: data/code-governance-audit.jsonl
  max_files_per_commit: 50
  protected_paths:
    - configs/code-governance.yaml
    - configs/users/user-secrets.yaml
    - configs/governance-policies.yaml
    - .husky/pre-commit
    - .github/workflows/*.yml
    - Dockerfile
    - .gcloudignore
    - ecosystem.config.cjs
    # ═══ PATENT LOCK ZONES — Owner-only modification ═══
    # Changes to these files require explicit owner approval.
    # See: Patent Harvest Report v2.0 (March 2026)
    # HS-001: Deterministic Context Feed
    - src/bootstrap/engine-wiring.js
    - src/hc_resource_manager.js
    # HS-009: IP Sovereignty Sentinel
    - src/security/code-governance.js
    - configs/governance/*
    # HS-024: Predictive Resource Modeling
    - src/hc_auto_success.js
    - src/hc-full-pipeline.js
    # NEW-A: Vibe-Match Latency Delta (PHI-derived thermal response)
    - src/agent-orchestrator.js
    - src/heady-principles.js
    # NEW-B: Distributed Handoff Persistence (vector memory as L3 cache)
    - src/vector-memory.js
    - src/vector-pipeline.js
    - src/vector-space-ops.js
    # NEW-C: Neural Stream Telemetry (Reasoning Jitter)
    - src/self-awareness.js
    - src/hc_realtime_intelligence.js
    - src/telemetry/*
    # Core Orchestration IP
    - src/heady-conductor.js
    - src/orchestration/*
    - heady-manager.js
approval_workflow:
  steps:
    - owner_says: approve <agent-id> as dev connection
    - system_adds_to: approved_agents
    - system_issues: temporary RBAC token via rbac-vendor.js
    - token_ttl: 3600000
    - audit_logged: true
  revoke_steps:
    - owner_says: revoke <agent-id>
    - system_removes_from: approved_agents
    - system_invalidates: all active tokens for agent

