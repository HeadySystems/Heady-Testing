# 🎨 COLORFUL LOGGING FUNCTIONS
logging:
  rainbow_log: |
    console.log(`${colors.red}🌈${colors.reset} ${colors.bright_red}H${colors.bright_yellow}e${colors.bright_green}a${colors.bright_cyan}d${colors.bright_blue}y${colors.bright_magenta} ${colors.reset}${message}`);

  success_log: |
    console.log(`${colors.bright_green}✅${colors.reset} ${colors.green}${message}${colors.reset}`);

  error_log: |
