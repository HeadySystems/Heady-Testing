name: CI
on:
  push: { branches: [main, develop] }
  pull_request: { branches: [main, develop] }
jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix: { node-version: [20, 22] }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '${{ matrix.node-version }}', cache: npm }
      - run: npm ci
      - run: npm run lint --if-present
      - run: npm test --if-present
      - run: npm audit --audit-level=high
  docker:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t heady:${{ github.sha }} .
      - run: |
          docker run -d --name heady-test -p 3301:3301 -e NODE_ENV=production -e PORT=3301 -e JWT_SECRET=testtesttesttesttesttesttesttesttesttest -e MCP_BEARER_TOKEN=testtesttesttesttesttesttesttesttesttest -e EMBEDDINGS_PROVIDER=ollama -e MEMORY_STORE_PATH=./data/memory heady:${{ github.sha }}
          sleep 15
          curl -f http://localhost:3301/health || exit 1
