name: Deploy
on:
  push: { branches: [main] }
  push: { tags: ['v*'] }
jobs:
  cloudflare:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm }
      - run: npm ci && npm run build --if-present
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          command: pages deploy dist --project-name=heady
  cloud-run:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with: { credentials_json: '${{ secrets.GCP_SA_KEY }}' }
      - uses: google-github-actions/setup-gcloud@v2
      - run: gcloud builds submit --tag gcr.io/${{ secrets.GCP_PROJECT_ID }}/heady:${{ github.ref_name }}
      - run: gcloud run deploy heady --image gcr.io/${{ secrets.GCP_PROJECT_ID }}/heady:${{ github.ref_name }} --region ${{ secrets.GCP_REGION }} --port 3301 --allow-unauthenticated
