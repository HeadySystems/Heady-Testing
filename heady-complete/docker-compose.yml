version: '3.9'
services:
  heady:
    build: .
    container_name: heady
    ports:
      - "3301:3301"
      - "9090:9090"
    volumes:
      - ./data:/app/data
    env_file: .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "const h=require('http');h.get('http://localhost:3301/health',r=>{process.exit(r.statusCode===200?0:1)}).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks: [heady-net]
    depends_on:
      ollama: { condition: service_healthy }

  ollama:
    image: ollama/ollama:latest
    container_name: heady-ollama
    ports: ["11434:11434"]
    volumes: [ollama-data:/root/.ollama]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks: [heady-net]

volumes:
  ollama-data:
networks:
  heady-net:
