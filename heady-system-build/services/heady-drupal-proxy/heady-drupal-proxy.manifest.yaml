# ──────────────────────────────────────────────────────────────────────────────
# heady-drupal-proxy — Kubernetes + Envoy Service Manifest
# Domain: headyconnection.org | Port: 3342
# CSL routing: domain matching via cosine similarity
# Concurrent-equals routing — phi-scaled CSL matching only
# ──────────────────────────────────────────────────────────────────────────────

apiVersion: v1
kind: Namespace
metadata:
  name: heady-system
  labels:
    app.kubernetes.io/part-of: heady-platform
    istio-injection: enabled

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: heady-drupal-proxy
  namespace: heady-system
  labels:
    app: heady-drupal-proxy
    heady.domain: headyconnection-org
    version: "3.2.3"
    app.kubernetes.io/part-of: heady-platform
spec:
  replicas: 3                   # F(4) = 3
  selector:
    matchLabels:
      app: heady-drupal-proxy
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge:        2        # F(3) = 2
      maxUnavailable:  1        # F(2) = 1
  template:
    metadata:
      labels:
        app: heady-drupal-proxy
        heady.domain: headyconnection-org
        version: "3.2.3"
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port:   "9464"
        prometheus.io/path:   "/metrics"
    spec:
      serviceAccountName: heady-drupal-proxy-sa
      containers:
        - name: heady-drupal-proxy
          image: us-central1-docker.pkg.dev/heady-prod/heady-drupal-proxy:3.2.3
          imagePullPolicy: Always
          ports:
            - containerPort: 3342
              name: http
              protocol: TCP
            - containerPort: 9464
              name: metrics
              protocol: TCP
          env:
            - name:  NODE_ENV
              value: production
            - name:  SERVICE_NAME
              value: heady-drupal-proxy
            - name:  SERVICE_VERSION
              value: "3.2.3"
            - name:  HEADY_DOMAIN
              value: headyconnection.org
            - name:  PORT
              value: "3342"
            - name:  OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://heady-collector.heady-system.svc.cluster.local:4317"
            - name:  OTEL_SERVICE_NAME
              value: heady-drupal-proxy
            - name:  CSL_CONFIDENCE
              value: "0.618"
            - name:  CSL_COHERENCE
              value: "0.882"
            - name:  MTLS_ENABLED
              value: "true"
          envFrom:
            - secretRef:
                name: heady-drupal-proxy-secrets
                optional: true
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 5
            periodSeconds: 7        # ≈ φ⁴ = 6.854s
            timeoutSeconds: 4       # ≈ φ³ = 4.236s
            failureThreshold: 3     # F(4) = 3
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 3
            periodSeconds: 7
            timeoutSeconds: 4
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /health/startup
              port: http
            failureThreshold: 13    # F(7) = 13 (longer for slow-starting services)
            periodSeconds: 5        # F(5) = 5
          resources:
            requests:
              memory: "89Mi"        # F(11) = 89
              cpu:    "55m"         # F(10) = 55
            limits:
              memory: "377Mi"       # F(14) = 377
              cpu:    "233m"        # F(13) = 233

---
apiVersion: v1
kind: Service
metadata:
  name: heady-drupal-proxy
  namespace: heady-system
  labels:
    app: heady-drupal-proxy
    heady.domain: headyconnection-org
spec:
  selector:
    app: heady-drupal-proxy
  ports:
    - name: http
      protocol: TCP
      port: 3342
      targetPort: http
    - name: metrics
      protocol: TCP
      port: 9464
      targetPort: metrics
  type: ClusterIP

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: heady-drupal-proxy-sa
  namespace: heady-system

---
# PeerAuthentication — enforce mTLS for ALL traffic to this service
apiVersion: security.istio.io/v1beta1
kind: PeerAuthentication
metadata:
  name: heady-drupal-proxy-peer-auth
  namespace: heady-system
spec:
  selector:
    matchLabels:
      app: heady-drupal-proxy
  mtls:
    mode: STRICT

---
# AuthorizationPolicy — zero-trust service-to-service rules
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: heady-drupal-proxy-authz
  namespace: heady-system
spec:
  selector:
    matchLabels:
      app: heady-drupal-proxy
  action: ALLOW
  rules:
    - from:
        - source:
            principals:
              - "cluster.local/ns/heady-system/sa/heady-manager-sa"
              - "cluster.local/ns/heady-system/sa/heady-gateway-sa"
              - "cluster.local/ns/heady-system/sa/heady-drupal-proxy-sa"
      to:
        - operation:
            ports: ["3342"]

---
# HorizontalPodAutoscaler — Fibonacci-snapped replica counts
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: heady-drupal-proxy-hpa
  namespace: heady-system
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: heady-drupal-proxy
  minReplicas: 2    # F(3) = 2
  maxReplicas: 13   # F(7) = 13
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 62   # ≈ ψ × 100 = 61.8%
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 62

---
# VirtualService — CSL routing without ranking fields
# Traffic routing based on CSL domain header matching
apiVersion: networking.istio.io/v1alpha3
kind: VirtualService
metadata:
  name: heady-drupal-proxy-vs
  namespace: heady-system
spec:
  hosts:
    - heady-drupal-proxy.heady-system.svc.cluster.local
  http:
    - match:
        - headers:
            x-heady-domain:
              exact: headyconnection.org
        - headers:
            x-heady-service:
              exact: heady-drupal-proxy
      route:
        - destination:
            host: heady-drupal-proxy
            port:
              number: 3342
      timeout: 11s       # ≈ φ⁵ = 11.090s
      retries:
        attempts: 3      # F(4) = 3
        perTryTimeout: 4s
        retryOn: "5xx,reset,connect-failure,retriable-4xx"
    - route:
        - destination:
            host: heady-drupal-proxy
            port:
              number: 3342
