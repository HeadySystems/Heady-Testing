# Heady™ Liquid Latent OS — Cloudflare Workers Production Config
# v4.0.0

name = "heady-liquid-gateway"
main = "liquid-gateway-worker/src/index.js"
compatibility_date = "2024-12-01"
account_id = "$CLOUDFLARE_ACCOUNT_ID"

[env.production]
routes = [
  { pattern = "api.headysystems.com/*", zone_name = "headysystems.com" },
  { pattern = "gateway.headysystems.com/*", zone_name = "headysystems.com" }
]

[env.production.vars]
ENVIRONMENT = "production"
HEADY_VERSION = "4.0.0"
BACKEND_ORIGIN = "https://manager.headysystems.com"
LOG_LEVEL = "info"

[[env.production.kv_namespaces]]
binding = "HEADY_CACHE"
id = "$KV_CACHE_ID"

[[env.production.kv_namespaces]]
binding = "HEADY_CONFIG"
id = "$KV_CONFIG_ID"

[env.production.durable_objects]
bindings = [
  { name = "RATE_LIMITER", class_name = "RateLimiter" },
  { name = "SESSION_STORE", class_name = "SessionStore" }
]
