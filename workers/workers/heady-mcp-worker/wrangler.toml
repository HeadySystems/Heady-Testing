name = "heady-mcp-worker"
main = "src/index.js"
compatibility_date = "2026-03-01"
account_id = "$CLOUDFLARE_ACCOUNT_ID"

[env.production]
routes = [
  { pattern = "mcp.headysystems.com/*", zone_name = "headysystems.com" },
  { pattern = "headyio.com/mcp/*", zone_name = "headyio.com" }
]
[env.production.vars]
ENVIRONMENT = "production"
MCP_BACKEND = "https://manager.headysystems.com/mcp"
MCP_RATE_LIMIT = "100"
