name = "liquid-gateway-worker"
main = "src/index.ts"
compatibility_date = "2026-03-08"
# account_id — set via CF_ACCOUNT_ID env var or wrangler.toml local override
# account_id = "CF_ACCOUNT_ID"

[vars]
HEADY_ENV = "production"
WORKER_NAME = "liquid-gateway-worker"
HEADY_VERSION = "4.0.0"
BACKEND_ORIGIN = "https://manager.headysystems.com"
# FIREBASE_API_KEY — set via wrangler secret put FIREBASE_API_KEY

[env.production]
routes = [
  { pattern = "api.headysystems.com/*", zone_name = "headysystems.com" },
  { pattern = "gateway.headysystems.com/*", zone_name = "headysystems.com" },
  { pattern = "app.headysystems.com/*", zone_name = "headysystems.com" },
  { pattern = "admin.headysystems.com/*", zone_name = "headysystems.com" },
  { pattern = "metrics.headysystems.com/*", zone_name = "headysystems.com" },
  { pattern = "ai.headysystems.com/*", zone_name = "headysystems.com" },
]

[env.production.vars]
HEADY_ENV = "production"
BACKEND_ORIGIN = "https://manager.headysystems.com"
LOG_LEVEL = "info"
