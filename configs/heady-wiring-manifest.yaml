version: "4.1.0"
name: HeadyWiringManifest
description: >
  Master wiring manifest ensuring all Heady components communicate
  optimally as a perfect liquid dynamic parallel async distributed
  intelligently orchestrated optimized latent OS.

# ═══════════════════════════════════════════════════════════════════
# COMMUNICATION BACKBONE
# ═══════════════════════════════════════════════════════════════════

communication:
  # Primary message bus for all inter-service events
  message_bus:
    type: HeadyMessageBus
    max_listeners: 55  # FIB[10]
    buffer_size: 2584  # FIB[13]
    channels:
      - "service.*"           # Service lifecycle events
      - "swarm.*"             # Swarm operations
      - "pipeline.*"          # Pipeline stage transitions
      - "memory.*"            # Memory tier operations
      - "governance.*"        # Policy enforcement events
      - "evolution.*"         # Mutation and canary events
      - "cost.*"              # Cost tracking events
      - "health.*"            # Health check results
      - "pattern.*"           # Pattern detection events
      - "distillation.*"      # Distillation pipeline events
      - "battle.*"            # Battle arena events
      - "error.*"             # Error and recovery events
      - "deploy.*"            # Deployment events

  # Correlation ID propagation
  tracing:
    correlation_header: "X-Heady-Correlation-ID"
    format: "cor-{timestamp_base36}-{random_4}"
    propagation: [message_bus, http_headers, grpc_metadata]

  # Circuit breaker defaults
  circuit_breaker:
    max_failures: 5  # FIB[5]
    reset_timeout_ms: 13000  # FIB[7] × 1000
    half_open_max_calls: 3  # FIB[4]

  # Retry policy with phi-backoff
  retry:
    max_attempts: 5  # FIB[5]
    base_delay_ms: 1000
    backoff_multiplier: 1.618  # PHI
    jitter_factor: 0.382  # 1 - PSI
    max_delay_ms: 34000  # FIB[9] × 1000

# ═══════════════════════════════════════════════════════════════════
# SERVICE WIRING — How each service connects to others
# ═══════════════════════════════════════════════════════════════════

service_wiring:
  heady-gateway:
    port: 3330
    connects_to:
      - service: heady-manager
        protocol: HTTP
        purpose: "Route API requests to manager"
      - service: heady-conductor
        protocol: gRPC
        purpose: "Task orchestration routing"
      - service: auth-session
        protocol: HTTP
        purpose: "JWT verification"
    receives_from:
      - source: cloudflare-workers
        protocol: HTTP
        purpose: "Edge-proxied requests"
    csl_gate: 0.500  # MINIMUM

  heady-manager:
    port: 3301
    connects_to:
      - service: heady-brain
        protocol: Event Bus
        purpose: "Cognitive operations"
      - service: heady-conductor
        protocol: Event Bus
        purpose: "Task routing"
      - service: heady-memory
        protocol: Event Bus
        purpose: "Vector storage/recall"
      - service: heady-autocontext
        protocol: HTTP
        purpose: "5-pass enrichment"
    mcp_server: true
    mcp_tools: 45  # Total MCP tools exposed

  heady-conductor:
    port: 3303
    connects_to:
      - service: all-agents
        protocol: Event Bus
        purpose: "Distribute tasks to agents"
      - service: heady-bee-factory
        protocol: Event Bus
        purpose: "Bee spawning and lifecycle"
      - service: heady-memory
        protocol: Event Bus
        purpose: "Context recall for routing"
    pools:
      hot: { percentage: 34, priority: "> CSL.HIGH (0.882)" }
      warm: { percentage: 21, priority: "> CSL.MEDIUM (0.809)" }
      cold: { percentage: 13, priority: "> CSL.LOW (0.691)" }
      reserve: { percentage: 8, purpose: "Burst capacity" }
      governance: { percentage: 5, purpose: "Audit and compliance" }

  heady-brain:
    port: 3302
    connects_to:
      - service: heady-autocontext
        protocol: HTTP
        purpose: "Context enrichment"
      - service: heady-memory
        protocol: Event Bus
        purpose: "Knowledge recall"
      - service: heady-soul
        protocol: Event Bus
        purpose: "Ethical decision escalation"
    receives_from:
      - source: heady-conductor
        protocol: Event Bus
      - source: heady-buddy
        protocol: Event Bus

  heady-buddy:
    port: 3310
    connects_to:
      - service: heady-brain
        protocol: Event Bus
        purpose: "Cognitive operations"
      - service: heady-memory
        protocol: Event Bus
        purpose: "Conversation memory"
      - service: heady-autocontext
        protocol: HTTP
        purpose: "Context enrichment"
    receives_from:
      - source: heady-gateway
        protocol: HTTP
      - source: web-clients
        protocol: WebSocket
      - source: discord-bot
        protocol: Event Bus
      - source: slack-bot
        protocol: Event Bus

  heady-memory:
    tier_wiring:
      T0:
        backend: upstash-redis
        protocol: Redis
        ttl: "89 seconds (FIB[11])"
        purpose: "Hot working memory"
      T1:
        backend: in-process
        protocol: Internal
        max_entries: 55  # FIB[10]
        purpose: "Short-term session memory"
      T2:
        backend: postgresql-pgvector
        protocol: SQL + HNSW
        hnsw: { m: 21, ef_construction: 89, dimensions: 384 }
        purpose: "Long-term persistent memory"
    consolidation:
      schedule: "every 6 hours"
      decay_function: "φ^(age_hours × decay_rate)"
      promotion_threshold: "access_count >= FIB[5]"

  heady-autocontext:
    port: 3396
    five_passes:
      - pass: 1
        name: "Memory Recall"
        weight: 0.34
        connects_to: heady-memory
      - pass: 2
        name: "Semantic Expansion"
        weight: 0.21
        connects_to: embedding-generator-node
      - pass: 3
        name: "Knowledge Grounding"
        weight: 0.21
        connects_to: graph-rag-bee
      - pass: 4
        name: "Temporal Context"
        weight: 0.13
        connects_to: temporal-context-node
      - pass: 5
        name: "Wisdom Synthesis"
        weight: 0.11
        connects_to: heady-vinci

