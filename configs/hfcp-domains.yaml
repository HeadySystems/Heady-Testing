# ═══════════════════════════════════════════════════════════════════════════════
# HCFP DEPLOYMENT STRATEGY
# ═══════════════════════════════════════════════════════════════════════════════
deployment:
  cloudflare:
    dns_records:
      type: CNAME
      target: heady-edge-gateway-bf4q4zywhq-uc.a.run.app
      ttl: 1
      proxied: true
      
    ssl:
      mode: full
      
    page_rules:
      - url: "*yourdomain.com/*"
        settings:
          cache_level: "cache_everything"
          security_level: "high"
          
  load_balancing:
    primary: heady-edge-gateway-bf4q4zywhq-uc.a.run.app
    fallback: heady-manager-bf4q4zywhq-uc.a.run.app
    
  health_checks:
    path: /api/health
    expected_status: 200
    interval: 30

