# ═══════════════════════════════════════════════════════════════════════════════
# CLOUDFLARE DOMAINS (User's Actual Zones)
# ═══════════════════════════════════════════════════════════════════════════════
cloudflare_zones:
  # Replace with your actual Cloudflare zones
  # Example structure:
  - domain: yourdomain.com
    type: primary
    cdn: enabled
    ssl: enabled
    
  - domain: anotherdomain.org  
    type: secondary
    cdn: enabled
    ssl: enabled

# ═══════════════════════════════════════════════════════════════════════════════
