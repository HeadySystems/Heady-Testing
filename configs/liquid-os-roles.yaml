# в”Ђв”Ђв”Ђ Memory Consolidation Schedule в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
consolidation:
  t1_to_t2_sweep: { interval_hours: 6.85, note: "П†вЃґ hours" }
  t0_to_t1_eviction: { interval_hours: 21, note: "fib(8) hours" }
  t2_hot_to_warm: { interval_hours: 55, note: "fib(10) hours" }
  t2_cold_to_archive: { interval_hours: 144, note: "fib(12) hours, HNSW rebuild" }

# в”Ђв”Ђв”Ђ ORS Operational Modes в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
operational_modes:
  full: { ors_min: 85, description: "Full parallelism, aggressive building, new optimizations" }
  normal: { ors_min: 70, description: "Normal operation, standard parallelism" }
  maintenance: { ors_min: 50, description: "Reduced load, no new large builds" }
  recovery: { ors_min: 0, description: "Repair only, escalate to owner" }

