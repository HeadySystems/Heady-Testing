# ─── Node Topology ────────────────────────────────────────────────────────────

topology:
  rings:
    central:
      radius: 0
      role: "Awareness and values layer — origin point"
      nodes:
        - HeadySoul

    inner:
      radius: 1.0
      role: "Processing core — orchestration, reasoning, planning"
      nodes:
        - HeadyBrains
        - HeadyConductor
        - HeadyVinci

    middle:
      radius: 1.618    # φ
      role: "Execution layer — coding, building, monitoring"
      nodes:
        - JULES
        - BUILDER
        - ATLAS
        - NOVA
        - HeadyLens
        - StoryDriver

    outer:
      radius: 2.618    # φ²
      role: "Specialized capabilities — research, simulation, creativity"
      nodes:
        - HeadyScientist
        - HeadyMC
        - PatternRecognition
        - SelfCritique
        - SASHA
        - Imagination
        - HCSupervisor
        - HCBrain

    governance:
      radius: 4.236    # φ³
      role: "Quality, assurance, risk — governance shell"
      nodes:
        - HeadyQA
        - HeadyCheck
        - HeadyRisk

