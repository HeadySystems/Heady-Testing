# ═══════════════════════════════════════════════════════════════════════════════
# RENDER CLOUD — app.headysystems.com subdomains
# ═══════════════════════════════════════════════════════════════════════════════
cloud_me:
  base: app.headysystems.com
  
  services:
    manager: api.app.headysystems.com
    buddy: buddy.app.headysystems.com
    web: app.app.headysystems.com
    
    # AI Nodes
    jules: jules.app.headysystems.com
    observer: observer.app.headysystems.com
    builder: builder.app.headysystems.com
    atlas: atlas.app.headysystems.com
    pythia: pythia.app.headysystems.com
    
    # Intelligence
    HeadySims: montecarlo.app.headysystems.com
    patterns: patterns.app.headysystems.com
    critique: critique.app.headysystems.com
    imagination: imagine.app.headysystems.com
    stories: stories.app.headysystems.com
    
    # Data
    postgres: db.app.headysystems.com
    redis: cache.app.headysystems.com
    events: events.app.headysystems.com
    
    # Observability
    lens: lens.app.headysystems.com
    metrics: metrics.app.headysystems.com
    logs: logs.app.headysystems.com
    traces: traces.app.headysystems.com
    alerts: alerts.app.headysystems.com
    
    # Browsers
    chrome: chrome.app.headysystems.com
    firefox: firefox.app.headysystems.com
    edge: edge.app.headysystems.com
    safari: safari.app.headysystems.com
    bridge: bridge.app.headysystems.com
    
    # IDEs
    vscode: vscode.app.headysystems.com
    jetbrains: jetbrains.app.headysystems.com
    neovim: neovim.app.headysystems.com
    sublime: sublime.app.headysystems.com
    emacs: emacs.app.headysystems.com
    
    # Integrations
    slack: slack.app.headysystems.com
    discord: discord.app.headysystems.com
    teams: teams.app.headysystems.com
    email: mail.app.headysystems.com
    calendar: calendar.app.headysystems.com
    github: github.app.headysystems.com
    notion: notion.app.headysystems.com
    
    # MCP
    mcp: mcp.app.headysystems.com
    fs: fs.app.headysystems.com
    shell: shell.app.headysystems.com
    browser-tools: browser.app.headysystems.com
    search: search.app.headysystems.com
    
    # Business
    billing: billing.app.headysystems.com
    telemetry: telemetry.app.headysystems.com
    
    # HeadyOS
    docker: docker.app.headysystems.com
    metal: metal.app.headysystems.com
