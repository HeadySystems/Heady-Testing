    dns: dns.app.headysystems.com

# ═══════════════════════════════════════════════════════════════════════════════
# CLOUD RUN SETUP — Add these as custom domain mappings in Cloud Run
# ═══════════════════════════════════════════════════════════════════════════════
render_setup: |
  1. Go to https://console.cloud.google.com/run
  2. Select your HeadyManager service
  3. Click "Custom Domains"
  4. Add each subdomain:
     
     CNAME Records:
     jules.app.headysystems.com → app.headysystems.com
     observer.app.headysystems.com → app.headysystems.com
     builder.app.headysystems.com → app.headysystems.com
     atlas.app.headysystems.com → app.headysystems.com
     pythia.app.headysystems.com → app.headysystems.com
     buddy.app.headysystems.com → app.headysystems.com
     api.app.headysystems.com → app.headysystems.com
     app.app.headysystems.com → app.headysystems.com
     ... (all 50+ subdomains)
     
  5. Cloud Run will verify each domain mapping
  6. All subdomains will route to your HeadyManager
  7. HeadyManager can route based on Host header

# ═══════════════════════════════════════════════════════════════════════════════
# ROUTING LOGIC — HeadyManager uses Host header to route
# ═══════════════════════════════════════════════════════════════════════════════
routing:
  strategy: host_header
  
  rules:
    - host: api.app.headysystems.com
      service: heady-manager
      port: 3300
      
    - host: jules.app.headysystems.com
      service: ai-node
      node: jules
      port: 8001
      
    - host: observer.app.headysystems.com
      service: ai-node
      node: observer
      port: 8002
      
    - host: buddy.app.headysystems.com
      service: heady-buddy
      port: 5174
      
    - host: app.app.headysystems.com
      service: frontend
      port: 5173
      
    - host: db.app.headysystems.com
      service: postgres
      port: 5432
      protocol: postgresql
      
    - host: cache.app.headysystems.com
      service: redis
      port: 6379
      protocol: redis

# ═══════════════════════════════════════════════════════════════════════════════
