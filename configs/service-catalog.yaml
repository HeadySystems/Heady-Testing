  - name: heady-github-connector
    runtime: cloud-run
    port: 4352
    healthPath: /health/ready
    dependencies: [heady-brains]
    description: "GitHub App integration connector"
workers:
  - name: heady-mcp-worker
    runtime: cloudflare-workers
    routes: [/mcp, /sse]
  - name: liquid-gateway-worker
    runtime: cloudflare-workers
    routes: [/v1/chat, /v1/embed]
  - name: heady-buddy-worker
    runtime: cloudflare-workers
    routes: [/chat, /stream]
  - name: edge-auth-worker
    runtime: cloudflare-workers
    routes: [/verify]
  - name: headyweb-edge-worker
    runtime: cloudflare-workers
    routes: [/browse, /search, /ide]
  - name: headyos-edge-worker
    runtime: cloudflare-workers
    routes: [/os, /sync, /persist]
