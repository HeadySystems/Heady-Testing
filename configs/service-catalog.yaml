    dependencies: [heady-brains, heady-vinci]
    description: "Creative content and image generation agent"
  - name: heady-stories-agent
    runtime: cloud-run
    port: 4329
    healthPath: /health/ready
    dependencies: [heady-brains, heady-memory]
