  - name: heady-kinetics-agent
    runtime: cloud-run
    port: 4330
    healthPath: /health/ready
    dependencies: [heady-vinci]
    description: "Motion, animation, and interaction design agent"
  - name: heady-jules-agent
    runtime: cloud-run
    port: 4331
    healthPath: /health/ready
    dependencies: [heady-brains, heady-memory]
    description: "The Hyper-Surgeon — precision coding and optimization agent"
  - name: heady-traces-service
    runtime: cloud-run
    port: 4340
    healthPath: /health/ready
    dependencies: [observability-kernel]
