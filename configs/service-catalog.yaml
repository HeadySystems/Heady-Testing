# в”Ђв”Ђв”Ђ AI PROVIDERS в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
aiProviders:
  - tier: 1
    provider: anthropic
    models: [claude-sonnet-4, claude-opus-4]
    costPerMTokens: "$3-$75"
    envKey: ANTHROPIC_API_KEY
  - tier: 2
    provider: groq
    models: [llama-3.3-70b]
    costPerMTokens: "$0.59/$0.79"
    envKey: GROQ_API_KEY
  - tier: 3
    provider: openai
    models: [gpt-4o]
    costPerMTokens: "$2.50/$10"
    envKey: OPENAI_API_KEY
  - tier: 4
    provider: openai-embeddings
    models: [text-embedding-3-small]
    costPerMTokens: "$0.02"
    envKey: OPENAI_API_KEY
  - tier: 5
    provider: perplexity
    models: [sonar-pro]
    costPerMTokens: "$3/$15"
    envKey: PERPLEXITY_API_KEY
  - tier: 6
    provider: google
    models: [gemini-2.5-pro, gemini-2.5-flash]
    costPerMTokens: "$0.10-$2.50"
    envKey: GEMINI_API_KEY
  - tier: 7
    provider: huggingface
    models: [various]
    costPerMTokens: "Free"
    envKey: HF_TOKEN
  - tier: 8
    provider: cloudflare-workers-ai
    models: [various]
    costPerMTokens: "Free (10K/day)"
    envKey: CF_ACCOUNT

aiFallback:
  fallbackChain: [anthropic, groq, openai, gemini, workers-ai, colab-vllm]
  scoringFormula: "phi_weight Г— csl Г— (1/latency_ms) Г— (1/cost_per_call)"

