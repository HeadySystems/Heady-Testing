version: 1
services:
  - name: domain-router
    runtime: cloud-run
    port: 4301
    healthPath: /health/ready
    dependencies: []
  - name: observability-kernel
    runtime: cloud-run
    port: 4302
    healthPath: /health/ready
    dependencies: [domain-router]
  - name: budget-tracker
    runtime: cloud-run
    port: 4303
    healthPath: /health/ready
    dependencies: [observability-kernel]
  - name: heady-memory
    runtime: cloud-run
    port: 4304
    healthPath: /health/ready
    dependencies: [observability-kernel]
  - name: heady-health
    runtime: cloud-run
    port: 4305
    healthPath: /health/ready
    dependencies: [observability-kernel, heady-memory]
  - name: heady-conductor
    runtime: cloud-run
    port: 4306
    healthPath: /health/ready
    dependencies: [heady-brains, heady-soul, heady-vinci, heady-governance]
  - name: heady-brains
    runtime: cloud-run
    port: 4307
    healthPath: /health/ready
    dependencies: [heady-memory]
  - name: heady-soul
    runtime: cloud-run
    port: 4308
    healthPath: /health/ready
    dependencies: [heady-governance]
  - name: heady-vinci
    runtime: cloud-run
    port: 4309
    healthPath: /health/ready
    dependencies: [heady-memory]
  - name: heady-governance
    runtime: cloud-run
    port: 4310
    healthPath: /health/ready
    dependencies: [domain-router]
  - name: heady-guard
    runtime: cloud-run
    port: 4311
    healthPath: /health/ready
    dependencies: [heady-governance]
  - name: heady-autobiographer
    runtime: cloud-run
    port: 4312
    healthPath: /health/ready
    dependencies: [heady-memory]
  - name: heady-bee-factory
    runtime: cloud-run
    port: 4313
    healthPath: /health/ready
    dependencies: [heady-health, heady-vinci]
  - name: hcfullpipeline-executor
    runtime: cloud-run
    port: 4314
    healthPath: /health/ready
    dependencies: [heady-conductor, heady-bee-factory, heady-governance]
  - name: auto-success-engine
    runtime: cloud-run
    port: 4315
    healthPath: /health/ready
    dependencies: [observability-kernel, heady-health, budget-tracker]
  - name: headyos-kernel
    runtime: cloud-run
    port: 4900
    healthPath: /health
    dependencies: [heady-memory, heady-governance, heady-conductor]
    description: "Latent OS kernel — persistence, liquid routing, orchestration"
  - name: headybuddy-agent
    runtime: cloud-run
    port: 4800
    healthPath: /health
    dependencies: [heady-brains, heady-memory]
    description: "HeadyBuddy AI companion — multi-provider, persistent memory, task automation"
  - name: headyweb-browser
    runtime: cloud-run
    port: 5173
    healthPath: /health
    dependencies: [headybuddy-agent, heady-brains]
    description: "HeadyWeb browser — Comet/Chromium hybrid with integrated IDE"
  - name: headyai-ide
    runtime: cloud-run
    port: 5174
    healthPath: /health
    dependencies: [headybuddy-agent, headyos-kernel]
    description: "HeadyAI-IDE — Windsurf/Antigravity hybrid cloud IDE"
  - name: heady-atlas-agent
    runtime: cloud-run
    port: 4320
    healthPath: /health/ready
