#
# Service Catalog - Canonical registry of all Heady services, agents, and tools.
# Orchestrator and System Brain use this as source of truth for routing and governance.

version: "9.0.0"

# в”Ђв”Ђв”Ђ SERVICES в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
services:
  - name: heady-manager
    role: API Gateway & MCP Server
    type: web
    skills: [api-gateway, mcp-protocol, static-serving, rate-limiting, auth]
    tools: [express, helmet, compression, ws]
    endpoint: http://manager.headysystems.com:3300
    healthCheck: /api/health
    criticality: critical
    owner: system
    slos:
      availability: 99.9
      latencyP99Ms: 500

  - name: heady-conductor
    role: Python Orchestration Worker
    type: worker
    skills: [audit, build, lint, test, concept-extraction]
    tools: [python, conductor-protocol]
    endpoint: http://conductor.headysystems.com:8080
    healthCheck: /health
    criticality: critical
    owner: system
    slos:
      availability: 99.0
      latencyP99Ms: 5000

  - name: heady-brain
    role: System Brain Meta-Controller
    type: internal
    skills: [meta-control, readiness-eval, concept-alignment, auto-tuning, governance]
    tools: [hc-brain, hc-readiness, concepts-index]
    endpoint: http://brain.headysystems.com:8081
    healthCheck: module-loaded
    criticality: critical
    owner: system
    slos:
      availability: 99.9
      latencyP99Ms: 1000

  - name: hc-supervisor
    role: Multi-Agent Supervisor
    type: internal
    skills: [agent-routing, parallel-fanout, result-aggregation, direct-routing]
    tools: [hc-supervisor, networking-client]
    endpoint: http://supervisor.headysystems.com:8082
    healthCheck: module-loaded
    criticality: critical
    owner: system
    slos:
      availability: 99.9
      latencyP99Ms: 200

  - name: heady-sync
    role: Multi-Remote Git Synchronization
    type: script
    skills: [git-sync, worktree-management, multi-remote-push]
    tools: [git, powershell]
    endpoint: http://sync.headysystems.com:8083
    healthCheck: script-runnable
    criticality: high
    owner: system

  - name: hcautobuild
    role: Automated Build Pipeline
    type: script
    skills: [auto-build, worktree-discovery, checkpoint-save, deploy-trigger]
    tools: [powershell, git, npm]
    endpoint: http://autobuild.headysystems.com:8084
    healthCheck: script-runnable
    criticality: high
    owner: system

  - name: heady-swarms
    role: Swarm Intelligence Orchestrator
    type: internal
    skills: [swarm-dispatch, parallel-fanout, vector-routing, semantic-matching, concurrent-execution]
    tools: [heady-bee, phi-math, vector-router]
    endpoint: http://swarms.headysystems.com:8085
    healthCheck: module-loaded
    criticality: critical
    owner: system
    slos:
      availability: 99.9
      latencyP99Ms: 500

  - name: colab-latent-ops
    role: Distributed Colab Pro+ Compute Cluster
    type: compute
    skills: [embedding-generation, model-inference, autonomous-learning, vector-indexing, latent-space-ops]
    tools: [colab-primary, colab-secondary, colab-tertiary, colab-learning]
    endpoint: http://colab.headysystems.com:8086
    healthCheck: /api/colab/health
    criticality: high
    owner: system
    runtimes:
      primary: { concurrency: 34, jobType: embedding, envVar: COLAB_PRIMARY_ENDPOINT }
      secondary: { concurrency: 21, jobType: inference, envVar: COLAB_SECONDARY_ENDPOINT }
      tertiary: { concurrency: 13, jobType: training, envVar: COLAB_TERTIARY_ENDPOINT }
      learning: { concurrency: 8, jobType: autonomous_learning, envVar: COLAB_LEARNING_ENDPOINT, dedicated: true }
      # Runtime 4 added 2026-03-21: Learning Engine (distillation, evolution, research, synthesis)
      learning_engine: { concurrency: 8, jobType: learning_engine, envVar: COLAB_RUNTIME_4_URL, script: colab/runtime_4_learning_engine.py }
    slos:
      availability: 95.0
      latencyP99Ms: 30000

  - name: vector-router
    role: Semantic Vector Space Task Router
    type: internal
    skills: [semantic-routing, cosine-similarity, agent-matching, capability-embedding, batch-routing]
    tools: [phi-math, structured-logger]
    endpoint: http://router.headysystems.com:8087
    healthCheck: module-loaded
    criticality: critical
    owner: system
    slos:
      availability: 99.99
      latencyP99Ms: 50

# в”Ђв”Ђв”Ђ LIQUID MICROSERVICE NODES (v1.0 вЂ” Added 2026-03-21) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
liquid_nodes:
  - name: heady-sims
    role: Multi-Scenario Simulation Engine with Replay
    type: web
    tier: warm
    skills: [simulation, replay, scenario-modeling, risk-assessment, batch-sim]
    tools: [heady-mc, phi-math, neon-pgvector]
    endpoint: http://sims.headysystems.com:3341
    healthCheck: /health
    criticality: high
    owner: system
    liquid_node_contract: true
    event_spine:
      subscribe: [mc:simulation-complete, pipeline:request-simulation, battle:scenario-request]
      publish: [sims:result, sims:replay-available, sims:scenario-complete]
    infrastructure:
      cloud_run: { image: gcr.io/headysystems/heady-sims, cpu: "4", memory: "8Gi" }
      cloudflare_route: sims.headysystems.com/*
      neon_schema: heady_sims
      sentry_project: heady-sims
      colab_runtime: 3
    slos:
      availability: 99.0
      latencyP99Ms: 5000

  - name: heady-mc
    role: Monte Carlo Simulation & UCB1 Plan Selection
    type: web
    tier: warm
    skills: [monte-carlo, ucb1, plan-selection, risk-assessment, candidate-evaluation]
    tools: [phi-math, neon-pgvector, upstash-redis]
    endpoint: http://mc.headysystems.com:3340
    healthCheck: /health
    criticality: high
    owner: system
    liquid_node_contract: true
    event_spine:
      subscribe: [pipeline:plan, battle:request-simulation, sims:request]
      publish: [mc:simulation-complete, mc:risk-assessment, pipeline:plan-selected]
    infrastructure:
      cloud_run: { image: gcr.io/headysystems/heady-mc, cpu: "4", memory: "8Gi" }
      cloudflare_route: mc.headysystems.com/*
      neon_schema: heady_sims
      sentry_project: heady-mc
      colab_runtime: 3
    slos:
      availability: 99.0
      latencyP99Ms: 5000

  - name: heady-battle
    role: Multi-Candidate Arena Competition with CSL Judging
    type: web
    tier: warm
    skills: [arena-competition, csl-judging, multi-model-eval, round-robin, elimination]
    tools: [heady-inference-gateway, phi-math, neon-pgvector]
    endpoint: http://battle.headysystems.com:3325
    healthCheck: /health
    criticality: high
    owner: system
    liquid_node_contract: true
    event_spine:
      subscribe: [pipeline:arena-request, mc:candidates-ready, sims:scenario-complete]
      publish: [battle:started, battle:round-complete, battle:winner-selected, battle:results]
    infrastructure:
      cloud_run: { image: gcr.io/headysystems/heady-battle, cpu: "4", memory: "8Gi" }
      cloudflare_route: battle.headysystems.com/*
      neon_schema: heady_battle
      sentry_project: heady-battle
      colab_runtime: 3
    arena_config:
      max_candidates: 13
      max_rounds: 5
      judge_weights: { correctness: 0.34, safety: 0.21, performance: 0.21, quality: 0.13, elegance: 0.11 }
    slos:
      availability: 99.0
      latencyP99Ms: 10000

