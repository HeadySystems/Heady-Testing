# configs/service-catalog.yaml


#
# Service Catalog - Canonical registry of all Heady services, agents, and tools.
# Orchestrator and System Brain use this as source of truth for routing and governance.

version: "2.0.0"

# в”Ђв”Ђв”Ђ SERVICES в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
services:
  - name: heady-manager
    role: API Gateway & MCP Server
    type: web
    skills: [api-gateway, mcp-protocol, static-serving, rate-limiting, auth]
    tools: [express, helmet, compression, ws]
    endpoint: http://manager.headysystems.com:3300
    healthCheck: /api/health
    criticality: critical
    owner: system
    slos:
      availability: 99.9
      latencyP99Ms: 500

  - name: heady-conductor
    role: Python Orchestration Worker
    type: worker
    skills: [audit, build, lint, test, concept-extraction]
    tools: [python, conductor-protocol]
    endpoint: http://conductor.headysystems.com:8080
    healthCheck: /health
    criticality: critical
    owner: system
    slos:
      availability: 99.0
      latencyP99Ms: 5000

  - name: heady-brain
    role: System Brain Meta-Controller
    type: internal
    skills: [meta-control, readiness-eval, concept-alignment, auto-tuning, governance]
    tools: [hc-brain, hc-readiness, concepts-index]
    endpoint: http://brain.headysystems.com:8081
    healthCheck: module-loaded
    criticality: critical
    owner: system
    slos:
      availability: 99.9
      latencyP99Ms: 1000

  - name: hc-supervisor
    role: Multi-Agent Supervisor
    type: internal
    skills: [agent-routing, parallel-fanout, result-aggregation, direct-routing]
    tools: [hc-supervisor, networking-client]
    endpoint: http://supervisor.headysystems.com:8082
    healthCheck: module-loaded
    criticality: critical
    owner: system
    slos:
      availability: 99.9
      latencyP99Ms: 200

  - name: heady-sync
    role: Multi-Remote Git Synchronization
    type: script
    skills: [git-sync, worktree-management, multi-remote-push]
    tools: [git, powershell]
    endpoint: http://sync.headysystems.com:8083
    healthCheck: script-runnable
    criticality: high
    owner: system

  - name: hcautobuild
    role: Automated Build Pipeline
    type: script
    skills: [auto-build, worktree-discovery, checkpoint-save, deploy-trigger]
    tools: [powershell, git, npm]
    endpoint: http://autobuild.headysystems.com:8084
    healthCheck: script-runnable
    criticality: high
    owner: system

  - name: heady-swarms
    role: Swarm Intelligence Orchestrator
    type: internal
    skills: [swarm-dispatch, parallel-fanout, vector-routing, semantic-matching, concurrent-execution]
    tools: [heady-bee, phi-math, vector-router]
    endpoint: http://swarms.headysystems.com:8085
    healthCheck: module-loaded
    criticality: critical
    owner: system
    slos:
      availability: 99.9
      latencyP99Ms: 500

  - name: colab-latent-ops
    role: Distributed Colab Pro+ Compute Cluster
    type: compute
    skills: [embedding-generation, model-inference, autonomous-learning, vector-indexing, latent-space-ops]
    tools: [colab-primary, colab-secondary, colab-tertiary, colab-learning]
    endpoint: http://colab.headysystems.com:8086
    healthCheck: /api/colab/health
    criticality: high
    owner: system
    runtimes:
      primary: { concurrency: 34, jobType: embedding, envVar: COLAB_PRIMARY_ENDPOINT }
      secondary: { concurrency: 21, jobType: inference, envVar: COLAB_SECONDARY_ENDPOINT }
      tertiary: { concurrency: 13, jobType: training, envVar: COLAB_TERTIARY_ENDPOINT }
      learning: { concurrency: 8, jobType: autonomous_learning, envVar: COLAB_LEARNING_ENDPOINT, dedicated: true }
    slos:
      availability: 95.0
      latencyP99Ms: 30000

  - name: vector-router
    role: Semantic Vector Space Task Router
    type: internal
    skills: [semantic-routing, cosine-similarity, agent-matching, capability-embedding, batch-routing]
    tools: [phi-math, structured-logger]
    endpoint: http://router.headysystems.com:8087
    healthCheck: module-loaded
    criticality: critical
    owner: system
    slos:
      availability: 99.99
      latencyP99Ms: 50

# в”Ђв”Ђв”Ђ AGENTS в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
agents:
  - name: builder
    role: Build & Deploy Agent
    skills: [build, deploy, test, lint]
    tools: [npm, git, render-api, powershell]
    routing: direct
    fallback: null
    criticality: high

  - name: researcher
    role: Knowledge & News Ingestion Agent
    skills: [news-ingestion, concept-extraction, trend-analysis]
    tools: [algolia-hn, perplexity, llm-provider]
    routing: direct
    fallback: null
    criticality: medium

  - name: deployer
    role: Infrastructure Deployment Agent
    skills: [render-deploy, docker-build, cloud-bridge, env-sync]
    tools: [render-api, docker, cloud-bridge]
    routing: direct
    fallback: null
    criticality: high

  - name: auditor
    role: Audit & Compliance Agent
    skills: [code-audit, security-scan, brand-check, dependency-audit]
    tools: [eslint, snyk, brand-headers]
    routing: direct
    fallback: null
    criticality: medium

  - name: observer
    role: Monitoring & Health Agent
    skills: [health-check, metrics-collection, alert-evaluation, readiness-probe]
    tools: [node-cron, health-scripts, cloudwatch-api]
    routing: direct
    fallback: null
    criticality: critical

  - name: claude-code
    role: AI Code Agent (Claude Code CLI)
    skills: [code-analysis, security-audit, documentation, concept-alignment, task-planning, governance-check, readiness-eval]
    tools: [claude-cli, read, grep, glob, bash]
    routing: direct
    fallback: null
    criticality: high

  - name: swarm-coordinator
    role: Swarm Intelligence Dispatch Coordinator
    skills: [task-distribution, concurrent-execution, dependency-resolution, phi-backoff-retry]
    tools: [heady-bee, heady-swarm, vector-router]
    routing: semantic
    fallback: claude-code
    criticality: critical

  - name: colab-ops
    role: Colab Compute Runtime Manager
    skills: [embedding, inference, training, autonomous-learning, health-check]
    tools: [colab-primary, colab-secondary, colab-tertiary, colab-learning]
    routing: capability
    fallback: null
    criticality: high

# в”Ђв”Ђв”Ђ EXTERNAL INTEGRATIONS в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
externalIntegrations:
  - name: render-com
    type: deployment-platform
    domain: api.render.com
    proxyPolicy: external-proxy-allowed
    rateLimit: 30/min

  - name: algolia-hn
    type: news-api
    domain: hn.algolia.com
    proxyPolicy: external-proxy-allowed
    rateLimit: 60/min

  - name: huggingface
    type: ml-platform
    domain: huggingface.co
    proxyPolicy: external-proxy-allowed
    rateLimit: 30/min

  - name: github
    type: scm
    domain: api.github.com
    proxyPolicy: external-proxy-allowed
    rateLimit: 60/min

  - name: cloudflare
    type: cdn-dns
    domain: api.cloudflare.com
    proxyPolicy: external-proxy-allowed
    rateLimit: 30/min

  - name: google-vertex-ai
    type: ml-platform
    domain: us-central1-aiplatform.googleapis.com
    proxyPolicy: external-proxy-allowed
    rateLimit: 30/min

  - name: google-ai-studio
    type: llm-api
    domain: generativelanguage.googleapis.com
    proxyPolicy: external-proxy-allowed
    rateLimit: 60/min

  - name: google-colab
    type: notebook-platform
    domain: colab.research.google.com
    proxyPolicy: external-proxy-allowed
    rateLimit: 10/min

# в”Ђв”Ђв”Ђ LIQUID NODES (MCP-Connected External Interfaces) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
liquidNodes:
  - name: github-node
    type: scm
    status: needs_token
    envVar: GITHUB_TOKEN
    capabilities: [list-repos, repo-info, search-code]
    vaultKey: heady-vault-manifest

  - name: gists-node
    type: code-snippets
    status: needs_token
    envVar: GITHUB_TOKEN
    capabilities: [list-gists, get-gist, create-gist]

  - name: cloudflare-node
    type: infrastructure
    status: needs_token
    envVar: CLOUDFLARE_API_TOKEN
    capabilities: [list-zones, dns-records, list-workers, list-pages]

  - name: vertex-ai-node
    type: ml-inference
    status: needs_token
    envVar: GCLOUD_ACCESS_TOKEN
    capabilities: [list-models, list-endpoints, predict]

  - name: ai-studio-node
    type: llm-generation
    status: needs_token
    envVar: GOOGLE_AI_KEY
    capabilities: [generate-text]

  - name: colab-node
    type: notebooks
    status: needs_token
    envVar: GOOGLE_DRIVE_TOKEN
    envVars: [COLAB_PRIMARY_ENDPOINT, COLAB_SECONDARY_ENDPOINT, COLAB_TERTIARY_ENDPOINT, COLAB_LEARNING_ENDPOINT, GCLOUD_ACCESS_TOKEN]
    capabilities: [list-notebooks, get-notebook]

  - name: latent-space-node
    type: vector-memory
    status: active
    envVar: null
    capabilities: [store, search, list, delete]
    currentVectors: 43

# в”Ђв”Ђв”Ђ PIPELINE STAGE MAPPINGS в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
pipelineStages:
  - name: "Channel Entry"
    handler: heady-manager
    agents: [observer]
    description: "Route incoming requests to appropriate pipeline"
  - name: "Ingest"
    handler: heady-manager
    agents: [researcher]
    description: "Gather all inputs, scan files, load configs"
  - name: "Plan (MC-Powered)"
    handler: heady-brain
    agents: [claude-code]
    description: "Monte Carlo plan selection and task decomposition"
  - name: "Execute Major Phase"
    handler: hc-supervisor
    agents: [builder, deployer, claude-code]
    description: "Primary execution phase with parallel fan-out"
  - name: "Recover"
    handler: hc-supervisor
    agents: [builder, auditor]
    description: "Error recovery and retry with phi-backoff"
  - name: "Self-Critique"
    handler: heady-brain
    agents: [auditor, claude-code]
    description: "Post-execution review and quality assessment"
  - name: "Optimize"
    handler: heady-brain
    agents: [builder, auditor]
    description: "Refactor, remove dead code, improve performance"
  - name: "Finalize"
    handler: heady-manager
    agents: [deployer]
    description: "Package artifacts and prepare for delivery"
  - name: "Monitor & Feedback Loop"
    handler: heady-manager
    agents: [observer]
    description: "Continuous monitoring and feedback collection"
  - name: "Cross-Device Sync"
    handler: heady-sync
    agents: [deployer]
    description: "Synchronize state across all devices"
  - name: "Sync Priority Changes"
    handler: heady-sync
    agents: [deployer]
    description: "Prioritize and sync critical changes first"
  - name: "Deploy Priority"
    handler: hcautobuild
    agents: [deployer, builder]
    description: "Automated deployment with priority ordering"
  - name: "Post-Quantum Cryptography"
    handler: heady-brain
    agents: [auditor]
    description: "Post-quantum crypto operations and validation"
  - name: "Cryptography"
    handler: heady-brain
    agents: [auditor]
    description: "Standard cryptographic operations"

# в”Ђв”Ђв”Ђ HEADY VAULT в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
vault:
  name: HeadyVault
  source: .Heady/.shit
  latentSpaceKey: heady-vault-manifest
  totalSecrets: 45
  categories:
    ai-llm: [ANTHROPIC_API_KEY, CLAUDE_API_KEY, OPENAI_API_KEY, GROQ_API_KEY, PERPLEXITY_API_KEY, HF_TOKEN, GEMINI_API_KEY, GCLOUD_API_KEY]
    infrastructure: [DATABASE_URL, NEON_API_KEY, UPSTASH_REDIS_REST_URL, FIREBASE_API_KEY, PINECONE_API_KEY, COLAB_PRIMARY_ENDPOINT, COLAB_SECONDARY_ENDPOINT, COLAB_TERTIARY_ENDPOINT, COLAB_LEARNING_ENDPOINT]
    cloud-deploy: [CLOUDFLARE_API_TOKEN, SENTRY_AUTH_TOKEN, SENTRY_DSN]
    scm: [GITHUB_TOKEN, GITHUB_TOKEN_SECONDARY]
    finance: [STRIPE_SECRET_KEY]
    auth: [ADMIN_TOKEN, HEADY_API_KEY, OP_SERVICE_ACCOUNT_TOKEN]
  rotationPolicy: quarterly
  lastRotation: unknown
  nextRotation: 2026-03-15
