  - name: heady-patterns-service
    runtime: cloud-run
    port: 4343
    healthPath: /health/ready
    dependencies: [heady-brains, observability-kernel]
    description: "Pattern recognition and evolution service"
  - name: heady-discord-connector
    runtime: cloud-run
    port: 4350
    healthPath: /health/ready
    dependencies: [headybuddy-agent]
    description: "Discord bot and webhook connector"
  - name: heady-slack-connector
    runtime: cloud-run
    port: 4351
    healthPath: /health/ready
    dependencies: [headybuddy-agent]
