# ANALYSIS PIPELINE
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
analysisPipeline:
  stages:
    - name: discover
      description: "Automated discovery via GitHub, HuggingFace, ArXiv, HN"
      frequency: weekly
      bee_type: research-bee
      timeout_ms: 4236  # φ³ × 1000

    - name: catalog
      description: "Map features to Heady equivalents, check IP compliance"
      bee_type: catalog-bee
      timeout_ms: 2618  # φ² × 1000

    - name: sandbox_test
      description: "Deploy in isolated sandbox, run standardized benchmarks"
      environment: "HeadySystems/sandbox or Colab"
      bee_type: testing-bee
      timeout_ms: 11090  # φ⁵ × 1000

    - name: battle_compare
      description: "HeadyBattle arena head-to-head comparison"
      scoring_weights:
        correctness: 1.618   # φ
        security: 1.618      # φ
        performance: 1.0
        code_quality: 0.618  # ψ
        sacred_geometry: 0.382  # ψ²
      bee_type: arena-bee

    - name: extract
      description: "Identify beneficial components (CSL gate > 0.618)"
      ip_check: "configs/ip-registry.yaml restrictedIP"
      csl_threshold: 0.618
      bee_type: extraction-bee

    - name: integrate
      description: "Implement with Heady standards, battle-verify"
      approval: "Auto-merge if all CSL gates pass (> 0.618)"
      bee_type: integration-bee

    - name: surpass
      description: "Verify Heady exceeds competitor on all dimensions"
      threshold: 0.786  # φ × ψ²
      bee_type: validation-bee

