# This runtime is dedicated solely to Heady's autonomous learning —
# trial & error, QA, Q&A, risk analysis, and Socratic reasoning.
# It runs independently from the 3 operational runtimes, using its
# own GPU/GPU RAM allocation without impacting production workloads.

version: "1.0.0"
name: ColabLearningRuntime

runtime:
  id: colab-learning
  name: "Colab Pro+ Learning Engine"
  platform: colab
  type: gpu_runtime
  subscription: 4  # 4th Pro+ subscription
  dedicated: true
  region: us-central
  gpu: A100
  gpu_ram: 40GB

# Fibonacci-aligned concurrency (FIB[5] = 8 — moderate, non-competing)
concurrency:
  limit: 8
  priority: 0  # Background priority — never competes with user tasks
  scheduling: background_only

# Learning modes — all run autonomously in background
learning_modes:
  trial_and_error:
    enabled: true
    description: "Automated experimentation with hypothesis testing"
    max_experiments_per_cycle: 5
    cycle_interval_minutes: 30
    rollback_on_failure: true

  quality_assurance:
    enabled: true
    description: "Continuous QA on system outputs and pipeline stages"
    scan_interval_minutes: 15
    coverage_target: 0.95

  question_and_answer:
    enabled: true
    description: "Self-interrogation using Socratic method"
    topics:
      - system_architecture
      - pipeline_optimization
      - resource_allocation
      - error_patterns
      - user_intent_modeling
    depth: deep
    max_reasoning_chains: 3

  risk_analysis:
    enabled: true
    description: "Proactive risk detection and mitigation planning"
    scan_scope:
      - configs
      - deployments
      - dependencies
      - security
      - performance
    alert_threshold: medium
    auto_mitigate: false  # Report only, never auto-fix

  socratic_method:
    enabled: true
    description: "Dialectical reasoning for deeper system understanding"
    question_depth: 5  # Maximum chain of why-questions
    contradiction_detection: true
    synthesis_output: latent_space

# Resource boundaries — never exceed these
resource_limits:
  max_gpu_utilization: 0.85
  max_gpu_ram_utilization: 0.90
  max_runtime_hours_per_day: 20
  cool_down_minutes: 30
  cost_budget_daily: 12.50  # $12.50/day max for learning runtime

# Output destinations
outputs:
  latent_space:
    enabled: true
    category: learning
    auto_vectorize: true
  
  insights_log:
    enabled: true
    path: data/learning/insights.jsonl
    rotation: daily

  risk_reports:
    enabled: true
    path: data/learning/risk-reports/
    format: yaml

# Integration with existing systems
integration:
  heady_brain:
    feed_insights: true
    update_patterns: true
    confidence_threshold: 0.8

  monte_carlo:
    share_experiment_results: true
    improve_strategy_weights: true

  heady_bee:
    accept_swarm_learning_tasks: true
    report_back_to_swarm: true

  latent_space:
    l0_ring_buffer: true
    l1_vector_store: true
    auto_prune_stale: true
    prune_threshold_days: 30

# Health & monitoring
health:
  heartbeat_interval_seconds: 34  # FIB[8]
  failover_timeout_seconds: 21    # FIB[7]
  max_consecutive_failures: 3
  auto_restart: true
