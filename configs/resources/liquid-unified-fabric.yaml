version: 1
updated_at: 2026-03-03T00:00:00Z
runtime_mode: unified-liquid-fabric
service_topology:
  paradigm: no-frontend-backend-split
  planes:
    - name: projection-plane
      purpose: project the full live system state to users
      protocols:
        - websocket
        - midi2-ump
        - rtp-midi
    - name: builder-plane
      purpose: dynamically build apps, connectors, and service adapters
      protocols:
        - orchestration-events
        - template-injection
    - name: orchestration-plane
      purpose: coordinate headyconductor, headycloudconductor, headyswarm, and headybees
      protocols:
        - websocket
        - event-bus
        - deterministic-receipts
enterprise_controls:
  cloud_only_projection: true
  local_resource_target_percent: 5
  require_health_paths:
    - /health/live
    - /health/ready
    - /health/full
ableton_live:
  enabled: true
  bridge: ableton-remote-script/HeadyBuddy/HeadyBuddyScript.py
  transport: midi2-ump
  target_latency_ms: 25
instantaneous_transfer:
  max_snapshot_staleness_ms: 1000
  preferred_transports:
    - websocket
    - midi2-ump
    - rtp-midi

source_of_truth:
  provider: github
  monorepo_only: true
  continuous_projection_sync: true
  reject_secondary_repo_overrides: true

projection_hygiene:
  detect_stray_runtime_files: true
  detect_service_worker_files: true
  allowlisted_service_workers:
    - public/sw.js
  runtime_file_patterns:
    - '*.bak'
    - '*.log'
    - '*.jsonl'
    - 'server.pid'
