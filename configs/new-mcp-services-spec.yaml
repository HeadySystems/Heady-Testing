# SERVICE 1: HeadyChrono вЂ” Temporal Intelligence Engine
# в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
heady-chrono:
  name: "HeadyChrono"
  tagline: "Every moment is a vector. Every timeline a trajectory."
  port: 3371
  category: ai
  sacred_geometry_position: "inner_ring"
  description: |
    Time-aware reasoning engine that treats temporal data as first-class
    citizens in vector space. Enables causal chain analysis, temporal
    pattern detection, and predictive trajectory modeling. Unlike simple
    timestamps, Chrono understands causality вЂ” what led to what, and
    what's likely next.

  tools:
    - name: heady_chrono_trace
      description: "Trace causal chains across time вЂ” follow the thread of events that led to a state"
      input:
        event_id: { type: string, required: true }
        depth: { type: number, default: 8 }
        direction: { type: string, enum: [backward, forward, bidirectional], default: backward }

    - name: heady_chrono_predict
      description: "Project future states based on temporal patterns and phi-scaled decay"
      input:
        context: { type: string, required: true }
        horizon: { type: string, enum: [minutes, hours, days, weeks], default: hours }
        confidence_floor: { type: number, default: 0.618 }

    - name: heady_chrono_diff
      description: "Compare two points in time вЂ” what changed, what drifted, what emerged"
      input:
        t1: { type: string, required: true, description: "ISO timestamp or relative (e.g., '2h ago')" }
        t2: { type: string, default: "now" }
        scope: { type: string, enum: [system, service, user, global], default: system }

    - name: heady_chrono_replay
      description: "Replay system state at a historical point вЂ” time-travel debugging"
      input:
        timestamp: { type: string, required: true }
        service: { type: string, required: true }
        include_context: { type: boolean, default: true }

  resources:
    - uri: "heady://chrono/timeline"
      description: "Live system timeline with causal annotations"
    - uri: "heady://chrono/patterns"
      description: "Detected temporal patterns and recurring cycles"

  dependencies:
    - heady-persistence
    - heady-memory
    - heady-metrics

# в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
# SERVICE 2: HeadyEcho вЂ” Voice & Audio Intelligence
# в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
heady-echo:
  name: "HeadyEcho"
  tagline: "The frequency of understanding. The resonance of intent."
  port: 3372
  category: ai
  sacred_geometry_position: "outer_ring"
  description: |
    Audio-native intelligence layer. Converts voice to structured intent,
    generates sonic branding, and enables audio-first interactions across
    the Heady ecosystem. Bridges the gap between HeadyBuddy's text
    interface and a fully multimodal future.

  tools:
    - name: heady_echo_transcribe
      description: "Real-time voice-to-text with speaker diarization and intent extraction"
      input:
        audio_url: { type: string, required: true }
        language: { type: string, default: "auto" }
        extract_intent: { type: boolean, default: true }
        diarize: { type: boolean, default: false }

    - name: heady_echo_synthesize
      description: "Generate natural speech from text with persona-aligned voice profiles"
      input:
        text: { type: string, required: true }
        voice_profile: { type: string, enum: [buddy, professional, warm, energetic], default: buddy }
        format: { type: string, enum: [mp3, wav, opus], default: opus }

    - name: heady_echo_fingerprint
      description: "Audio fingerprinting вЂ” identify, classify, and tag audio content"
      input:
        audio_url: { type: string, required: true }
        match_against: { type: string, enum: [library, web, custom], default: library }

    - name: heady_echo_soundscape
      description: "Generate ambient soundscapes and sonic branding aligned to Sacred Geometry"
      input:
        mood: { type: string, enum: [focus, creative, calm, energetic, sacred], default: focus }
        duration_seconds: { type: number, default: 300 }
        phi_harmonics: { type: boolean, default: true, description: "Use phi-ratio frequency relationships" }

  resources:
    - uri: "heady://echo/voices"
      description: "Available voice profiles and their characteristics"
    - uri: "heady://echo/library"
      description: "Audio fingerprint library"

  dependencies:
    - heady-gateway
    - heady-conductor

# в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
# SERVICE 3: HeadyOracle вЂ” Knowledge Graph Engine
# в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
heady-oracle:
  name: "HeadyOracle"
  tagline: "Beyond similarity. Into meaning."
  port: 3373
  category: data
  sacred_geometry_position: "inner_ring"
  description: |
    Graph-native knowledge engine that complements vector memory with
    structural reasoning. While heady-memory finds similar things,
    Oracle finds connected things вЂ” traversing relationships, discovering
    paths, and inferring new connections through graph neural reasoning.

  tools:
    - name: heady_oracle_query
      description: "Traverse the knowledge graph with natural language вЂ” find connections humans miss"
      input:
        query: { type: string, required: true }
        max_hops: { type: number, default: 5 }
        include_inferred: { type: boolean, default: true, description: "Include AI-inferred edges" }

    - name: heady_oracle_connect
      description: "Create typed relationships between entities in the knowledge graph"
      input:
        from_entity: { type: string, required: true }
        to_entity: { type: string, required: true }
        relationship: { type: string, required: true }
        confidence: { type: number, default: 0.809 }
        bidirectional: { type: boolean, default: false }

    - name: heady_oracle_discover
      description: "Find hidden patterns and emergent clusters in the knowledge graph"
      input:
        seed_entity: { type: string, required: true }
        discovery_mode: { type: string, enum: [shortest_path, community, influence, anomaly], default: community }
        depth: { type: number, default: 3 }

    - name: heady_oracle_explain
      description: "Generate human-readable explanations of graph paths and reasoning chains"
      input:
        from: { type: string, required: true }
        to: { type: string, required: true }
        style: { type: string, enum: [technical, narrative, visual], default: narrative }

  resources:
    - uri: "heady://oracle/graph"
      description: "Full knowledge graph statistics and topology"
    - uri: "heady://oracle/entities"
      description: "Entity registry with types and cardinality"
    - uri: "heady://oracle/inferences"
      description: "Recently inferred relationships awaiting validation"

  dependencies:
    - heady-memory
    - heady-persistence
    - hc-brain

# в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
# SERVICE 4: HeadyMirror вЂ” Digital Twin & Simulation
# в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
heady-mirror:
  name: "HeadyMirror"
  tagline: "Every system has a shadow. Mirror lets you play with it."
  port: 3374
  category: orchestration
  sacred_geometry_position: "middle_ring"
  description: |
    Digital twin engine that creates sandboxed replicas of any Heady
    service or the entire system. Run what-if scenarios, test
    configuration changes, simulate load patterns, and preview
    deployments вЂ” all without touching production.

  tools:
    - name: heady_mirror_spawn
      description: "Spawn a digital twin of any service or service group"
      input:
        target: { type: string, required: true, description: "Service ID or 'full_system'" }
        snapshot_time: { type: string, default: "now" }
        mutations: { type: object, default: {}, description: "Config overrides for the twin" }

    - name: heady_mirror_simulate
      description: "Run a simulation scenario against a digital twin"
      input:
        twin_id: { type: string, required: true }
        scenario: { type: string, required: true, description: "Natural language scenario description" }
        duration: { type: string, default: "5m" }
        load_factor: { type: number, default: 1.0 }

    - name: heady_mirror_compare
      description: "Compare twin behavior against production reality"
      input:
        twin_id: { type: string, required: true }
        metrics: { type: array, items: { type: string }, default: ["latency", "error_rate", "throughput"] }

    - name: heady_mirror_promote
      description: "Promote a validated twin configuration to staging or production"
      input:
        twin_id: { type: string, required: true }
        target_env: { type: string, enum: [staging, production], required: true }
        require_approval: { type: boolean, default: true }

  resources:
    - uri: "heady://mirror/twins"
      description: "Active digital twins and their status"
    - uri: "heady://mirror/scenarios"
      description: "Scenario library with historical results"

  dependencies:
    - heady-gateway
    - heady-conductor
    - heady-persistence

