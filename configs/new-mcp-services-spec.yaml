        content: { type: string, required: true }
        target_locale: { type: string, required: true }
        content_type: { type: string, enum: [ui, documentation, marketing, legal, technical], default: ui }

    - name: heady_rosetta_scan
      description: "Scan codebase for untranslated strings and i18n issues"
      input:
        path: { type: string, required: true }
        locales: { type: array, items: { type: string }, default: ["en", "es", "fr", "de", "ja", "zh", "pt", "ar"] }
        report_missing: { type: boolean, default: true }

    - name: heady_rosetta_harmonize
      description: "Harmonize translations across all locale files вЂ” ensure consistency"
      input:
        base_locale: { type: string, default: "en" }
        fix_inconsistencies: { type: boolean, default: false }
        generate_missing: { type: boolean, default: true }

  resources:
    - uri: "heady://rosetta/locales"
      description: "Supported locales and completion percentages"
    - uri: "heady://rosetta/glossary"
      description: "Domain-specific translation glossary"

  dependencies:
    - heady-memory
    - heady-docs
    - heady-gateway

# в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
# SERVICE 12: HeadyGenesis вЂ” Self-Evolving Service Generator
# в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
heady-genesis:
  name: "HeadyGenesis"
  tagline: "The service that creates services. The tool that forges tools."
  port: 3382
  category: orchestration
  sacred_geometry_position: "center_adjacent"
  description: |
    Meta-programming engine that observes ecosystem usage patterns
    and auto-generates new MCP tools, services, and integrations.
    When users repeatedly perform multi-step sequences, Genesis
    crystallizes them into first-class tools. It's how the Heady
    ecosystem grows organically вЂ” like a living system.

  tools:
    - name: heady_genesis_observe
      description: "Analyze usage patterns to identify candidates for new tool generation"
      input:
        lookback: { type: string, default: "7d" }
        min_frequency: { type: number, default: 5, description: "Minimum pattern occurrences" }
        min_steps: { type: number, default: 3, description: "Minimum steps in sequence" }

    - name: heady_genesis_propose
      description: "Generate a new MCP tool specification from observed patterns"
      input:
        pattern_id: { type: string, required: true }
        name_hint: { type: string, description: "Suggested name for the new tool" }
        auto_implement: { type: boolean, default: false }

    - name: heady_genesis_scaffold
      description: "Scaffold a complete new MCP server from a spec вЂ” Sacred Geometry compliant"
      input:
        spec: { type: object, required: true, description: "Tool specification object" }
        template: { type: string, enum: [minimal, standard, full], default: standard }
        deploy_target: { type: string, enum: [cloud-run, cloudflare-workers, docker], default: cloud-run }

    - name: heady_genesis_evolve
      description: "Evolve an existing tool вЂ” add parameters, optimize, or split into sub-tools"
      input:
        tool_name: { type: string, required: true }
        evolution_type: { type: string, enum: [extend, optimize, split, merge], required: true }
        suggestion: { type: string, description: "Natural language evolution guidance" }

  resources:
    - uri: "heady://genesis/patterns"
      description: "Detected usage patterns awaiting crystallization"
    - uri: "heady://genesis/proposals"
      description: "Proposed new tools pending approval"
    - uri: "heady://genesis/lineage"
      description: "Tool evolution history вЂ” which tools spawned from which patterns"

  dependencies:
    - heady-conductor
    - heady-distiller
    - heady-patterns
    - template-mcp-server

