heady-spectrum:
  name: "HeadySpectrum"
  tagline: "See what others overlook. Understand what others can't."
  port: 3378
  category: ai
  sacred_geometry_position: "outer_ring"
  description: |
    Vision and multimodal processing engine. Analyzes images,
    screenshots, diagrams, and visual artifacts. Powers visual
    regression testing, UI consistency checking against Sacred
    Geometry standards, and screenshot-to-code generation.

  tools:
    - name: heady_spectrum_analyze
      description: "Deep analysis of images вЂ” detect objects, read text, understand layouts"
      input:
        image_url: { type: string, required: true }
        analysis_type: { type: string, enum: [general, ui, diagram, document, code], default: general }
        extract_text: { type: boolean, default: true }

    - name: heady_spectrum_diff
      description: "Visual diff between two images вЂ” pixel-perfect regression testing"
      input:
        image_a: { type: string, required: true }
        image_b: { type: string, required: true }
        sensitivity: { type: number, default: 0.618, description: "Diff sensitivity threshold" }
        highlight_mode: { type: string, enum: [overlay, side_by_side, heatmap], default: heatmap }

    - name: heady_spectrum_generate
      description: "Generate code from visual input вЂ” screenshot to Sacred Geometry components"
      input:
        image_url: { type: string, required: true }
        target_framework: { type: string, enum: [react, html, tailwind, sacred_geometry_sdk], default: sacred_geometry_sdk }
        include_animations: { type: boolean, default: true }

    - name: heady_spectrum_audit
      description: "Audit UI against Sacred Geometry design system вЂ” spacing, ratios, organic curves"
      input:
        image_url: { type: string, required: true }
        rules: { type: array, items: { type: string }, default: ["phi_spacing", "golden_ratio", "organic_curves", "breathing_rhythm"] }
        strict: { type: boolean, default: false }

  resources:
    - uri: "heady://spectrum/gallery"
      description: "Processed image gallery with analysis metadata"
    - uri: "heady://spectrum/design_system"
      description: "Sacred Geometry design tokens and visual rules"

  dependencies:
    - heady-sacred-geometry-sdk
    - heady-memory
    - heady-gateway

