heady-nexus:
  name: "HeadyNexus"
  tagline: "Where minds converge. Where ideas multiply."
  port: 3377
  category: ui
  sacred_geometry_position: "middle_ring"
  description: |
    Real-time collaboration engine powered by CRDTs and presence
    awareness. Enables multiplayer editing, shared agent sessions,
    and collaborative problem-solving. Every cursor is a presence,
    every edit a vector in shared space.

  tools:
    - name: heady_nexus_create_room
