        name: { type: string, required: true }
        type: { type: string, enum: [code, document, canvas, agent_session, whiteboard], required: true }
        max_participants: { type: number, default: 13 }
        ai_copilot: { type: boolean, default: true }

    - name: heady_nexus_broadcast
      description: "Broadcast a message or state change to all room participants"
      input:
        room_id: { type: string, required: true }
        message: { type: string, required: true }
        type: { type: string, enum: [chat, state_update, cursor, annotation], default: chat }

    - name: heady_nexus_presence
      description: "Get real-time presence information вЂ” who's where, doing what"
      input:
        scope: { type: string, enum: [room, service, global], default: room }
        room_id: { type: string, description: "Required if scope is 'room'" }

    - name: heady_nexus_merge
      description: "Merge divergent CRDT states with conflict resolution"
      input:
        room_id: { type: string, required: true }
        strategy: { type: string, enum: [last_write_wins, semantic_merge, vote, ai_resolve], default: semantic_merge }

  resources:
