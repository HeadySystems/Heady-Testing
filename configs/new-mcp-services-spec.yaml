heady-forge:
  name: "HeadyForge"
  tagline: "Shape intent into action. Forge workflows from thought."
  port: 3376
  category: orchestration
  sacred_geometry_position: "middle_ring"
  description: |
    Visual DAG-based workflow engine that lets users and agents build
    complex automation chains across the Heady ecosystem. Think
    Zapier meets Sacred Geometry вЂ” trigger chains that fan out through
    bees, converge through quality gates, and self-optimize over time.

  tools:
    - name: heady_forge_create
      description: "Create a workflow DAG from natural language description"
      input:
        description: { type: string, required: true }
        trigger: { type: string, enum: [manual, cron, webhook, event, emotion], required: true }
        cron_expression: { type: string, description: "Required if trigger is 'cron'" }

    - name: heady_forge_execute
      description: "Execute a workflow вЂ” fan out through bees, converge through gates"
      input:
        workflow_id: { type: string, required: true }
        input_data: { type: object, default: {} }
        dry_run: { type: boolean, default: false }

    - name: heady_forge_optimize
      description: "Analyze workflow execution history and suggest phi-optimized improvements"
      input:
        workflow_id: { type: string, required: true }
        optimization_target: { type: string, enum: [speed, cost, reliability, all], default: all }

    - name: heady_forge_compose
      description: "Compose multiple workflows into a meta-workflow with conditional branching"
      input:
        workflow_ids: { type: array, items: { type: string }, required: true }
        composition_mode: { type: string, enum: [sequential, parallel, conditional], default: conditional }
        condition: { type: string, description: "Natural language condition for branching" }

  resources:
    - uri: "heady://forge/workflows"
      description: "Active workflow registry with execution statistics"
    - uri: "heady://forge/templates"
      description: "Pre-built workflow templates for common patterns"

  dependencies:
    - heady-conductor
    - heady-gateway
    - hc-supervisor

