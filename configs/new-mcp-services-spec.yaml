heady-pulse:
  name: "HeadyPulse"
  tagline: "Feel the frequency. Respond with resonance."
  port: 3375
  category: ai
  sacred_geometry_position: "outer_ring"
  description: |
    Affective computing layer that reads emotional undertones in user
    interactions and system behaviors. Enables empathetic response
    tuning, frustration detection, satisfaction scoring, and
    mood-aware UI adaptation. Core to HeadyConnection's mission
    of human-centered technology.

  tools:
    - name: heady_pulse_analyze
      description: "Detect emotional tone, frustration signals, and satisfaction markers in text"
      input:
        text: { type: string, required: true }
        context: { type: string, default: "", description: "Prior conversation context" }
        granularity: { type: string, enum: [coarse, fine, dimensional], default: fine }

    - name: heady_pulse_adapt
      description: "Get response strategy recommendations based on detected emotional state"
      input:
        emotion_vector: { type: object, required: true, description: "Output from pulse_analyze" }
        response_type: { type: string, enum: [text, ui, voice, all], default: text }

    - name: heady_pulse_track
      description: "Track emotional trajectory over a session вЂ” detect escalation or resolution"
      input:
        session_id: { type: string, required: true }
        window: { type: string, default: "30m" }

    - name: heady_pulse_wellbeing
      description: "Aggregate wellbeing score across user base вЂ” community health metric"
      input:
        scope: { type: string, enum: [individual, team, community, global], default: community }
        timeframe: { type: string, default: "24h" }

  resources:
    - uri: "heady://pulse/emotional_map"
      description: "Real-time emotional heatmap across the user base"
    - uri: "heady://pulse/wellbeing"
      description: "Community wellbeing index and trends"

  dependencies:
    - heady-memory
    - heady-buddy
    - heady-persistence

