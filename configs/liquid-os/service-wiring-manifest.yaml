  - step: 12
    services: [heady-lab, heady-sandbox, heady-weaver, heady-tutor]
    delay_ms: 618
    description: "Developer experience tier"

  - step: 13
    services: [heady-bridge, heady-nexus, heady-canvas, heady-muse]
    delay_ms: 618
    description: "Integration and creative tier"

  - step: 14
    services: [heady-anchor, heady-rosetta, heady-mirror, heady-apex]
    delay_ms: 618
    description: "Specialized services tier"

  - step: 15
    services: [heady-archive, heady-doc-gen, heady-cron, heady-nexus-graph]
    delay_ms: 618
    description: "Support services tier"

  - step: 16
    services: [auto-success-engine]
    delay_ms: 4236  # φ² × 1618
    description: "Auto-Success — begins 29,034ms heartbeat cycle"


# ═══════════════════════════════════════════════════════════════════════
# DATA FLOW TOPOLOGY — THE LIQUID OS NERVOUS SYSTEM
# ═══════════════════════════════════════════════════════════════════════

data_flows:
  user_request:
    description: "Complete path of a user request through the Liquid OS"
    path: |
      User → Gateway → Shield (security pre-flight)
           → Manager → AutoContext (5-pass enrichment)
           → Conductor (CSL-scored routing)
           → Brain → [Synapse | Cortex | Battle] (intelligence)
           → Bees (execution) → Gate (quality gate)
           → Pulse (emotion detection) → Persona (personalization)
           → Rosetta (translation if needed)
           → Echo (voice synthesis if needed)
           → Response → Stream (event publish)
           → Memory (index result) → Chrono (temporal record)
           → Oracle (graph update) → Narrator (narrative)

  memory_lifecycle:
    description: "How memories flow through the 3-tier system"
    path: |
      New Data → T0 (working memory, session-bound)
             → Consolidation Engine (φ-scored evaluation)
             → T1 (short-term, 47h TTL, pgvector HNSW)
             → Consolidation Engine (access_freq × reinforcement × importance)
             → T2 (long-term, partitioned: hot/warm/cold/archive)
             → Archive (compressed cold storage, 377d retention)
             → Oracle (graph relationships extracted)
             → Chrono (temporal patterns recorded)

  security_perimeter:
    description: "How security is enforced at every layer"
    path: |
      External → Shield (WAF, rate limit, bot detection)
             → Gateway (auth, CORS, TLS)
             → Vault (secret retrieval, lease-based)
             → Soul (ethical gate, HALT authority)
             → Anchor (compliance check)
             → Guard (input validation)
             → [Execution] → Anchor (output compliance)
             → Shield (response sanitization)

  observability_loop:
    description: "How the system watches itself"
    path: |
      All Services → Stream (metrics/events/logs)
                   → LensDeep (anomaly detection)
                   → Chrono (temporal correlation)
                   → Cost (spending tracking)
                   → Narrator (human narrative)
                   → Relay (alert delivery)
                   → Memory (pattern storage)
                   → Patterns (anti-regression)
                   → Gate (threshold tuning)

  evolution_cycle:
    description: "How the system evolves itself"
    path: |
      Usage Patterns → Genesis (observation)
                     → Cortex (analysis)
                     → Prism (multi-perspective evaluation)
                     → Mirror (simulation)
                     → Gate (approval)
                     → Weaver (code generation)
                     → Sandbox (testing)
                     → Lab (experiment)
                     → Cron (progressive rollout)
                     → LensDeep (monitoring)
                     → Memory (learnings recorded)
