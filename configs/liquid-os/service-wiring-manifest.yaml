  - step: 9
    services: [heady-buddy, heady-pulse, heady-echo, heady-persona]
    delay_ms: 1000
    description: "User-facing tier"

  - step: 10
    services: [heady-forge, heady-saga, heady-gate, heady-genesis]
    delay_ms: 618
    description: "Automation tier"

  - step: 11
    services: [heady-lens-deep, heady-cost, heady-narrator, heady-relay]
    delay_ms: 618
