# ═══════════════════════════════════════════════════════════════════════════════
# Heady™ System Configuration — configs/system.yaml
# ═══════════════════════════════════════════════════════════════════════════════
#
# Single source of truth for all system-wide configuration.
# All constants derive from φ (1.618) and Fibonacci sequences.
#
# © HeadySystems Inc.

version: "3.2.2"
codename: "Aether"

# ─── Runtime ──────────────────────────────────────────────────────────────────

runtime:
  nodeVersion: ">=20"
  entryPoint: "heady-manager.js"
  port: 3301
  host: "0.0.0.0"
  environment: "${HEADY_ENV:-production}"
  timezone: "UTC"
  maxOldSpace: 512       # MB — V8 heap limit

# ─── Phi Constants ────────────────────────────────────────────────────────────

phi:
  ratio: 1.6180339887
  conjugate: 0.6180339887  # ψ = 1/φ
  squared: 2.6180339887
  cubed: 4.2360679775

# ─── CSL Thresholds ──────────────────────────────────────────────────────────

csl:
  thresholds:
    minimum: 0.500     # Noise floor
    low: 0.691         # Weak alignment
    medium: 0.809      # Moderate alignment
    high: 0.882        # Strong alignment
    critical: 0.927    # Near-certain
    dedup: 0.955       # Semantic identity
    identity: 0.972    # Near-identical
  temperature:
    default: 0.236     # ψ³
    min: 0.090         # ψ⁵
    max: 0.618         # ψ

# ─── Pool Scheduling ─────────────────────────────────────────────────────────

pools:
  hot:
    resourcePct: 34
    maxConcurrency: 21
    timeoutMs: 5000
    purpose: "User-facing, latency-critical"
  warm:
    resourcePct: 21
    maxConcurrency: 13
    timeoutMs: 30000
    purpose: "Background processing"
  cold:
    resourcePct: 13
    maxConcurrency: 8
    timeoutMs: 120000
    purpose: "Ingestion, analytics, batch"
  reserve:
    resourcePct: 8
    maxConcurrency: 5
    timeoutMs: 60000
    purpose: "Burst capacity"
  governance:
    resourcePct: 5
    maxConcurrency: 3
    timeoutMs: 10000
    purpose: "Health, audit, compliance"

# ─── Resilience ───────────────────────────────────────────────────────────────

resilience:
  circuitBreaker:
    failureThreshold: 5      # fib(5)
    successThreshold: 3      # fib(4)
    resetTimeoutMs: 5000
    volumeThreshold: 13      # fib(7)
    errorRateThreshold: 0.618
    halfOpenMax: 3

  backoff:
    baseMs: 1000
    maxMs: 60000
    jitter: true             # ±ψ² (±38.2%)

  bulkhead:
    maxConcurrent: 21        # fib(8)
    maxQueue: 233            # fib(13)
    queueTimeoutMs: 30000

# ─── Memory ───────────────────────────────────────────────────────────────────

memory:
  vectorDimensions: 384
  ramCapacity: 6765          # fib(20) entries
  embeddingCache: 6765       # fib(20)
  cacheTTLMs: 3600000        # 1 hour
  evictionWeights:
    importance: 0.486
    recency: 0.300
    relevance: 0.214
  persistence:
    driver: "pgvector"
    hnswM: 21                # fib(8)
    hnswEfConstruction: 144  # fib(12)
    hnswEfSearch: 89         # fib(11)

# ─── Context Window ──────────────────────────────────────────────────────────

context:
  tokenBudgets:
    working: 8192
    session: 21450           # base × φ²
    memory: 56131            # base × φ⁴
    artifacts: 146920        # base × φ⁶
  compressionRatio: 0.618    # ψ

# ─── Observability ────────────────────────────────────────────────────────────

observability:
  logger:
    level: "INFO"
    ringBufferSize: 1597     # fib(17)
    format: "json"

  health:
    checkIntervalMs: 4236    # φ³ × 1000
    checkTimeoutMs: 5000
    autoCheck: true

  coherence:
    monitorIntervalMs: 6854  # φ⁴ × 1000
    driftThreshold: 0.809    # CSL MEDIUM
    historySize: 55          # fib(10)

# ─── Bee Workers ──────────────────────────────────────────────────────────────

bees:
  maxConcurrent: 21          # fib(8)
  maxQueueDepth: 233         # fib(13)
  timeoutMs: 34000           # fib(9) × 1000
  maxRetries: 5              # fib(5)
  healthCheckIntervalMs: 13000  # fib(7) × 1000
  registryCapacity: 55       # fib(10)

# ─── Backpressure ─────────────────────────────────────────────────────────────

backpressure:
  maxQueueSize: 377          # fib(14)
  dedupThreshold: 0.955      # CSL DEDUP
  windowMs: 34000            # fib(9) × 1000
  acceptanceMultiplier: 1.618  # φ
  pressureLevels:
    nominal: [0, 0.382]
    elevated: [0.382, 0.618]
    high: [0.618, 0.854]
    critical: [0.910, 1.0]

# ─── Security ─────────────────────────────────────────────────────────────────

security:
  jwt:
    algorithm: "ES256"
    expiryMs: 3600000        # 1 hour
    refreshWindowMs: 900000  # 15 minutes before expiry
  rateLimit:
    windowMs: 60000
    maxRequests: 89          # fib(11) per minute
    burstMax: 13             # fib(7)
  cors:
    allowedOrigins:
      - "https://headyme.com"
      - "https://headysystems.com"
      - "https://headyconnection.org"
      - "https://headybuddy.org"
      - "https://headymcp.com"
      - "https://headyio.com"
      - "https://headybot.com"
      - "https://headyapi.com"
      - "https://heady-ai.com"
    methods: ["GET", "POST", "PUT", "DELETE", "OPTIONS"]
    credentials: true

# ─── Conductor ────────────────────────────────────────────────────────────────

conductor:
  maxConcurrent: 34          # fib(9)
  maxQueueSize: 377          # fib(14)
  defaultMaxRetries: 3       # fib(4)

# ─── Shutdown ─────────────────────────────────────────────────────────────────

shutdown:
  timeoutMs: 34000           # fib(9) × 1000
  signalHandlers: ["SIGTERM", "SIGINT"]
