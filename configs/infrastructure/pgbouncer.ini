# PgBouncer Configuration for Heady pgvector workloads (E11)
# Transaction pooling for high-concurrency vector search

[databases]
heady_production = host=127.0.0.1 port=5432 dbname=heady_production

[pgbouncer]
listen_addr = 0.0.0.0
listen_port = 6432
auth_type = md5
auth_file = /etc/pgbouncer/userlist.txt

# Transaction mode — optimal for vector similarity queries (single-statement)
pool_mode = transaction

# Pool sizing
default_pool_size = 25
min_pool_size = 5
reserve_pool_size = 5
reserve_pool_timeout = 3

# Connection limits
max_client_conn = 5000
max_db_connections = 100

# Timeouts
server_idle_timeout = 600
client_idle_timeout = 300
query_timeout = 30
query_wait_timeout = 120

# Logging
log_connections = 1
log_disconnections = 1
log_pooler_errors = 1
stats_period = 60

# TLS
client_tls_sslmode = prefer
server_tls_sslmode = require
