# HEADY_BRAND:END
#
# Cloud Run Min-Instances Configuration
# Version: 1.0.0  |  Date: 2026-03-18
#
# PURPOSE: Eliminate cold starts on critical-path services.
# min_instances=1 costs ~$3.24/month per 512MB service (always-allocated CPU).
# Scale-to-zero for all 130+ non-critical services saves 2-5Г— on compute.
#
# Budget impact: 5 services Г— $3.24 = $16.20/month вЂ” eliminates cold starts entirely.
# HeadyMCP cold start currently 1,080ms в†’ target <100ms with min_instances=1.
#
# П†-principle: Only the 5 critical-path services (Fibonacci: fib(5)=5) stay warm.
# All others scale to zero with startup_cpu_boost=true for fast cold starts.
#
# GCP Project: gen-lang-client-0920560496
# Region: us-east1

version: "1.0.0"

# в”Ђв”Ђв”Ђ CRITICAL PATH SERVICES вЂ” min_instances=1 в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
# These 5 services must never cold-start. Cost: 5 Г— $3.24 = $16.20/month.
critical_warm_services:
  - service: heady-mcp-server
    reason: "Primary MCP gateway вЂ” 1,080ms cold start eliminated. Serves all 55 tools."
    gcp_service_name: "heady-mcp-server"
    min_instances: 1
    max_instances: 13           # fib(7) = 13
    concurrency: 80             # I/O-bound: high concurrency
    cpu: "1"
    memory: "512Mi"
    startup_cpu_boost: true
    timeout: 300s
    cold_start_before: "1080ms"
    cold_start_target: "<100ms"

  - service: api-gateway
    reason: "All traffic enters here. Cold start would cascade to all downstream services."
    gcp_service_name: "heady-api-gateway"
    min_instances: 1
    max_instances: 21           # fib(8) = 21
    concurrency: 80
    cpu: "2"
    memory: "1Gi"
    startup_cpu_boost: true
    timeout: 60s

  - service: auth-session
    reason: "Every authenticated request passes through auth. Cold start = auth latency spike."
    gcp_service_name: "heady-auth-session"
    min_instances: 1
    max_instances: 8            # fib(6) = 8
    concurrency: 80
    cpu: "1"
    memory: "512Mi"
    startup_cpu_boost: true
    timeout: 30s

  - service: heady-brain
    reason: "Multi-model router вЂ” warms connections to Claude/GPT/Gemini. Cold start = 3s+ delays."
    gcp_service_name: "heady-brain"
    min_instances: 1
    max_instances: 13           # fib(7) = 13
    concurrency: 8              # CPU-bound: AI inference, lower concurrency
    cpu: "4"
    memory: "2Gi"
    startup_cpu_boost: true
    timeout: 300s

  - service: heady-memory
    reason: "Mnemosyne 3-tier memory вЂ” Redis/pgvector/Qdrant connections must stay warm."
    gcp_service_name: "heady-memory"
    min_instances: 1
    max_instances: 8            # fib(6) = 8
    concurrency: 34             # Mixed I/O + CPU: medium concurrency (fib(9)=34)
    cpu: "2"
    memory: "1Gi"
    startup_cpu_boost: true
    timeout: 120s

# в”Ђв”Ђв”Ђ SCALE-TO-ZERO SERVICES вЂ” all others в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
# All 130+ remaining services scale to zero.
# startup_cpu_boost=true provides faster cold starts at no extra cost.
scale_to_zero_policy:
  default_min_instances: 0
  startup_cpu_boost: true       # Free вЂ” boosts cold start by ~50%
  max_instances: 5              # fib(5)=5 default max; critical services override above
  concurrency: 80               # I/O-bound default
  timeout: 300s

  # Services that should NOT scale to zero (override above)
  exceptions: []                # Handled by critical_warm_services above

# в”Ђв”Ђв”Ђ COST MODEL в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
cost_model:
  region: "us-east1"
  # Always-on instance cost (CPU always allocated even at 0 requests)
  per_warm_instance_monthly_usd:
    "512Mi_1cpu":  3.24
    "1Gi_1cpu":    5.18
    "1Gi_2cpu":    8.64
    "2Gi_4cpu":   24.48

  # These 5 services warm = $16.20-$46.50/month depending on tier
  critical_services_monthly_estimate_usd:
    low:  16.20   # All 512Mi/1cpu
    high: 46.50   # Actual mix above

  # Scale-to-zero saves vs. all-warm estimate
  savings_vs_all_warm_pct: 85

# в”Ђв”Ђв”Ђ DEPLOYMENT COMMANDS в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
# Apply with: gcloud run services update <service> --min-instances=1 ...
deployment:
  project: "gen-lang-client-0920560496"
  region: "us-east1"

  commands:
    - description: "Set min-instances on MCP server"
      cmd: >
        gcloud run services update heady-mcp-server
        --min-instances=1 --max-instances=13
        --concurrency=80 --cpu=1 --memory=512Mi
        --region=us-east1 --project=gen-lang-client-0920560496

    - description: "Set min-instances on API gateway"
      cmd: >
        gcloud run services update heady-api-gateway
        --min-instances=1 --max-instances=21
        --concurrency=80 --cpu=2 --memory=1Gi
        --region=us-east1 --project=gen-lang-client-0920560496

    - description: "Set min-instances on auth-session"
      cmd: >
        gcloud run services update heady-auth-session
        --min-instances=1 --max-instances=8
        --concurrency=80 --cpu=1 --memory=512Mi
        --region=us-east1 --project=gen-lang-client-0920560496

    - description: "Set min-instances on heady-brain"
      cmd: >
        gcloud run services update heady-brain
        --min-instances=1 --max-instances=13
        --concurrency=8 --cpu=4 --memory=2Gi
        --region=us-east1 --project=gen-lang-client-0920560496

    - description: "Set min-instances on heady-memory"
      cmd: >
        gcloud run services update heady-memory
        --min-instances=1 --max-instances=8
        --concurrency=34 --cpu=2 --memory=1Gi
        --region=us-east1 --project=gen-lang-client-0920560496
