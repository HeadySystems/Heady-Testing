# ═══════════════════════════════════════════════════════════════════════
# HEADY SYSTEMS LiteLLM Router — Multi-Provider AI Gateway
# Updated: 2026-03-06 | All providers verified
# ═══════════════════════════════════════════════════════════════════════

model_list:
  # ─── TIER 1: GPT-5.4 (Latest OpenAI) ──────────────────────────────
  - model_name: "heady-logic-v1"
    litellm_params:
      model: "openai/gpt-5.4"
      api_key: "os.environ/OPENAI_API_KEY"
      metadata: { source: "openai-gpt54", tier: 1 }

  - model_name: "gpt-5.4"
    litellm_params:
      model: "openai/gpt-5.4"
      api_key: "os.environ/OPENAI_API_KEY"
      metadata: { source: "openai-direct" }

  - model_name: "gpt-4o"
    litellm_params:
      model: "openai/gpt-4o"
      api_key: "os.environ/OPENAI_API_KEY"
      metadata: { source: "openai-4o" }

  # ─── TIER 2: Gemini (Google — verified ✅) ─────────────────────────
  - model_name: "heady-logic-v1"
    litellm_params:
      model: "gemini/gemini-2.0-flash"
      api_key: "os.environ/GEMINI_API_KEY"
      metadata: { source: "gemini-flash", tier: 2 }

  - model_name: "gemini-pro"
    litellm_params:
      model: "gemini/gemini-2.0-pro-exp-02-05"
      api_key: "os.environ/GEMINI_API_KEY"
      metadata: { source: "gemini-pro" }

  - model_name: "gemini-flash"
    litellm_params:
      model: "gemini/gemini-2.0-flash"
      api_key: "os.environ/GEMINI_API_KEY"
      metadata: { source: "gemini-flash" }

  # ─── TIER 3: Groq (Ultra-fast — verified ✅) ──────────────────────
  - model_name: "heady-logic-v1"
    litellm_params:
      model: "groq/llama-3.3-70b-versatile"
      api_key: "os.environ/GROQ_API_KEY"
      metadata: { source: "groq-llama33", tier: 3 }

  - model_name: "groq-fast"
    litellm_params:
      model: "groq/llama-3.3-70b-versatile"
      api_key: "os.environ/GROQ_API_KEY"
      metadata: { source: "groq-fast" }

  - model_name: "groq-small"
    litellm_params:
      model: "groq/llama-3.1-8b-instant"
      api_key: "os.environ/GROQ_API_KEY"
      metadata: { source: "groq-instant" }

  # ─── TIER 4: Claude (Anthropic — key valid, needs credits) ────────
  - model_name: "claude"
    litellm_params:
      model: "anthropic/claude-sonnet-4-20250514"
      api_key: "os.environ/CLAUDE_API_KEY"
      metadata: { source: "anthropic-sonnet4" }

  - model_name: "claude-haiku"
    litellm_params:
      model: "anthropic/claude-3-5-haiku-20241022"
      api_key: "os.environ/CLAUDE_API_KEY"
      metadata: { source: "anthropic-haiku" }

  # ─── PERPLEXITY (Research/Search — verified ✅) ────────────────────
  - model_name: "perplexity-research"
    litellm_params:
      model: "perplexity/sonar-pro"
      api_key: "os.environ/PERPLEXITY_API_KEY"
      metadata: { source: "perplexity-sonar-pro" }

  - model_name: "perplexity-quick"
    litellm_params:
      model: "perplexity/sonar"
      api_key: "os.environ/PERPLEXITY_API_KEY"
      metadata: { source: "perplexity-sonar" }

  # ─── HUGGING FACE (Embeddings — verified ✅) ──────────────────────
  - model_name: "hf-embed"
    litellm_params:
      model: "huggingface/sentence-transformers/all-MiniLM-L6-v2"
      api_key: "os.environ/HF_TOKEN"
      metadata: { source: "hf-embeddings" }

router_settings:
  routing_strategy: "latency-based-routing"
  # Upstash Redis for routing state (created 2026-03-06)
  redis_host: "finer-sole-64861.upstash.io"
  redis_port: 6379
  redis_password: "os.environ/UPSTASH_REDIS_PASSWORD"
  redis_ssl: true
  timeout: 10       # failover after 10s
  num_retries: 2    # retry twice before failover
  fallbacks:
    - heady-logic-v1: ["gemini-flash", "groq-fast"]
    - gpt-5.4: ["gemini-pro", "groq-fast"]
    - claude: ["gemini-pro", "gpt-5.4"]

general_settings:
  master_key: "os.environ/HEADY_API_KEY"
  max_budget: 100       # $100/month default budget
  budget_duration: "monthly"
