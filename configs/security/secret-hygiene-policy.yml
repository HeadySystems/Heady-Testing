version: 2
# Updated: 2026-03-18 — Expanded per security audit findings
policy:
  forbidden_patterns:
    - "BEGIN PRIVATE KEY"
    - "AKIA[0-9A-Z]{16}"
    - "-----BEGIN RSA PRIVATE KEY-----"
    - "-----BEGIN EC PRIVATE KEY-----"
    - "-----BEGIN OPENSSH PRIVATE KEY-----"
    - "xoxb-"
    - "xapp-"
    - "sk_live_"
    - "pk_live_"
    - "ghp_[A-Za-z0-9_]{36}"
    - "gho_[A-Za-z0-9_]{36}"
    - "AIza[0-9A-Za-z-_]{35}"
    - "sk-[A-Za-z0-9]{48}"
    - "sk-ant-[A-Za-z0-9-_]{90}"
  forbidden_paths:
    - "configs/nginx/ssl/*.key"
    - "configs/nginx/ssl/*.pem"
    - "configs/nginx/ssl/*.pfx"
    - "configs/nginx/ssl/*.p12"
    - "_archive/configs/nginx/ssl/*.key"
    - "_archive/configs/nginx/ssl/*.pem"
    - "*.exe"
    - "env.local"
    - "env.production"
  forbidden_extensions:
    - ".exe"
    - ".dll"
    - ".so"
    - ".dylib"
    - ".pem"
    - ".key"
    - ".pfx"
    - ".p12"
    - ".jks"
  required_templates:
    - "configs/nginx/ssl/README.md"
  ci:
    fail_on_detection: true
    allow_examples_only_in:
      - "docs/"
      - "examples/"
      - ".env.example"
      - ".env.template"
    pre_commit_hook: true
    block_on_binary_commit: true
