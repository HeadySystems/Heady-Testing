version: 1
protectedActions:
  - deploy
  - delete
  - rotate_secrets
  - publish_public_content
  - create_external_write
approvals:
  requiredFor:
    - deploy
    - public_post
    - delete
identity:
  serviceTokens: ed25519
  userEdgeAuth: cloudflare-access
  sessionProof: jwt
audit:
  logFormat: jsonl
  retentionDays: 89
  tamperChain: sha256_prev_hash
