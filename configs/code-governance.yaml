blocked_gateways:
  - id: cursor
    vendor: Anysphere
    reason: Third-party IDE agent — requires owner approval
    can_be_approved: true
    approval_method: owner-explicit-command
  - id: github-copilot
    vendor: GitHub/Microsoft
    reason: Third-party AI agent — requires owner approval
    can_be_approved: true
    approval_method: owner-explicit-command
  - id: windsurf
    vendor: Codeium
    reason: Third-party IDE agent — requires owner approval
    can_be_approved: true
    approval_method: owner-explicit-command
auth_gate:
  require_signed_commits: true
  block_unknown_emails: true
  require_dev_token: true
  auto_approve_owners: true
  audit_all_attempts: true
  audit_log: data/code-governance-audit.jsonl
  max_files_per_commit: 50
  protected_paths:
    - configs/code-governance.yaml
    - configs/users/user-secrets.yaml
    - configs/governance-policies.yaml
    - .husky/pre-commit
    - .github/workflows/*.yml
    - Dockerfile
    - .gcloudignore
    - ecosystem.config.cjs
approval_workflow:
  steps:
    - owner_says: approve <agent-id> as dev connection
    - system_adds_to: approved_agents
    - system_issues: temporary RBAC token via rbac-vendor.js
    - token_ttl: 3600000
    - audit_logged: true
  revoke_steps:
    - owner_says: revoke <agent-id>
    - system_removes_from: approved_agents
    - system_invalidates: all active tokens for agent
