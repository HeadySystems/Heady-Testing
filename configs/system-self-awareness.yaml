version: 1
driftSignals:
  - latency_spike
  - error_rate
  - dependency_failure
  - memory_staleness
  - budget_pressure
  - config_drift
stateMachine:
  healthy: [suspect]
  suspect: [quarantined, recovering]
  quarantined: [recovering]
  recovering: [healthy, quarantined]
restoreRequirements:
  attestation: true
  smokeTest: true
  dependencyCheck: true
