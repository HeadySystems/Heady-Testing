apiVersion: heady.systems/v1
kind: ServiceRegistry
metadata:
  name: heady-pilot-services
  version: 3.2.0-orion
  updated: 2026-03-07T12:34:00-07:00
spec:
  services:
    # API Gateway - PRIMARY ENTRY POINT
    # PENDING: service not yet implemented
    - name: heady-api-gateway
      version: 3.2.0
      replicas: 3
      resources:
        cpu: 2000m
        memory: 4Gi
      domains:
        - headyapi.com
        - api.headyapi.com
        - gateway.headyapi.com
        - pilot.headyapi.com
      healthCheck:
        path: /health
        interval: 30s
        timeout: 5s

    # Cloud Orchestration
    # PENDING: service not yet implemented
    - name: heady-cloud-orchestrator
      version: 3.2.0
      replicas: 3
      resources:
        cpu: 2000m
        memory: 4Gi
      domains:
        - headycloud.com
        - orchestrator.headycloud.com
        - deploy.headycloud.com
        - console.headycloud.com
      healthCheck:
        path: /health
        interval: 30s
        timeout: 5s

    # AI Model Router
    # PENDING: service not yet implemented
    - name: heady-ai-router
      version: 3.2.0
      replicas: 2
      resources:
        cpu: 4000m
        memory: 8Gi
        gpu: 1
      domains:
        - heady-ai.com
        - router.heady-ai.com
        - inference.heady-ai.com
        - models.heady-ai.com
      healthCheck:
        path: /health
        interval: 30s
        timeout: 5s

    # OS Runtime Layer
    # PENDING: service not yet implemented
    - name: heady-os-kernel
      version: 3.2.0
      replicas: 2
      resources:
        cpu: 2000m
        memory: 4Gi
      domains:
        - headyos.com
        - kernel.headyos.com
        - runtime.headyos.com
        - scheduler.headyos.com
      healthCheck:
        path: /health
        interval: 30s
        timeout: 5s

    # MCP Protocol Server
    - name: heady-mcp-server
      version: 3.2.0
      replicas: 2
      resources:
        cpu: 1000m
        memory: 2Gi
      domains:
        - headymcp.com
        - server.headymcp.com
      healthCheck:
        path: /health
        interval: 30s
        timeout: 5s

    # Conductor (Auto-Success Engine)
    - name: heady-conductor
      version: 3.2.0
      replicas: 2
      resources:
        cpu: 1000m
        memory: 2Gi
      healthCheck:
        path: /health
        interval: 30s
        timeout: 5s

    # HeadyMe User Dashboard
    # PENDING: service not yet implemented
    - name: heady-me-web
      version: 3.2.0
      replicas: 2
      resources:
        cpu: 1000m
        memory: 2Gi
      domains:
        - headyme.com
        - pilot.headyme.com
        - dashboard.headyme.com
      healthCheck:
        path: /health
        interval: 30s
        timeout: 5s

    # HeadyBuddy AI Assistant
    - name: heady-buddy
      version: 3.2.0
      replicas: 2
      domains:
        - headybuddy.org
      healthCheck:
        path: /health
        interval: 30s
        timeout: 5s

    # Developer Platform
    # PENDING: service not yet implemented
    - name: heady-io
      version: 3.2.0
      replicas: 2
      domains:
        - headyio.com
        - docs.headyio.com
        - sandbox.headyio.com
      healthCheck:
        path: /health
        interval: 30s
        timeout: 5s

    # Systems Hub
    # PENDING: service not yet implemented
    - name: heady-systems-hub
      version: 3.2.0
      replicas: 2
      domains:
        - headysystems.com
        - status.headysystems.com
      healthCheck:
        path: /health
        interval: 30s
        timeout: 5s

    # Community Platform
    # PENDING: service not yet implemented
    - name: heady-connection
      version: 3.2.0
      replicas: 2
      domains:
        - headyconnection.org
        - community.headyconnection.org
      healthCheck:
        path: /health
        interval: 30s
        timeout: 5s

    # Automation Bot
    # PENDING: service not yet implemented
    - name: heady-bot
      version: 3.2.0
      replicas: 1
      domains:
        - headybot.com
      healthCheck:
        path: /health
        interval: 30s
        timeout: 5s

    # Memory Service — vector search and upsert
    - name: heady-memory
      version: 3.2.0
      replicas: 1
      healthCheck:
        path: /health
        interval: 30s
        timeout: 5s

  remotes:
    - name: headyCloudUI
      url: https://console.headycloud.com/remoteEntry.js
      version: 3.2.0
    - name: headyMcpUI
      url: https://server.headymcp.com/remoteEntry.js
      version: 3.2.0
    - name: headyBuddyUI
      url: https://headybuddy.org/remoteEntry.js
      version: 3.2.0
    - name: headyAiUI
      url: https://heady-ai.com/remoteEntry.js
      version: 3.2.0
    - name: headyOsUI
      url: https://headyos.com/remoteEntry.js
      version: 3.2.0
    - name: headyIoUI
      url: https://headyio.com/remoteEntry.js
      version: 3.2.0
