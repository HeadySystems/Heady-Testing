# ═══ Routing Configuration ═══════════════════════════════════════════
routing:
  strategy: csl-weighted
  fallback: round-robin
  healthCheck:
    interval: 30s
    timeout: 5s
    unhealthyThreshold: 3
    healthyThreshold: 2
  circuitBreaker:
    threshold: 5
    timeout: 60s
    halfOpenRequests: 3
  retryPolicy:
    maxRetries: 3
    backoffMultiplier: 1.618  # φ
    initialDelay: 100ms
    maxDelay: 5000ms

# ═══ Observability ═══════════════════════════════════════════════════
observability:
  metrics:
    enabled: true
    port: 9090
    path: /metrics
  tracing:
    enabled: true
    sampler: 0.618  # ψ sampling rate
    exporter: otlp
  logging:
    level: info
    format: json
    correlationId: true
