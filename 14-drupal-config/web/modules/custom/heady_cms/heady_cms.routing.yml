# Heady™ Headless CMS Routes
# JSON:API endpoints for all 47 sites + task browser + liquid nodes

# ── Content Delivery API ────────────────────────────────────────────
heady_cms.api_content:
  path: '/api/cms/content/{site}'
  defaults:
    _controller: '\Drupal\heady_cms\Controller\ContentApiController::getSiteContent'
    _title: 'Site Content API'
  requirements:
    _permission: 'access content'
    _method: 'GET'

heady_cms.api_content_update:
  path: '/api/cms/content/{site}'
  defaults:
    _controller: '\Drupal\heady_cms\Controller\ContentApiController::updateSiteContent'
    _title: 'Update Site Content'
  requirements:
    _permission: 'edit any page content'
    _method: 'POST|PUT|PATCH'

heady_cms.api_sites:
  path: '/api/cms/sites'
  defaults:
    _controller: '\Drupal\heady_cms\Controller\ContentApiController::listSites'
    _title: 'All Sites'
  requirements:
    _permission: 'access content'
    _method: 'GET'

heady_cms.api_site_deploy:
  path: '/api/cms/sites/{site}/deploy'
  defaults:
    _controller: '\Drupal\heady_cms\Controller\ContentApiController::deploySite'
    _title: 'Deploy Site'
  requirements:
    _permission: 'manage heady services'
    _method: 'POST'

# ── Task Browser API ───────────────────────────────────────────────
heady_cms.api_tasks:
  path: '/api/cms/tasks'
  defaults:
    _controller: '\Drupal\heady_cms\Controller\TaskBrowserController::listTasks'
    _title: 'Task Queue'
  requirements:
    _permission: 'view heady dashboard'
    _method: 'GET'

heady_cms.api_task_create:
  path: '/api/cms/tasks'
  defaults:
    _controller: '\Drupal\heady_cms\Controller\TaskBrowserController::createTask'
    _title: 'Create Task'
  requirements:
    _permission: 'manage heady services'
    _method: 'POST'

heady_cms.api_task_action:
  path: '/api/cms/tasks/{task_id}/{action}'
  defaults:
    _controller: '\Drupal\heady_cms\Controller\TaskBrowserController::taskAction'
    _title: 'Task Action'
  requirements:
    _permission: 'manage heady services'
    _method: 'POST'
    action: 'start|pause|cancel|retry|complete'

heady_cms.api_task_browser_run:
  path: '/api/cms/tasks/browser/run'
  defaults:
    _controller: '\Drupal\heady_cms\Controller\TaskBrowserController::runBrowserTask'
    _title: 'Run Browser Task'
  requirements:
    _permission: 'administer heady ecosystem'
    _method: 'POST'

# ── Liquid Nodes API ───────────────────────────────────────────────
heady_cms.api_liquid_nodes:
  path: '/api/cms/liquid/nodes'
  defaults:
    _controller: '\Drupal\heady_cms\Controller\LiquidNodeController::listNodes'
    _title: 'Liquid Nodes'
  requirements:
    _permission: 'view heady dashboard'
    _method: 'GET'

heady_cms.api_liquid_node_health:
  path: '/api/cms/liquid/nodes/{node_id}/health'
  defaults:
    _controller: '\Drupal\heady_cms\Controller\LiquidNodeController::nodeHealth'
    _title: 'Node Health'
  requirements:
    _permission: 'view heady dashboard'
    _method: 'GET'

heady_cms.api_liquid_dispatch:
  path: '/api/cms/liquid/dispatch'
  defaults:
    _controller: '\Drupal\heady_cms\Controller\LiquidNodeController::dispatch'
    _title: 'Dispatch to Liquid Node'
  requirements:
    _permission: 'manage heady services'
    _method: 'POST'

heady_cms.api_liquid_topology:
  path: '/api/cms/liquid/topology'
  defaults:
    _controller: '\Drupal\heady_cms\Controller\LiquidNodeController::topology'
    _title: 'Liquid Topology'
  requirements:
    _permission: 'view heady dashboard'
    _method: 'GET'

# ── Admin UI Pages ─────────────────────────────────────────────────
heady_cms.content_manager:
  path: '/admin/heady/content'
  defaults:
    _controller: '\Drupal\heady_cms\Controller\ContentManagerController::overview'
    _title: 'Content Manager'
  requirements:
    _permission: 'edit any page content'

heady_cms.task_manager:
  path: '/admin/heady/tasks'
  defaults:
    _controller: '\Drupal\heady_cms\Controller\ContentManagerController::tasks'
    _title: 'Task Browser'
  requirements:
    _permission: 'manage heady services'

heady_cms.liquid_dashboard:
  path: '/admin/heady/liquid'
  defaults:
    _controller: '\Drupal\heady_cms\Controller\ContentManagerController::liquidDashboard'
    _title: 'Liquid Latent OS'
  requirements:
    _permission: 'view heady dashboard'

# ── Clipboard API ──────────────────────────────────────────────────
heady_cms.api_clipboard_copy:
  path: '/api/cms/clipboard/{channel}/copy'
  defaults:
    _controller: '\Drupal\heady_cms\Controller\ClipboardController::copy'
    _title: 'Clipboard Copy'
  requirements:
    _permission: 'access heady clipboard'
    _method: 'POST'

heady_cms.api_clipboard_paste:
  path: '/api/cms/clipboard/{channel}/paste'
  defaults:
    _controller: '\Drupal\heady_cms\Controller\ClipboardController::paste'
    _title: 'Clipboard Paste'
  requirements:
    _permission: 'access heady clipboard'
    _method: 'GET'

heady_cms.api_clipboard_list:
  path: '/api/cms/clipboard/{channel}'
  defaults:
    _controller: '\Drupal\heady_cms\Controller\ClipboardController::listItems'
    _title: 'Clipboard Items'
  requirements:
    _permission: 'access heady clipboard'
    _method: 'GET'

heady_cms.api_clipboard_channels:
  path: '/api/cms/clipboard'
  defaults:
    _controller: '\Drupal\heady_cms\Controller\ClipboardController::channels'
    _title: 'Clipboard Channels'
  requirements:
    _permission: 'access heady clipboard'
    _method: 'GET'

heady_cms.api_clipboard_transfer:
  path: '/api/cms/clipboard/transfer'
  defaults:
    _controller: '\Drupal\heady_cms\Controller\ClipboardController::transfer'
    _title: 'Clipboard Transfer'
  requirements:
    _permission: 'access heady clipboard'
    _method: 'POST'

heady_cms.api_clipboard_clear:
  path: '/api/cms/clipboard/{channel}/clear'
  defaults:
    _controller: '\Drupal\heady_cms\Controller\ClipboardController::clear'
    _title: 'Clear Clipboard Channel'
  requirements:
    _permission: 'manage heady clipboard'
    _method: 'DELETE'

# ── Settings ───────────────────────────────────────────────────────
heady_cms.settings:
  path: '/admin/heady/cms/settings'
  defaults:
    _form: '\Drupal\heady_cms\Form\HeadyCmsSettingsForm'
    _title: 'CMS Settings'
  requirements:
    _permission: 'administer heady ecosystem'
