# ═══════════════════════════════════════════════════════════════════
# WIRING — Inter-service Communication Channels
# ═══════════════════════════════════════════════════════════════════
wiring:
  service-mesh:
    description: "Inter-service routing with phi-backoff and CSL-gated health"
    protocol: "http+mcp"
    circuit-breaker:
      failure-threshold: 5
      success-threshold: 3
      half-open-timeout: "30s × φ"
    retry-policy:
      max-retries: 3
      backoff: "PHI^attempt × 1000ms"
      jitter: "±38.2%"

  event-bus:
    description: "Async pub/sub for decoupled communication"
    topics:
      - service.health
      - pipeline.stage.complete
      - bee.spawned
      - bee.completed
      - memory.consolidated
      - deploy.started
      - deploy.completed
      - incident.detected
      - governance.violation

  vector-channel:
    description: "Latent space operations routed through T0/T1/T2"
    tiers:
      t0: { capsules: 21, scope: session }
      t1: { max-vectors: 144000, ttl: "47h", storage: "pgvector-hnsw" }
      t2: { capacity: unlimited, partitions: ["hot", "warm", "cold", "archive"] }

  protocol-bridge:
    description: "Cross-protocol translation"
    supported: ["mcp", "http", "websocket", "grpc", "udp", "mqtt"]

  gossip-protocol:
    description: "Eventually consistent state propagation"
    fanout: 3
    interval: "1s × φ"

  sacred-geometry-topology:
    description: "Phi-optimized node placement"
    rings:
      center: { radius: 0, max-nodes: 1 }
      inner: { radius: φ, max-nodes: 5 }
      middle: { radius: "2φ", max-nodes: 8 }
      outer: { radius: "3φ", max-nodes: 13 }
      governance: { radius: "4φ", max-nodes: 8 }

