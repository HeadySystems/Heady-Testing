version: '3.9'

# Heady™NativeServices — Sacred Geometry Architecture v3.0.0
# PHI = 1.618033988749895
# All services orchestrated with zero external AI dependencies

services:
  # ─── PostgreSQL with pgvector ──────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: heady-postgres
    environment:
      POSTGRES_DB: heady
      POSTGRES_USER: heady
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-heady_sacred_geometry}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./src/services/heady-vector/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U heady"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - heady-net

  # ─── HeadyEmbed — Local Transformer Embeddings ────────────
  heady-embed:
    build:
      context: .
      dockerfile: src/services/heady-embed/Dockerfile
    container_name: heady-embed
    environment:
      HEADY_EMBED_PORT: 3101
      HEADY_EMBED_MODEL: Xenova/all-MiniLM-L6-v2
      HEADY_EMBED_BATCH_SIZE: 32
      HEADY_EMBED_CACHE_SIZE: 10000
    ports:
      - "3101:3101"
    volumes:
      - embed-models:/app/models
      - embed-cache:/app/cache
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3101/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1.618'
    networks:
      - heady-net

  # ─── HeadyInfer — Multi-Model Inference Gateway ───────────
  heady-infer:
    build:
      context: .
      dockerfile: src/services/heady-infer/Dockerfile
    container_name: heady-infer
    environment:
      HEADY_INFER_PORT: 3102
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY}
      GROQ_API_KEY: ${GROQ_API_KEY}
      OLLAMA_BASE_URL: http://ollama:11434
    ports:
      - "3102:3102"
    depends_on:
      ollama:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3102/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.618'
    networks:
      - heady-net

  # ─── HeadyVector — pgvector Search Service ────────────────
  heady-vector:
    build:
      context: .
      dockerfile: src/services/heady-vector/Dockerfile
    container_name: heady-vector
    environment:
      HEADY_VECTOR_PORT: 3103
      DATABASE_URL: postgresql://heady:${POSTGRES_PASSWORD:-heady_sacred_geometry}@postgres:5432/heady
      PG_POOL_SIZE: 20
    ports:
      - "3103:3103"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3103/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
    networks:
      - heady-net

  # ─── HeadyChain — Agent Orchestration Framework ───────────
  heady-chain:
    build:
      context: .
      dockerfile: src/services/heady-chain/Dockerfile
    container_name: heady-chain
    environment:
      HEADY_CHAIN_PORT: 3104
      HEADY_INFER_URL: http://heady-infer:3102
      HEADY_VECTOR_URL: http://heady-vector:3103
      HEADY_EMBED_URL: http://heady-embed:3101
    ports:
      - "3104:3104"
    depends_on:
      - heady-infer
      - heady-vector
      - heady-embed
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3104/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.618'
    networks:
      - heady-net

  # ─── HeadyCache — Semantic Cache ──────────────────────────
  heady-cache:
    build:
      context: .
      dockerfile: src/services/heady-cache/Dockerfile
    container_name: heady-cache
    environment:
      HEADY_CACHE_PORT: 3105
      HEADY_CACHE_BACKEND: memory
      HEADY_CACHE_MAX_SIZE: 50000
      HEADY_CACHE_SIMILARITY_THRESHOLD: 0.95
      HEADY_EMBED_URL: http://heady-embed:3101
    ports:
      - "3105:3105"
    depends_on:
      - heady-embed
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3105/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1.0'
    networks:
      - heady-net

  # ─── HeadyGuard — Prompt Security Pipeline ────────────────
  heady-guard:
    build:
      context: .
      dockerfile: src/services/heady-guard/Dockerfile
    container_name: heady-guard
    environment:
      HEADY_GUARD_PORT: 3106
      HEADY_GUARD_BLOCK_THRESHOLD: 80
      HEADY_GUARD_FLAG_THRESHOLD: 50
      HEADY_GUARD_PII_MODE: redact
    ports:
      - "3106:3106"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3106/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.618'
    networks:
      - heady-net

  # ─── HeadyEval — LLM Evaluation Framework ────────────────
  heady-eval:
    build:
      context: .
      dockerfile: src/services/heady-eval/Dockerfile
    container_name: heady-eval
    environment:
      HEADY_EVAL_PORT: 3107
      HEADY_EVAL_JUDGE_MODEL: claude-3.5-sonnet
      HEADY_EVAL_CONCURRENCY: 5
      HEADY_INFER_URL: http://heady-infer:3102
      HEADY_EMBED_URL: http://heady-embed:3101
      HEADY_GUARD_URL: http://heady-guard:3106
    ports:
      - "3107:3107"
    depends_on:
      - heady-infer
      - heady-embed
      - heady-guard
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3107/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
    networks:
      - heady-net

  # ─── HeadyGateway — Unified API Gateway ───────────────────
  heady-gateway:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: heady-gateway
    environment:
      HEADY_GATEWAY_PORT: 3100
      NODE_ENV: production
    ports:
      - "3100:3100"
    depends_on:
      - heady-embed
      - heady-infer
      - heady-vector
      - heady-chain
      - heady-cache
      - heady-guard
      - heady-eval
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3100/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.618'
    networks:
      - heady-net

  # ─── Ollama — Local LLM Runtime ───────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: heady-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-models:/root/.ollama
    deploy:
      resources:
        limits:
          memory: 8G
    profiles:
      - local-llm
    networks:
      - heady-net

volumes:
  pgdata:
    driver: local
  embed-models:
    driver: local
  embed-cache:
    driver: local
  ollama-models:
    driver: local

networks:
  heady-net:
    driver: bridge
    name: heady-sacred-geometry
