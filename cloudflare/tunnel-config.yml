# Heady™ AI Platform — Cloudflare Tunnel Ingress Configuration
# Version: 3.1.0
#
# Deploy:  cloudflared tunnel --config cloudflare/tunnel-config.yml run
# Docs:    https://developers.cloudflare.com/cloudflare-one/connections/connect-networks/
# =============================================================================

# The tunnel ID is assigned by Cloudflare when you create the tunnel.
# Set via environment variable or replace directly:
#   cloudflared tunnel create heady-platform
tunnel: ${CF_TUNNEL_ID}

# Credentials file generated by `cloudflared tunnel create`
credentials-file: /etc/cloudflare/tunnel-credentials.json

# ─── Logging ──────────────────────────────────────────────────────────────────
loglevel: info
logfile:  /var/log/cloudflared/tunnel.log

# ─── Metrics ──────────────────────────────────────────────────────────────────
metrics: 0.0.0.0:9090

# ─── Protocol ─────────────────────────────────────────────────────────────────
protocol: quic

# ─── Retries ──────────────────────────────────────────────────────────────────
retries: 5
grace-period: 30s

# ─── Ingress Rules ────────────────────────────────────────────────────────────
# Routes inbound HTTPS traffic from Cloudflare edge → internal Docker service.
# Service target: heady-manager container on the heady-internal Docker network.
# IMPORTANT: No localhost references. All services resolve by container name.

ingress:

  # ── manager.headysystems.com ─ Primary manager & orchestration API ─────
  - hostname: manager.headysystems.com
    service: http://heady-manager:3301
    originRequest:
      connectTimeout:      30s
      tlsTimeout:          30s
      tcpKeepAlive:        30s
      keepAliveConnections: 100
      keepAliveTimeout:    90s
      httpHostHeader:      manager.headysystems.com
      noTLSVerify:         false
      disableChunkedEncoding: false

  # ── api.headysystems.com ─ Public REST/JSON API ───────────────────────
  - hostname: api.headysystems.com
    service: http://heady-manager:3301
    originRequest:
      connectTimeout:      30s
      tlsTimeout:          30s
      tcpKeepAlive:        30s
      keepAliveConnections: 200
      keepAliveTimeout:    90s
      httpHostHeader:      api.headysystems.com

  # ── conductor.headysystems.com ─ HeadyConductor endpoint ──────────────
  - hostname: conductor.headysystems.com
    service: http://heady-manager:3301
    originRequest:
      connectTimeout:      60s
      tlsTimeout:          30s
      tcpKeepAlive:        30s
      keepAliveConnections: 50
      keepAliveTimeout:    120s
      httpHostHeader:      conductor.headysystems.com

  # ── mcp.headymcp.com ─ Model Context Protocol server ──────────────────
  - hostname: mcp.headymcp.com
    service: http://heady-manager:3301
    originRequest:
      connectTimeout:      30s
      tlsTimeout:          30s
      tcpKeepAlive:        30s
      keepAliveConnections: 100
      keepAliveTimeout:    90s
      httpHostHeader:      mcp.headymcp.com

  # ── buddy.headybuddy.org ─ HeadyBuddy companion interface ────────────
  - hostname: buddy.headybuddy.org
    service: http://heady-manager:3301
    originRequest:
      connectTimeout:      30s
      tlsTimeout:          30s
      tcpKeepAlive:        30s
      keepAliveConnections: 100
      keepAliveTimeout:    90s
      httpHostHeader:      buddy.headybuddy.org

  # ── web.headysystems.com ─ Web layer & dashboard ──────────────────────
  - hostname: web.headysystems.com
    service: http://heady-manager:3301
    originRequest:
      connectTimeout:      30s
      tlsTimeout:          30s
      tcpKeepAlive:        30s
      keepAliveConnections: 150
      keepAliveTimeout:    90s
      httpHostHeader:      web.headysystems.com

  # ── Catch-all ─────────────────────────────────────────────────────────
  # Returns 404 for any unmatched hostname. Must be last rule.
  - service: http_status:404

  # ── Audit Ecosystem Domains (added March 2026) ─────────────────────
  - hostname: headyai.com
    service: http://heady-manager:3301
    originRequest:
      connectTimeout: 30s
      httpHostHeader: headyai.com

  - hostname: headyfullstack.com
    service: http://heady-manager:3301
    originRequest:
      connectTimeout: 30s
      httpHostHeader: headyfullstack.com

  - hostname: headymusic.net
    service: http://heady-manager:3301
    originRequest:
      connectTimeout: 30s
      httpHostHeader: headymusic.net

  - hostname: headycloud.io
    service: http://heady-manager:3301
    originRequest:
      connectTimeout: 30s
      httpHostHeader: headycloud.io

  - hostname: headydata.io
    service: http://heady-manager:3301
    originRequest:
      connectTimeout: 30s
      httpHostHeader: headydata.io

  - hostname: headyinc.com
    service: http://heady-manager:3301
    originRequest:
      connectTimeout: 30s
      httpHostHeader: headyinc.com

  - hostname: headyhc.com
    service: http://heady-manager:3301
    originRequest:
      connectTimeout: 30s
      httpHostHeader: headyhc.com

  - hostname: headygraphics.com
    service: http://heady-manager:3301
    originRequest:
      connectTimeout: 30s
      httpHostHeader: headygraphics.com
