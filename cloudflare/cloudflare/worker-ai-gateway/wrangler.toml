name = "worker-ai-gateway"
main = "src/index.js"
compatibility_date = "2026-03-06"
account_id = "" # Set via wrangler secret

# KV: Dynamic routing rules (updated by CostOptimizationBee)
[[kv_namespaces]]
binding = "AI_ROUTING_RULES"
id = "" # Created on deploy

# KV: Request/cost tracking
[[kv_namespaces]]
binding = "AI_COST_TRACKER"
id = "" # Created on deploy

# Workers AI for local inference fallback
[ai]
binding = "WORKERS_AI"

[vars]
DEFAULT_PROVIDER = "groq"
BUDGET_LIMIT_DAILY_USD = "10.00"
FALLBACK_ORDER = "groq,gemini,openai,anthropic"
