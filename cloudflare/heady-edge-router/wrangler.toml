# HEADY_BRAND:END

name = "heady-edge-router"
main = "src/index.js"
compatibility_date = "2026-03-01"
# account_id вЂ” set via CF_ACCOUNT_ID env var or wrangler.toml local override
# account_id = "CF_ACCOUNT_ID"

# в”Ђв”Ђв”Ђ Production Routes в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
# All 9 Heady domains route through this single edge router.
# The worker inspects hostname + path to select the correct origin.

[env.production]
workers_dev = false
routes = [
  { pattern = "headysystems.com/*",        zone_name = "headysystems.com" },
  { pattern = "*.headysystems.com/*",      zone_name = "headysystems.com" },
  { pattern = "headyme.com/*",             zone_name = "headyme.com" },
  { pattern = "*.headyme.com/*",           zone_name = "headyme.com" },
  { pattern = "headyconnection.org/*",     zone_name = "headyconnection.org" },
  { pattern = "*.headyconnection.org/*",   zone_name = "headyconnection.org" },
  { pattern = "headyweb.com/*",            zone_name = "headyweb.com" },
  { pattern = "*.headyweb.com/*",          zone_name = "headyweb.com" },
  { pattern = "headymcp.com/*",            zone_name = "headymcp.com" },
  { pattern = "*.headymcp.com/*",          zone_name = "headymcp.com" },
  { pattern = "headyio.com/*",             zone_name = "headyio.com" },
  { pattern = "*.headyio.com/*",           zone_name = "headyio.com" },
  { pattern = "headybuddy.com/*",          zone_name = "headybuddy.com" },
  { pattern = "*.headybuddy.com/*",        zone_name = "headybuddy.com" },
  { pattern = "headyapi.com/*",            zone_name = "headyapi.com" },
  { pattern = "*.headyapi.com/*",          zone_name = "headyapi.com" },
  { pattern = "headyos.com/*",             zone_name = "headyos.com" },
  { pattern = "*.headyos.com/*",           zone_name = "headyos.com" },
]

# в”Ђв”Ђв”Ђ Environment Variables в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
[vars]
ORIGIN_URL = "https://heady-liquid-latent-os-849135684797.us-central1.run.app"
ORIGIN_PORT = "3300"
GATEWAY_VERSION = "1.0.0"
NODE_ENV = "production"
ENABLE_METRICS = "true"
ENABLE_CORS = "true"
CORS_ORIGINS = "*"
REQUEST_TIMEOUT = "30000"
HEADY_EDGE_ROUTER_VERSION = "1.0.0"

# в”Ђв”Ђв”Ђ KV Namespace Bindings в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
# Edge cache for response caching and rate limiting
[[kv_namespaces]]
binding = "EDGE_CACHE"
id = "edge-cache-kv-prod"
preview_id = "edge-cache-kv-preview"

[[kv_namespaces]]
binding = "RATE_LIMIT"
id = "edge-rate-limit-kv-prod"
preview_id = "edge-rate-limit-kv-preview"

[[kv_namespaces]]
binding = "ROUTE_CONFIG"
id = "edge-route-config-kv-prod"
preview_id = "edge-route-config-kv-preview"

# в”Ђв”Ђв”Ђ Analytics в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
[[analytics_engine_datasets]]
binding = "EDGE_METRICS"

# в”Ђв”Ђв”Ђ Observability в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
[observability]
enabled = true
head_sampling_rate = 1.0

# в”Ђв”Ђв”Ђ Limits в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
[limits]
cpu_ms = 50
