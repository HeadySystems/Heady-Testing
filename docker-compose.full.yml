# HEADY_BRAND:END
#
# Full-stack compose вЂ” all Heady services + infra + monitoring.
# Usage: docker compose -f docker-compose.full.yml up -d

services:
  # в”Ђв”Ђв”Ђ Core Heady Manager в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  heady-manager:
    build: .
    container_name: heady-manager
    ports:
      - "3300:3300"
    environment:
      - NODE_ENV=production
      - PORT=3300
      - HEADY_TARGET=CloudOnly
      - HEADY_VERSION=3.0.0
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=redis://heady-redis:6379
      - OLLAMA_HOST=http://heady-ollama:11434
    volumes:
      - heady-data:/app/.heady-memory
      - ./configs:/app/configs:ro
      - ./docs:/app/docs:ro
    networks:
      - heady-net
    depends_on:
      heady-postgres:
        condition: service_healthy
      heady-redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3300/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  # в”Ђв”Ђв”Ђ Database Layer в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  heady-postgres:
    image: pgvector/pgvector:pg16
    container_name: heady-postgres
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-heady}
      - POSTGRES_USER=${POSTGRES_USER:-heady}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_INITDB_ARGS=--encoding=UTF-8 --lc-collate=C --lc-ctype=C
    volumes:
      - heady-postgres:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - heady-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U heady -d heady"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  heady-redis:
    image: redis:7-alpine
    container_name: heady-redis
    volumes:
      - heady-redis:/data
    ports:
      - "6379:6379"
    networks:
      - heady-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # в”Ђв”Ђв”Ђ AI/ML Services в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  heady-ollama:
    image: ollama/ollama:latest
    container_name: heady-ollama
    volumes:
      - heady-ollama:/root/.ollama
    ports:
      - "11434:11434"
    networks:
      - heady-net
    environment:
      - OLLAMA_HOST=0.0.0.0
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:11434/api/tags || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # в”Ђв”Ђв”Ђ Web Frontend в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  heady-web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: heady-web
    ports:
      - "3400:3400"
    environment:
      - REACT_APP_API_URL=http://heady-manager:3300
    networks:
      - heady-net
    depends_on:
      - heady-manager
    restart: unless-stopped

  # в”Ђв”Ђв”Ђ Admin/Debug Interfaces в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  heady-pgadmin:
    image: dpage/pgadmin4:latest
    container_name: heady-pgadmin
    ports:
      - "5050:80"
    environment:
      - PGADMIN_DEFAULT_EMAIL=${PGADMIN_EMAIL:-admin@heady.local}
      - PGADMIN_DEFAULT_PASSWORD=${PGADMIN_PASSWORD:-heady_admin}
      - PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED=False
    volumes:
      - heady-pgadmin:/var/lib/pgadmin
    networks:
      - heady-net
    depends_on:
      heady-postgres:
        condition: service_healthy
    restart: unless-stopped

  heady-redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: heady-redis-commander
    ports:
      - "8081:8081"
    environment:
      - REDIS_HOSTS=local:heady-redis:6379
    networks:
      - heady-net
    depends_on:
      heady-redis:
        condition: service_healthy
    restart: unless-stopped

  # в”Ђв”Ђв”Ђ Monitoring & Observability в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  heady-grafana:
    image: grafana/grafana:latest
    container_name: heady-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-heady_grafana}
      - GF_INSTALL_PLUGINS=grafana-clock-panel,grafana-simple-json-datasource
    volumes:
      - heady-grafana:/var/lib/grafana
    networks:
      - heady-net
    restart: unless-stopped

  heady-prometheus:
    image: prom/prometheus:latest
    container_name: heady-prometheus
    ports:
      - "9090:9090"
    volumes:
      - heady-prometheus:/prometheus
    command:
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    networks:
      - heady-net
    restart: unless-stopped

volumes:
  heady-data:
    driver: local
  heady-postgres:
    driver: local
  heady-redis:
    driver: local
  heady-ollama:
    driver: local
  heady-pgadmin:
    driver: local
  heady-grafana:
    driver: local
  heady-prometheus:
    driver: local

networks:
  heady-net:
    driver: bridge
