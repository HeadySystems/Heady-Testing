    :root {
      --bg: #0a0e17; --bg2: #111827; --panel: #1a2332;

    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); }

    .header { padding: 1rem 1.618rem; background: var(--bg2);
      border-bottom: 1px solid var(--border); display: flex;
      align-items: center; justify-content: space-between; }
    .header h1 { font-size: 1.618rem; }
    .header h1 span { color: var(--amber); font-size: 0.618em; vertical-align: super; }

    .runtime-grid { display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 1.618rem; padding: 1.618rem; max-width: 1400px; margin: 0 auto; }

    .runtime-card { background: var(--panel); border: 1px solid var(--border);
      border-radius: 0.618rem; padding: 1.618rem; }

    .runtime-header { display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 1.618rem; }
    .runtime-name { font-size: 1.1rem; font-weight: 600; }
    .runtime-badge { font-size: 0.75rem; padding: 0.2rem 0.618rem;
      border-radius: 0.382rem; font-weight: 500; }
    .runtime-badge.warm { background: var(--green); color: #000; }
    .runtime-badge.idle { background: var(--muted); color: #fff; }
    .runtime-badge.executing { background: var(--amber); color: #000; }
    .runtime-badge.error { background: var(--red); color: #fff; }

    .gpu-gauge { margin: 1rem 0; }
    .gauge-label { display: flex; justify-content: space-between; font-size: 0.75rem;
      color: var(--muted); margin-bottom: 0.382rem; }
    .gauge-bar { height: 8px; background: var(--bg); border-radius: 4px; overflow: hidden; }
    .gauge-fill { height: 100%; border-radius: 4px; transition: width 0.5s; }
    .gauge-fill.low { background: var(--green); }
    .gauge-fill.medium { background: var(--amber); }
    .gauge-fill.high { background: var(--red); }

    .metric-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.618rem;
      margin-top: 1rem; }
    .mini-metric { background: var(--bg); border-radius: 0.382rem; padding: 0.618rem;
      text-align: center; }
    .mini-metric .mm-value { font-size: 1.2rem; font-weight: 700;
      font-variant-numeric: tabular-nums; }
    .mini-metric .mm-label { font-size: 0.688rem; color: var(--muted);
      margin-top: 0.2rem; }

    .action-bar { display: flex; gap: 0.618rem; margin-top: 1.618rem; }
    .action-btn { flex: 1; padding: 0.618rem; border: 1px solid var(--border);
      border-radius: 0.382rem; background: var(--bg); color: var(--text);
      font-size: 0.813rem; cursor: pointer; text-align: center; transition: border-color 0.2s; }
    .action-btn:hover { border-color: var(--amber); }
    .action-btn.primary { background: var(--amber); color: #000; border-color: var(--amber); }

    .ops-section { margin-top: 1.618rem; padding-top: 1rem; border-top: 1px solid var(--border); }
    .ops-section h3 { font-size: 0.813rem; color: var(--muted); margin-bottom: 0.618rem; }
    .op-tag { display: inline-block; padding: 0.2rem 0.618rem; margin: 0.2rem;
      background: var(--bg); border: 1px solid var(--border); border-radius: 0.382rem;
      font-size: 0.75rem; cursor: pointer; }
    .op-tag:hover { border-color: var(--cyan); }
  </style>
</head>
