services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: heady-postgres
    environment:
      POSTGRES_USER: heady
      POSTGRES_PASSWORD: heady
      POSTGRES_DB: heady
    ports:
      - "5432:5432"
    volumes:
      - heady_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U heady -d heady"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  heady_pgdata:
