# HEADY™ Cloudflare Workers Configuration
name = "heady-edge"
main = "workers/edge-worker.js"
compatibility_date = "2024-12-01"

[vars]
ENVIRONMENT = "production"

[[kv_namespaces]]
binding = "HEADY_KV"
id = "your-kv-namespace-id"

[[vectorize]]
binding = "HEADY_VECTORS"
index_name = "heady-embeddings"

[ai]
binding = "AI"

[[durable_objects.bindings]]
name = "HEADY_STATE"
class_name = "HeadyDurableObject"

[[migrations]]
tag = "v1"
new_classes = ["HeadyDurableObject"]
