# Heady Production Docker Compose
# 59 application services + 6 infrastructure services
# All parameters derive from phi (1.6180339887) / Fibonacci
version: "3.9"

volumes:
  pgdata:
  redisdata:
  promdata:
  grafanadata:

networks:
  default:
    name: heady-network
    driver: bridge

services:
  # ── Infrastructure ──

  heady-postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: heady
      POSTGRES_USER: heady
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U heady"]
      interval: 13s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  heady-redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 987mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 13s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  heady-prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./../../infrastructure/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./../../infrastructure/alert-rules.yml:/etc/prometheus/alert-rules.yml
      - promdata:/prometheus
    ports:
      - "9090:9090"
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=89d
    restart: unless-stopped

  heady-alertmanager:
    image: prom/alertmanager:latest
    volumes:
      - ./../../infrastructure/alertmanager.yml:/etc/alertmanager/alertmanager.yml
    ports:
      - "9093:9093"
    restart: unless-stopped

  heady-grafana:
    image: grafana/grafana:latest
    volumes:
      - ./../../infrastructure/grafana-dashboards:/etc/grafana/provisioning/dashboards
      - grafanadata:/var/lib/grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
    restart: unless-stopped

  heady-otel-collector:
    image: otel/opentelemetry-collector:latest
    ports:
      - "4317:4317"
      - "4318:4318"
    restart: unless-stopped

  # ── Application Services (59 total) ──


  ai-router:
    build:
      context: ./../../services/ai-router
      dockerfile: Dockerfile
    ports:
      - "3310:3310"
    environment:
      NODE_ENV: production
      SERVICE_NAME: ai-router
      PORT: "3310"
      DATABASE_URL: postgresql://heady:${DB_PASSWORD}@heady-postgres:5432/heady
      REDIS_URL: redis://heady-redis:6379/0
      OTEL_EXPORTER_OTLP_ENDPOINT: http://heady-otel-collector:4318
    depends_on:
      heady-postgres:
        condition: service_healthy
      heady-redis:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M

  analytics-service:
