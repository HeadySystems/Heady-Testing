# =============================================================================
# Heady™ Liquid Latent OS — Google Cloud Build CI/CD Pipeline
#
# Stages:
#   1  Security scan        TruffleHog secret scanning + npm audit
#   2  TypeScript build     tsc compile + ESLint
#   3  Tests                Jest test suite
#   4  Docker build         Multi-stage production image
#   5  Push to registry     Artifact Registry push
#   6  Canary deploy        Progressive traffic: 5% → 25% → 50% → 100%
#   7  Post-deploy health   Verify all Heady domains respond correctly
#
# Substitution variables (set in Cloud Build trigger or CLI --substitutions):
#   _PROJECT_ID     GCP project ID
#   _REGION         Cloud Run region (e.g. us-central1)
#   _SERVICE_NAME   Cloud Run service name
#   _IMAGE_TAG      Docker image tag (defaults to $SHORT_SHA)
#   _REGISTRY       Artifact Registry host
#
# φ-derived timing constants used in deploy steps:
#   grace period between canary stages: φ³ × 1000 = 4236 ms ≈ 5 s (rounded up for prod safety)
#   fib(6) = 8  → max canary retries
#   fib(5) = 5  → health check failure threshold
# =============================================================================

substitutions:
  _PROJECT_ID: "your-gcp-project-id"
  _REGION: "us-central1"
  _SERVICE_NAME: "heady-liquid-latent-os"
  _IMAGE_TAG: "$SHORT_SHA"
  _REGISTRY: "us-central1-docker.pkg.dev"
  _ARTIFACT_REPO: "heady-registry"

# Retain logs and artifacts for fib(13) = 233 days
options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8
  substitution_option: ALLOW_LOOSE
  dynamic_substitutions: true
  env:
    - "NODE_ENV=production"
    - "CI=true"

timeout: "2400s"  # fib(16) × fib(12) ≈ 2400 s cap (40 min total)

steps:
  # ---------------------------------------------------------------------------
  # Step 1a — TruffleHog secret scanning
  # Fails the build immediately if any secrets are detected in commit history.
  # ---------------------------------------------------------------------------
  - id: "security-scan-trufflehog"
    name: "trufflesecurity/trufflehog:latest"
    entrypoint: "trufflehog"
    args:
      - "filesystem"
      - "--directory=/workspace"
      - "--only-verified"
      - "--fail"
    waitFor: ["-"]

  # ---------------------------------------------------------------------------
  # Step 1b — npm audit
  # Fails on any high or critical severity vulnerability.
  # ---------------------------------------------------------------------------
  - id: "security-scan-npm-audit"
    name: "node:22-alpine"
    entrypoint: "npm"
    args:
      - "audit"
      - "--audit-level=high"
      - "--prefer-offline"
    dir: "/workspace"
    waitFor: ["-"]

  # ---------------------------------------------------------------------------
  # Step 2a — Install all dependencies (including devDependencies)
  # Cached in the build worker's node_modules for subsequent steps.
  # ---------------------------------------------------------------------------
  - id: "install-deps"
    name: "node:22-alpine"
    entrypoint: "npm"
    args:
      - "ci"
      - "--prefer-offline"
      - "--no-audit"
    dir: "/workspace"
    waitFor:
      - "security-scan-trufflehog"
      - "security-scan-npm-audit"

  # ---------------------------------------------------------------------------
  # Step 2b — TypeScript compile
  # Ensures the codebase compiles cleanly with strict mode enabled.
  # ---------------------------------------------------------------------------
  - id: "typescript-build"
    name: "node:22-alpine"
    entrypoint: "npm"
    args:
      - "run"
      - "build"
    dir: "/workspace"
    waitFor:
      - "install-deps"

  # ---------------------------------------------------------------------------
  # Step 2c — ESLint
  # Zero lint errors required before proceeding.
  # ---------------------------------------------------------------------------
  - id: "lint"
    name: "node:22-alpine"
    entrypoint: "npm"
    args:
      - "run"
      - "lint"
    dir: "/workspace"
    waitFor:
      - "install-deps"

  # ---------------------------------------------------------------------------
  # Step 3 — Jest test suite
  # Run all unit and integration tests.  Build fails on any test failure.
  # ---------------------------------------------------------------------------
  - id: "tests"
    name: "node:22-alpine"
    entrypoint: "npm"
    args:
      - "run"
      - "test"
      - "--"
      - "--forceExit"
      - "--passWithNoTests"
    dir: "/workspace"
    env:
      - "NODE_ENV=test"
    waitFor:
      - "typescript-build"
      - "lint"

  # ---------------------------------------------------------------------------
  # Step 4 — Docker image build (multi-stage)
  # Tags with both the commit SHA and 'latest' for traceability.
  # ---------------------------------------------------------------------------
  - id: "docker-build"
    name: "gcr.io/cloud-builders/docker"
    args:
      - "build"
      - "--file=Dockerfile"
      - "--tag=${_REGISTRY}/${_PROJECT_ID}/${_ARTIFACT_REPO}/${_SERVICE_NAME}:${_IMAGE_TAG}"
      - "--tag=${_REGISTRY}/${_PROJECT_ID}/${_ARTIFACT_REPO}/${_SERVICE_NAME}:latest"
      - "--cache-from=${_REGISTRY}/${_PROJECT_ID}/${_ARTIFACT_REPO}/${_SERVICE_NAME}:latest"
      - "--build-arg=BUILDKIT_INLINE_CACHE=1"
      - "."
    dir: "/workspace"
    waitFor:
      - "tests"

  # ---------------------------------------------------------------------------
  # Step 5 — Push image to Artifact Registry
  # Both the SHA-tagged and 'latest' tags are pushed atomically.
  # ---------------------------------------------------------------------------
  - id: "push-sha-tag"
    name: "gcr.io/cloud-builders/docker"
    args:
      - "push"
      - "${_REGISTRY}/${_PROJECT_ID}/${_ARTIFACT_REPO}/${_SERVICE_NAME}:${_IMAGE_TAG}"
    waitFor:
      - "docker-build"

  - id: "push-latest-tag"
    name: "gcr.io/cloud-builders/docker"
    args:
      - "push"
      - "${_REGISTRY}/${_PROJECT_ID}/${_ARTIFACT_REPO}/${_SERVICE_NAME}:latest"
    waitFor:
      - "docker-build"

  # ---------------------------------------------------------------------------
  # Step 6a — Deploy new revision (0% traffic — canary start)
  # The new revision is deployed but receives no traffic yet.
  # ---------------------------------------------------------------------------
  - id: "deploy-revision"
    name: "gcr.io/google.com/cloudsdktool/cloud-sdk:slim"
    entrypoint: "gcloud"
    args:
      - "run"
      - "deploy"
      - "${_SERVICE_NAME}"
      - "--image=${_REGISTRY}/${_PROJECT_ID}/${_ARTIFACT_REPO}/${_SERVICE_NAME}:${_IMAGE_TAG}"
      - "--region=${_REGION}"
      - "--project=${_PROJECT_ID}"
      - "--no-traffic"
      - "--tag=canary-${_IMAGE_TAG}"
      - "--platform=managed"
    waitFor:
      - "push-sha-tag"
      - "push-latest-tag"

  # ---------------------------------------------------------------------------
  # Step 6b — Canary stage 1: 5% traffic
  # fib(5)/fib(10) = 5/55 → closest clean Fibonacci ratio is 5%
  # Grace period: φ³ × 1000 ms ≈ 4236 ms → sleep 5s for production safety
  # ---------------------------------------------------------------------------
  - id: "canary-5pct"
    name: "gcr.io/google.com/cloudsdktool/cloud-sdk:slim"
    entrypoint: "bash"
    args:
      - "-euxo"
      - "pipefail"
      - "-c"
      - |
        gcloud run services update-traffic "${_SERVICE_NAME}" \
          --region="${_REGION}" \
          --project="${_PROJECT_ID}" \
          --to-tags="canary-${_IMAGE_TAG}=5"
        echo "Canary at 5% — grace period (phi^3 x 1000 = 4236 ms, rounded to 5 s)"
        sleep 5
    waitFor:
      - "deploy-revision"

  # ---------------------------------------------------------------------------
  # Step 6c — Canary stage 2: 25% traffic
  # fib(7)/fib(9) = 13/34 ≈ 38% → rounded to nearest clean milestone: 25%
  # Grace period: 5 s
  # ---------------------------------------------------------------------------
  - id: "canary-25pct"
    name: "gcr.io/google.com/cloudsdktool/cloud-sdk:slim"
    entrypoint: "bash"
    args:
      - "-euxo"
      - "pipefail"
      - "-c"
      - |
        gcloud run services update-traffic "${_SERVICE_NAME}" \
          --region="${_REGION}" \
          --project="${_PROJECT_ID}" \
          --to-tags="canary-${_IMAGE_TAG}=25"
        echo "Canary at 25% — grace period 5 s"
        sleep 5
    waitFor:
      - "canary-5pct"

  # ---------------------------------------------------------------------------
  # Step 6d — Canary stage 3: 50% traffic
  # Golden ratio split: send 1/φ ≈ 61.8% → conservative rounding: 50%
  # Grace period: 5 s
  # ---------------------------------------------------------------------------
  - id: "canary-50pct"
    name: "gcr.io/google.com/cloudsdktool/cloud-sdk:slim"
    entrypoint: "bash"
    args:
      - "-euxo"
      - "pipefail"
      - "-c"
      - |
        gcloud run services update-traffic "${_SERVICE_NAME}" \
          --region="${_REGION}" \
          --project="${_PROJECT_ID}" \
          --to-tags="canary-${_IMAGE_TAG}=50"
        echo "Canary at 50% — grace period 5 s"
        sleep 5
    waitFor:
      - "canary-25pct"

  # ---------------------------------------------------------------------------
  # Step 6e — Full rollout: 100% traffic to new revision
  # ---------------------------------------------------------------------------
  - id: "canary-100pct"
    name: "gcr.io/google.com/cloudsdktool/cloud-sdk:slim"
    entrypoint: "bash"
    args:
      - "-euxo"
      - "pipefail"
      - "-c"
      - |
        gcloud run services update-traffic "${_SERVICE_NAME}" \
          --region="${_REGION}" \
          --project="${_PROJECT_ID}" \
          --to-latest
    waitFor:
      - "canary-50pct"

  # ---------------------------------------------------------------------------
  # Step 7 — Post-deploy health verification across all Heady domains
  # Uses curl with fib(8) = 21 s timeout; fib(6) = 8 retry attempts.
  # All domains must return HTTP 200 on /health/live.
  # ---------------------------------------------------------------------------
  - id: "post-deploy-health-check"
    name: "curlimages/curl:latest"
    entrypoint: "sh"
    args:
      - "-euxo"
      - "pipefail"
      - "-c"
      - |
        DOMAINS="
          headysystems.com
          headyio.com
          headymcp.com
          headyapi.com
          headybuddy.org
          headyconnection.org
        "
        TIMEOUT=21
        RETRIES=8
        for domain in $DOMAINS; do
          attempt=0
          while [ $attempt -lt $RETRIES ]; do
            echo "Checking https://${domain}/health/live (attempt $((attempt+1))/${RETRIES})"
            if curl --fail --silent --max-time "${TIMEOUT}" \
                "https://${domain}/health/ready"; then
              echo "  OK: ${domain}"
              break
            fi
            attempt=$((attempt+1))
            sleep 3
            if [ $attempt -eq $RETRIES ]; then
              echo "FATAL: health check failed for ${domain} after ${RETRIES} attempts"
              exit 1
            fi
          done
        done
        echo "All domain health checks passed."
    waitFor:
      - "canary-100pct"

# Build artifacts — store image digest for audit trail
images:
  - "${_REGISTRY}/${_PROJECT_ID}/${_ARTIFACT_REPO}/${_SERVICE_NAME}:${_IMAGE_TAG}"
  - "${_REGISTRY}/${_PROJECT_ID}/${_ARTIFACT_REPO}/${_SERVICE_NAME}:latest"
