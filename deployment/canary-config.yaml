# =============================================================================
# Heady™ Liquid Latent OS — Canary Deployment Configuration
#
# Progressive delivery definition for the 4-stage canary rollout.
# Auto-rollback is triggered by any of the following threshold breaches.
#
# φ-derived constants used in this file:
#   grace period:  φ³ × 1000 = 4.236 × 1000 = 4236 ms
#   phi:           1.6180339887498948482
#   phi^3:         4.2360679774997896964
#   Fibonacci stages: 5 → 25 → 50 → 100
#     fib(5)  =  5  → stage 1 traffic %
#     fib(14) = 377 → closest Fibonacci to 25% × 15  (normalised)
#     fib(10) = 55  → closest Fibonacci to 50% × 10  (normalised)
#     fib(12) = 144 → 100% = full rollout (conceptual fib completion)
# =============================================================================

canary:
  # Service identifier
  service: heady-liquid-latent-os
  region: us-central1

  # φ constant for derived calculations
  phi: 1.6180339887498948482

  # ---------------------------------------------------------------------------
  # Progressive delivery stages
  # Each stage must remain healthy for the full grace period before advancing.
  # ---------------------------------------------------------------------------
  stages:
    - name: "stage-1-probe"
      trafficPercent: 5
      # Grace period: φ³ × 1000 ms = 4236 ms
      gracePeriodMs: 4236
      description: "Initial 5% canary — validate baseline error rate"

    - name: "stage-2-growth"
      trafficPercent: 25
      # Grace period: φ³ × 1000 ms = 4236 ms
      gracePeriodMs: 4236
      description: "25% canary — confirm p99 latency under real load"

    - name: "stage-3-majority"
      trafficPercent: 50
      # Grace period: φ³ × 1000 ms = 4236 ms
      gracePeriodMs: 4236
      description: "50% canary — golden ratio split, confirm stability"

    - name: "stage-4-full"
      trafficPercent: 100
      # No grace period — this is the final cutover
      gracePeriodMs: 0
      description: "100% rollout — full production traffic"

  # ---------------------------------------------------------------------------
  # Health thresholds — per stage
  # A single breach within a stage triggers immediate auto-rollback.
  # ---------------------------------------------------------------------------
  healthThresholds:
    # Maximum error rate (5xx / total requests)
    errorRatePercent: 5.0

    # p99 latency ceiling: 10 000 ms = fib(6) × fib(5) × fib(5) × fib(5) = 8 × 5 × 5 × 5 = 1000 (×10 for ms)
    # Expressed as a clean, meaningful production SLO: 10 seconds
    p99LatencyMs: 10000

    # Consecutive health check failures before rollback
    # fib(4) = 3 consecutive failures
    consecutiveHealthCheckFailures: 3

    # Minimum requests required per stage before evaluating error rate
    # fib(7) = 13 minimum sample size
    minRequestSampleSize: 13

  # ---------------------------------------------------------------------------
  # Auto-rollback configuration
  # ---------------------------------------------------------------------------
  autoRollback:
    enabled: true

    # Triggers — any single condition causes rollback
    triggers:
      errorRateExceeds:
        percent: 5.0
        description: "Error rate exceeded 5% threshold"

      p99LatencyExceeds:
        ms: 10000
        description: "p99 latency exceeded 10 000 ms SLO"

      consecutiveHealthCheckFailures:
        count: 3
        description: "fib(4) = 3 consecutive /health/ready failures"

      # Auto-rollback if a stage does not advance within this window
      stageTimeoutMs: 300000  # 300 s = 5 min maximum per stage

    # Action on rollback: shift all traffic back to the previous stable revision
    action: "route-to-previous-revision"

    # Notify on rollback via Cloud Build pub/sub topic
    notificationTopic: "projects/${PROJECT_ID}/topics/heady-deploy-alerts"

  # ---------------------------------------------------------------------------
  # Observability — metrics evaluated during canary
  # ---------------------------------------------------------------------------
  metrics:
    # Cloud Run built-in metrics
    errorRate:
      metricType: "run.googleapis.com/request_count"
      filter: "response_code_class=5xx"
      aggregation: "rate"

    p99Latency:
      metricType: "run.googleapis.com/request_latencies"
      percentile: 99
      aggregation: "distribution"

    healthCheckStatus:
      endpoint: "/health/ready"
      method: GET
      expectedStatus: 200

  # ---------------------------------------------------------------------------
  # Deployment metadata
  # ---------------------------------------------------------------------------
  metadata:
    strategy: "progressive-fibonacci-canary"
    phiGracePeriodMs: 4236
    phiFormula: "phi^3 * 1000"
    phiValue: 4.2360679774997896964
    stages: 4
    maxRolloutDurationMs: 1200000  # 20 min total budget (4 stages × 5 min max each)
    maintainer: "eric@headyconnection.org"
