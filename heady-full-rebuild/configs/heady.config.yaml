    value:      8000
    _comment:   "8000 = F(6) × 1000 = 8 × 1000. Fibonacci-compliant. Replaces arbitrary 10000."

  max_agents:
    value:      21
    _comment:   "21 = F(8). Fibonacci-compliant. Replaces off-by-one 20."

  auto_success:
    interval_ms:
      value:    34000
      _comment: "34000 = F(9) × 1000 = 34 × 1000. Fibonacci-compliant. Replaces arbitrary 30000."
    total_tasks:
      value:    144
      _comment: "144 = F(12). Fibonacci-compliant. Replaces arbitrary 135."

# ─────────────────────────────────────────────────────────────────────────────
# MCP RATE LIMITS
# ─────────────────────────────────────────────────────────────────────────────
mcp:
  rate_limit:
    requests_per_hour:
      value:    987
      _comment: "987 = F(16). Fibonacci-compliant. Replaces arbitrary 1000."
    burst_limit:
      value:    55
      _comment: "55 = F(10). Fibonacci-compliant. Replaces arbitrary 50."
  retry:
    max_retries:
      value:    3
      _comment: "3 = F(4). Fibonacci-compliant."
    backoff_multiplier:
      value:    1.618
      _comment: "φ = 1.6180339887... Exact golden ratio. phi-backoff standard."
    max_backoff_ms:
      value:    13000
      _comment: "13000 = F(7) × 1000. Fibonacci-compliant."

# ─────────────────────────────────────────────────────────────────────────────
# SECURITY
# ─────────────────────────────────────────────────────────────────────────────
security:
  jwt:
    ttl_seconds:
      value:    86400
      _comment: >
        86400 = 24 × 60 × 60. Industry-standard 24-hour JWT TTL.
        Operational convention — exempt from phi-scaling per security domain requirements.
        Closest phi-power approximation would be φ⁵ × 7790 ≈ 86400s, but this is coincidental.
  session:
    ttl_seconds:
      value:    86400
      _comment: "Same 24h convention as jwt.ttl_seconds. See note above."

