# ═══════════════════════════════════════════════════════════════════════════════
# system.yaml — Heady™ Sovereign Phi-100 System Deployment Configuration
# ═══════════════════════════════════════════════════════════════════════════════
#
# @author  Heady™ Core Engineering
# @version 3.2.3
# @codename Aether
#
# PURPOSE
#   Complete system deployment configuration for the Heady™ Sovereign Phi-100
#   platform. Every threshold, timeout, limit, size, and weight in this file
#   derives from phi-math constants. No magic numbers are permitted.
#
# PHI-MATH REFERENCE (from shared/phi-math.js)
#   PHI   = 1.6180339887   Golden Ratio  φ = (1 + √5) / 2
#   PSI   = 0.6180339887   Inverse Ratio ψ = 1/φ = φ − 1
#   PHI²  = 2.6180339887   φ² = φ + 1
#   PHI³  = 4.2360679775   φ³ = φ² + φ
#   PHI⁴  = 6.8541019662   φ⁴ — health-check interval divisor
#   PHI⁵  = 11.090169944   φ⁵
#   PHI⁶  = 17.944271910   φ⁶
#   PHI⁷  = 29.034271910   φ⁷ — cold pool timeout base
#   PHI⁸  = 46.979023560   φ⁸ — session TTL base
#
# TIMEOUT LADDER (phi^n × 1000 ms) — only these values are valid:
#   phi^1 × 1000 =  1618 ms
#   phi^2 × 1000 =  2618 ms
#   phi^3 × 1000 =  4236 ms
#   phi^4 × 1000 =  6854 ms
#   phi^5 × 1000 = 11090 ms
#   phi^6 × 1000 = 17944 ms
#   phi^7 × 1000 = 29034 ms
#   phi^8 × 1000 = 46979 ms
#
# CSL THRESHOLDS (phiThreshold(level) = 1 − ψ^level × 0.5)
#   MINIMUM:  0.5000   phiThreshold(0)
#   LOW:      0.6910   phiThreshold(1)
#   MEDIUM:   0.8090   phiThreshold(3) — coherence floor
#   HIGH:     0.8820   phiThreshold(3.5) — high gate
#   CRITICAL: 0.9270   phiThreshold(4)
#
# FIBONACCI SEQUENCE (queue/cache/instance sizing only)
#   F(3)=2  F(4)=3  F(5)=5  F(6)=8  F(7)=13  F(8)=21  F(9)=34
#   F(10)=55  F(11)=89  F(12)=144  F(13)=233  F(14)=377
# ═══════════════════════════════════════════════════════════════════════════════

version: 3.2.3

system:
  name: "Heady™ Sovereign Phi-100"
  codename: "Aether"
  author: "Heady™ Core Engineering"
  schema: "https://headysystems.com/schemas/system-config/3.2.3"
  created_at: "2026-03-08T00:00:00Z"
  updated_at: "2026-03-08T00:00:00Z"

# ───────────────────────────────────────────────────────────────────────────────
# INFRASTRUCTURE
# Cloud and database deployment topology.
# All sizes, counts, and timeouts use phi-math values.
# ───────────────────────────────────────────────────────────────────────────────
infrastructure:

  cloud_run:
    # Google Cloud Run deployment parameters
    region: us-central1
    min_instances: 2            # fib(3) = 2 — minimum live replicas
    max_instances: 13           # fib(7) = 13 — scale ceiling
    concurrency: 8              # fib(6) = 8 — requests per container
    timeout_seconds: 29         # floor(PHI³) = floor(4.236 × 1000 / 1000 × phi⁷/phi⁴) ≈ 29 — phi^7/1000 ≈ 29.034 rounded
    # Note: timeout_seconds = round(PHI⁷) = round(29.034) = 29
    memory: "512Mi"             # base container memory allocation
    cpu: 1                      # vCPU count per container instance
    startup_probe_period_ms: 1618    # PHI¹ × 1000 ms
    liveness_probe_period_ms: 4236   # PHI³ × 1000 ms
    scale_down_delay_ms: 11090       # PHI⁵ × 1000 ms — cool-off before scale-down

  cloudflare:
    workers:
      max_instances: 21           # fib(8) = 21 — Worker concurrency cap
      cpu_time_limit_ms: 6854     # PHI⁴ × 1000 ms — hard CPU time budget per request
      request_timeout_ms: 29034   # PHI⁷ × 1000 ms — wall-clock request ceiling
      kv_cache_ttl_ms: 46979      # PHI⁸ × 1000 ms — KV store entry TTL
      retry_backoff_multiplier: 1.618   # PHI — never use 2×; always golden-ratio backoff
      max_retries: 5              # fib(5) = 5

    pages:
      build_timeout_ms: 6854      # PHI⁴ × 1000 ms
      deploy_timeout_ms: 11090    # PHI⁵ × 1000 ms
      max_concurrent_builds: 5    # fib(5) = 5
      cache_ttl_ms: 46979         # PHI⁸ × 1000 ms — CDN edge cache lifetime

  database:
    type: postgresql
    version: "15"
    extensions:
      - pgvector          # vector similarity search
      - pg_trgm           # trigram text search

    vector:
      dimensions: 384            # sentence-transformer embedding dimensionality
      index_type: hnsw           # Hierarchical Navigable Small World graph
      hnsw_m: 21                 # fib(8) = 21 — per-node link count during construction
      ef_construction: 144       # fib(12) = 144 — dynamic candidate list size at build time
      ef_search: 89              # fib(11) = 89 — dynamic candidate list size at query time
      similarity_precision: 6    # decimal places for stored cosine scores

    pool:
      min_connections: 5         # fib(5) = 5
      max_connections: 21        # fib(8) = 21
      acquire_timeout_ms: 4236   # PHI³ × 1000 ms
      idle_timeout_ms: 11090     # PHI⁵ × 1000 ms
      connection_lifetime_ms: 46979   # PHI⁸ × 1000 ms

    replication:
      read_replicas: 2           # fib(3) = 2
      sync_lag_threshold_ms: 1618   # PHI¹ × 1000 ms — alert if replica falls behind

  redis:
    max_memory: "233mb"          # fib(13) = 233 — cache memory cap in MB
    eviction_policy: "allkeys-lru"
    max_connections: 89          # fib(11) = 89
    connect_timeout_ms: 2618     # PHI² × 1000 ms
    command_timeout_ms: 1618     # PHI¹ × 1000 ms
    retry_delay_ms: 1618         # PHI¹ × 1000 ms
    max_retries: 5               # fib(5) = 5
    key_ttl_default_ms: 11090    # PHI⁵ × 1000 ms
    pipeline_batch_size: 21      # fib(8) = 21

# ───────────────────────────────────────────────────────────────────────────────
# POOLS
# Phi-geometric resource allocation across the five cognitive tier pools.
# Allocations use the Fibonacci percentages from sacred-geometry.yaml:
#   hot(0.34) + warm(0.21) + cold(0.13) + reserve(0.08) + governance(0.05) ≈ 0.81
# The remaining 0.19 is system / overhead headroom.
# ───────────────────────────────────────────────────────────────────────────────
pools:

  hot:
    # Active working-set — live session context and hot vectors.
    # Allocation mirrors F(9)=34 → 34% of total resource envelope.
    allocation: 0.34              # Fibonacci fraction — F(9)=34 / 100
    fib_index: 9                  # F(9) = 34
    timeout_ms: 4236              # PHI³ × 1000 ms — hot path must resolve fast
    max_concurrent: 21            # fib(8) = 21 — max simultaneous hot-pool tasks
    eviction_policy: "lru"
    coherence_gate: 0.8090        # CSL_THRESHOLDS.MEDIUM — minimum vector score to enter hot pool
    priority_score_min: 0.6910    # CSL_THRESHOLDS.LOW — floor for task admission

  warm:
    # Evictable-but-likely-needed tier.
    # Allocation mirrors F(8)=21 → 21% of total resource envelope.
    allocation: 0.21              # Fibonacci fraction — F(8)=21 / 100
    fib_index: 8                  # F(8) = 21
    timeout_ms: 11090             # PHI⁵ × 1000 ms
    max_concurrent: 13            # fib(7) = 13
    eviction_policy: "lfu"
    coherence_gate: 0.6910        # CSL_THRESHOLDS.LOW
    priority_score_min: 0.5000    # CSL_THRESHOLDS.MINIMUM

  cold:
    # Long-term compressed storage — high-latency retrieval tier.
    # Allocation mirrors F(7)=13 → 13% of total resource envelope.
    allocation: 0.13              # Fibonacci fraction — F(7)=13 / 100
    fib_index: 7                  # F(7) = 13
    timeout_ms: 29034             # PHI⁷ × 1000 ms — cold path latency is acceptable
    max_concurrent: 8             # fib(6) = 8
    eviction_policy: "ttl"
    coherence_gate: 0.5000        # CSL_THRESHOLDS.MINIMUM
    compression: true

  reserve:
    # Emergency capacity buffer — released only under CRITICAL pressure.
    # Allocation mirrors F(6)=8 → 8% of total resource envelope.
    allocation: 0.08              # Fibonacci fraction — F(6)=8 / 100
    fib_index: 6                  # F(6) = 8
    burst_multiplier: 1.618       # PHI — maximum burst above allocation before shedding
    release_pressure_threshold: 0.8541   # 1 − PSI⁴ — CRITICAL pressure lower bound
    timeout_ms: 17944             # PHI⁶ × 1000 ms
    max_concurrent: 5             # fib(5) = 5

  governance:
    # Compliance, audit, and meta-coordination overhead — always on.
    # Allocation mirrors F(5)=5 → 5% of total resource envelope.
    allocation: 0.05              # Fibonacci fraction — F(5)=5 / 100
    fib_index: 5                  # F(5) = 5
    always_on: true               # never evicted, never rate-limited
    timeout_ms: 46979             # PHI⁸ × 1000 ms — governance tasks may be long-running
    max_concurrent: 3             # fib(4) = 3
    audit_sink: "headyio.com/audit"
    law_count: 8                  # fib(6) = 8 sovereign laws enforced

# ───────────────────────────────────────────────────────────────────────────────
# MONITORING
# Observability, health-checking, coherence gating, and metrics retention.
# All thresholds are CSL values; all intervals are phi-power × 1000 ms.
# ───────────────────────────────────────────────────────────────────────────────
monitoring:

  health_check_interval_ms: 6854       # PHI⁴ × 1000 ms — sovereign heartbeat period
  deep_scan_interval_ms: 11090         # PHI⁵ × 1000 ms — full coherence sweep
  stale_node_timeout_ms: 29034         # PHI⁷ × 1000 ms — node declared stale after silence

  coherence_threshold: 0.8090          # CSL_THRESHOLDS.MEDIUM — minimum acceptable coherence score
  drift_alert_threshold: 0.6910        # CSL_THRESHOLDS.LOW — vector drift triggers re-embedding
  dedup_threshold: 0.9720              # CSL_THRESHOLDS.DEDUP — near-duplicate rejection sentinel
  critical_coherence_gate: 0.9270      # CSL_THRESHOLDS.CRITICAL — escalate to ops immediately

  metrics_retention_days: 89           # fib(11) = 89 — rolling metrics window
  trace_retention_days: 34             # fib(9) = 34
  log_retention_days: 55               # fib(10) = 55

  pressure_bands:
    # System resource pressure boundaries — mirror PRESSURE_LEVELS in phi-math.js
    nominal_upper: 0.3820          # PSI² — healthy headroom ceiling
    elevated_upper: 0.6180         # PSI  — above natural balance point
    high_upper: 0.7639             # 1 − PSI³ — attention zone ceiling
    critical_lower: 0.8541         # 1 − PSI⁴ — immediate-action floor

  alert_thresholds:
    # Progressive escalation triggers — mirror ALERT_THRESHOLDS in phi-math.js
    warning: 0.6180                # PSI — first notice, log to telemetry
    caution: 0.6180                # 1 − PSI² — increase polling frequency
    critical: 0.7639               # 1 − PSI³ — page on-call, attempt auto-remediation
    exceeded: 0.8541               # 1 − PSI⁴ — shed load immediately
    hard_max: 1.0000               # absolute ceiling, circuit-break all inbound

  endpoints:
    health: "/health"
    ready:  "/ready"
    live:   "/live"
    metrics: "/metrics"
    coherence: "/coherence"

  tracing:
    enabled: true
    sample_rate: 0.6180            # PSI — golden-ratio sampling fraction
    export_timeout_ms: 4236        # PHI³ × 1000 ms

# ───────────────────────────────────────────────────────────────────────────────
# SECURITY
# Authentication, encryption, secret rotation, and rate limiting.
# Session TTLs and rotation cycles use phi-math values.
# ───────────────────────────────────────────────────────────────────────────────
security:

  auth:
    providers:
      - cloudflare_access
      - auth0
    session_ttl_ms: 46979         # PHI⁸ × 1000 ms — session expiry
    refresh_window_ms: 11090      # PHI⁵ × 1000 ms — re-auth warning window before expiry
    token_grace_ms: 1618          # PHI¹ × 1000 ms — clock-skew tolerance
    max_sessions_per_user: 8      # fib(6) = 8

  encryption:
    at_rest: "AES-256"
    in_transit: "TLS-1.3"
    key_rotation_days: 89         # fib(11) = 89 — encryption key rotation period
    cipher_suite: "TLS_AES_256_GCM_SHA384"
    min_tls_version: "1.3"

  secrets:
    provider: "1password"
    rotation_days: 21             # fib(8) = 21 — secret rotation cycle
    audit_trail: true
    vault_timeout_ms: 4236        # PHI³ × 1000 ms — vault unlock timeout
    emergency_rotation_days: 5    # fib(5) = 5 — breach-response forced rotation

  rate_limiting:
    window_ms: 6854               # PHI⁴ × 1000 ms — sliding window
    max_requests: 144             # fib(12) = 144 — per-window request cap
    burst_limit: 21               # fib(8) = 21 — token-bucket burst allowance
    backoff_multiplier: 1.618     # PHI — progressive backoff on rate-limit hit
    ban_threshold: 5              # fib(5) = 5 — violations before temporary ban
    ban_duration_ms: 46979        # PHI⁸ × 1000 ms

  cors:
    # Canonical allowed origins — individual domains extend this in domains.yaml
    allowed_methods:
      - GET
      - POST
      - PUT
      - DELETE
      - OPTIONS
    allowed_headers:
      - Authorization
      - Content-Type
      - X-Heady-Version
      - X-Heady-Signature
    max_age_ms: 46979             # PHI⁸ × 1000 ms — CORS preflight cache lifetime
    credentials: true

# ───────────────────────────────────────────────────────────────────────────────
# SCALING
# Auto-scaling rules, retry policy, and circuit-breaker configuration.
# All multipliers use PHI (1.618), not 2×.
# ───────────────────────────────────────────────────────────────────────────────
scaling:

  backoff_multiplier: 1.618       # PHI — golden-ratio exponential backoff (never 2×)
  base_delay_ms: 1618             # PHI¹ × 1000 ms — initial retry delay
  max_delay_ms: 46979             # PHI⁸ × 1000 ms — backoff hard cap
  max_retries: 5                  # fib(5) = 5 — maximum retry attempts before DLQ
  jitter_fraction: 0.3820         # PSI² ≈ 0.382 — ±38.2% jitter on each backoff

  circuit_breaker:
    threshold: 5                  # fib(5) = 5 — failures to trip the breaker
    half_open_timeout_ms: 11090   # PHI⁵ × 1000 ms — probe window in half-open state
    reset_timeout_ms: 29034       # PHI⁷ × 1000 ms — full reset after sustained health
    probe_requests: 3             # fib(4) = 3 — requests sampled in half-open state
    error_rate_threshold: 0.6180  # PSI — error rate that triggers circuit open

  auto_scale:
    # Bee pool auto-scaling — triggers follow PHI/PSI ratio thresholds
    scale_up_trigger: 1.618       # PHI — scale when queue_depth > pool × PHI
    scale_down_trigger: 0.3820    # PSI² — scale down when queue_depth < pool × PSI²
    fib_step: true                # grow/shrink by one Fibonacci step at a time
    pool_sizes: [5, 8, 13, 21]   # fib(5)…fib(8) — valid pool size steps
    min_pool: 5                   # fib(5) = 5 — never scale below this floor
    max_pool: 10000               # Ten-Thousand Bee Law upper bound
    scale_up_cooldown_ms: 4236    # PHI³ × 1000 ms — stabilization between scale-ups
    scale_down_cooldown_ms: 11090 # PHI⁵ × 1000 ms — conservative scale-down delay
    stale_idle_threshold_ms: 17944   # PHI⁶ × 1000 ms — bee idle timeout before recycle

  load_shedding:
    # Activate at CRITICAL pressure to protect core function
    pressure_threshold: 0.8541    # 1 − PSI⁴ — CRITICAL pressure lower bound
    shed_fraction: 0.3820         # PSI² — proportion of load to shed in one pass
    priority_floor: 0.6910        # CSL_THRESHOLDS.LOW — tasks below this are shed first
    recovery_check_ms: 6854       # PHI⁴ × 1000 ms — check if pressure has eased

# ───────────────────────────────────────────────────────────────────────────────
# PIPELINE
# 21-stage pipeline configuration — stage counts and sizing use Fibonacci values.
# ───────────────────────────────────────────────────────────────────────────────
pipeline:

  stage_count: 21                 # fib(8) = 21 — canonical pipeline stage count
  stage_timeout_ms: 17944         # PHI⁶ × 1000 ms — per-stage wall-clock limit
  full_pipeline_timeout_ms: 46979 # PHI⁸ × 1000 ms — end-to-end pipeline ceiling

  quality_gate_threshold: 0.8090  # CSL_THRESHOLDS.MEDIUM — score required to advance stage
  assurance_gate_threshold: 0.9270 # CSL_THRESHOLDS.CRITICAL — final gate before deploy

  stages:
    - CHANNEL_ENTRY
    - RECON
    - INTAKE
    - TRIAGE
    - STRATEGY
    - PLANNING
    - MONTE_CARLO
    - ARENA
    - JUDGE
    - SWARM_DISPATCH
    - EXECUTION
    - QUALITY_GATE
    - ASSURANCE_GATE
    - PATTERN_CAPTURE
    - STORY_UPDATE
    - WISDOM_HARVEST
    - DEPLOY_GATE
    - PROJECTION
    - VERIFICATION
    - RECEIPT
    - RETROSPECTIVE

  swarms:
    count: 17               # prime — chosen for swarm sharding resilience
    names:
      - CodeSwarm
      - ArchitectSwarm
      - SecuritySwarm
      - QualitySwarm
      - ResearchSwarm
      - DocumentationSwarm
      - CreativeSwarm
      - DeploySwarm
      - AnalyticsSwarm
      - MonitoringSwarm
      - MaintenanceSwarm
      - MemorySwarm
      - TranslationSwarm
      - PatternSwarm
      - CompanionSwarm
      - GovernanceSwarm
      - InnovationSwarm

# ───────────────────────────────────────────────────────────────────────────────
# VECTOR STORE
# Embedding and semantic search configuration.
# ───────────────────────────────────────────────────────────────────────────────
vector_store:

  dimensions: 384               # sentence-transformer default embedding dimensionality
  index_type: hnsw
  hnsw_m: 21                    # fib(8) = 21 — connections per node
  ef_construction: 144          # fib(12) = 144 — candidate list at index build time
  ef_search: 89                 # fib(11) = 89 — candidate list at query time
  batch_size: 144               # fib(12) = 144 — embedding batch ingestion size
  max_stored_vectors: 1597      # fib(17) = 1597 — hot-tier vector cap before eviction

  coherence_threshold: 0.8090   # CSL_THRESHOLDS.MEDIUM — minimum cosine score for admission
  dedup_threshold: 0.9720       # CSL_THRESHOLDS.DEDUP — near-duplicate rejection
  drift_threshold: 0.6910       # CSL_THRESHOLDS.LOW — re-embed if drift exceeds this

  reindex_interval_ms: 46979    # PHI⁸ × 1000 ms — background reindex cycle

# ───────────────────────────────────────────────────────────────────────────────
# MEMORY TIERS
# Heady™ Elephant Memory layer — eviction weights and tier sizing.
# ───────────────────────────────────────────────────────────────────────────────
memory:

  eviction_weights:
    # Calibrated to sum to 1.0 — mirrors EVICTION_WEIGHTS in phi-math.js
    importance: 0.486          # dominant signal — Fibonacci ratio 34/70
    recency:    0.300          # time decay signal — Fibonacci ratio 21/70
    relevance:  0.214          # semantic proximity — Fibonacci ratio 15/70

  tiers:
    working:
      token_budget: 8192       # base token window (direct input context)
      ttl_ms: 4236             # PHI³ × 1000 ms
    session:
      token_budget: 21450      # base × PHI² ≈ 8192 × 2.618
      ttl_ms: 46979            # PHI⁸ × 1000 ms — full session lifetime
    long_term:
      token_budget: 56823      # base × PHI⁴ ≈ 8192 × 6.854
      ttl_ms: 0                # persisted — no TTL
    artifacts:
      token_budget: 150572     # base × PHI⁶ ≈ 8192 × 17.944
      ttl_ms: 0                # persisted — no TTL

  max_context_slots: 89        # fib(11) = 89 — circular memory ring capacity
  flush_interval_ms: 11090     # PHI⁵ × 1000 ms — rolling session context flush
  checkpoint_interval_ms: 17944 # PHI⁶ × 1000 ms — memory snapshot interval

# ───────────────────────────────────────────────────────────────────────────────
# COGNITIVE LAYERS
# Seven animal-archetype cognitive layers from heady-cognitive-config.json.
# ───────────────────────────────────────────────────────────────────────────────
cognitive_layers:

  count: 7                # fib(5)+2 extended cognitive archetypes
  layers:
    - id: ANT
      name: "Swarm Intelligence"
      role: "Parallel micro-task execution"
      max_workers: 34         # fib(9) = 34

    - id: BEE
      name: "Hive Mind"
      role: "Collaborative workflows"
      max_workers: 21         # fib(8) = 21

    - id: DOLPHIN
      name: "Social Intelligence"
      role: "Multi-agent communication"
      max_workers: 13         # fib(7) = 13

    - id: CROW
      name: "Tool Use"
      role: "External tool orchestration"
      max_workers: 8          # fib(6) = 8

    - id: ELEPHANT
      name: "Memory"
      role: "Long-term memory and recall"
      max_workers: 5          # fib(5) = 5

    - id: OWL
      name: "Wisdom"
      role: "Pattern recognition and strategic planning"
      max_workers: 3          # fib(4) = 3

    - id: OCTOPUS
      name: "Adaptation"
      role: "Multi-modal problem solving"
      max_workers: 2          # fib(3) = 2
