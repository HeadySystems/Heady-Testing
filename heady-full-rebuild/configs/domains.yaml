# ═══════════════════════════════════════════════════════════════════════════════
# domains.yaml — Heady™ Sovereign Phi-100 Domain Registry
# ═══════════════════════════════════════════════════════════════════════════════
#
# @author  Heady™ Core Engineering
# @version 3.2.3
#
# PURPOSE
#   Canonical domain registry for the entire Heady™ ecosystem.
#   Nine domains covering the complete surface area of the platform:
#   command center, architecture engine, nonprofit community, AI companion,
#   MCP layer, developer platform, automation agents, public API, and
#   intelligence routing.
#
#   Every timeout, TTL, and size value derives from phi-math constants.
#   No magic numbers are permitted in this file.
#
# PHI-MATH REFERENCE (from shared/phi-math.js)
#   PHI   = 1.6180339887   Golden Ratio φ
#   PSI   = 0.6180339887   Inverse Ratio ψ
#
# TIMEOUT LADDER (phi^n × 1000 ms) — only these values are valid:
#   phi^1 × 1000 =  1618 ms
#   phi^2 × 1000 =  2618 ms
#   phi^3 × 1000 =  4236 ms
#   phi^4 × 1000 =  6854 ms
#   phi^5 × 1000 = 11090 ms
#   phi^6 × 1000 = 17944 ms
#   phi^7 × 1000 = 29034 ms
#   phi^8 × 1000 = 46979 ms
#
# CSL THRESHOLDS
#   MINIMUM:  0.5000   MEDIUM: 0.8090   CRITICAL: 0.9270
#   LOW:      0.6910   HIGH:   0.8820   DEDUP:    0.9720
#
# FIBONACCI SIZES
#   F(5)=5  F(6)=8  F(7)=13  F(8)=21  F(9)=34  F(10)=55
#   F(11)=89  F(12)=144  F(13)=233
# ═══════════════════════════════════════════════════════════════════════════════

version: 3.2.3

# ───────────────────────────────────────────────────────────────────────────────
# SHARED DEFAULTS
# Inherited by all domains unless explicitly overridden.
# ───────────────────────────────────────────────────────────────────────────────
defaults:
  ssl:
    provider: cloudflare
    mode: "full_strict"
    min_tls_version: "1.3"
    hsts_max_age_ms: 46979       # PHI⁸ × 1000 ms
    hsts_include_subdomains: true
    hsts_preload: true

  health:
    interval_ms: 6854            # PHI⁴ × 1000 ms
    timeout_ms: 4236             # PHI³ × 1000 ms
    unhealthy_threshold: 3       # fib(4) = 3 consecutive failures

  rate_limit:
    window_ms: 6854              # PHI⁴ × 1000 ms sliding window
    max_requests: 144            # fib(12) = 144 per window
    burst: 21                    # fib(8) = 21 token-bucket burst

  cache:
    cdn_ttl_ms: 46979            # PHI⁸ × 1000 ms — CDN edge cache
    browser_ttl_ms: 11090        # PHI⁵ × 1000 ms — browser cache

  routing:
    retry_attempts: 5            # fib(5) = 5
    backoff_multiplier: 1.618    # PHI — never 2×
    base_delay_ms: 1618          # PHI¹ × 1000 ms

# ───────────────────────────────────────────────────────────────────────────────
# DOMAINS
# Nine Heady™ domains. Each entry contains:
#   url, role, platform, health_endpoint, cors, connected_services, routing
# ───────────────────────────────────────────────────────────────────────────────
domains:

  # ── 1. HEADYME.COM ────────────────────────────────────────────────────────
  - id: headyme
    url: "https://headyme.com"
    role: "Command Center"
    description: >
      Primary user-facing dashboard and sovereign command interface.
      Routes all user intent into the Heady™ pipeline. Hosts the Heady™Soul
      control plane and real-time swarm observability UI.
    platform:
      primary: "Cloudflare Pages"
      edge: "Cloudflare Workers"
      # Workers intercept all /api/* and /ws/* paths before Pages serves static assets
    environment: production

    health_endpoint: "https://headyme.com/health"
    ready_endpoint:  "https://headyme.com/ready"

    ssl:
      provider: cloudflare
      mode: "full_strict"
      min_tls_version: "1.3"
      hsts_max_age_ms: 46979     # PHI⁸ × 1000 ms

    cors:
      allowed_origins:
        - "https://headyme.com"
        - "https://headysystems.com"
        - "https://heady-ai.com"
        - "https://headyapi.com"
      allowed_methods: [GET, POST, PUT, DELETE, OPTIONS]
      allowed_headers: [Authorization, Content-Type, X-Heady-Version, X-Heady-Signature]
      max_age_ms: 46979           # PHI⁸ × 1000 ms
      credentials: true

    routing:
      rules:
        - match: "/api/*"
          target: "Cloudflare Workers"
          timeout_ms: 11090       # PHI⁵ × 1000 ms
        - match: "/ws/*"
          target: "Cloudflare Workers"
          timeout_ms: 46979       # PHI⁸ × 1000 ms — long-lived WebSocket
        - match: "/health"
          target: "Cloudflare Workers"
          timeout_ms: 4236        # PHI³ × 1000 ms
        - match: "/*"
          target: "Cloudflare Pages"
          timeout_ms: 6854        # PHI⁴ × 1000 ms
      retry_attempts: 5           # fib(5) = 5
      backoff_multiplier: 1.618   # PHI
      base_delay_ms: 1618         # PHI¹ × 1000 ms

    workers:
      max_instances: 21           # fib(8) = 21
      cpu_time_limit_ms: 6854     # PHI⁴ × 1000 ms
      request_timeout_ms: 29034   # PHI⁷ × 1000 ms

    connected_services:
      - headysystems.com          # Core Architecture Engine — pipeline orchestration
      - heady-ai.com               # Intelligence Routing Hub — LLM routing
      - headyapi.com              # Public Intelligence Interface — structured queries
      - headyconnection.org       # Nonprofit & Community — identity federation
      - headymcp.com              # MCP Layer — tool-call protocol

    cache:
      cdn_ttl_ms: 46979           # PHI⁸ × 1000 ms
      api_ttl_ms: 1618            # PHI¹ × 1000 ms — API responses short-lived

  # ── 2. HEADYSYSTEMS.COM ───────────────────────────────────────────────────
  - id: headysystems
    url: "https://headysystems.com"
    role: "Core Architecture Engine"
    description: >
      The sovereign back-end. Hosts the 21-stage pipeline orchestrator,
      all swarm dispatch logic, the vector store, and the law enforcement
      shell. All other domains route compute-heavy workloads here.
    platform:
      primary: "Cloud Run"
      region: "us-central1"
      min_instances: 2            # fib(3) = 2
      max_instances: 13           # fib(7) = 13
      concurrency: 8              # fib(6) = 8
      memory: "512Mi"
      cpu: 1
      timeout_seconds: 29         # round(PHI⁷) = 29
    environment: production

    health_endpoint: "https://headysystems.com/health"
    ready_endpoint:  "https://headysystems.com/ready"
    metrics_endpoint: "https://headysystems.com/metrics"

    ssl:
      provider: cloudflare
      mode: "full_strict"
      min_tls_version: "1.3"
      hsts_max_age_ms: 46979

    cors:
      allowed_origins:
        - "https://headyme.com"
        - "https://heady-ai.com"
        - "https://headyapi.com"
        - "https://headyio.com"
        - "https://headymcp.com"
        - "https://headybot.com"
        - "https://headybuddy.org"
      allowed_methods: [GET, POST, PUT, DELETE, OPTIONS]
      allowed_headers: [Authorization, Content-Type, X-Heady-Version, X-Heady-Signature, X-Pipeline-Stage]
      max_age_ms: 46979
      credentials: true

    routing:
      rules:
        - match: "/pipeline/*"
          target: "Cloud Run"
          timeout_ms: 46979       # PHI⁸ × 1000 ms — full pipeline may be long
        - match: "/swarm/*"
          target: "Cloud Run"
          timeout_ms: 29034       # PHI⁷ × 1000 ms
        - match: "/vector/*"
          target: "Cloud Run"
          timeout_ms: 11090       # PHI⁵ × 1000 ms
        - match: "/health"
          target: "Cloud Run"
          timeout_ms: 4236        # PHI³ × 1000 ms
      retry_attempts: 5
      backoff_multiplier: 1.618
      base_delay_ms: 1618

    circuit_breaker:
      threshold: 5                # fib(5) = 5 failures
      half_open_timeout_ms: 11090 # PHI⁵ × 1000 ms
      reset_timeout_ms: 29034     # PHI⁷ × 1000 ms

    connected_services:
      - heady-ai.com               # Intelligence Routing Hub
      - headyapi.com              # Public Intelligence Interface
      - headymcp.com              # MCP Layer
      - headyio.com               # Developer Platform
      - headybot.com              # Automation & Agents

    cache:
      cdn_ttl_ms: 1618            # PHI¹ × 1000 ms — architecture responses are live

  # ── 3. HEADYCONNECTION.ORG ───────────────────────────────────────────────
  - id: headyconnection
    url: "https://headyconnection.org"
    role: "Nonprofit & Community"
    description: >
      Public-facing nonprofit and community hub. Hosts educational content,
      community governance docs, and identity federation for charitable
      access tiers. No compute-intensive workloads run here.
    platform:
      primary: "Cloudflare Pages"
      # Static site — Workers handle form submissions and identity callbacks only
      edge: "Cloudflare Workers"
    environment: production

    health_endpoint: "https://headyconnection.org/health"
    ready_endpoint:  "https://headyconnection.org/ready"

    ssl:
      provider: cloudflare
      mode: "full_strict"
      min_tls_version: "1.3"
      hsts_max_age_ms: 46979

    cors:
      allowed_origins:
        - "https://headyconnection.org"
        - "https://headyme.com"
        - "https://headybuddy.org"
      allowed_methods: [GET, POST, OPTIONS]
      allowed_headers: [Authorization, Content-Type, X-Heady-Version]
      max_age_ms: 46979
      credentials: false           # public nonprofit content — no credentials

    routing:
      rules:
        - match: "/api/*"
          target: "Cloudflare Workers"
          timeout_ms: 11090        # PHI⁵ × 1000 ms
        - match: "/auth/*"
          target: "Cloudflare Workers"
          timeout_ms: 6854         # PHI⁴ × 1000 ms
        - match: "/*"
          target: "Cloudflare Pages"
          timeout_ms: 6854
      retry_attempts: 5
      backoff_multiplier: 1.618
      base_delay_ms: 1618

    workers:
      max_instances: 8            # fib(6) = 8 — light edge load
      cpu_time_limit_ms: 4236     # PHI³ × 1000 ms
      request_timeout_ms: 11090   # PHI⁵ × 1000 ms

    connected_services:
      - headyme.com               # Command Center — identity federation
      - headybuddy.org            # AI Companion — community access tier

    cache:
      cdn_ttl_ms: 46979           # PHI⁸ × 1000 ms — static content cached aggressively
      api_ttl_ms: 4236            # PHI³ × 1000 ms

  # ── 4. HEADYBUDDY.ORG ────────────────────────────────────────────────────
  - id: headybuddy
    url: "https://headybuddy.org"
    role: "AI Companion Experience"
    description: >
      Consumer AI companion interface. Delivers real-time conversational
      interactions, memory-backed context, and personalized companion
      sessions. Runs on Cloud Run for stateful compute with Cloudflare
      Workers handling edge routing and streaming.
    platform:
      primary: "Cloud Run"
      edge: "Cloudflare Workers"
      region: "us-central1"
      min_instances: 2            # fib(3) = 2
      max_instances: 13           # fib(7) = 13
      concurrency: 8              # fib(6) = 8
      memory: "512Mi"
      cpu: 1
      timeout_seconds: 29         # round(PHI⁷) = 29
    environment: production

    health_endpoint: "https://headybuddy.org/health"
    ready_endpoint:  "https://headybuddy.org/ready"

    ssl:
      provider: cloudflare
      mode: "full_strict"
      min_tls_version: "1.3"
      hsts_max_age_ms: 46979

    cors:
      allowed_origins:
        - "https://headybuddy.org"
        - "https://headyme.com"
        - "https://headyconnection.org"
        - "https://heady-ai.com"
      allowed_methods: [GET, POST, PUT, DELETE, OPTIONS]
      allowed_headers: [Authorization, Content-Type, X-Heady-Version, X-Heady-Signature, X-Session-Id]
      max_age_ms: 46979
      credentials: true

    routing:
      rules:
        - match: "/stream/*"
          target: "Cloudflare Workers"
          timeout_ms: 46979        # PHI⁸ × 1000 ms — streaming responses
        - match: "/companion/*"
          target: "Cloud Run"
          timeout_ms: 29034        # PHI⁷ × 1000 ms
        - match: "/memory/*"
          target: "Cloud Run"
          timeout_ms: 11090        # PHI⁵ × 1000 ms
        - match: "/health"
          target: "Cloud Run"
          timeout_ms: 4236
      retry_attempts: 5
      backoff_multiplier: 1.618
      base_delay_ms: 1618

    session:
      ttl_ms: 46979               # PHI⁸ × 1000 ms
      max_concurrent: 21          # fib(8) = 21 companion sessions per instance

    connected_services:
      - heady-ai.com               # Intelligence Routing Hub — LLM routing
      - headysystems.com          # Core Architecture Engine — memory & pipeline
      - headyapi.com              # Public Intelligence Interface
      - headymcp.com              # MCP Layer — tool access
      - headyconnection.org       # Nonprofit — community access tier

    cache:
      cdn_ttl_ms: 1618            # PHI¹ × 1000 ms — companion state is live
      session_ttl_ms: 46979       # PHI⁸ × 1000 ms

  # ── 5. HEADYMCP.COM ───────────────────────────────────────────────────────
  - id: headymcp
    url: "https://headymcp.com"
    role: "MCP Layer"
    description: >
      Model Context Protocol gateway. Exposes standardized MCP endpoints
      for tool registration, invocation, and result routing. Acts as the
      universal tool-call broker between AI agents and external services.
    platform:
      primary: "Cloud Run"
      region: "us-central1"
      min_instances: 2            # fib(3) = 2
      max_instances: 13           # fib(7) = 13
      concurrency: 8              # fib(6) = 8
      memory: "512Mi"
      cpu: 1
      timeout_seconds: 29
    environment: production

    health_endpoint: "https://headymcp.com/health"
    ready_endpoint:  "https://headymcp.com/ready"

    ssl:
      provider: cloudflare
      mode: "full_strict"
      min_tls_version: "1.3"
      hsts_max_age_ms: 46979

    cors:
      allowed_origins:
        - "https://headyme.com"
        - "https://headysystems.com"
        - "https://headybuddy.org"
        - "https://headybot.com"
        - "https://headyio.com"
        - "https://headyapi.com"
        - "https://heady-ai.com"
      allowed_methods: [GET, POST, PUT, DELETE, OPTIONS]
      allowed_headers: [Authorization, Content-Type, X-Heady-Version, X-Heady-Signature, X-MCP-Tool-Id]
      max_age_ms: 46979
      credentials: true

    routing:
      rules:
        - match: "/tools/*"
          target: "Cloud Run"
          timeout_ms: 29034        # PHI⁷ × 1000 ms — tool invocations may be slow
        - match: "/register/*"
          target: "Cloud Run"
          timeout_ms: 11090        # PHI⁵ × 1000 ms
        - match: "/result/*"
          target: "Cloud Run"
          timeout_ms: 4236         # PHI³ × 1000 ms
        - match: "/health"
          target: "Cloud Run"
          timeout_ms: 4236
      retry_attempts: 5
      backoff_multiplier: 1.618
      base_delay_ms: 1618

    tool_registry:
      max_registered_tools: 89     # fib(11) = 89
      tool_ttl_ms: 46979           # PHI⁸ × 1000 ms — tool registration lifetime
      invocation_timeout_ms: 29034 # PHI⁷ × 1000 ms
      result_cache_ttl_ms: 4236    # PHI³ × 1000 ms

    circuit_breaker:
      threshold: 5
      half_open_timeout_ms: 11090
      reset_timeout_ms: 29034

    connected_services:
      - headysystems.com          # Core Architecture Engine — pipeline integration
      - headybot.com              # Automation & Agents — agent tool access
      - headyapi.com              # Public Intelligence Interface
      - headyio.com               # Developer Platform — tool publishing

    cache:
      cdn_ttl_ms: 6854            # PHI⁴ × 1000 ms — tool manifests semi-static

  # ── 6. HEADYIO.COM ────────────────────────────────────────────────────────
  - id: headyio
    url: "https://headyio.com"
    role: "Developer Platform"
    description: >
      Developer-facing platform. Hosts SDK documentation, API playgrounds,
      tool publishing, webhook configuration, audit logs, and developer
      billing. Acts as the external developer integration layer.
    platform:
      primary: "Cloud Run"
      region: "us-central1"
      min_instances: 2
      max_instances: 13
      concurrency: 8
      memory: "512Mi"
      cpu: 1
      timeout_seconds: 29
    environment: production

    health_endpoint: "https://headyio.com/health"
    ready_endpoint:  "https://headyio.com/ready"
    metrics_endpoint: "https://headyio.com/metrics"
    audit_endpoint:   "https://headyio.com/audit"

    ssl:
      provider: cloudflare
      mode: "full_strict"
      min_tls_version: "1.3"
      hsts_max_age_ms: 46979

    cors:
      allowed_origins:
        - "https://headyio.com"
        - "https://headyme.com"
        - "https://headysystems.com"
        - "https://headyapi.com"
        - "https://headymcp.com"
      allowed_methods: [GET, POST, PUT, DELETE, OPTIONS]
      allowed_headers: [Authorization, Content-Type, X-Heady-Version, X-Heady-Signature, X-Developer-Key]
      max_age_ms: 46979
      credentials: true

    routing:
      rules:
        - match: "/v1/*"
          target: "Cloud Run"
          timeout_ms: 17944        # PHI⁶ × 1000 ms — API calls
        - match: "/webhooks/*"
          target: "Cloud Run"
          timeout_ms: 11090        # PHI⁵ × 1000 ms
        - match: "/audit/*"
          target: "Cloud Run"
          timeout_ms: 6854         # PHI⁴ × 1000 ms
        - match: "/docs/*"
          target: "Cloud Run"
          timeout_ms: 4236
        - match: "/health"
          target: "Cloud Run"
          timeout_ms: 4236
      retry_attempts: 5
      backoff_multiplier: 1.618
      base_delay_ms: 1618

    developer:
      max_api_keys_per_account: 8   # fib(6) = 8
      key_ttl_ms: 46979             # PHI⁸ × 1000 ms
      webhook_max_retries: 5        # fib(5) = 5
      webhook_backoff_ms: 1618      # PHI¹ × 1000 ms
      rate_limit_window_ms: 6854    # PHI⁴ × 1000 ms
      rate_limit_max_requests: 144  # fib(12) = 144

    circuit_breaker:
      threshold: 5
      half_open_timeout_ms: 11090
      reset_timeout_ms: 29034

    connected_services:
      - headysystems.com          # Core Architecture Engine
      - headyapi.com              # Public Intelligence Interface
      - headymcp.com              # MCP Layer — tool publishing
      - headybot.com              # Automation & Agents
      - heady-ai.com               # Intelligence Routing Hub

    cache:
      cdn_ttl_ms: 11090           # PHI⁵ × 1000 ms — docs semi-static
      api_ttl_ms: 1618            # PHI¹ × 1000 ms — live API data

  # ── 7. HEADYBOT.COM ───────────────────────────────────────────────────────
  - id: headybot
    url: "https://headybot.com"
    role: "Automation & Agents"
    description: >
      Autonomous agent and automation platform. Hosts scheduled job runners,
      event-driven agent triggers, bot persona orchestration, and workflow
      automation pipelines. All agent work is dispatched through the swarm
      dispatch layer at headysystems.com.
    platform:
      primary: "Cloud Run"
      region: "us-central1"
      min_instances: 2
      max_instances: 13
      concurrency: 8
      memory: "512Mi"
      cpu: 1
      timeout_seconds: 29
    environment: production

    health_endpoint: "https://headybot.com/health"
    ready_endpoint:  "https://headybot.com/ready"

    ssl:
      provider: cloudflare
      mode: "full_strict"
      min_tls_version: "1.3"
      hsts_max_age_ms: 46979

    cors:
      allowed_origins:
        - "https://headyme.com"
        - "https://headysystems.com"
        - "https://headyio.com"
        - "https://headymcp.com"
        - "https://headyapi.com"
      allowed_methods: [GET, POST, PUT, DELETE, OPTIONS]
      allowed_headers: [Authorization, Content-Type, X-Heady-Version, X-Heady-Signature, X-Agent-Id, X-Job-Id]
      max_age_ms: 46979
      credentials: true

    routing:
      rules:
        - match: "/agents/*"
          target: "Cloud Run"
          timeout_ms: 46979        # PHI⁸ × 1000 ms — agents may run long
        - match: "/jobs/*"
          target: "Cloud Run"
          timeout_ms: 29034        # PHI⁷ × 1000 ms
        - match: "/triggers/*"
          target: "Cloud Run"
          timeout_ms: 11090        # PHI⁵ × 1000 ms
        - match: "/status/*"
          target: "Cloud Run"
          timeout_ms: 4236
        - match: "/health"
          target: "Cloud Run"
          timeout_ms: 4236
      retry_attempts: 5
      backoff_multiplier: 1.618
      base_delay_ms: 1618

    agents:
      max_concurrent_agents: 21    # fib(8) = 21
      max_job_queue_depth: 89      # fib(11) = 89
      job_ttl_ms: 46979            # PHI⁸ × 1000 ms
      agent_idle_timeout_ms: 17944 # PHI⁶ × 1000 ms
      heartbeat_interval_ms: 6854  # PHI⁴ × 1000 ms

    circuit_breaker:
      threshold: 5
      half_open_timeout_ms: 11090
      reset_timeout_ms: 29034

    connected_services:
      - headysystems.com          # Core Architecture Engine — swarm dispatch
      - headymcp.com              # MCP Layer — tool access for agents
      - headyapi.com              # Public Intelligence Interface — agent queries
      - headyio.com               # Developer Platform — job configuration
      - heady-ai.com               # Intelligence Routing Hub — LLM for agents

    cache:
      cdn_ttl_ms: 1618            # PHI¹ × 1000 ms — job state is live
      status_ttl_ms: 4236         # PHI³ × 1000 ms — status responses short-lived

  # ── 8. HEADYAPI.COM ───────────────────────────────────────────────────────
  - id: headyapi
    url: "https://headyapi.com"
    role: "Public Intelligence Interface"
    description: >
      The public-facing intelligence API. Provides structured, rate-limited
      access to Heady™ AI capabilities for external consumers. Acts as the
      gateway between the internet and the sovereign core — all public
      queries are vetted through the CSL coherence gate before dispatch.
    platform:
      primary: "Cloud Run"
      region: "us-central1"
      min_instances: 2
      max_instances: 13
      concurrency: 8
      memory: "512Mi"
      cpu: 1
      timeout_seconds: 29
    environment: production

    health_endpoint: "https://headyapi.com/health"
    ready_endpoint:  "https://headyapi.com/ready"
    metrics_endpoint: "https://headyapi.com/metrics"

    ssl:
      provider: cloudflare
      mode: "full_strict"
      min_tls_version: "1.3"
      hsts_max_age_ms: 46979

    cors:
      # Public API — broader allowed origins
      allowed_origins:
        - "https://headyme.com"
        - "https://headysystems.com"
        - "https://headybuddy.org"
        - "https://headybot.com"
        - "https://headyio.com"
        - "https://headymcp.com"
        - "https://heady-ai.com"
        - "https://headyconnection.org"
      allowed_methods: [GET, POST, OPTIONS]
      allowed_headers: [Authorization, Content-Type, X-Heady-Version, X-Heady-Signature, X-API-Key]
      max_age_ms: 46979
      credentials: true

    routing:
      rules:
        - match: "/v1/intelligence/*"
          target: "Cloud Run"
          timeout_ms: 29034        # PHI⁷ × 1000 ms — intelligence queries
        - match: "/v1/search/*"
          target: "Cloud Run"
          timeout_ms: 17944        # PHI⁶ × 1000 ms
        - match: "/v1/embed/*"
          target: "Cloud Run"
          timeout_ms: 11090        # PHI⁵ × 1000 ms
        - match: "/v1/generate/*"
          target: "Cloud Run"
          timeout_ms: 46979        # PHI⁸ × 1000 ms — generation may be long
        - match: "/health"
          target: "Cloud Run"
          timeout_ms: 4236
      retry_attempts: 5
      backoff_multiplier: 1.618
      base_delay_ms: 1618

    public_api:
      # CSL gate on all inbound public queries
      coherence_gate_threshold: 0.8090   # CSL_THRESHOLDS.MEDIUM
      admission_floor: 0.6910            # CSL_THRESHOLDS.LOW
      rate_limit_window_ms: 6854         # PHI⁴ × 1000 ms
      rate_limit_max_requests: 89        # fib(11) = 89 — conservative public cap
      burst_limit: 13                    # fib(7) = 13
      api_key_ttl_ms: 46979             # PHI⁸ × 1000 ms

    circuit_breaker:
      threshold: 5
      half_open_timeout_ms: 11090
      reset_timeout_ms: 29034

    connected_services:
      - headysystems.com          # Core Architecture Engine — pipeline dispatch
      - heady-ai.com               # Intelligence Routing Hub — LLM selection
      - headymcp.com              # MCP Layer — tool-augmented responses
      - headyio.com               # Developer Platform — API key validation

    cache:
      cdn_ttl_ms: 4236            # PHI³ × 1000 ms — responses moderately cacheable
      search_ttl_ms: 11090        # PHI⁵ × 1000 ms — search results cached longer

  # ── 9. HEADYAI.COM ────────────────────────────────────────────────────────
  - id: headyai
    url: "https://heady-ai.com"
    role: "Intelligence Routing Hub"
    description: >
      The sovereign LLM router and intelligence routing hub. Runs entirely
      on Cloudflare Workers at the edge for minimum-latency model selection.
      Applies phi-weighted routing scores across all registered model
      providers, enforces CSL coherence gates, and distributes inference
      load across providers using the Fibonacci pool step pattern.
    platform:
      primary: "Cloudflare Workers"
      # No Cloud Run — pure edge routing for ultra-low latency model dispatch
    environment: production

    health_endpoint: "https://heady-ai.com/health"
    ready_endpoint:  "https://heady-ai.com/ready"

    ssl:
      provider: cloudflare
      mode: "full_strict"
      min_tls_version: "1.3"
      hsts_max_age_ms: 46979

    cors:
      allowed_origins:
        - "https://headyme.com"
        - "https://headysystems.com"
        - "https://headybuddy.org"
        - "https://headybot.com"
        - "https://headyapi.com"
        - "https://headymcp.com"
        - "https://headyio.com"
        - "https://headyconnection.org"
      allowed_methods: [GET, POST, OPTIONS]
      allowed_headers: [Authorization, Content-Type, X-Heady-Version, X-Heady-Signature, X-Model-Preference, X-Routing-Mode]
      max_age_ms: 46979
      credentials: true

    routing:
      rules:
        - match: "/route/*"
          target: "Cloudflare Workers"
          timeout_ms: 11090        # PHI⁵ × 1000 ms — routing decision fast
        - match: "/infer/*"
          target: "Cloudflare Workers"
          timeout_ms: 46979        # PHI⁸ × 1000 ms — proxied inference may be long
        - match: "/score/*"
          target: "Cloudflare Workers"
          timeout_ms: 6854         # PHI⁴ × 1000 ms — scoring requests
        - match: "/health"
          target: "Cloudflare Workers"
          timeout_ms: 4236
      retry_attempts: 5
      backoff_multiplier: 1.618
      base_delay_ms: 1618

    workers:
      max_instances: 21           # fib(8) = 21
      cpu_time_limit_ms: 6854     # PHI⁴ × 1000 ms
      request_timeout_ms: 46979   # PHI⁸ × 1000 ms

    intelligence_routing:
      # Phi-weighted model selection scores — weights sum to 1.0 via phiFusionWeights(N)
      coherence_gate: 0.8090       # CSL_THRESHOLDS.MEDIUM — minimum to proceed
      fallback_threshold: 0.6910   # CSL_THRESHOLDS.LOW — route to fallback provider
      critical_gate: 0.9270        # CSL_THRESHOLDS.CRITICAL — escalate to premium model
      max_model_providers: 8       # fib(6) = 8 registered LLM providers
      provider_ttl_ms: 11090       # PHI⁵ × 1000 ms — provider health cache
      routing_cache_ttl_ms: 4236   # PHI³ × 1000 ms — routing decision cache
      load_balance_window: 21      # fib(8) = 21 requests in rolling load-balance window
      backoff_multiplier: 1.618    # PHI — provider retry backoff

    circuit_breaker:
      threshold: 5
      half_open_timeout_ms: 11090
      reset_timeout_ms: 29034

    connected_services:
      - headysystems.com          # Core Architecture Engine — pipeline context
      - headyapi.com              # Public Intelligence Interface — query intake
      - headymcp.com              # MCP Layer — tool-augmented inference
      - headybuddy.org            # AI Companion — companion model routing
      - headybot.com              # Automation & Agents — agent model routing
      - headyio.com               # Developer Platform — developer inference

    cache:
      routing_decision_ttl_ms: 4236   # PHI³ × 1000 ms
      provider_health_ttl_ms: 11090   # PHI⁵ × 1000 ms

