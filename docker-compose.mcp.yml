#
# MCP Gateway + Admin UI stack.
# Usage: docker compose -f docker-compose.mcp.yml up -d

services:
  mcp-gateway:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./:/app
    ports:
      - "4000:4000"
    environment:
      - NODE_ENV=production
      - MCP_GATEWAY_TOKEN=${MCP_GATEWAY_TOKEN:-}
    command: npm run start:mcp
    depends_on:
      - redis
    networks:
      - heady-mcp-net
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - heady-mcp-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  admin-ui:
    image: node:20-alpine
    working_dir: /app/frontend
    volumes:
      - ./:/app
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
    command: npm run dev
    depends_on:
      - mcp-gateway
      - redis
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - heady-mcp-net
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  heady-mcp-net:
    driver: bridge
