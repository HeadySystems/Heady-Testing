# ═══════════════════════════════════════════════════════════════════════
# HEADY™ ADVANCED MCP SERVICES — Docker Compose
# ═══════════════════════════════════════════════════════════════════════
# 45 new φ-scaled microservices for the MCP ecosystem
# All ports follow the φ-indexed allocation scheme (34xx-36xx)
#
# Usage:
#   docker compose -f docker-compose.advanced-mcp.yml up
#   docker compose -f docker-compose.advanced-mcp.yml up heady-chrono heady-nexus
#
# @version 5.1.0

x-heady-defaults: &heady-defaults
  restart: unless-stopped
  networks:
    - heady-mesh
  environment: &heady-env
    NODE_ENV: production
    LOG_LEVEL: info
    DATABASE_URL: ${DATABASE_URL}
    REDIS_URL: ${REDIS_URL}
    HEADY_SERVICE_HOST: ${HEADY_SERVICE_HOST:-host.docker.internal}
  healthcheck:
    test: ["CMD", "wget", "--spider", "-q", "http://localhost:${PORT:-3310}/health"]
    interval: 30s
    timeout: 5s
    retries: 3
    start_period: 10s
  deploy:
    resources:
      limits:
        memory: 256M
        cpus: '0.5'
      reservations:
        memory: 128M
        cpus: '0.25'

services:
  # ═══ Tier 0 — Critical Intelligence ═══════════════════════════════
  heady-chrono:
    <<: *heady-defaults
    build: ./services/heady-chrono
    container_name: heady-chrono
    ports: ["3400:3400"]
    environment:
      <<: *heady-env
      PORT: 3400

  heady-cartograph:
