# Heady Network Policies — Zero-Trust Service Mesh
# Author: Eric Haywood / HeadySystems Inc. — 51 Provisional Patents
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: heady-default-deny
  namespace: heady
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: heady-api-gateway-ingress
  namespace: heady
spec:
  podSelector:
    matchLabels:
      app: api-gateway
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              name: heady-edge
      ports:
        - protocol: TCP
          port: 3316
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: heady-postgres-ingress
  namespace: heady
spec:
  podSelector:
    matchLabels:
      app: postgres
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              tier: pgbouncer
      ports:
        - protocol: TCP
          port: 5432
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: heady-redis-ingress
  namespace: heady
spec:
  podSelector:
    matchLabels:
      app: redis
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              tier: service
      ports:
        - protocol: TCP
          port: 6379
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: heady-nats-ingress
  namespace: heady
spec:
  podSelector:
    matchLabels:
      app: nats
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              tier: service
      ports:
        - protocol: TCP
          port: 4222
        - protocol: TCP
          port: 6222
