# Cloudflare Workers Configuration
# Based on 2026 best practices for Heady edge infrastructure

name = "heady-edge-proxy"
main = "src/index.js"
compatibility_date = "2026-03-01"

# Use bindings instead of REST APIs for zero-latency
[[kv_namespaces]]
binding = "HEADY_CACHE"
id = "YOUR_KV_NAMESPACE_ID"

[[r2_buckets]]
binding = "HEADY_STORAGE"
bucket_name = "heady-assets"

[[d1_databases]]
binding = "HEADY_DB"
database_name = "heady-production"
database_id = "YOUR_D1_DATABASE_ID"

# Service-to-service bindings (zero network hop)
[[services]]
binding = "HEADY_MANAGER"
service = "heady-manager-service"
environment = "production"

[[services]]
binding = "HEADY_MCP"
service = "heady-mcp-service"
environment = "production"

# Durable Objects for stateful coordination
[[durable_objects.bindings]]
name = "HEADY_ORCHESTRATOR"
class_name = "HeadyOrchestrator"
script_name = "heady-orchestrator"

# Queue bindings for background work
[[queues.producers]]
binding = "HEADY_TASKS"
queue = "heady-background-tasks"

[[queues.consumers]]
queue = "heady-background-tasks"
max_batch_size = 10
max_batch_timeout = 30

# Analytics Engine binding
[[analytics_engine_datasets]]
binding = "HEADY_ANALYTICS"

# Environment variables
[env.production]
ENVIRONMENT = "production"
LOG_LEVEL = "info"
PHI_RATIO = "1.618033988749895"

[env.staging]
ENVIRONMENT = "staging"
LOG_LEVEL = "debug"

# Limits
[limits]
cpu_ms = 50
