<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — Heady™ Secure Authentication</title>
  <meta name="description" content="Secure authentication gateway for all Heady™ services. Firebase Auth with Google OAuth, Email/Password, and Anonymous guest access.">
  <meta name="robots" content="noindex, nofollow">
  <link rel="canonical" href="https://auth.headysystems.com/login">
  <link rel="stylesheet" href="../shared/css/heady-design-system.css">
  <style>
    :root { --accent: #00d4aa; --accent-glow: #00d4aa4d; --accent-dim: #00d4aa1a; }
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .auth-container {
      width: 100%; max-width: 420px; padding: 55px 34px;
      background: rgba(255,255,255,0.03); backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.08); border-radius: 21px;
    }
    .auth-logo { text-align: center; margin-bottom: 34px; }
    .auth-logo .logo-icon {
      width: 55px; height: 55px; border-radius: 13px; display: inline-flex;
      align-items: center; justify-content: center; font-size: 1.618rem; font-weight: 700;
      background: linear-gradient(135deg, #00d4aa, rgba(139,92,246,0.8)); color: #fff;
    }
    .auth-logo h1 { font-size: 1.618rem; margin-top: 13px; color: #e8e8f0; }
    .auth-logo p { color: #9898a8; font-size: 0.875rem; margin-top: 8px; }
    .auth-btn {
      width: 100%; padding: 13px 21px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.05); color: #e8e8f0; font-size: 1rem;
      cursor: pointer; display: flex; align-items: center; gap: 13px;
      margin-bottom: 13px; transition: all 0.3s cubic-bezier(0.618,0,0.382,1);
    }
    .auth-btn:hover { background: rgba(255,255,255,0.1); border-color: var(--accent); }
    .auth-btn-primary { background: var(--accent); color: #0a0a0f; font-weight: 600; border-color: var(--accent); }
    .auth-btn-primary:hover { background: #00e8bb; }
    .auth-divider { text-align: center; color: #9898a8; margin: 21px 0; position: relative; }
    .auth-divider::before, .auth-divider::after {
      content: ''; position: absolute; top: 50%; width: 40%; height: 1px;
      background: rgba(255,255,255,0.08);
    }
    .auth-divider::before { left: 0; } .auth-divider::after { right: 0; }
    .auth-input {
      width: 100%; padding: 13px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.03); color: #e8e8f0; font-size: 1rem;
      margin-bottom: 13px; outline: none;
    }
    .auth-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-dim); }
    .auth-input::placeholder { color: #6868a8; }
    .auth-error { color: #ff6b6b; font-size: 0.875rem; margin-bottom: 13px; display: none; }
    .auth-success { color: var(--accent); font-size: 0.875rem; margin-bottom: 13px; display: none; }
    .auth-footer { text-align: center; margin-top: 21px; color: #6868a8; font-size: 0.75rem; }
    .auth-footer a { color: var(--accent); text-decoration: none; }
    .auth-rate-limit { color: #f59e0b; font-size: 0.75rem; text-align: center; display: none; margin-top: 8px; }
    .security-badge { display: flex; align-items: center; justify-content: center; gap: 8px;
      color: #9898a8; font-size: 0.75rem; margin-top: 21px; }
    .security-badge span { color: var(--accent); }
    #email-form { display: none; }
    .back-link { color: var(--accent); cursor: pointer; font-size: 0.875rem; margin-bottom: 13px; display: none; }
    canvas#auth-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; opacity: 0.3; }
  </style>
</head>
<body>
  <canvas id="auth-canvas" aria-hidden="true"></canvas>
  <div class="auth-container" role="main" aria-label="Authentication">
    <div class="auth-logo">
      <div class="logo-icon">H</div>
      <h1>Heady™</h1>
      <p>Secure Authentication Gateway</p>
    </div>

    <div id="auth-error" class="auth-error" role="alert"></div>
    <div id="auth-success" class="auth-success" role="status"></div>

    <!-- Provider Buttons -->
    <div id="provider-buttons">
      <button class="auth-btn auth-btn-primary" id="btn-google" aria-label="Sign in with Google">
        <svg width="20" height="20" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
        Sign in with Google
      </button>

      <div class="auth-divider">or</div>

      <button class="auth-btn" id="btn-email" aria-label="Sign in with email">
        <span>✉</span> Sign in with Email
      </button>

      <button class="auth-btn" id="btn-anonymous" aria-label="Continue as guest">
        <span>👤</span> Continue as Guest
      </button>
      <div id="rate-limit-msg" class="auth-rate-limit">Guest sessions are rate-limited for security.</div>
    </div>

    <!-- Email Form (hidden by default) -->
    <div id="email-form">
      <span class="back-link" id="back-to-providers">← Back to sign-in options</span>
      <input type="email" class="auth-input" id="input-email" placeholder="Email address" autocomplete="email" required aria-label="Email address">
      <input type="password" class="auth-input" id="input-password" placeholder="Password" autocomplete="current-password" required aria-label="Password">
      <button class="auth-btn auth-btn-primary" id="btn-email-submit">Sign In</button>
      <button class="auth-btn" id="btn-email-create">Create Account</button>
    </div>

    <div class="security-badge">
      <span>🔒</span> Secured by Firebase Auth · httpOnly Cookies · Zero-Trust
    </div>

    <div class="auth-footer">
      <p>Protected by 51+ provisional patents · <a href="https://headysystems.com">HeadySystems</a></p>
      <p style="margin-top:5px;">© 2026 HeadySystems Inc. All Rights Reserved.</p>
    </div>
  </div>

  <script src="../shared/js/phi-math.js"></script>
  <script src="../shared/js/sacred-geometry-canvas.js"></script>
  <script>
    // Initialize background canvas
    new SacredGeometryCanvas('auth-canvas', 'flower-of-life', '#00d4aa');
  </script>
  <script type="module">
    /**
     * Heady™ Secure Auth Controller
     * Security: httpOnly cookies, state/nonce, redirect allowlist, short JWT, revocation blacklist, anonymous rate-limit
     * NO localStorage for tokens (XSS vulnerable). Everything goes through httpOnly Secure cookies.
     */
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
    import {
      getAuth, signInWithPopup, GoogleAuthProvider,
      signInWithEmailAndPassword, createUserWithEmailAndPassword,
      signInAnonymously, onAuthStateChanged, getIdToken
    } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
    import {
      getFirestore, doc, setDoc, getDoc, serverTimestamp, collection
    } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

    // ─── Firebase Config ────────────────────────────────────────────────────
    const firebaseConfig = {
      apiKey: window.__HEADY_ENV__?.FIREBASE_API_KEY || 'AIzaSyXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX',
      authDomain: 'gen-lang-client-0920560496.firebaseapp.com',
      projectId: 'gen-lang-client-0920560496',
      storageBucket: 'gen-lang-client-0920560496.appspot.com',
      messagingSenderId: '920560496',
      appId: '1:920560496:web:XXXXXXXXXXXXXXXX',
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // ─── Security: Redirect URL Allowlist (CSRF Protection) ─────────────────
    const ALLOWED_REDIRECT_DOMAINS = Object.freeze([
      'headyme.com', 'headysystems.com', 'heady-ai.com', 'headyos.com',
      'headyconnection.org', 'headyconnection.com', 'headyex.com',
      'headyfinance.com', 'admin.headysystems.com', 'auth.headysystems.com',
      'localhost', '127.0.0.1',
    ]);

    function validateRedirectUrl(url) {
      if (!url) return 'https://headyme.com';
      try {
        const parsed = new URL(url);
        const hostname = parsed.hostname;
        const isAllowed = ALLOWED_REDIRECT_DOMAINS.some(d =>
          hostname === d || hostname.endsWith('.' + d)
        );
        if (!isAllowed) {
          console.warn(`[HeadyAuth] Blocked redirect to unauthorized domain: ${hostname}`);
          return 'https://headyme.com';
        }
        return url;
      } catch {
        return 'https://headyme.com';
      }
    }

    // ─── Security: State/Nonce for OAuth Flows ──────────────────────────────
    function generateNonce(length = 32) {
      const array = new Uint8Array(length);
      crypto.getRandomValues(array);
      return Array.from(array, b => b.toString(16).padStart(2, '0')).join('');
    }

    function setOAuthState() {
      const state = generateNonce();
      const nonce = generateNonce();
      sessionStorage.setItem('heady_oauth_state', state);
      sessionStorage.setItem('heady_oauth_nonce', nonce);
      return { state, nonce };
    }

    function validateOAuthState(state) {
      const stored = sessionStorage.getItem('heady_oauth_state');
      sessionStorage.removeItem('heady_oauth_state');
      sessionStorage.removeItem('heady_oauth_nonce');
      return stored && stored === state;
    }

    // ─── Security: Anonymous Rate Limiting ──────────────────────────────────
    const ANON_RATE_LIMIT = { maxPerHour: 5, windowMs: 3600000 };
    function checkAnonRateLimit() {
      const key = 'heady_anon_attempts';
      const now = Date.now();
      let attempts = [];
      try { attempts = JSON.parse(sessionStorage.getItem(key) || '[]'); } catch {}
      attempts = attempts.filter(t => now - t < ANON_RATE_LIMIT.windowMs);
      if (attempts.length >= ANON_RATE_LIMIT.maxPerHour) return false;
      attempts.push(now);
      sessionStorage.setItem(key, JSON.stringify(attempts));
      return true;
    }

    // ─── Parse Redirect URL ─────────────────────────────────────────────────
    const params = new URLSearchParams(window.location.search);
    const redirectUrl = validateRedirectUrl(params.get('redirect'));

    // ─── DOM Elements ───────────────────────────────────────────────────────
    const btnGoogle = document.getElementById('btn-google');
    const btnEmail = document.getElementById('btn-email');
    const btnAnonymous = document.getElementById('btn-anonymous');
    const btnEmailSubmit = document.getElementById('btn-email-submit');
    const btnEmailCreate = document.getElementById('btn-email-create');
    const backLink = document.getElementById('back-to-providers');
    const providerButtons = document.getElementById('provider-buttons');
    const emailForm = document.getElementById('email-form');
    const inputEmail = document.getElementById('input-email');
    const inputPassword = document.getElementById('input-password');
    const errorEl = document.getElementById('auth-error');
    const successEl = document.getElementById('auth-success');
    const rateLimitMsg = document.getElementById('rate-limit-msg');

    function showError(msg) {
      errorEl.textContent = msg;
      errorEl.style.display = 'block';
      successEl.style.display = 'none';
      setTimeout(() => { errorEl.style.display = 'none'; }, 8000);
    }

    function showSuccess(msg) {
      successEl.textContent = msg;
      successEl.style.display = 'block';
      errorEl.style.display = 'none';
    }

    // ─── Token Relay via httpOnly Cookie (server-side endpoint) ──────────────
    // In production, the token is sent to a server endpoint that sets httpOnly cookie.
    // For the client-side flow, we use the relay iframe pattern with postMessage.
    async function relayTokenToAllDomains(user) {
      const idToken = await getIdToken(user);

      // Store user profile in Firestore
      const userRef = doc(db, 'heady_users', user.uid);
      await setDoc(userRef, {
        uid: user.uid,
        email: user.email || null,
        displayName: user.displayName || null,
        photoURL: user.photoURL || null,
        provider: user.providerData?.[0]?.providerId || 'anonymous',
        lastSignIn: serverTimestamp(),
        updatedAt: serverTimestamp(),
      }, { merge: true });

      // Store sign-in event for vector memory indexing
      const eventRef = doc(collection(db, 'heady_auth_events'));
      await setDoc(eventRef, {
        uid: user.uid,
        event: 'sign_in',
        timestamp: serverTimestamp(),
        redirectTo: redirectUrl,
        provider: user.providerData?.[0]?.providerId || 'anonymous',
      });

      // Relay token to all Heady domains via postMessage
      // In production, this goes through auth.headysystems.com server
      // which sets httpOnly Secure SameSite=Strict cookies on each domain
      const relayPayload = {
        type: 'heady:auth:token',
        token: idToken,
        user: {
          uid: user.uid,
          email: user.email,
          displayName: user.displayName,
          photoURL: user.photoURL,
          provider: user.providerData?.[0]?.providerId || 'anonymous',
        },
        expiresAt: Date.now() + (15 * 60 * 1000), // 15-min JWT expiry
      };

      // Broadcast to parent if in iframe, or to opener if popup
      if (window.parent !== window) {
        window.parent.postMessage(relayPayload, '*');
      }
      if (window.opener) {
        window.opener.postMessage(relayPayload, '*');
      }

      // Dispatch custom event for local listeners
      window.dispatchEvent(new CustomEvent('heady:auth:changed', {
        detail: relayPayload,
      }));

      // Add to revocation blacklist check (Firestore doc)
      const blacklistRef = doc(db, 'heady_token_blacklist', user.uid);
      const blacklistSnap = await getDoc(blacklistRef).catch(() => null);
      if (blacklistSnap?.exists() && blacklistSnap.data().revoked) {
        showError('Account has been revoked. Contact support.');
        await auth.signOut();
        return;
      }

      showSuccess('Authenticated. Redirecting...');
      setTimeout(() => { window.location.href = redirectUrl; }, 1000);
    }

    // ─── Google OAuth ───────────────────────────────────────────────────────
    btnGoogle.addEventListener('click', async () => {
      try {
        const { state } = setOAuthState();
        const provider = new GoogleAuthProvider();
        provider.setCustomParameters({ state, prompt: 'select_account' });
        const result = await signInWithPopup(auth, provider);
        await relayTokenToAllDomains(result.user);
      } catch (err) {
        showError(`Google sign-in failed: ${err.message}`);
      }
    });

    // ─── Email/Password ─────────────────────────────────────────────────────
    btnEmail.addEventListener('click', () => {
      providerButtons.style.display = 'none';
      emailForm.style.display = 'block';
      backLink.style.display = 'block';
      inputEmail.focus();
    });

    backLink.addEventListener('click', () => {
      providerButtons.style.display = 'block';
      emailForm.style.display = 'none';
      backLink.style.display = 'none';
    });

    btnEmailSubmit.addEventListener('click', async () => {
      const email = inputEmail.value.trim();
      const password = inputPassword.value;
      if (!email || !password) { showError('Email and password are required.'); return; }
      try {
        const result = await signInWithEmailAndPassword(auth, email, password);
        await relayTokenToAllDomains(result.user);
      } catch (err) {
        showError(`Sign-in failed: ${err.message}`);
      }
    });

    btnEmailCreate.addEventListener('click', async () => {
      const email = inputEmail.value.trim();
      const password = inputPassword.value;
      if (!email || !password) { showError('Email and password are required.'); return; }
      if (password.length < 8) { showError('Password must be at least 8 characters.'); return; }
      try {
        const result = await createUserWithEmailAndPassword(auth, email, password);
        await relayTokenToAllDomains(result.user);
      } catch (err) {
        showError(`Account creation failed: ${err.message}`);
      }
    });

    // ─── Anonymous Guest (Rate-Limited) ─────────────────────────────────────
    btnAnonymous.addEventListener('click', async () => {
      if (!checkAnonRateLimit()) {
        rateLimitMsg.style.display = 'block';
        showError('Anonymous sign-in rate limit exceeded. Try again later or sign in with Google/Email.');
        return;
      }
      try {
        rateLimitMsg.style.display = 'block';
        const result = await signInAnonymously(auth);
        await relayTokenToAllDomains(result.user);
      } catch (err) {
        showError(`Guest sign-in failed: ${err.message}`);
      }
    });

    // ─── Auth State Observer ────────────────────────────────────────────────
    onAuthStateChanged(auth, (user) => {
      if (user && !window.__heady_redirecting) {
        window.__heady_redirecting = true;
        relayTokenToAllDomains(user);
      }
    });

    // ─── Keyboard Navigation ────────────────────────────────────────────────
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && emailForm.style.display === 'block') {
        btnEmailSubmit.click();
      }
    });
  </script>
</body>
</html>
