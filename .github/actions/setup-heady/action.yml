name: "Setup Heady"
description: "Standardizes Node 20 LTS and PNPM 9.15.0 across all Heady pipelines"
runs:
  using: "composite"
  steps:
    - name: Install pnpm
      uses: pnpm/action-setup@v3
      with:
        version: 9.15.0
    - name: Setup Node 20 LTS
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'pnpm'
