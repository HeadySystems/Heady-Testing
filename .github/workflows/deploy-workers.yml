name: Deploy Cloudflare Workers

# Push trigger disabled — use ci-unified.yml for main deploys
# on:
#   push:
#     branches:
#       - main
#     paths:
#       - 'workers/**'
on:
  workflow_dispatch:
    inputs:
      environment:
        description: Cloudflare environment
        required: false
        default: production
        type: choice
        options:
          - production
          - staging

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_VERSION: '22'

defaults:
  run:
    shell: bash

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        
    - name: Deploy Auth Service Worker
      uses: cloudflare/wrangler-action@v3
      with:
        apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        workingDirectory: ./workers/service-worker
        command: deploy --env ${{ inputs.environment }}

    - name: Deploy Gateway Worker
      uses: cloudflare/wrangler-action@v3
      with:
        apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        workingDirectory: ./workers/gateway-worker
        command: deploy --env ${{ inputs.environment }}

    - name: Deploy Edge Proxy Worker
      uses: cloudflare/wrangler-action@v3
      with:
        apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        workingDirectory: ./workers/edge-proxy
        command: deploy --env ${{ inputs.environment }}

    - name: Verify Deployments
      id: verify
      run: |
        set -euo pipefail
        echo "🔍 Verifying worker deployments..."
        sleep 10
        
        FAILED=0
        TOTAL=3
        
        declare -A WORKERS=(
          ["Auth Worker"]="https://auth.heady.systems/health"
          ["Gateway Worker"]="https://gateway.heady.systems/health"
          ["Edge Proxy Worker"]="https://edge.heady.systems/health"
        )
        
        declare -A RESPONSE_TIMES=()
        declare -A WORKER_STATUS=()
        
        for WORKER in "${!WORKERS[@]}"; do
          URL="${WORKERS[$WORKER]}"
          echo "Checking $WORKER..."
          
          RETRY=0
          MAX_RETRIES=3
          SUCCESS=false
          
          while [ "$RETRY" -lt "$MAX_RETRIES" ] && [ "$SUCCESS" = "false" ]; do
            START_TIME=$(date +%s%N)
            HTTP_CODE=$(curl -sf --max-time 30 -o /dev/null -w "%{http_code}" "$URL" 2>/dev/null || echo "000")
            END_TIME=$(date +%s%N)
            
            if [ "$HTTP_CODE" = "200" ]; then
              RESPONSE_MS=$(( (END_TIME - START_TIME) / 1000000 ))
              RESPONSE_TIMES["$WORKER"]=$RESPONSE_MS
              WORKER_STATUS["$WORKER"]="healthy"
              echo "✅ $WORKER healthy (${RESPONSE_MS}ms, HTTP $HTTP_CODE)"
              SUCCESS=true
            else
              RETRY=$((RETRY + 1))
              if [ "$RETRY" -lt "$MAX_RETRIES" ]; then
                echo "⏳ Retry $RETRY/$MAX_RETRIES for $WORKER (HTTP $HTTP_CODE)..."
                sleep 5
              fi
            fi
          done
          
          if [ "$SUCCESS" = "false" ]; then
            echo "⚠️ $WORKER health check failed after $MAX_RETRIES attempts (last HTTP: $HTTP_CODE)"
            FAILED=$((FAILED + 1))
            RESPONSE_TIMES["$WORKER"]="timeout"
            WORKER_STATUS["$WORKER"]="unhealthy"
          fi
        done
        
        HEALTHY=$((TOTAL - FAILED))
        echo "healthy_count=$HEALTHY" >> "$GITHUB_OUTPUT"
        echo "failed_count=$FAILED" >> "$GITHUB_OUTPUT"
        echo "total_count=$TOTAL" >> "$GITHUB_OUTPUT"
        
        TOTAL_TIME=0
        COUNT=0
        MIN_TIME=999999
        MAX_TIME=0
        
        for WORKER in "${!RESPONSE_TIMES[@]}"; do
          if [ "${RESPONSE_TIMES[$WORKER]}" != "timeout" ]; then
            TIME=${RESPONSE_TIMES[$WORKER]}
            TOTAL_TIME=$((TOTAL_TIME + TIME))
            COUNT=$((COUNT + 1))
            [ "$TIME" -lt "$MIN_TIME" ] && MIN_TIME=$TIME
            [ "$TIME" -gt "$MAX_TIME" ] && MAX_TIME=$TIME
          fi
        done
        
        if [ "$COUNT" -gt 0 ]; then
          AVG_RESPONSE=$((TOTAL_TIME / COUNT))
          echo "avg_response_time=${AVG_RESPONSE}ms" >> "$GITHUB_OUTPUT"
          echo "min_response_time=${MIN_TIME}ms" >> "$GITHUB_OUTPUT"
          echo "max_response_time=${MAX_TIME}ms" >> "$GITHUB_OUTPUT"
        else
          echo "avg_response_time=N/A" >> "$GITHUB_OUTPUT"
          echo "min_response_time=N/A" >> "$GITHUB_OUTPUT"
          echo "max_response_time=N/A" >> "$GITHUB_OUTPUT"
        fi
        
        echo "auth_status=${WORKER_STATUS["Auth Worker"]:-unknown}" >> "$GITHUB_OUTPUT"
        echo "gateway_status=${WORKER_STATUS["Gateway Worker"]:-unknown}" >> "$GITHUB_OUTPUT"
        echo "edge_status=${WORKER_STATUS["Edge Proxy Worker"]:-unknown}" >> "$GITHUB_OUTPUT"

    - name: Check Worker Versions
      id: versions
      if: success()
      run: |
        set -euo pipefail
        echo "📦 Checking worker versions..."
        
        declare -A ENDPOINTS=(
          ["auth"]="https://auth.heady.systems"
          ["gateway"]="https://gateway.heady.systems"
          ["edge"]="https://edge.heady.systems"
        )
        
        for NAME in "${!ENDPOINTS[@]}"; do
          VERSION=$(curl -sf --max-time 10 "${ENDPOINTS[$NAME]}/version" 2>/dev/null || echo "unknown")
          echo "${NAME}_version=$VERSION" >> "$GITHUB_OUTPUT"
        done

    - name: Smoke Tests
      id: smoke
      if: success()
      run: |
        set -euo pipefail
        echo "🧪 Running smoke tests..."
        
        SMOKE_PASSED=0
        SMOKE_TOTAL=0
        
        run_smoke_test() {
          local NAME="$1"
          local URL="$2"
          local EXPECTED_PATTERN="$3"
          
          SMOKE_TOTAL=$((SMOKE_TOTAL + 1))
          RESPONSE=$(curl -sf --max-time 15 "$URL" 2>/dev/null || echo "")
          
          if echo "$RESPONSE" | grep -qE "$EXPECTED_PATTERN"; then
            echo "✅ $NAME smoke test passed"
            SMOKE_PASSED=$((SMOKE_PASSED + 1))
            return 0
          fi
          
          echo "⚠️ $NAME smoke test inconclusive (response: ${RESPONSE:0:100}...)"
          return 1
        }
        
        run_smoke_test "Auth" "https://auth.heady.systems/health" "ok|healthy|success|status.*ok"
        run_smoke_test "Gateway" "https://gateway.heady.systems/health" "ok|healthy|success|status.*ok"
        run_smoke_test "Edge" "https://edge.heady.systems/health" "ok|healthy|success|status.*ok"
        
        SMOKE_TOTAL=$((SMOKE_TOTAL + 1))
        CORS_HEADER=$(curl -sf --max-time 10 -I "https://gateway.heady.systems/health" 2>/dev/null | grep -i "access-control" || echo "")
        if [ -n "$CORS_HEADER" ]; then
          SMOKE_PASSED=$((SMOKE_PASSED + 1))
        fi
        
        SMOKE_TOTAL=$((SMOKE_TOTAL + 1))
        CONTENT_TYPE=$(curl -sf --max-time 10 -I "https://auth.heady.systems/health" 2>/dev/null | grep -i "content-type" || echo "")
        if echo "$CONTENT_TYPE" | grep -qi "application/json"; then
          SMOKE_PASSED=$((SMOKE_PASSED + 1))
        fi
        
        echo "smoke_passed=$SMOKE_PASSED" >> "$GITHUB_OUTPUT"
        echo "smoke_total=$SMOKE_TOTAL" >> "$GITHUB_OUTPUT"
        echo "smoke_percentage=$((SMOKE_PASSED * 100 / SMOKE_TOTAL))" >> "$GITHUB_OUTPUT"

    - name: Performance Benchmark
      id: benchmark
      if: success()
      continue-on-error: true
      run: |
        set -euo pipefail
        echo "⚡ Running performance benchmark..."
        
        benchmark_endpoint() {
          local NAME="$1"
          local URL="$2"
          local ITERATIONS=5
          local TOTAL=0
          
          for i in $(seq 1 "$ITERATIONS"); do
            TIME=$(curl -sf --max-time 10 -o /dev/null -w "%{time_total}" "$URL" 2>/dev/null || echo "0")
            TIME_MS=$(python3 -c "import sys; print(int(float(sys.argv[1]) * 1000))" "$TIME")
            TOTAL=$((TOTAL + TIME_MS))
          done
          
          AVG=$((TOTAL / ITERATIONS))
          echo "${NAME}_benchmark=${AVG}ms" >> "$GITHUB_OUTPUT"
        }
        
        benchmark_endpoint "auth" "https://auth.heady.systems/health"
        benchmark_endpoint "gateway" "https://gateway.heady.systems/health"
        benchmark_endpoint "edge" "https://edge.heady.systems/health"

    - name: Deployment Summary
      if: always()
      env:
        HEALTHY_COUNT: ${{ steps.verify.outputs.healthy_count }}
        TOTAL_COUNT: ${{ steps.verify.outputs.total_count }}
        FAILED_COUNT: ${{ steps.verify.outputs.failed_count }}
        AVG_RESPONSE_TIME: ${{ steps.verify.outputs.avg_response_time }}
        MIN_RESPONSE_TIME: ${{ steps.verify.outputs.min_response_time }}
        MAX_RESPONSE_TIME: ${{ steps.verify.outputs.max_response_time }}
        AUTH_STATUS: ${{ steps.verify.outputs.auth_status }}
        GATEWAY_STATUS: ${{ steps.verify.outputs.gateway_status }}
        EDGE_STATUS: ${{ steps.verify.outputs.edge_status }}
        AUTH_VERSION: ${{ steps.versions.outputs.auth_version }}
        GATEWAY_VERSION: ${{ steps.versions.outputs.gateway_version }}
        EDGE_VERSION: ${{ steps.versions.outputs.edge_version }}
        SMOKE_PASSED: ${{ steps.smoke.outputs.smoke_passed }}
        SMOKE_TOTAL: ${{ steps.smoke.outputs.smoke_total }}
        SMOKE_PERCENTAGE: ${{ steps.smoke.outputs.smoke_percentage }}
        AUTH_BENCHMARK: ${{ steps.benchmark.outputs.auth_benchmark }}
        GATEWAY_BENCHMARK: ${{ steps.benchmark.outputs.gateway_benchmark }}
        EDGE_BENCHMARK: ${{ steps.benchmark.outputs.edge_benchmark }}
      run: |
        SHORT_SHA="${GITHUB_SHA::7}"
        cat >> "$GITHUB_STEP_SUMMARY" <<EOF
        ## Cloudflare Workers Deployment Summary

        | Property | Value |
        |----------|-------|
        | Commit | [\`${SHORT_SHA}\`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}) |
        | Branch | \`${{ github.ref_name }}\` |
        | Triggered by | @${{ github.actor }} |
        | Workflow | \`${{ github.workflow }}\` |
        | Status | \`${{ job.status }}\` |

        | Worker | Status | Version | Avg Response |
        |--------|--------|---------|--------------|
        | Auth | ${AUTH_STATUS:-unknown} | ${AUTH_VERSION:-unknown} | ${AUTH_BENCHMARK:-N/A} |
        | Gateway | ${GATEWAY_STATUS:-unknown} | ${GATEWAY_VERSION:-unknown} | ${GATEWAY_BENCHMARK:-N/A} |
        | Edge | ${EDGE_STATUS:-unknown} | ${EDGE_VERSION:-unknown} | ${EDGE_BENCHMARK:-N/A} |

        | Metric | Value |
        |--------|-------|
        | Healthy Workers | ${HEALTHY_COUNT:-0}/${TOTAL_COUNT:-3} |
        | Failed Workers | ${FAILED_COUNT:-0} |
        | Avg Response Time | ${AVG_RESPONSE_TIME:-N/A} |
        | Min Response Time | ${MIN_RESPONSE_TIME:-N/A} |
        | Max Response Time | ${MAX_RESPONSE_TIME:-N/A} |
        | Smoke Tests | ${SMOKE_PASSED:-0}/${SMOKE_TOTAL:-0} (${SMOKE_PERCENTAGE:-0}%) |
        EOF
