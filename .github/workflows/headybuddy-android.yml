name: HeadyBuddy Android CI

on:
  push:
    paths: ['headybuddy-mobile/**']
    branches: [main, staging]
  pull_request:
    paths: ['headybuddy-mobile/**']

env:
  JAVA_VERSION: '17'
  GRADLE_OPTS: '-Dorg.gradle.daemon=false -Dorg.gradle.parallel=true'

jobs:
  # ────────────────────────────────────────────────────────
  # GATE 1: Static Analysis (Detekt, ktlint, custom lint)
  # ────────────────────────────────────────────────────────
  static-analysis:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Detekt
        working-directory: headybuddy-mobile
        run: ./gradlew detekt

      - name: Android Lint + HeadyLint custom rules
        working-directory: headybuddy-mobile
        run: ./gradlew lint

      - name: 🚫 Fail on localhost references
        run: |
          if grep -rn "localhost\|127\.0\.0\.1\|10\.0\.2\.2" headybuddy-mobile/*/src; then
            echo "::error::Localhost reference found — HeadyBuddy must use api.headysystems.com"
            exit 1
          fi

      - name: 🚫 Fail on hardcoded secrets
        run: |
          if grep -rnE "(api_key|secret|password|token)\s*=\s*\"[^\"]{8,}\"" headybuddy-mobile/*/src --include="*.kt"; then
            echo "::error::Hardcoded secret detected — use HeadyKeystore"
            exit 1
          fi

  # ────────────────────────────────────────────────────────
  # GATE 2: Unit Tests (JVM — no Android runtime)
  # ────────────────────────────────────────────────────────
  unit-tests:
    runs-on: ubuntu-latest
    needs: static-analysis
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Run unit tests
        working-directory: headybuddy-mobile
        run: ./gradlew testDebugUnitTest

      - name: Coverage report (Kover)
        working-directory: headybuddy-mobile
        run: ./gradlew koverReport

      - name: 🚫 Fail if coverage < 80%
        run: |
          COV=$(grep -oP '(?<=e rate=")[^"]+' headybuddy-mobile/build/reports/kover/report.xml | head -1 || echo "0.0")
          python3 -c "import sys; sys.exit(0 if float('${COV}') >= 0.80 else 1)"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: headybuddy-mobile/**/build/reports/tests/

  # ────────────────────────────────────────────────────────
  # GATE 3: Instrumented Tests (Android emulator)
  # ────────────────────────────────────────────────────────
  instrumented-tests:
    runs-on: macos-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Run instrumented tests on emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          profile: Nexus 6
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -no-snapshot -noaudio -no-boot-anim
          script: |
            cd headybuddy-mobile
            ./gradlew connectedDebugAndroidTest

      - name: Upload instrumented test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: instrumented-test-results
          path: headybuddy-mobile/**/build/reports/androidTests/

  # ────────────────────────────────────────────────────────
  # GATE 4: Work Profile E2E (Firebase Test Lab)
  # ────────────────────────────────────────────────────────
  work-profile-e2e:
    runs-on: ubuntu-latest
    needs: instrumented-tests
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Build APKs
        working-directory: headybuddy-mobile
        run: |
          ./gradlew :app-work:assembleDebug :app-work:assembleDebugAndroidTest
          ./gradlew :app-companion:assembleDebug

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Run on Firebase Test Lab
        run: |
          gcloud firebase test android run \
            --type instrumentation \
            --app headybuddy-mobile/app-work/build/outputs/apk/debug/app-work-debug.apk \
            --test headybuddy-mobile/app-work/build/outputs/apk/androidTest/debug/app-work-debug-androidTest.apk \
            --device model=Pixel8,version=34,locale=en,orientation=portrait \
            --timeout 10m \
            --use-orchestrator \
            --results-dir=ftl-results-${{ github.run_id }}

  # ────────────────────────────────────────────────────────
  # GATE 5: Heady Eval Engine (drift + correctness)
  # ────────────────────────────────────────────────────────
  eval-gate:
    runs-on: ubuntu-latest
    needs: [unit-tests, instrumented-tests]
    steps:
      - name: Run Heady Eval Engine (staging)
        run: |
          curl -sf -X POST https://api.headysystems.com/v1/eval/run \
            -H "Authorization: Bearer ${{ secrets.HEADY_CI_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"agentId":"heady-buddy-android","environment":"staging"}'

      - name: Assert eval passed
        run: |
          sleep 10  # Wait for eval to complete
          RESULT=$(curl -sf https://api.headysystems.com/v1/eval/latest?agentId=heady-buddy-android-staging \
            -H "Authorization: Bearer ${{ secrets.HEADY_CI_TOKEN }}")
          echo "Eval result: $RESULT"
          python3 -c "
          import json, sys
          r = json.loads('$RESULT')
          if not r.get('allPassed', False):
              print('EVAL FAILED:', json.dumps(r, indent=2))
              sys.exit(1)
          print('All eval layers passed ✅')
          "
