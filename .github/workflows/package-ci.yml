name: Package CI
on:
  push:
    paths:
      - 'packages/**'
jobs:
  test-packages:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Setup Heady
        uses: ./.github/actions/setup-heady
      - run: pnpm install --no-frozen-lockfile
      - run: pnpm run build --filter="./packages/**"
