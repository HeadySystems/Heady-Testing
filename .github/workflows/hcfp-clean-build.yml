name: HCFP Clean Build Pipeline
# Clean build on every change - no incremental artifacts trusted
# Error handling with classification and recovery

# Push/PR triggers disabled — use ci-unified.yml for main CI/CD
# on:
#   push:
#     branches: [main, master, develop]
#   pull_request:
#     branches: [main, master]
on:
  workflow_dispatch:
    inputs:
      full_rebuild:
        description: 'Force full rebuild from scratch'
        required: false
        default: true
        type: boolean

concurrency:
  group: hcfp-clean-build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_VERSION: '22'
  PYTHON_VERSION: '3.12.7'
  CLEAN_BUILD: true
  ERROR_RETRY_COUNT: 2

defaults:
  run:
    shell: bash

jobs:
  # Phase 1: Setup and Validation
  setup:
    name: 🔧 Setup Environment
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      cache_key: ${{ steps.cache.outputs.key }}
      should_build: ${{ steps.check.outputs.should_build }}
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for proper builds
      
      - name: 🔍 Check for api.headysystems.com references
        id: check
        run: |
          echo "🔍 Scanning for api.headysystems.com references..."
          python scripts/api.headysystems.com-inventory.py --root . --output api.headysystems.com-check.json || true
          
          # Check if critical api.headysystems.com refs exist
          if grep -r "api.headysystems.com:3300\|api.headysystems.com:3300" --include="*.js" --include="*.ts" --include="*.py" --include="*.yaml" src/ 2>/dev/null | head -5; then
            echo "⚠️  Found hardcoded api.headysystems.com references in source code"
            echo "should_build=warning" >> $GITHUB_OUTPUT
          else
            echo "should_build=true" >> $GITHUB_OUTPUT
          fi
      
      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.6.0

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml
      
      - name: 🐍 Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: requirements.txt
      
      - name: 🔐 Cache Tools (Not Artifacts)
        id: cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.pnpm-store
            ~/.local/share/virtualenvs
            /usr/local/lib/node_modules
          key: ${{ runner.os }}-tools-${{ hashFiles('pnpm-lock.yaml') }}-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-tools-

  # Phase 2: Clean Build
  build:
    name: 🏗️ Clean Build (No Incremental)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: setup
    if: needs.setup.outputs.should_build != 'false'
    
    strategy:
      fail-fast: false
      matrix:
        component:
          - manager
          - worker
          - frontend
          - browser-ext
          - mobile
    
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.6.0

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: 🐍 Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: backend/python_worker/requirements.txt
      
      - name: 🧹 Clean Workspace (No Artifacts)
        run: |
          echo "🧹 Performing clean build - removing all build artifacts..."
          rm -rf dist/
          rm -rf build/
          rm -rf .next/
          rm -rf out/
          rm -rf node_modules/.cache/
          rm -rf coverage/
          rm -rf .nyc_output/
          find . -name "*.log" -delete
          echo "✅ Workspace cleaned"
      
      - name: 📦 Install Dependencies (Clean)
        run: pnpm install --frozen-lockfile
      
      - name: 🏗️ Build ${{ matrix.component }}
        id: build
        run: |
          set -euo pipefail
          case "${{ matrix.component }}" in
            manager)
              pnpm run build
              ;;
            worker)
              python -m pip install --upgrade pip
              python -m pip install -r backend/python_worker/requirements.txt
              python -m compileall backend/python_worker
              ;;
            frontend)
              npm run build --prefix apps/headyweb
              ;;
            browser-ext)
              npm install --prefix extensions/vscode --package-lock=false
              npm run compile --prefix extensions/vscode
              ;;
            mobile)
              sh ./headybuddy-mobile/gradlew -p ./headybuddy-mobile assembleDebug
              ;;
          esac
        continue-on-error: true
      
      - name: 🔍 Classify Build Error
        if: steps.build.outcome == 'failure'
        id: error_classify
        run: |
          ERROR_LOG="build-error-${{ matrix.component }}.log"
          
          # Check error patterns
          if grep -q "network timeout\|ECONNREFUSED\|ETIMEDOUT\|fetch failed" $ERROR_LOG 2>/dev/null; then
            echo "error_type=transient_network" >> $GITHUB_OUTPUT
            echo "🔄 Transient network error detected - will retry"
          elif grep -q "permission denied\|EACCES\|EPERM" $ERROR_LOG 2>/dev/null; then
            echo "error_type=permission" >> $GITHUB_OUTPUT
            echo "🚫 Permission error - requires manual fix"
          elif grep -q "syntax error\|SyntaxError\|Unexpected token\|Module not found\|Cannot find module" $ERROR_LOG 2>/dev/null; then
            echo "error_type=code_config" >> $GITHUB_OUTPUT
            echo "🔴 Code/config error - blocking issue"
          else
            echo "error_type=unknown" >> $GITHUB_OUTPUT
            echo "❓ Unknown error type"
          fi
      
      - name: 🔄 Retry Build (Transient Errors Only)
        if: steps.build.outcome == 'failure' && steps.error_classify.outputs.error_type == 'transient_network'
        run: |
          echo "🔄 Retrying build after transient error..."
          sleep 30
          # Re-run the build command from previous step
          case "${{ matrix.component }}" in
            manager)
              pnpm run build
              ;;
            worker)
              python -m compileall backend/python_worker
              ;;
            frontend)
              npm run build --prefix apps/headyweb
              ;;
            browser-ext)
              npm run compile --prefix extensions/vscode
              ;;
            mobile)
              sh ./headybuddy-mobile/gradlew -p ./headybuddy-mobile assembleDebug
              ;;
          esac
      
      - name: ❌ Fail on Non-Recoverable Error
        if: steps.build.outcome == 'failure' && steps.error_classify.outputs.error_type != 'transient_network'
        run: |
          echo "🚨 Build failed with non-recoverable error: ${{ steps.error_classify.outputs.error_type }}"
          echo "::error::Build failure in ${{ matrix.component }} - requires code/config fix"
          exit 1
      
      - name: 📤 Upload Build Artifacts
        if: steps.build.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.component }}
          path: |
            dist/
            build/
            apps/headyweb/dist/
            extensions/vscode/out/
            headybuddy-mobile/app/build/
            !node_modules/
          retention-days: 7
          if-no-files-found: ignore

  # Phase 3: Test Suite
  test:
    name: 🧪 Full Test Suite
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: build
    
    strategy:
      fail-fast: false
      matrix:
        test_type:
          - unit
          - integration
          - e2e
    
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.6.0

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml
      
      - name: 🧹 Clean Test Environment
        run: |
          rm -rf coverage/
          rm -rf .nyc_output/
          rm -rf test-results/
      
      - name: 📦 Install Dependencies
        run: pnpm install --frozen-lockfile
      
      - name: 🧪 Run ${{ matrix.test_type }} Tests
        id: test
        run: |
          set -euo pipefail
          case "${{ matrix.test_type }}" in
            unit)
              pnpm exec jest --coverage --forceExit --passWithNoTests
              ;;
            integration)
              if node -e "const s=require('./package.json').scripts||{}; process.exit(s['test:integration'] ? 0 : 1)"; then
                pnpm run test:integration
              else
                echo "No integration tests"
              fi
              ;;
            e2e)
              if node -e "const s=require('./package.json').scripts||{}; process.exit(s['test:e2e'] ? 0 : 1)"; then
                pnpm run test:e2e
              else
                echo "No e2e tests"
              fi
              ;;
          esac
        continue-on-error: ${{ matrix.test_type == 'e2e' }}
      
      - name: 📊 Upload Test Results
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.test_type }}
          path: |
            coverage/
            test-results/
            junit.xml
          if-no-files-found: ignore
        if: always()

  # Phase 4: Security & Quality Checks
  security:
    name: 🔒 Security & Quality
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: build
    
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.6.0

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: 🐍 Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: 📦 Install Security Dependencies
        run: |
          pnpm install --frozen-lockfile
          python -m pip install --upgrade pip pip-audit
      
      - name: 🔍 Secret Detection
        uses: trufflesecurity/trufflehog@v3.93.7
        with:
          path: ./
          base: main
          head: HEAD
          extra_args: --debug --only-verified
      
      - name: 🛡️ Dependency Vulnerability Scan
        run: |
          pnpm audit --audit-level=moderate || true
          pip-audit || true
      
      - name: 📋 Lint & Code Quality
        run: |
          pnpm run lint
          if node -e "const s=require('./package.json').scripts||{}; process.exit(s['format:check'] ? 0 : 1)"; then
            pnpm run format:check
          else
            echo "format:check not configured"
          fi
      
      - name: 🔐 Check for Hardcoded Secrets
        run: |
          # Check for common secret patterns
          patterns=(
            "password\s*=\s*['\"][^'\"]+['\"]"
            "api_key\s*=\s*['\"][^'\"]+['\"]"
            "secret\s*=\s*['\"][^'\"]+['\"]"
            "token\s*=\s*['\"][^'\"]{20,}['\"]"
          )
          
          found=0
          for pattern in "${patterns[@]}"; do
            if grep -rE "$pattern" --include="*.js" --include="*.ts" --include="*.py" src/ 2>/dev/null | grep -v "example\|test\|spec\|mock"; then
              echo "⚠️  Potential hardcoded secret found with pattern: $pattern"
              found=1
            fi
          done
          
          if [ $found -eq 1 ]; then
            echo "::warning::Potential hardcoded secrets detected - review required"
          fi

  # Phase 5: Deployment Preparation
  deploy-prep:
    name: 📦 Deploy Preparation
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [build, test, security]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    
    steps:
      - name: 📥 Download All Build Artifacts
        uses: actions/download-artifact@v4
        with:
          path: deploy-artifacts/
          pattern: build-*
      
      - name: 🔍 Verify Artifacts
        run: |
          echo "📦 Verifying build artifacts..."
          ls -la deploy-artifacts/
          
          # Check each artifact
          for dir in deploy-artifacts/build-*/; do
            if [ -d "$dir" ]; then
              echo "✅ Found: $dir"
              du -sh "$dir"
            fi
          done
      
      - name: 🏷️ Tag Release
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "📌 Release version: $VERSION"
      
      - name: 📤 Upload Deploy Package
        uses: actions/upload-artifact@v4
        with:
          name: deploy-package-${{ env.VERSION }}
          path: deploy-artifacts/
          retention-days: 30
          if-no-files-found: ignore

  # Phase 6: Error Reporting & Notifications
  report:
    name: 📊 Build Report
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [setup, build, test, security]
    if: always()
    
    steps:
      - name: 📥 Collect Results
        run: |
          echo "## 🏗️ HCFP Clean Build Report" > build-report.md
          echo "" >> build-report.md
          echo "**Commit:** ${{ github.sha }}" >> build-report.md
          echo "**Branch:** ${{ github.ref }}" >> build-report.md
          echo "**Triggered by:** ${{ github.actor }}" >> build-report.md
          echo "" >> build-report.md
          
          echo "### 📋 Job Status" >> build-report.md
          echo "- Setup: ${{ needs.setup.result }}" >> build-report.md
          echo "- Build: ${{ needs.build.result }}" >> build-report.md
          echo "- Test: ${{ needs.test.result }}" >> build-report.md
          echo "- Security: ${{ needs.security.result }}" >> build-report.md
          echo "" >> build-report.md
          
          if [ "${{ needs.build.result }}" == "failure" ]; then
            echo "🚨 **BUILD FAILED** - Manual intervention required" >> build-report.md
            echo "::error::HCFP Clean Build failed - check logs for details"
          elif [ "${{ needs.test.result }}" == "failure" ]; then
            echo "⚠️ **TESTS FAILED** - Review test results" >> build-report.md
          else
            echo "✅ **BUILD SUCCESSFUL**" >> build-report.md
          fi
      
      - name: 🔔 Alert on Failure
        if: failure()
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "🚨 HCFP Build Failed",
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "🚨 Clean Build Failed"
                  }
                },
                {
                  "type": "section",
                  "fields": [
                    {
                      "type": "mrkdwn",
                      "text": "*Repository:*\n${{ github.repository }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Branch:*\n${{ github.ref }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Commit:*\n${{ github.sha }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Author:*\n${{ github.actor }}"
                    }
                  ]
                },
                {
                  "type": "actions",
                  "elements": [
                    {
                      "type": "button",
                      "text": {
                        "type": "plain_text",
                        "text": "View Logs"
                      },
                      "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                    }
                  ]
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        continue-on-error: true

# Prevent api.headysystems.com in production code
  api-headysystems-com-lint:
    name: 🚫 api.headysystems.com Lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
      
      - name: 🔍 Check for api.headysystems.com in Production Code
        run: |
          # Only check production-bound code
          EXCLUDE_DIRS="test|spec|example|docs|.github|scripts"
          
          if grep -rE "api.headysystems.com|127\.0\.0\.1|0\.0\.0\.0" \
            --include="*.js" --include="*.ts" --include="*.py" \
            src/ 2>/dev/null | grep -vE "$EXCLUDE_DIRS"; then
            echo "::error::Found api.headysystems.com references in production code!"
            echo "These must be replaced with service domain names."
            exit 1
          else
            echo "✅ No api.headysystems.com references found in production code"
          fi
      - name: 🔧 Auto-fix localhost References
        if: failure()
        run: |
          echo "🔧 Attempting auto-fix for localhost references..."
          
          # Check if fix script exists
          if [ -f "scripts/localhost-inventory.py" ]; then
            python scripts/localhost-inventory.py --fix --dry-run || true
            echo ""
            echo "📋 Dry-run complete. To apply fixes, run:"
            echo "  python scripts/localhost-inventory.py --fix"
          fi
          
          # Check for service discovery configuration
          if [ -f "configs/service-discovery.yaml" ]; then
            echo ""
            echo "📦 Available Service Discovery Domains:"
            cat configs/service-discovery.yaml | grep -E "^\s+\w+:" | head -15
          fi
          
          echo ""
          echo "📋 Quick Fix Guide:"
          echo "  1. Replace 'localhost:3000' with '\${API_BASE_URL}'"
          echo "  2. Replace 'localhost:3001' with '\${WEB_APP_URL}'"
          echo "  3. Replace '127.0.0.1' with service names from service-discovery.yaml"
          echo "  4. Use environment variables for all URLs"
          echo "  5. For Docker, use service names (e.g., 'api', 'web', 'db')"
          echo "  6. Replace hardcoded ports with environment variables"
          echo "  7. Use 'wss://' instead of 'ws://' for WebSocket connections"
          echo ""
          echo "🔗 Reference: docs/url-style-guide.md"
          echo ""
          echo "🔄 Common Replacements:"
          echo "  localhost:3000  → https://api.headysystems.com"
          echo "  localhost:3001  → https://app.headysystems.com"
          echo "  localhost:5432  → \${DATABASE_URL}"
          echo "  localhost:6379  → \${REDIS_URL}"
          echo "  127.0.0.1       → Use Docker service names or proper domains"
          echo ""
          echo "🔄 Attempting automatic sed replacements (dry-run)..."
          
          # Show what would be replaced
          for file in $(find src/ -type f \( -name "*.js" -o -name "*.ts" -o -name "*.py" \) 2>/dev/null); do
            if grep -qE "localhost|127\.0\.0\.1" "$file" 2>/dev/null; then
              echo "  Would modify: $file"
            fi
          done

      - name: 🔍 Deep Scan for Security Issues
        run: |
          echo "🔍 Running deep security scan..."
          
          # Check for exposed credentials
          echo "Checking for exposed credentials..."
          CRED_PATTERNS=(
            "password\s*[:=]\s*['\"][^'\"]+['\"]"
            "api[_-]?key\s*[:=]\s*['\"][^'\"]+['\"]"
            "secret\s*[:=]\s*['\"][^'\"]+['\"]"
            "token\s*[:=]\s*['\"][a-zA-Z0-9]{20,}['\"]"
            "private[_-]?key"
            "BEGIN\s+(RSA|DSA|EC|OPENSSH)\s+PRIVATE\s+KEY"
          )
          
          cred_found=0
          for pattern in "${CRED_PATTERNS[@]}"; do
            if grep -rE "$pattern" --include="*.js" --include="*.ts" --include="*.py" --include="*.yaml" --include="*.yml" src/ configs/ 2>/dev/null | grep -vE "example|test|spec|mock|placeholder|\\\$\{"; then
              echo "⚠️ Potential credential exposure: $pattern"
              cred_found=1
            fi
          done
          
          if [ $cred_found -eq 0 ]; then
            echo "✅ No exposed credentials detected"
          fi
          
          # Check for insecure protocols
          echo ""
          echo "Checking for insecure protocols..."
          if grep -rE "http://[^l]" --include="*.js" --include="*.ts" --include="*.py" src/ 2>/dev/null | grep -vE "localhost|127\.0\.0\.1|example|test"; then
            echo "⚠️ Found HTTP (non-HTTPS) URLs in production code"
          fi
          
          # Check for SQL injection vulnerabilities
          echo ""
          echo "Checking for potential SQL injection patterns..."
          if grep -rE "execute\s*\(\s*[\"'].*\+|f[\"'].*SELECT.*\{|\.format\(.*SELECT" --include="*.py" src/ 2>/dev/null | grep -vE "test|spec"; then
            echo "⚠️ Potential SQL injection vulnerability detected"
          fi

      - name: 📊 Generate Comprehensive Report
        if: always()
        run: |
          echo "📊 Generating comprehensive localhost usage report..."
          
          # Initialize report
          cat > localhost-report.md << 'EOF'
          # 🔍 Localhost & Security Reference Report
          
          EOF
          
          echo "**Generated:** $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> localhost-report.md
          echo "**Commit:** ${{ github.sha }}" >> localhost-report.md
          echo "**Branch:** ${{ github.ref_name }}" >> localhost-report.md
          echo "**Run Number:** ${{ github.run_number }}" >> localhost-report.md
          echo "**Triggered By:** ${{ github.actor }}" >> localhost-report.md
          echo "" >> localhost-report.md
          
          # Executive Summary
          echo "## 📋 Executive Summary" >> localhost-report.md
          echo "" >> localhost-report.md
          
          total_localhost=$(grep -rlE "localhost|127\.0\.0\.1|0\.0\.0\.0" src/ 2>/dev/null | wc -l || echo "0")
          if [ "$total_localhost" -eq 0 ]; then
            echo "✅ **Status: PASS** - No localhost references found in production code" >> localhost-report.md
          else
            echo "⚠️ **Status: REVIEW NEEDED** - Found $total_localhost files with localhost references" >> localhost-report.md
          fi
          echo "" >> localhost-report.md
          
          # Count occurrences by file type
          echo "## 📁 References by File Type" >> localhost-report.md
          echo "" >> localhost-report.md
          echo "| Extension | File Count | Severity |" >> localhost-report.md
          echo "|-----------|------------|----------|" >> localhost-report.md
          
          total_count=0
          for ext in js ts jsx tsx py yaml yml json html css vue svelte go rs java; do
            count=$(grep -rlE "localhost|127\.0\.0\.1|0\.0\.0\.0" --include="*.$ext" src/ 2>/dev/null | wc -l || echo "0")
            if [ "$count" -gt 0 ]; then
              severity="🟡 Medium"
              if [ "$count" -gt 10 ]; then
                severity="🔴 High"
              elif [ "$count" -lt 3 ]; then
                severity="🟢 Low"
              fi
              echo "| .$ext | $count | $severity |" >> localhost-report.md
              total_count=$((total_count + count))
            fi
          done
          
          echo "" >> localhost-report.md
          echo "**Total files affected:** $total_count" >> localhost-report.md
          echo "" >> localhost-report.md
          
          # Pattern Analysis
          echo "## 🔬 Pattern Analysis" >> localhost-report.md
          echo "" >> localhost-report.md
          
          localhost_count=$(grep -rE "localhost" --include="*.js" --include="*.ts" --include="*.py" src/ 2>/dev/null | wc -l || echo "0")
          ip_count=$(grep -rE "127\.0\.0\.1" --include="*.js" --include="*.ts" --include="*.py" src/ 2>/dev/null | wc -l || echo "0")
          zero_ip_count=$(grep -rE "0\.0\.0\.0" --include="*.js" --include="*.ts" --include="*.py" src/ 2>/dev/null | wc -l || echo "0")
          private_ip_count=$(grep -rE "192\.168\.|10\.\d+\.\d+\.\d+|172\.(1[6-9]|2[0-9]|3[0-1])\." --include="*.js" --include="*.ts" --include="*.py" src/ 2>/dev/null | wc -l || echo "0")
          
          echo "| Pattern | Count | Risk Level |" >> localhost-report.md
          echo "|---------|-------|------------|" >> localhost-report.md
          echo "| \`localhost\` | $localhost_count | 🟡 Medium |" >> localhost-report.md
          echo "| \`127.0.0.1\` | $ip_count | 🟡 Medium |" >> localhost-report.md
          echo "| \`0.0.0.0\` | $zero_ip_count | 🔴 High |" >> localhost-report.md
          echo "| Private IPs | $private_ip_count | 🔴 High |" >> localhost-report.md
          echo "" >> localhost-report.md
          
          # Hardcoded Port Analysis
          echo "## 🔌 Hardcoded Port Analysis" >> localhost-report.md
          echo "" >> localhost-report.md
          echo "| Port | Service | Count | Recommended Replacement |" >> localhost-report.md
