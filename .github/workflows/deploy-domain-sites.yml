name: Deploy Domain Sites to Cloud Run
on:
  push:
    branches: [main]
    paths:
      - 'sites/**'
      - 'shared/worker-router.js'
      - 'services/heady-web/**'
  workflow_dispatch:
    inputs:
      site:
        description: 'Site to deploy (all, or a specific site name)'
        required: true
        default: 'all'

jobs:
  deploy:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        site:
          - name: headyme-com
            domain: headyme.com
            service: heady-site-headyme
          - name: headysystems-com
            domain: headysystems.com
            service: heady-site-headysystems
          - name: heady-ai-com
            domain: heady-ai.com
            service: heady-site-heady-ai
          - name: headyio-com
            domain: headyio.com
            service: heady-site-headyio
          - name: headymcp-com
            domain: headymcp.com
            service: heady-site-headymcp
          - name: headybuddy-com
            domain: headybuddy.com
            service: heady-site-headybuddy
          - name: headybuddy-org
            domain: headybuddy.org
            service: heady-site-headybuddy-org
          - name: headyconnection-org
            domain: headyconnection.org
            service: heady-site-headyconnection
          - name: headybot-com
            domain: headybot.com
            service: heady-site-headybot
          - name: headylens-com
            domain: headylens.com
            service: heady-site-headylens
          - name: headyfinance-com
            domain: headyfinance.com
            service: heady-site-headyfinance
          - name: headyapi-com
            domain: headyapi.com
            service: heady-site-headyapi
          - name: headydocs
            domain: docs.headysystems.com
            service: heady-site-headydocs
    steps:
      - uses: actions/checkout@v4
      - name: Auth to GCP
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
      - name: Build and push Docker image
        run: |
          gcloud builds submit --tag us-east1-docker.pkg.dev/gen-lang-client-0920560496/heady/${{ matrix.site.service }}:${{ github.sha }}
      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ matrix.site.service }} \
            --image us-east1-docker.pkg.dev/gen-lang-client-0920560496/heady/${{ matrix.site.service }}:${{ github.sha }} \
            --region us-east1 \
            --platform managed \
            --allow-unauthenticated \
            --port 8080 \
            --memory 512Mi \
            --cpu 1 \
            --min-instances 1 \
            --max-instances 5
