# ============================================================================
# HEADY CI/CD — Lighthouse Performance Audit
# .github/workflows/lighthouse-audit.yml
#
# Triggers: weekly schedule (Sundays at 06:00 UTC), manual dispatch
# - Audits all 9 live Heady domains with Lighthouse CI
# - Saves results as workflow artifacts (30-day retention)
# - Opens a GitHub Issue if any category score drops below 50
# ============================================================================

name: Lighthouse Audit

on:
  schedule:
    # Every Sunday at 06:00 UTC
    - cron: '0 6 * * 0'
  workflow_dispatch:
    inputs:
      url_override:
        description: 'Optional: audit a single URL instead of all domains'
        required: false
        default: ''

permissions:
  contents: read
  issues: write  # Required to open performance regression issues

jobs:
  lighthouse:
    name: Lighthouse — ${{ matrix.site.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false  # Audit all domains even if one fails
      matrix:
        site:
          - name: heady-ai.com
            url: https://heady-ai.com
          - name: headyme.com
            url: https://headyme.com
          - name: headysystems.com
            url: https://headysystems.com
          - name: headyio.com
            url: https://headyio.com
          - name: headybuddy.org
            url: https://headybuddy.org
          - name: headyconnection.org
            url: https://headyconnection.org
          - name: headybot.com
            url: https://headybot.com
          - name: headyapi.com
            url: https://headyapi.com
          - name: headymcp.com
            url: https://headymcp.com

    steps:
      - uses: actions/checkout@v4

      - name: Run Lighthouse CI
        id: lighthouse
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: ${{ github.event.inputs.url_override || matrix.site.url }}
          uploadArtifacts: true
          artifactName: lighthouse-${{ matrix.site.name }}-${{ github.run_id }}
          temporaryPublicStorage: false
          runs: 1
        continue-on-error: true  # Don't fail the job if Lighthouse errors (e.g., site down)

      - name: Parse Lighthouse results
        id: parse
        if: steps.lighthouse.outcome == 'success'
        run: |
          # Extract scores from Lighthouse output (manifest JSON)
          MANIFEST="${{ steps.lighthouse.outputs.manifest }}"

          if [ -z "$MANIFEST" ]; then
            echo "No manifest output from Lighthouse — site may be unreachable."
            echo "score_performance=N/A" >> $GITHUB_OUTPUT
            echo "score_accessibility=N/A" >> $GITHUB_OUTPUT
            echo "score_best_practices=N/A" >> $GITHUB_OUTPUT
            echo "score_seo=N/A" >> $GITHUB_OUTPUT
            echo "any_below_50=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Parse scores from manifest JSON (treosh outputs a path or JSON blob)
          PERF=$(echo "$MANIFEST" | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          if isinstance(data, list) and len(data) > 0:
              summary = data[0].get('summary', {})
              print(round(summary.get('performance', 0) * 100))
          else:
              print('N/A')
          " 2>/dev/null || echo "N/A")

          ACCESSIBILITY=$(echo "$MANIFEST" | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          if isinstance(data, list) and len(data) > 0:
              summary = data[0].get('summary', {})
              print(round(summary.get('accessibility', 0) * 100))
          else:
              print('N/A')
          " 2>/dev/null || echo "N/A")

          BEST_PRACTICES=$(echo "$MANIFEST" | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          if isinstance(data, list) and len(data) > 0:
              summary = data[0].get('summary', {})
              print(round(summary.get('best-practices', 0) * 100))
          else:
              print('N/A')
          " 2>/dev/null || echo "N/A")

          SEO=$(echo "$MANIFEST" | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          if isinstance(data, list) and len(data) > 0:
              summary = data[0].get('summary', {})
              print(round(summary.get('seo', 0) * 100))
          else:
              print('N/A')
          " 2>/dev/null || echo "N/A")

          echo "score_performance=$PERF" >> $GITHUB_OUTPUT
          echo "score_accessibility=$ACCESSIBILITY" >> $GITHUB_OUTPUT
          echo "score_best_practices=$BEST_PRACTICES" >> $GITHUB_OUTPUT
          echo "score_seo=$SEO" >> $GITHUB_OUTPUT

          # Check if any numeric score is below 50
          ANY_BELOW=false
          for SCORE in "$PERF" "$ACCESSIBILITY" "$BEST_PRACTICES" "$SEO"; do
            if [[ "$SCORE" =~ ^[0-9]+$ ]] && [ "$SCORE" -lt 50 ]; then
              ANY_BELOW=true
              echo "Score below 50: $SCORE for ${{ matrix.site.name }}"
            fi
          done
          echo "any_below_50=$ANY_BELOW" >> $GITHUB_OUTPUT

      - name: Save score summary
        id: save-summary
        if: steps.lighthouse.outcome == 'success'
        run: |
          mkdir -p lighthouse-results
          cat > "lighthouse-results/${{ matrix.site.name }}.json" <<EOF
          {
            "site": "${{ matrix.site.name }}",
            "url": "${{ matrix.site.url }}",
            "run_date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "scores": {
              "performance": "${{ steps.parse.outputs.score_performance }}",
              "accessibility": "${{ steps.parse.outputs.score_accessibility }}",
              "best_practices": "${{ steps.parse.outputs.score_best_practices }}",
              "seo": "${{ steps.parse.outputs.score_seo }}"
            },
            "any_below_50": ${{ steps.parse.outputs.any_below_50 || 'false' }}
          }
          EOF
          cat "lighthouse-results/${{ matrix.site.name }}.json"

      - name: Upload score summary artifact
        if: steps.lighthouse.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-scores-${{ matrix.site.name }}-${{ github.run_id }}
          path: lighthouse-results/
          retention-days: 30

      - name: Open issue if score below 50
        if: steps.parse.outputs.any_below_50 == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const site = '${{ matrix.site.name }}';
            const url = '${{ matrix.site.url }}';
            const perf = '${{ steps.parse.outputs.score_performance }}';
            const a11y = '${{ steps.parse.outputs.score_accessibility }}';
            const bp = '${{ steps.parse.outputs.score_best_practices }}';
            const seo = '${{ steps.parse.outputs.score_seo }}';
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const date = new Date().toISOString().split('T')[0];

            const scores = { Performance: perf, Accessibility: a11y, 'Best Practices': bp, SEO: seo };
            const failing = Object.entries(scores)
              .filter(([, v]) => !isNaN(parseInt(v)) && parseInt(v) < 50)
              .map(([k, v]) => `- **${k}**: ${v}/100`)
              .join('\n');

            // Check for existing open issue for this site to avoid duplicates
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'performance,lighthouse',
            });

            const existing = issues.find(i => i.title.includes(site));
            if (existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body: `## Weekly Lighthouse Update — ${date}\n\nScores still below threshold for [${site}](${url}):\n\n${failing}\n\n[View audit run](${runUrl})`,
              });
              console.log(`Updated existing issue #${existing.number}`);
              return;
            }

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[Lighthouse] Performance regression on ${site} — ${date}`,
              body: `## Lighthouse Performance Alert\n\nOne or more Lighthouse scores dropped **below 50** for [${site}](${url}).\n\n### Scores\n| Category | Score |\n|----------|-------|\n| Performance | ${perf}/100 |\n| Accessibility | ${a11y}/100 |\n| Best Practices | ${bp}/100 |\n| SEO | ${seo}/100 |\n\n### Failing Categories\n${failing}\n\n### Action Required\n- [ ] Investigate performance regression on \`${site}\`\n- [ ] Review Lighthouse report artifacts\n- [ ] Fix and verify score recovers above 50\n\n[View full audit run](${runUrl})\n\n_Auto-opened by Lighthouse Audit workflow on ${date}_`,
              labels: ['performance', 'lighthouse', 'automated'],
            });
            console.log(`Opened new performance issue for ${site}`);
