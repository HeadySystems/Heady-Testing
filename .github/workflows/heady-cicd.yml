# ⚠ DEPRECATED: This workflow is superseded by ci-unified.yml
# All CI/CD functionality has been consolidated into a single unified pipeline.
# See: .github/workflows/ci-unified.yml
# This file is retained for reference only and should be removed in a future cleanup.
name: Heady™ CI/CD Pipeline [DEPRECATED]

# Triggers disabled — use ci-unified.yml instead
# on:
#   push:
#     branches: [ main, staging ]
#   pull_request:
#     branches: [ main ]
on: workflow_dispatch

env:
  NODE_VERSION: '20'

jobs:
  validate:
    name: Validate Determinism & Endpoints
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Fix determinism issues
        run: npm run fix:determinism

      - name: Validate endpoints
        run: npm run validate:endpoints

      - name: Run tests
        run: npm test

      - name: Lint code
        run: npm run lint

  security:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: TruffleHog Secrets Scan
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD

      - name: Run npm audit
        run: npm audit --audit-level=high

      - name: CodeQL Analysis
        uses: github/codeql-action/init@v3
        with:
          languages: javascript

  deploy-workers:
    name: Deploy Cloudflare Workers
    needs: [validate, security]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Cloudflare
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          workingDirectory: 'workers'
          command: deploy --env production

  deploy-cloud-run:
    name: Deploy Cloud Run Services
    needs: [validate, security]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      - name: Deploy heady-manager
        run: |
          gcloud run deploy heady-manager \
            --source . \
            --region us-central1 \
            --platform managed \
            --allow-unauthenticated
