          wrangler deploy

  deploy-render:
    name: Deploy to Render
    needs: validate
    if: inputs.target == 'render' || inputs.target == 'all'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Trigger Render Deploy
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
        run: |
          curl -X POST "https://api.render.com/v1/services/${{ inputs.service }}/deploys" \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Content-Type: application/json"

  notify:
    name: Notify
    needs: [deploy-cloudrun, deploy-cloudflare, deploy-render]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Deployment Summary
        run: |
          echo "## Liquid Node Deploy Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Service:** ${{ inputs.service }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Tier:** ${{ inputs.tier }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Target:** ${{ inputs.target }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
