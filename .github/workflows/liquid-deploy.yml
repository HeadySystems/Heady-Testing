          npm test 2>/dev/null || echo "No tests configured"
      - name: Validate health endpoints
        run: |
          grep -q "health.attachRoutes\|/health" "services/${{ inputs.service }}/index.js" || {
            echo "WARNING: No health endpoints found"
          }

  deploy-cloudrun:
    name: Deploy to Cloud Run
    needs: validate
    if: inputs.target == 'cloudrun' || inputs.target == 'all'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - uses: google-github-actions/setup-gcloud@v2
      - name: Build & Push Container
        run: |
          SERVICE="${{ inputs.service }}"
          IMAGE="${{ env.REGISTRY }}/${SERVICE}:${{ github.sha }}"
          docker build -t "$IMAGE" -f "services/${SERVICE}/Dockerfile" .
          docker push "$IMAGE"
      - name: Deploy to Cloud Run
        run: |
          SERVICE="${{ inputs.service }}"
          IMAGE="${{ env.REGISTRY }}/${SERVICE}:${{ github.sha }}"
          gcloud run deploy "$SERVICE" \
            --image "$IMAGE" \
            --region "${{ env.GCP_REGION }}" \
            --platform managed \
            --allow-unauthenticated \
            --min-instances 0 \
            --max-instances 13 \
            --concurrency 89 \
            --timeout 300 \
            --set-env-vars "NODE_ENV=production,SERVICE_NAME=${SERVICE}" \
            --set-secrets "DATABASE_URL=DATABASE_URL:latest,HEADY_API_KEY=HEADY_API_KEY:latest,SENTRY_DSN=SENTRY_DSN:latest,UPSTASH_REDIS_REST_URL=UPSTASH_REDIS_REST_URL:latest,UPSTASH_REDIS_REST_TOKEN=UPSTASH_REDIS_REST_TOKEN:latest"

