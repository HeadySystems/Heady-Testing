name: Liquid Node Deploy

on:
  workflow_dispatch:
    inputs:
      service:
        description: 'Service to deploy (e.g., heady-mc, heady-sims, heady-battle)'
        required: true
        type: string
      tier:
        description: 'Service tier'
        required: true
        type: choice
        options:
          - hot
          - warm
          - cold
      target:
        description: 'Deploy target'
        required: true
        type: choice
        options:
          - cloudrun
          - cloudflare
          - render
          - all

env:
  GCP_PROJECT: headysystems
  GCP_REGION: us-central1
  REGISTRY: gcr.io/headysystems

