# ============================================================================
# HEADY CI/CD — Cloudflare Edge Deployment
# .github/workflows/deploy-edge.yml
#
# Deploys Cloudflare Workers (edge proxy, AI gateway, MCP telemetry)
# LR-001: Uses workingDirectory: cloudflare/heady-edge-proxy
# LR-005: Validates Host header stripping before deploy
# ============================================================================

name: Deploy Edge Workers

on:
  push:
    branches: [main]
    paths:
      - 'cloudflare/**'
      - 'src/edge/**'
  workflow_dispatch:

env:
  CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

jobs:
  validate:
    name: 'Validate Edge Workers'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # LR-005: Verify Host header deletion in edge proxy
      - name: 'LR-005: Check Host header handling'
        run: |
          if ! grep -q "delete.*headers.*Host\|request\.headers\.delete.*host" cloudflare/heady-edge-proxy/*.js cloudflare/heady-edge-proxy/*.ts 2>/dev/null; then
            echo "::warning::Host header deletion not found in edge proxy (LR-005)"
          fi

      # No localhost in Workers code
      - name: 'Law 0: Localhost check'
        run: |
          HITS=$(grep -rn "localhost\|127\.0\.0\.1" cloudflare/ --include="*.js" --include="*.ts" || true)
          if [ -n "$HITS" ]; then
            echo "::error::Localhost references in Cloudflare Workers (Law 0)"
            echo "$HITS"
            exit 1
          fi

  deploy-edge-proxy:
    name: 'Deploy heady-edge-proxy'
    runs-on: ubuntu-latest
    needs: [validate]
    # LR-001: workingDirectory for edge deploys
    defaults:
      run:
        working-directory: cloudflare/heady-edge-proxy
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install wrangler
        run: npm install -g wrangler

      - name: Deploy
        run: wrangler deploy --config wrangler.toml
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}

  deploy-ai-gateway:
    name: 'Deploy AI Gateway Worker'
    runs-on: ubuntu-latest
    needs: [validate]
    defaults:
      run:
        working-directory: cloudflare/worker-ai-gateway
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
      - run: npm install -g wrangler
      - name: Deploy
        run: wrangler deploy --config wrangler.toml
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}

  deploy-mcp-telemetry:
    name: 'Deploy MCP Telemetry Worker'
    runs-on: ubuntu-latest
    needs: [validate]
    defaults:
      run:
        working-directory: cloudflare/worker-mcp-telemetry
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
      - run: npm install -g wrangler
      - name: Deploy
        run: wrangler deploy --config wrangler.toml
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
