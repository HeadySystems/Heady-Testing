name: Promote Staging → Main

on:
  push:
    branches: [staging]

concurrency:
  group: promote-main-${{ github.ref }}
  cancel-in-progress: true

jobs:
  staging-tests:
    name: Comprehensive Staging Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - name: Full test suite
        run: npm test
      - name: Build validation
        run: npm run build

  promote:
    name: Create Production PR
    needs: staging-tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - name: Create PR to main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          EXISTING=$(gh pr list --base main --head staging --json number --jq '.[0].number' || echo '')
          if [ -n "$EXISTING" ] && [ "$EXISTING" != "null" ]; then
            echo "PR #$EXISTING already exists"
          else
            gh pr create \
              --base main \
              --head staging \
              --title "🚀 Promote staging → main (production)" \
              --body "## Production Promotion

          Staging tests passed — ready for production.

          **Commit:** \`${{ github.sha }}\`
          **By:** ${{ github.actor }}

          ### Checklist
          - [ ] All staging QA passed
          - [ ] No regressions
          - [ ] User acceptance confirmed"
          fi
