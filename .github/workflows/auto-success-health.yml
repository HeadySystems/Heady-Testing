# HEADY_BRAND:BEGIN
# Auto-Success Health Check — Periodic health monitoring
# Runs every ~29 minutes (closest cron to φ⁷ = 29,034ms)
# HEADY_BRAND:END

name: Auto-Success Health Check

on:
  schedule:
    - cron: '*/29 * * * *'
  workflow_dispatch:

jobs:
  health-check:
    name: Full-Throttle Auto-Success Health
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Check service manifests
        run: |
          echo "## Auto-Success Health Report" >> $GITHUB_STEP_SUMMARY
          echo "**Date:** $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_STEP_SUMMARY
          echo "**φ = 1.618033988749895**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          TOTAL=0
          HEALTHY=0
          for svc in services/heady-*/; do
            svc_name=$(basename "$svc")
            TOTAL=$((TOTAL + 1))
            if [ -f "$svc/index.js" ] && [ -f "$svc/package.json" ]; then
              HEALTHY=$((HEALTHY + 1))
              echo "- ✅ **$svc_name** — manifest + index present" >> $GITHUB_STEP_SUMMARY
            else
              echo "- ⚠️ **$svc_name** — missing files" >> $GITHUB_STEP_SUMMARY
            fi
          done

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Score:** $HEALTHY/$TOTAL services healthy" >> $GITHUB_STEP_SUMMARY

      - name: Validate Liquid Node Base
        run: |
          node -e "
            const { LiquidNodeBase } = require('./src/core/liquid-node-base');
            const node = new LiquidNodeBase({ serviceId: 'test', serviceTier: 'warm' });
            const h = node.health();
            console.log('LiquidNodeBase health:', JSON.stringify(h));
            process.exitCode = h.status === 'unhealthy' && !node._started ? 0 : 1;
          " && echo "✅ LiquidNodeBase valid" || echo "⚠️ LiquidNodeBase check"
