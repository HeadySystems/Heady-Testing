name: Sync AutoContext

on:
  push:
    branches: [main]
    paths:
      - 'configs/**'
      - 'docs/**'
      - 'src/services/**'
      - 'src/orchestration/**'
      - 'src/bees/**'
      - 'packages/**'
      - 'package.json'
      - 'heady.config.js'
  workflow_dispatch:
    inputs:
      tier:
        description: 'Context tier to sync (all/small/medium/large)'
        default: 'all'

jobs:
  sync-context:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
    - name: Checkout Source
      uses: actions/checkout@v4
      with:
        fetch-depth: 1

    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Generate & Push Context
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        HEADY_WORKSPACE: ${{ github.workspace }}
      run: |
        # Clone target repo
        git clone --depth 1 https://x-access-token:${GITHUB_TOKEN}@github.com/HeadySystems/HeadyAutoContext.git /tmp/autocontext || {
          mkdir -p /tmp/autocontext
          cd /tmp/autocontext
          git init
          git remote add origin https://x-access-token:${GITHUB_TOKEN}@github.com/HeadySystems/HeadyAutoContext.git
        }

        # Run the sync bee
        node -e "
          const bee = require('./src/bees/context-sync-bee.js');
          const tiers = '${{ github.event.inputs.tier || 'all' }}';
          const root = process.env.HEADY_WORKSPACE;
          
          const allFiles = [];
          const tierList = tiers === 'all' ? ['small', 'medium', 'large'] : [tiers];
          
          for (const tier of tierList) {
            const pkg = bee.generateContextPackage(tier, root);
            allFiles.push(...pkg);
            console.log(tier + ': ' + pkg.length + ' files');
          }

          // Write files to target
          const fs = require('fs');
          const path = require('path');
          for (const f of allFiles) {
            const fp = path.join('/tmp/autocontext', f.path);
            fs.mkdirSync(path.dirname(fp), { recursive: true });
            fs.writeFileSync(fp, f.content);
          }

          // Write README
          const readme = bee.generateREADME({
            syncedAt: new Date().toISOString(),
            fileCount: allFiles.length,
            trigger: 'github-action',
          });
          fs.writeFileSync('/tmp/autocontext/README.md', readme);
          console.log('Total: ' + allFiles.length + ' files');
        "

        # Commit + Push
        cd /tmp/autocontext
        git config user.name "Eric Haywood"
        git config user.email "eric@headyconnection.org"
        git add -A
        git diff --cached --quiet && echo "No changes" && exit 0
        git commit -m "sync: AutoContext github-action — $(date -u +%Y-%m-%dT%H:%M)"
        git push origin main --force || git push -u origin main --force
