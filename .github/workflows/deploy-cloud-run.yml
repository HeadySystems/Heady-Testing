name: Deploy to Cloud Run
on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      service:
        description: 'Service to deploy (heady-site, heady-admin-ui, all)'
        required: false
        default: 'all'

env:
  PROJECT_ID: gen-lang-client-0920560496
  REGION: us-central1

jobs:
  deploy-heady-site:
    if: |
      github.event_name == 'workflow_dispatch' && 
      (github.event.inputs.service == 'heady-site' || github.event.inputs.service == 'all') ||
      github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      - uses: google-github-actions/setup-gcloud@v2

      - name: Deploy HeadySite to Cloud Run
        run: |
          gcloud run deploy heady-site \
            --source . \
            --project=${{ env.PROJECT_ID }} \
            --region=${{ env.REGION }} \
            --allow-unauthenticated \
            --port=3301 \
            --memory=1Gi \
            --cpu=1 \
            --min-instances=0 \
            --max-instances=10 \
            --set-env-vars="NODE_ENV=production" \
            --set-secrets="ANTHROPIC_API_KEY=ANTHROPIC_API_KEY:latest,OPENAI_API_KEY=OPENAI_API_KEY:latest,GROQ_API_KEY=GROQ_API_KEY:latest,GEMINI_API_KEY=GEMINI_API_KEY_HEADY:latest"

      - name: Show service URL
        run: |
          gcloud run services describe heady-site \
            --project=${{ env.PROJECT_ID }} \
            --region=${{ env.REGION }} \
            --format='value(status.url)'

  deploy-admin-ui:
    if: |
      github.event_name == 'workflow_dispatch' && 
      (github.event.inputs.service == 'heady-admin-ui' || github.event.inputs.service == 'all')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      - uses: google-github-actions/setup-gcloud@v2

      - name: Deploy Admin UI to Cloud Run
        working-directory: admin-ui
        run: |
          gcloud run deploy heady-admin-ui \
            --source . \
            --project=${{ env.PROJECT_ID }} \
            --region=${{ env.REGION }} \
            --allow-unauthenticated \
            --port=8080 \
            --memory=512Mi \
            --cpu=1 \
            --min-instances=0 \
            --max-instances=5 \
            --set-env-vars="NODE_ENV=production" \
            --set-secrets="ANTHROPIC_API_KEY=ANTHROPIC_API_KEY:latest,OPENAI_API_KEY=OPENAI_API_KEY:latest,GROQ_API_KEY=GROQ_API_KEY:latest,GEMINI_API_KEY=GEMINI_API_KEY_HEADY:latest"

      - name: Show Admin UI URL
        run: |
          gcloud run services describe heady-admin-ui \
            --project=${{ env.PROJECT_ID }} \
            --region=${{ env.REGION }} \
            --format='value(status.url)'
