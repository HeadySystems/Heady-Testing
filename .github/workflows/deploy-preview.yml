# ============================================================================
# HEADY CI/CD — Deploy Preview (PR Comments)
# .github/workflows/deploy-preview.yml
#
# Triggers: pull_request events (opened, synchronize, reopened)
# - Posts a PR comment listing changed site files
# - Identifies which Heady verticals are affected
# - Links to the relevant production domains
# ============================================================================

name: Deploy Preview

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]

permissions:
  contents: read
  pull-requests: write  # Required to post PR comments

jobs:
  preview-comment:
    name: PR Preview Summary
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # Full history to diff against base

      - name: Get changed files
        id: changed-files
        run: |
          # Diff between PR base and HEAD
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"

          echo "Comparing $BASE_SHA...$HEAD_SHA"

          CHANGED=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA" 2>/dev/null || \
                    git diff --name-only HEAD~1 HEAD 2>/dev/null || true)

          echo "changed_files<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGED" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          echo "Total changed files: $(echo "$CHANGED" | grep -c . || echo 0)"

      - name: Analyze affected verticals
        id: analyze
        run: |
          CHANGED="${{ steps.changed-files.outputs.changed_files }}"

          # ── Domain → production URL mapping ──────────────────────────────
          declare -A DOMAIN_URLS=(
            ["heady-ai.com"]="https://heady-ai.com"
            ["headyai"]="https://heady-ai.com"
            ["headyme.com"]="https://headyme.com"
            ["headyme"]="https://headyme.com"
            ["headysystems.com"]="https://headysystems.com"
            ["headysystems"]="https://headysystems.com"
            ["headyio.com"]="https://headyio.com"
            ["headyio"]="https://headyio.com"
            ["headybuddy.com"]="https://headybuddy.com"
            ["headybuddy"]="https://headybuddy.com"
            ["headyconnection.org"]="https://headyconnection.org"
            ["headyconnection"]="https://headyconnection.org"
            ["headyfinance.com"]="https://headyfinance.com"
            ["headyfinance"]="https://headyfinance.com"
            ["headyapi"]="https://headyapi.com"
            ["headymcp"]="https://headymcp.com"
            ["headybot"]="https://headybot.com"
            ["headylens"]="https://headylens.com"
            ["admin.headysystems.com"]="https://admin.headysystems.com"
            ["docs"]="https://docs.headysystems.com"
          )

          # ── Vertical → emoji label ────────────────────────────────────────
          declare -A VERTICAL_LABELS=(
            ["heady-ai"]="AI Platform"
            ["headyme"]="HeadyMe"
            ["headysystems"]="Core Systems"
            ["headyio"]="HeadyIO"
            ["headybuddy"]="HeadyBuddy"
            ["headyconnection"]="HeadyConnection"
            ["headyfinance"]="HeadyFinance"
            ["headyapi"]="HeadyAPI"
            ["headymcp"]="HeadyMCP"
            ["headybot"]="HeadyBot"
            ["headylens"]="HeadyLens"
            ["admin"]="Admin Portal"
            ["docs"]="Documentation"
          )

          AFFECTED_SITES=""
          SITE_FILES_CHANGED=""
          OTHER_FILES_CHANGED=""

          while IFS= read -r file; do
            [ -z "$file" ] && continue

            # Track site-related changes
            if [[ "$file" == sites/* || "$file" == _site/* ]]; then
              SITE_FILES_CHANGED="$SITE_FILES_CHANGED\n- \`$file\`"

              # Extract vertical from path
              VERTICAL=$(echo "$file" | sed 's|^sites/||;s|^_site/sites/||;s|/.*||')

              # Match to a domain URL
              URL=""
              for key in "${!DOMAIN_URLS[@]}"; do
                if [[ "$VERTICAL" == *"$key"* || "$key" == *"$VERTICAL"* ]]; then
                  URL="${DOMAIN_URLS[$key]}"
                  break
                fi
              done

              # Get label
              LABEL="${VERTICAL}"
              for key in "${!VERTICAL_LABELS[@]}"; do
                if [[ "$VERTICAL" == *"$key"* ]]; then
                  LABEL="${VERTICAL_LABELS[$key]}"
                  break
                fi
              done

              # Add to affected sites (deduplicate)
              if [ -n "$URL" ] && ! echo "$AFFECTED_SITES" | grep -q "$URL"; then
                AFFECTED_SITES="$AFFECTED_SITES\n| $LABEL | [$VERTICAL]($URL) | Production |"
              fi
            elif [[ "$file" == .github/* ]]; then
              OTHER_FILES_CHANGED="$OTHER_FILES_CHANGED\n- \`$file\` _(CI/CD)_"
            elif [[ "$file" == shared/* || "$file" == services/* ]]; then
              OTHER_FILES_CHANGED="$OTHER_FILES_CHANGED\n- \`$file\` _(shared/services)_"
            else
              OTHER_FILES_CHANGED="$OTHER_FILES_CHANGED\n- \`$file\`"
            fi
          done <<< "$CHANGED"

          # Save outputs for comment step
          {
            echo "site_files<<EOF"
            printf "%b\n" "${SITE_FILES_CHANGED:-_(none)_}"
            echo "EOF"
          } >> $GITHUB_OUTPUT

          {
            echo "affected_sites<<EOF"
            printf "%b\n" "${AFFECTED_SITES:-_(no site verticals affected)_}"
            echo "EOF"
          } >> $GITHUB_OUTPUT

          {
            echo "other_files<<EOF"
            printf "%b\n" "${OTHER_FILES_CHANGED:-_(none)_}"
            echo "EOF"
          } >> $GITHUB_OUTPUT

          # Count totals
          TOTAL=$(echo "$CHANGED" | grep -c . || echo 0)
          echo "total_changed=$TOTAL" >> $GITHUB_OUTPUT

      - name: Post PR comment
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const siteFiles = `${{ steps.analyze.outputs.site_files }}`;
            const affectedSites = `${{ steps.analyze.outputs.affected_sites }}`;
            const otherFiles = `${{ steps.analyze.outputs.other_files }}`;
            const totalChanged = `${{ steps.analyze.outputs.total_changed }}`;
            const sha = context.sha.substring(0, 7);
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            const hasAffectedSites = affectedSites && !affectedSites.includes('no site verticals affected');

            const body = `## Deploy Preview — PR #${context.payload.pull_request.number}

            **Commit:** \`${sha}\` — ${totalChanged} file(s) changed

            ${hasAffectedSites ? `### Affected Verticals

            | Vertical | Domain | Status |
            |----------|--------|--------|
            ${affectedSites}

            > These production domains will reflect changes after merge to \`main\` and deployment.` : `> No site verticals affected by this PR.`}

            ### Changed Site Files
            ${siteFiles}

            ### Other Changed Files
            ${otherFiles}

            ---
            _Preview analysis by [Deploy Preview workflow](${runUrl})_`;

            // Find existing bot comment to update instead of creating duplicate
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
            });

            const botComment = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('Deploy Preview')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body,
              });
              console.log('Updated existing deploy preview comment.');
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                body,
              });
              console.log('Created new deploy preview comment.');
            }
