# HEADY_BRAND:BEGIN
# Cross-Repo Sync — Synchronize HeadyMe, HeadySystems, HeadyAI orgs
# HEADY_BRAND:END

name: Cross-Repo Sync

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  sync:
    name: Sync Heady Organizations
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Sync shared configs
        env:
          GH_TOKEN: ${{ secrets.HEADY_GITHUB_TOKEN }}
        run: |
          echo "## Cross-Repo Sync Report" >> $GITHUB_STEP_SUMMARY

          # Shared config files to sync across orgs
          SHARED_FILES=(
            "configs/liquid-microservice-architecture.yaml"
            "src/core/liquid-node-base.js"
            ".github/workflows/hcfullpipeline-ci.yml"
            ".github/workflows/liquid-deploy.yml"
          )

          for file in "${SHARED_FILES[@]}"; do
            if [ -f "$file" ]; then
              echo "- ✅ $file exists" >> $GITHUB_STEP_SUMMARY
            else
              echo "- ❌ $file missing" >> $GITHUB_STEP_SUMMARY
            fi
          done

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Orgs:** HeadyMe, HeadySystems, HeadyAI" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** $(git branch --show-current)" >> $GITHUB_STEP_SUMMARY
