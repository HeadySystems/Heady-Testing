# GitHub CI — Turborepo filtered build + test
# v9.0 Blueprint §7: Only builds/tests packages changed since main
#
# Uses turbo filtering (--filter='...[origin/main...HEAD]') to
# transform a 45-task full build into 4-8 affected tasks per PR.
# Remote caching via GitHub Artifacts for cross-CI reuse.

name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for turbo --filter

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Turbo cache (GitHub Artifacts)
        uses: felixmosh/turborepo-gh-artifacts@v4
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build (changed packages only)
        run: npx turbo run build --filter='...[origin/main...HEAD]' --concurrency=4

      - name: Test (changed packages only)
        run: npx turbo run test --filter='...[origin/main...HEAD]' --concurrency=4

      - name: Lint (changed packages only)
        run: npx turbo run lint --filter='...[origin/main...HEAD]' --concurrency=4
        continue-on-error: true

  docker:
    needs: build-and-test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: headyme-site
          region: us-central1
          source: .
