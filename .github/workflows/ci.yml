name: Heady™ CI/CD Pipeline
on:
  push:
    branches: [main, production, develop]
  pull_request:
    branches: [main, production]

env:
  NODE_VERSION: '20'
  PYTHON_VERSION: '3.12'

jobs:
  # ─── Code Quality ────────────────────────────────────────────
  lint:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npx eslint src/ services/ packages/ bin/ --ext .js,.ts --max-warnings 0
      - run: npx tsc --noEmit --project tsconfig.json
        continue-on-error: true

  # ─── Security ────────────────────────────────────────────────
  security-scan:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - name: npm audit
        run: npm audit --production --audit-level=high
      - name: Credential scan
        run: |
          ! grep -rn "AKID\|sk-[a-zA-Z0-9]\{20\}\|-----BEGIN PRIVATE" \
            src/ services/ packages/ bin/ configs/ \
            --include="*.js" --include="*.ts" --include="*.py" --include="*.json"
      - name: SAST scan
        uses: github/codeql-action/analyze@v3
        with:
          languages: javascript
        continue-on-error: true

  # ─── Tests ───────────────────────────────────────────────────
  test:
    name: Test Suite
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - name: Run tests in heady-mcp-server
        working-directory: services/heady-mcp-server
        run: npm test
      - run: npx jest --coverage --ci --reporters=default --reporters=jest-junit
        env:
          JEST_JUNIT_OUTPUT_DIR: ./test-results
      - uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
      - uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/

  # ─── Python Tests ───────────────────────────────────────────
  test-python:
    name: Python Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: cd python && pip install -e ".[dev]" && pytest tests/ -v --cov=core
        continue-on-error: true

  # ─── Registry Validation ────────────────────────────────────
  registry-validation:
    name: Validate Registry
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - name: Run registry validation
        run: npm run validate-registry --if-present || node validate-registry.js

  # ─── Build ──────────────────────────────────────────────────
  build:
    name: Build Packages
    runs-on: ubuntu-latest
    needs: [test, security-scan, registry-validation]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: node bin/heady-cli.js build

  # ─── Docker Build & Push ────────────────────────────────────
  build-docker:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [lint, test, registry-validation, security-scan]
    if: success()
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build heady-mcp-server image
        uses: docker/build-push-action@v5
        with:
          context: ./services/heady-mcp-server
          push: false
          tags: heady-mcp-server:latest
          cache-from: type=registry,ref=us-east1-docker.pkg.dev/gen-lang-client-0920560496/heady/heady-mcp-server:latest
          cache-to: type=inline

      - name: Build heady-gateway image
        uses: docker/build-push-action@v5
        with:
          context: ./services/heady-gateway
          push: false
          tags: heady-gateway:latest
          cache-from: type=registry,ref=us-east1-docker.pkg.dev/gen-lang-client-0920560496/heady/heady-gateway:latest
          cache-to: type=inline

      - name: Build heady-orchestrator image
        uses: docker/build-push-action@v5
        with:
          context: ./services/heady-orchestrator
          push: false
          tags: heady-orchestrator:latest
          cache-from: type=registry,ref=us-east1-docker.pkg.dev/gen-lang-client-0920560496/heady/heady-orchestrator:latest
          cache-to: type=inline
