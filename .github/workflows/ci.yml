name: Heady CI/CD Pipeline
on:
  push:
    branches: [main, production, develop]
  pull_request:
    branches: [main, production]

env:
  NODE_VERSION: '20'
  PYTHON_VERSION: '3.12'

jobs:
  # ─── Code Quality ────────────────────────────────────────────
  lint:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npx eslint src/ services/ packages/ bin/ --ext .js,.ts --max-warnings 0
      - run: npx tsc --noEmit --project tsconfig.json
        continue-on-error: true

  # ─── Security ────────────────────────────────────────────────
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - name: npm audit
        run: npm audit --production --audit-level=high
      - name: Credential scan
        run: |
          ! grep -rn "AKID\|sk-[a-zA-Z0-9]\{20\}\|-----BEGIN PRIVATE" \
            src/ services/ packages/ bin/ configs/ \
            --include="*.js" --include="*.ts" --include="*.py" --include="*.json"
      - name: SAST scan
        uses: github/codeql-action/analyze@v3
        with:
          languages: javascript
        continue-on-error: true

  # ─── Tests ───────────────────────────────────────────────────
  test:
    name: Test Suite
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npx jest --coverage --ci --reporters=default --reporters=jest-junit
        env:
          JEST_JUNIT_OUTPUT_DIR: ./test-results
      - uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
      - uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/

  # ─── Python Tests ───────────────────────────────────────────
  test-python:
    name: Python Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: cd python && pip install -e ".[dev]" && pytest tests/ -v --cov=core
        continue-on-error: true

  # ─── Build ──────────────────────────────────────────────────
  build:
    name: Build Packages
    runs-on: ubuntu-latest
    needs: [test, security]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: node bin/heady-cli.js build

  # ─── Deploy (production only) ───────────────────────────────
  deploy:
    name: Deploy to Cloud Run
    runs-on: ubuntu-latest
    needs: [build]
    if: github.ref == 'refs/heads/production' && github.event_name == 'push'
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - uses: google-github-actions/setup-gcloud@v2
      - run: |
          gcloud run services replace infra/cloudrun/service.yaml \
            --region=us-central1 --quiet
      - name: Post-deploy health check
        run: |
          sleep 30
          curl -sf https://api.headysystems.com/health || exit 1
