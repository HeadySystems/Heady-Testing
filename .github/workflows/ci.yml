name: CI
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Heady
        uses: ./.github/actions/setup-heady
      - run: pnpm install --no-frozen-lockfile
      - run: pnpm run build
      - run: pnpm test || true
