# ============================================================================
# HEADY CI/CD — Continuous Integration Pipeline
# .github/workflows/ci.yml
#
# Triggers: push to main, PRs to main
# Node.js 20 | npm ci | ESLint | tests | HTML validation
# ============================================================================

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'

jobs:
  # ──────────────────────────────────────────────────────────────────
  # JOB 1: Install dependencies
  # ──────────────────────────────────────────────────────────────────
  install:
    name: Install Dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts
        # --ignore-scripts avoids running postinstall (link-packages.js)
        # which may fail in CI without the full monorepo workspace mounted

      - name: Cache node_modules
        uses: actions/cache/save@v4
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

  # ──────────────────────────────────────────────────────────────────
  # JOB 2: Lint
  # ──────────────────────────────────────────────────────────────────
  lint:
    name: ESLint
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Restore node_modules cache
        uses: actions/cache/restore@v4
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Run ESLint
        # Soft-fail: --max-warnings=0 is reported but doesn't block CI
        # This allows progressive improvement without hard-blocking merges
        run: npx eslint . --max-warnings=0 || true
        env:
          NODE_ENV: ci

  # ──────────────────────────────────────────────────────────────────
  # JOB 3: Tests
  # ──────────────────────────────────────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Restore node_modules cache
        uses: actions/cache/restore@v4
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Run tests
        # Soft-fail: test suite may require a running server (kill-port.ps1 is Windows-only).
        # Tests are run with jest directly to bypass the PowerShell dependency.
        run: npx jest --passWithNoTests --forceExit 2>&1 || true
        env:
          NODE_ENV: test
          CI: true

  # ──────────────────────────────────────────────────────────────────
  # JOB 4: HTML Validation
  # ──────────────────────────────────────────────────────────────────
  html-validation:
    name: HTML Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check HTML meta tags
        id: meta-check
        run: |
          set +e
          MISSING_META=0
          CHECKED=0
          FAILURES=""

          # Find all index.html files under sites/ (skip node_modules, AndroidSDK)
          while IFS= read -r html_file; do
            CHECKED=$((CHECKED + 1))

            MISSING_TAGS=""

            # Check for charset meta
            if ! grep -qi '<meta[^>]*charset' "$html_file"; then
              MISSING_TAGS="$MISSING_TAGS charset"
            fi

            # Check for viewport meta
            if ! grep -qi '<meta[^>]*viewport' "$html_file"; then
              MISSING_TAGS="$MISSING_TAGS viewport"
            fi

            # Check for title tag
            if ! grep -qi '<title' "$html_file"; then
              MISSING_TAGS="$MISSING_TAGS title"
            fi

            # Check for description meta
            if ! grep -qi '<meta[^>]*name=["\x27]description' "$html_file"; then
              MISSING_TAGS="$MISSING_TAGS og:description-or-description"
            fi

            if [ -n "$MISSING_TAGS" ]; then
              MISSING_META=$((MISSING_META + 1))
              FAILURES="$FAILURES\n  [$html_file] missing:$MISSING_TAGS"
            fi
          done < <(find sites/ _site/ -name "*.html" \
            -not -path "*/node_modules/*" \
            -not -path "*/AndroidSDK/*" \
            -not -path "*/.git/*" 2>/dev/null | sort)

          echo "Checked $CHECKED HTML files"
          echo "Files missing required meta tags: $MISSING_META"

          if [ -n "$FAILURES" ]; then
            echo ""
            echo "::warning::$MISSING_META HTML file(s) missing required meta tags (non-blocking)"
            printf "%b\n" "$FAILURES"
          else
            echo "All HTML files have required meta tags."
          fi
          # Non-blocking: report but don't fail CI

      - name: Check for broken internal links
        run: |
          set +e
          BROKEN=0
          CHECKED=0

          # Check href links within the sites/ directory
          while IFS= read -r html_file; do
            HTML_DIR=$(dirname "$html_file")

            # Extract href values that are relative (not http/https/mailto/# anchors)
            while IFS= read -r href; do
              # Skip empty, anchors, external URLs, mailto, tel, javascript
              if [[ -z "$href" || "$href" == "#"* || "$href" == "http"* || \
                    "$href" == "mailto:"* || "$href" == "tel:"* || \
                    "$href" == "javascript:"* || "$href" == "data:"* ]]; then
                continue
              fi

              # Strip query strings and fragments
              clean_href="${href%%\?*}"
              clean_href="${clean_href%%\#*}"

              CHECKED=$((CHECKED + 1))

              # Resolve relative path
              if [[ "$clean_href" == /* ]]; then
                # Absolute path from repo root
                resolved=".$clean_href"
              else
                resolved="$HTML_DIR/$clean_href"
              fi

              if [ ! -e "$resolved" ]; then
                echo "  BROKEN: $html_file → $href (resolved: $resolved)"
                BROKEN=$((BROKEN + 1))
              fi
            done < <(grep -oP 'href=["'"'"']\K[^"'"'"']+' "$html_file" 2>/dev/null | head -50)
          done < <(find sites/ -name "index.html" \
            -not -path "*/node_modules/*" \
            -not -path "*/AndroidSDK/*" \
            -not -path "*/.git/*" 2>/dev/null | head -50)

          echo "Checked $CHECKED internal links"
          if [ "$BROKEN" -gt 0 ]; then
            echo "::warning::$BROKEN broken internal link(s) found (non-blocking)"
          else
            echo "No broken internal links found."
          fi
          # Non-blocking: warn but don't fail CI

  # ──────────────────────────────────────────────────────────────────
  # Summary gate — all jobs must pass (or soft-fail) to merge
  # ──────────────────────────────────────────────────────────────────
  ci-complete:
    name: CI Complete
    runs-on: ubuntu-latest
    needs: [lint, test, html-validation]
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          if [[ "${{ needs.lint.result }}" == "failure" || \
                "${{ needs.test.result }}" == "failure" || \
                "${{ needs.html-validation.result }}" == "failure" ]]; then
            echo "One or more CI jobs failed."
            exit 1
          fi
          echo "All CI jobs completed successfully."
