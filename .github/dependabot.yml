# v9.0 Blueprint §7: Dependabot grouped dependency updates
# Groups patch/minor production deps into one PR, dev deps into another.
# Auto-merge non-major updates via dependabot/fetch-metadata action.

version: 2
updates:
  # npm dependencies — root monorepo
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    groups:
      production-patch-minor:
        dependency-type: "production"
        update-types:
          - "minor"
          - "patch"
      dev-dependencies:
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"
    ignore:
      # Ignore archived packages — not deployed
      - dependency-name: "*"
        update-types: ["version-update:semver-major", "version-update:semver-minor", "version-update:semver-patch"]
    labels:
      - "dependencies"
      - "automated"

  # Python dependencies — oracle_service
  - package-ecosystem: "pip"
    directory: "/oracle_service"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "python"

  # Python dependencies — midi_bridge
  - package-ecosystem: "pip"
    directory: "/midi_bridge"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "python"

  # Python dependencies — ai_workflow_engine
  - package-ecosystem: "pip"
    directory: "/apps/ai_workflow_engine"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "python"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "ci"
      - "automated"
