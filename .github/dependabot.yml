# P2-4: Dependabot configuration
version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "automated"
    commit-message:
      prefix: "chore(deps):"
    groups:
      opentelemetry:
        patterns:
          - "@opentelemetry/*"
      lint-format:
        patterns:
          - "eslint*"
          - "prettier*"
      ai-providers:
        patterns:
          - "openai"
          - "@anthropic-ai/*"
          - "@google/*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "ci"
      - "automated"
    commit-message:
      prefix: "chore(ci):"

  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "monthly"
    labels:
      - "docker"
      - "automated"
    commit-message:
      prefix: "chore(docker):"
