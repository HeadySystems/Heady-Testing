<!-- HEADY_BRAND:BEGIN
     HeadyOS · Colab Runtime Panel
     Sacred Geometry · Latent Space Operations
     HEADY_BRAND:END -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Colab Runtime Panel · HeadyOS</title>
  <link rel="stylesheet" href="/sacred-geometry.css" />
  <link rel="stylesheet" href="/heady-nav.css" />
  <style>
    :root {
      --void: #050510;
      --cyan: #00D9FF;
      --magenta: #FF00A0;
      --gold: #D4AF37;
      --surface: rgba(255,255,255,0.04);
      --border: rgba(0,217,255,0.15);
      --phi: 1.618;
      --psi: 0.618;
      --ready-color: #00FF88;
      --busy-color: #D4AF37;
      --error-color: #FF00A0;
      --text-primary: rgba(255,255,255,0.92);
      --text-muted: rgba(255,255,255,0.45);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--void);
      color: var(--text-primary);
      font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }
    body::before {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 80% 50% at 20% 20%, rgba(0,217,255,0.04) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 80% 80%, rgba(255,0,160,0.04) 0%, transparent 60%);
      pointer-events: none; z-index: 0;
    }
    .page-wrap { position: relative; z-index: 1; max-width: 1280px; margin: 0 auto; padding: 2.4rem 1.6rem 4rem; }

    /* Header */
    .page-header { text-align: center; margin-bottom: 2.618rem; }
    .eyebrow {
      font-size: 0.75rem; letter-spacing: 0.2em; text-transform: uppercase;
      color: var(--cyan); opacity: 0.7; margin-bottom: 0.618rem;
    }
    .page-title {
      font-size: clamp(1.8rem, 4vw, 3rem); font-weight: 700;
      background: linear-gradient(135deg, var(--cyan), var(--magenta));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      letter-spacing: -0.02em; line-height: 1.1;
    }
    .page-subtitle { font-size: 0.9rem; color: var(--text-muted); margin-top: 0.618rem; }

    /* Summary strip */
    .summary-strip {
      display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap;
      margin-bottom: 2.4rem;
    }
    .summary-chip {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 100px; padding: 0.5rem 1.2rem;
      font-size: 0.8rem; color: var(--cyan); letter-spacing: 0.05em;
      display: flex; align-items: center; gap: 0.5rem;
    }
    .summary-chip .val { color: #fff; font-weight: 600; }

    /* Runtime grid */
    .runtime-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 1.618rem;
      margin-bottom: 2.618rem;
    }
    .runtime-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.618rem;
      position: relative;
      overflow: hidden;
      transition: border-color 0.3s, transform 0.3s;
    }
    .runtime-card::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, var(--cyan), var(--magenta));
      opacity: 0.6;
    }
    .runtime-card:hover { border-color: rgba(0,217,255,0.4); transform: translateY(-2px); }

    .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 1.2rem; }
    .card-id { font-size: 0.7rem; color: var(--text-muted); letter-spacing: 0.15em; text-transform: uppercase; }
    .card-role { font-size: 1rem; font-weight: 600; color: var(--cyan); margin-top: 0.2rem; }
    .state-badge {
      font-size: 0.65rem; font-weight: 700; letter-spacing: 0.12em;
      padding: 0.25rem 0.65rem; border-radius: 100px;
      text-transform: uppercase;
    }
    .state-READY  { background: rgba(0,255,136,0.15); color: var(--ready-color); border: 1px solid rgba(0,255,136,0.3); }
    .state-BUSY   { background: rgba(212,175,55,0.15); color: var(--busy-color);  border: 1px solid rgba(212,175,55,0.3); }
    .state-ERROR  { background: rgba(255,0,160,0.15);  color: var(--error-color); border: 1px solid rgba(255,0,160,0.3); }

    /* GPU Arc Ring */
    .gpu-ring-wrap { display: flex; flex-direction: column; align-items: center; margin: 1rem 0; }
    .gpu-ring-svg { width: 100px; height: 60px; overflow: visible; }
    .ring-track { fill: none; stroke: rgba(255,255,255,0.08); stroke-width: 6; stroke-linecap: round; }
    .ring-fill  { fill: none; stroke: var(--cyan); stroke-width: 6; stroke-linecap: round;
                  transition: stroke-dashoffset 1s ease; filter: drop-shadow(0 0 4px var(--cyan)); }
    .ring-label { font-size: 0.7rem; color: var(--text-muted); margin-top: 0.3rem; }
    .ring-pct   { font-size: 1.1rem; font-weight: 700; color: var(--cyan); }

    .card-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; margin: 1rem 0; }
    .stat-item { }
    .stat-label { font-size: 0.65rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.1em; }
    .stat-value { font-size: 0.9rem; font-weight: 600; color: #fff; margin-top: 0.1rem; }
    .stat-value.cyan { color: var(--cyan); }
    .stat-value.gold { color: var(--gold); }

    .vram-bar-wrap { margin: 0.5rem 0 1rem; }
    .vram-bar-label { font-size: 0.65rem; color: var(--text-muted); margin-bottom: 0.3rem; display: flex; justify-content: space-between; }
    .vram-bar-track { height: 4px; background: rgba(255,255,255,0.08); border-radius: 2px; overflow: hidden; }
    .vram-bar-fill  { height: 100%; background: linear-gradient(90deg, var(--cyan), var(--magenta));
                      border-radius: 2px; transition: width 1s ease; }

    .op-tags { display: flex; flex-wrap: wrap; gap: 0.35rem; margin-top: 0.8rem; }
    .op-tag {
      font-size: 0.6rem; letter-spacing: 0.08em; text-transform: uppercase;
      padding: 0.2rem 0.5rem; border-radius: 4px;
      background: rgba(0,217,255,0.08); border: 1px solid rgba(0,217,255,0.2);
      color: var(--cyan);
    }
    .cb-indicator { display: flex; align-items: center; gap: 0.4rem; font-size: 0.7rem; color: var(--text-muted); margin-top: 0.5rem; }
    .cb-dot { width: 6px; height: 6px; border-radius: 50%; }
    .cb-closed { background: var(--ready-color); box-shadow: 0 0 6px var(--ready-color); }
    .cb-open   { background: var(--error-color); box-shadow: 0 0 6px var(--error-color); }

    /* Two-column lower section */
    .lower-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.618rem; margin-bottom: 2.618rem; }
    @media (max-width: 768px) { .lower-grid { grid-template-columns: 1fr; } }

    .panel {
      background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 1.4rem;
    }
    .panel-title {
      font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.15em;
      color: var(--cyan); margin-bottom: 1rem; display: flex; align-items: center; gap: 0.5rem;
    }
    .panel-title::before { content: ''; width: 3px; height: 12px; background: var(--cyan); border-radius: 2px; }

    .op-form { display: flex; flex-direction: column; gap: 0.75rem; margin-bottom: 1.4rem; }
    .op-input {
      background: rgba(0,0,0,0.3); border: 1px solid var(--border); border-radius: 8px;
      padding: 0.65rem 0.9rem; color: #fff; font-size: 0.85rem;
      width: 100%; outline: none; transition: border-color 0.2s;
    }
    .op-input:focus { border-color: var(--cyan); }
    .op-btn {
      padding: 0.65rem 1.2rem; border-radius: 8px; border: 1px solid var(--cyan);
      background: rgba(0,217,255,0.1); color: var(--cyan); font-size: 0.8rem;
      font-weight: 600; letter-spacing: 0.08em; cursor: pointer; transition: all 0.2s;
    }
    .op-btn:hover { background: rgba(0,217,255,0.2); }
    .op-btn.magenta { border-color: var(--magenta); background: rgba(255,0,160,0.1); color: var(--magenta); }
    .op-btn.magenta:hover { background: rgba(255,0,160,0.2); }
    .op-result {
      background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.06);
      border-radius: 8px; padding: 0.75rem; font-size: 0.75rem;
      color: var(--text-muted); font-family: 'Courier New', monospace;
      min-height: 2.5rem; word-break: break-all; white-space: pre-wrap;
    }

    /* Activity log */
    .log-panel {
      background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 1.4rem;
    }
    .log-entries { max-height: 280px; overflow-y: auto; }
    .log-entry {
      display: flex; gap: 0.75rem; align-items: flex-start;
      padding: 0.4rem 0; border-bottom: 1px solid rgba(255,255,255,0.04);
      font-size: 0.75rem;
    }
    .log-entry:last-child { border-bottom: none; }
    .log-ts { color: var(--text-muted); white-space: nowrap; flex-shrink: 0; }
    .log-level { width: 42px; text-align: center; border-radius: 3px; padding: 0 3px;
                  font-size: 0.6rem; font-weight: 700; flex-shrink: 0; }
    .level-INFO  { color: var(--cyan); background: rgba(0,217,255,0.1); }
    .level-OK    { color: var(--ready-color); background: rgba(0,255,136,0.1); }
    .level-WARN  { color: var(--gold); background: rgba(212,175,55,0.1); }
    .level-ERR   { color: var(--magenta); background: rgba(255,0,160,0.1); }
    .log-msg { color: rgba(255,255,255,0.7); flex: 1; }

    .pulse-dot {
      display: inline-block; width: 7px; height: 7px; border-radius: 50%;
      background: var(--ready-color); box-shadow: 0 0 8px var(--ready-color);
      animation: pulse 2s infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.5;transform:scale(0.8)} }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(0,217,255,0.2); border-radius: 2px; }
  </style>
</head>
<body>
<script src="/nav-component.js"></script>
<script src="/heady-shell.js"></script>

<div class="page-wrap">

  <!-- Header -->
  <header class="page-header">
    <div class="eyebrow">∞ Latent Space Operations</div>
    <h1 class="page-title">Colab Runtime Panel</h1>
    <p class="page-subtitle">Colab Pro+ · 3 Runtimes · 55GB VRAM each · Live <span class="pulse-dot"></span></p>
  </header>

  <!-- Summary strip -->
  <div class="summary-strip" id="summaryStrip">
    <div class="summary-chip">Runtimes <span class="val">3</span></div>
    <div class="summary-chip">Total VRAM <span class="val" id="sumVram">165 GB</span></div>
    <div class="summary-chip">Ops/sec <span class="val" id="sumOps">—</span></div>
    <div class="summary-chip">GPU Avg <span class="val" id="sumGpu">—</span></div>
    <div class="summary-chip">ORS <span class="val" id="sumOrs">—</span></div>
  </div>

  <!-- Runtime cards -->
  <div class="runtime-grid" id="runtimeGrid">
    <!-- populated by JS -->
  </div>

  <!-- Operations + Log -->
  <div class="lower-grid">

    <!-- Operations -->
    <div class="panel">
      <div class="panel-title">Vector Operations</div>

      <div class="op-form">
        <label style="font-size:0.75rem;color:var(--text-muted);">Embed Text → /api/vector/embed</label>
        <input class="op-input" id="embedInput" placeholder="Enter text to embed…" />
        <button class="op-btn" onclick="doEmbed()">⚡ Embed Text</button>
        <div class="op-result" id="embedResult">Awaiting input…</div>
      </div>

      <div class="op-form">
        <label style="font-size:0.75rem;color:var(--text-muted);">Search Vectors → /api/vector/search</label>
        <input class="op-input" id="searchInput" placeholder="Enter query to search…" />
        <button class="op-btn magenta" onclick="doSearch()">∞ Search Vectors</button>
        <div class="op-result" id="searchResult">Awaiting input…</div>
      </div>
    </div>

    <!-- Activity Log -->
    <div class="log-panel">
      <div class="panel-title">Activity Log <span class="pulse-dot" style="margin-left:auto;"></span></div>
      <div class="log-entries" id="activityLog">
        <!-- populated by JS -->
      </div>
    </div>

  </div>
</div>

<script>
// ─── Synthetic data ───────────────────────────────────────────────────────────
const RUNTIMES_SYNTHETIC = [
  {
    id: 'colab-a', role: 'primary-embed', state: 'READY',
    gpuPct: 72, vramUsed: 38.4, vramTotal: 55,
    opsExecuted: 14382, tasksQueued: 3, tempC: 71,
    cbState: 'CLOSED', ops: ['Embed','Search','Cluster']
  },
  {
    id: 'colab-b', role: 'search-cluster', state: 'BUSY',
    gpuPct: 91, vramUsed: 48.9, vramTotal: 55,
    opsExecuted: 9841, tasksQueued: 11, tempC: 84,
    cbState: 'CLOSED', ops: ['Search','Cluster','Train']
  },
  {
    id: 'colab-c', role: 'train-transform', state: 'READY',
    gpuPct: 44, vramUsed: 24.2, vramTotal: 55,
    opsExecuted: 5120, tasksQueued: 0, tempC: 62,
    cbState: 'CLOSED', ops: ['Train','Transform','Embed']
  }
];

const LOG_POOL = [
  [' INFO', 'colab-a → embed complete (38ms)'],
  [' OK  ', 'GPU utilization within budget'],
  [' INFO', 'colab-b search cluster returned 5 results'],
  [' WARN', 'colab-b VRAM usage >88% — monitoring'],
  [' OK  ', 'Checkpoint sync: all runtimes healthy'],
  [' INFO', 'colab-c training epoch 12 complete'],
  [' INFO', 'Vector index rebuilt — 6765 nodes'],
  [' OK  ', 'Circuit breakers: all CLOSED'],
  [' INFO', 'Latent space op: embed text (42ms)'],
  [' WARN', 'colab-b temp 84°C — throttle possible'],
  [' INFO', 'ORS computed: 91.4'],
  [' OK  ', 'colab-a ops/sec stable at 4.2'],
];

let logEntries = [];
function seedLog() {
  const now = Date.now();
  for (let i = 0; i < 12; i++) {
    const [level, msg] = LOG_POOL[i % LOG_POOL.length];
    logEntries.unshift({ ts: new Date(now - (12 - i) * 18000), level: level.trim(), msg });
  }
}
seedLog();

// ─── Arc Ring SVG ─────────────────────────────────────────────────────────────
// Arc is a half-circle (180°), cx=50 cy=50 r=38
function arcPath(pct, r = 38) {
  const total = Math.PI * r; // half-circle circumference
  const offset = total - (total * Math.min(pct, 100) / 100);
  return { total: total.toFixed(2), offset: offset.toFixed(2) };
}

function stateColor(state) {
  return { READY: 'var(--ready-color)', BUSY: 'var(--busy-color)', ERROR: 'var(--error-color)' }[state] || '#fff';
}

function renderCard(rt) {
  const arc = arcPath(rt.gpuPct);
  const vramPct = ((rt.vramUsed / rt.vramTotal) * 100).toFixed(0);
  const stateBadge = `<span class="state-badge state-${rt.state}">${rt.state}</span>`;
  const cbClass = rt.cbState === 'CLOSED' ? 'cb-closed' : 'cb-open';
  const tags = rt.ops.map(o => `<span class="op-tag">${o}</span>`).join('');

  return `
  <div class="runtime-card" id="card-${rt.id}">
    <div class="card-header">
      <div>
        <div class="card-id">${rt.id}</div>
        <div class="card-role">${rt.role}</div>
      </div>
      ${stateBadge}
    </div>

    <div class="gpu-ring-wrap">
      <svg class="gpu-ring-svg" viewBox="0 0 100 55">
        <path class="ring-track"
          d="M 12 50 A 38 38 0 0 1 88 50"
          stroke-dasharray="${arc.total} ${arc.total}"
          stroke-dashoffset="0"/>
        <path class="ring-fill"
          d="M 12 50 A 38 38 0 0 1 88 50"
          stroke="${stateColor(rt.state)}"
          stroke-dasharray="${arc.total} ${arc.total}"
          stroke-dashoffset="${arc.offset}"/>
        <text x="50" y="48" text-anchor="middle" font-size="13" fill="${stateColor(rt.state)}" font-weight="700">${rt.gpuPct}%</text>
      </svg>
      <span class="ring-label">GPU Utilization</span>
    </div>

    <div class="vram-bar-wrap">
      <div class="vram-bar-label">
        <span>VRAM</span>
        <span>${rt.vramUsed} GB / ${rt.vramTotal} GB</span>
      </div>
      <div class="vram-bar-track"><div class="vram-bar-fill" style="width:${vramPct}%"></div></div>
    </div>

    <div class="card-stats">
      <div class="stat-item">
        <div class="stat-label">Ops Executed</div>
        <div class="stat-value cyan">${rt.opsExecuted.toLocaleString()}</div>
      </div>
      <div class="stat-item">
        <div class="stat-label">Tasks Queued</div>
        <div class="stat-value">${rt.tasksQueued}</div>
      </div>
      <div class="stat-item">
        <div class="stat-label">Temperature</div>
        <div class="stat-value gold">${rt.tempC}°C</div>
      </div>
      <div class="stat-item">
        <div class="stat-label">VRAM %</div>
        <div class="stat-value">${vramPct}%</div>
      </div>
    </div>

    <div class="cb-indicator">
      <span class="cb-dot ${cbClass}"></span>
      Circuit Breaker: ${rt.cbState}
    </div>

    <div class="op-tags">${tags}</div>
  </div>`;
}

// ─── Render all cards ─────────────────────────────────────────────────────────
function renderGrid(runtimes) {
  document.getElementById('runtimeGrid').innerHTML = runtimes.map(renderCard).join('');
  // Summary
  const totalOps = runtimes.reduce((s, r) => s + r.opsExecuted, 0);
  const avgGpu = Math.round(runtimes.reduce((s, r) => s + r.gpuPct, 0) / runtimes.length);
  const totalVram = runtimes.reduce((s, r) => s + r.vramTotal, 0);
  document.getElementById('sumVram').textContent = totalVram + ' GB';
  document.getElementById('sumOps').textContent = (totalOps / 1000).toFixed(1) + 'k';
  document.getElementById('sumGpu').textContent = avgGpu + '%';
}

// ─── Activity log render ──────────────────────────────────────────────────────
function renderLog() {
  const levelClass = { INFO: 'level-INFO', OK: 'level-OK', WARN: 'level-WARN', ERR: 'level-ERR' };
  document.getElementById('activityLog').innerHTML =
    logEntries.slice(0, 20).map(e => `
      <div class="log-entry">
        <span class="log-ts">${e.ts.toLocaleTimeString()}</span>
        <span class="log-level ${levelClass[e.level] || 'level-INFO'}">${e.level}</span>
        <span class="log-msg">${e.msg}</span>
      </div>`).join('');
}

// ─── Operations ───────────────────────────────────────────────────────────────
async function doEmbed() {
  const text = document.getElementById('embedInput').value.trim();
  const el = document.getElementById('embedResult');
  if (!text) { el.textContent = 'Enter text first.'; return; }
  el.textContent = 'Embedding…';
  try {
    const res = await HeadyOS.post('/api/vector/embed', { text });
    const dims = (res.embedding || []).slice(0, 16).map(v => v.toFixed(4)).join(', ');
    el.textContent = `dims[0..15]: [${dims}]\nmodel: ${res.model||'all-MiniLM-L6-v2'} | ${res.dimensions||384}D`;
  } catch {
    // synthetic
    const fake = Array.from({length:16}, () => (Math.random()*2-1).toFixed(4));
    el.textContent = `dims[0..15]: [${fake.join(', ')}]\nmodel: all-MiniLM-L6-v2 | 384D (synthetic)`;
  }
  logEntries.unshift({ ts: new Date(), level: 'INFO', msg: `embed op complete — "${text.slice(0,40)}"` });
  renderLog();
}

async function doSearch() {
  const query = document.getElementById('searchInput').value.trim();
  const el = document.getElementById('searchResult');
  if (!query) { el.textContent = 'Enter a query first.'; return; }
  el.textContent = 'Searching…';
  try {
    const res = await HeadyOS.post('/api/vector/search', { query, topK: 5 });
    const results = (res.results || []).map((r, i) =>
      `${i+1}. [${(r.score||0).toFixed(4)}] ${r.id||'vec-'+i}`
    ).join('\n');
    el.textContent = results || 'No results.';
  } catch {
    const fakeResults = Array.from({length:5}, (_, i) =>
      `${i+1}. [${(0.99 - i*0.08).toFixed(4)}] synthetic-vec-${1000+i}`
    ).join('\n');
    el.textContent = fakeResults + '\n(synthetic)';
  }
  logEntries.unshift({ ts: new Date(), level: 'INFO', msg: `search op — "${query.slice(0,40)}"` });
  renderLog();
}

// ─── Poll ─────────────────────────────────────────────────────────────────────
async function refresh() {
  let runtimes = RUNTIMES_SYNTHETIC;
  let ors = 91.4;
  try {
    const data = await HeadyOS.get('/api/colab/status');
    if (data && data.runtimes) { runtimes = data.runtimes; ors = data.ors || ors; }
  } catch {}
  // Jitter synthetic values for liveliness
  runtimes = runtimes.map(rt => ({
    ...rt,
    gpuPct: Math.min(99, Math.max(10, rt.gpuPct + Math.round((Math.random()-0.5)*4))),
    opsExecuted: rt.opsExecuted + Math.floor(Math.random()*8),
    tempC: Math.min(95, Math.max(50, rt.tempC + Math.round((Math.random()-0.5)*2))),
  }));
  renderGrid(runtimes);
  document.getElementById('sumOrs').textContent = ors;

  // Add periodic log entry
  if (Math.random() > 0.5) {
    const [level, msg] = LOG_POOL[Math.floor(Math.random()*LOG_POOL.length)];
    logEntries.unshift({ ts: new Date(), level: level.trim(), msg });
    if (logEntries.length > 20) logEntries.pop();
  }
  renderLog();
}

// ─── Boot ─────────────────────────────────────────────────────────────────────
renderGrid(RUNTIMES_SYNTHETIC);
renderLog();
refresh();
setInterval(refresh, 5000);
</script>
</body>
</html>
