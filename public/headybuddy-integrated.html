<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HeadyBuddy - AI Operations Assistant</title>
    <link rel="stylesheet" href="/sacred-geometry.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: var(--heady-deep-space);
            color: var(--heady-white);
            overflow: hidden;
            height: 100vh;
        }

        .container {
            display: flex;
            height: 100vh;
            position: relative;
        }

        /* Main Chat Area */
        .chat-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
            z-index: 10;
        }

        /* Header */
        .chat-header {
            background: rgba(10, 10, 26, 0.8);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(212, 175, 55, 0.2);
            padding: 16px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            min-height: 70px;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header-logo {
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--heady-gold), var(--heady-cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header-status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: var(--heady-gray);
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #00FF00;
            box-shadow: 0 0 10px rgba(0, 255, 0, 0.5);
            animation: pulse-dot 2s ease-in-out infinite;
        }

        .status-dot.offline {
            background: #FF4444;
            box-shadow: 0 0 10px rgba(255, 68, 68, 0.5);
        }

        @keyframes pulse-dot {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .header-version {
            font-size: 12px;
            color: var(--heady-gray);
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .back-button {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            border-radius: var(--radius-button);
            border: 1px solid rgba(212, 175, 55, 0.3);
            background: rgba(212, 175, 55, 0.1);
            color: var(--heady-gold);
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            font-size: 20px;
        }

        .back-button:hover {
            background: rgba(212, 175, 55, 0.2);
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.3);
        }

        .panel-toggle {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            border-radius: var(--radius-button);
            border: 1px solid rgba(0, 217, 255, 0.3);
            background: rgba(0, 217, 255, 0.1);
            color: var(--heady-cyan);
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 18px;
        }

        .panel-toggle:hover {
            background: rgba(0, 217, 255, 0.2);
            box-shadow: 0 0 15px rgba(0, 217, 255, 0.3);
        }

        /* Chat Messages Area */
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            background: var(--heady-deep-space);
            position: relative;
        }

        .chat-messages::before {
            content: '';
            position: absolute;
            inset: 0;
            background-image:
                radial-gradient(ellipse at 20% 50%, rgba(0, 217, 255, 0.05) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(255, 0, 160, 0.03) 0%, transparent 50%);
            pointer-events: none;
        }

        /* Welcome Message with Orb */
        .welcome-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 24px;
            padding: 40px 24px;
            text-align: center;
            min-height: 300px;
        }

        .welcome-orb {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            background:
                radial-gradient(circle at 35% 35%, rgba(255,255,255,0.3) 0%, transparent 50%),
                conic-gradient(from 0deg, var(--heady-cyan), var(--heady-magenta), var(--heady-gold), var(--heady-cyan));
            box-shadow:
                inset 0 0 40px rgba(255,255,255,0.2),
                0 0 60px rgba(0, 217, 255, 0.4),
                0 0 100px rgba(255, 0, 160, 0.2);
            animation: breathe 4s ease-in-out infinite, rotate-slow 20s linear infinite;
            position: relative;
        }

        .welcome-orb::before {
            content: '';
            position: absolute;
            inset: 10px;
            border-radius: 50%;
            background: var(--heady-void);
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
        }

        .welcome-orb::after {
            content: '';
            position: absolute;
            inset: 15px;
            border-radius: 50%;
            background:
                radial-gradient(circle at 40% 40%, var(--heady-cyan) 0%, transparent 60%),
                radial-gradient(circle at 60% 60%, var(--heady-magenta) 0%, transparent 60%);
            opacity: 0.6;
            animation: pulse-glow 1.5s ease-in-out infinite;
        }

        .welcome-text h1 {
            font-size: 24px;
            margin-bottom: 12px;
            background: linear-gradient(135deg, var(--heady-gold), var(--heady-cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .welcome-text p {
            font-size: 15px;
            color: var(--heady-gray);
            line-height: 1.6;
            max-width: 500px;
        }

        /* Message Bubbles */
        .message {
            display: flex;
            gap: 12px;
            animation: slideIn 0.3s ease-out;
            position: relative;
            z-index: 1;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            justify-content: flex-end;
        }

        .message-content {
            max-width: 70%;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .message.user .message-content {
            align-items: flex-end;
        }

        .message-bubble {
            padding: 12px 16px;
            border-radius: 16px;
            font-size: 14px;
            line-height: 1.5;
            word-wrap: break-word;
        }

        .user .message-bubble {
            background: linear-gradient(135deg, var(--heady-gold), rgba(212, 175, 55, 0.7));
            color: var(--heady-void);
            border-radius: 16px 4px 16px 16px;
            font-weight: 500;
        }

        .assistant .message-bubble {
            background: rgba(26, 26, 62, 0.8);
            border: 1px solid rgba(0, 217, 255, 0.3);
            color: var(--heady-white);
            border-radius: 4px 16px 16px 16px;
            box-shadow: 0 0 20px rgba(0, 217, 255, 0.15);
        }

        .message-time {
            font-size: 12px;
            color: var(--heady-gray);
        }

        /* Typing Indicator */
        .typing-indicator {
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 12px 16px;
            background: rgba(26, 26, 62, 0.8);
            border: 1px solid rgba(0, 217, 255, 0.3);
            border-radius: 4px 16px 16px 16px;
            width: fit-content;
        }

        .typing-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--heady-cyan);
            animation: typingBounce 1.4s infinite;
        }

        .typing-dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typingBounce {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.5; }
            30% { transform: translateY(-10px); opacity: 1; }
        }

        /* Suggestions Chips */
        .suggestions-container {
            padding: 0 24px 16px;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            animation: slideDown 0.4s ease-out;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .suggestion-chip {
            background: rgba(0, 217, 255, 0.1);
            border: 1px solid rgba(0, 217, 255, 0.4);
            color: var(--heady-cyan);
            padding: 8px 14px;
            border-radius: var(--radius-pill);
            font-size: 13px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 500;
        }

        .suggestion-chip:hover {
            background: rgba(0, 217, 255, 0.2);
            box-shadow: 0 0 20px rgba(0, 217, 255, 0.3);
            transform: translateY(-2px);
        }

        /* Input Area */
        .chat-input-area {
            background: rgba(10, 10, 26, 0.8);
            backdrop-filter: blur(20px);
            border-top: 1px solid rgba(212, 175, 55, 0.2);
            padding: 16px 24px;
            display: flex;
            gap: 12px;
            align-items: flex-end;
            min-height: 80px;
        }

        .input-field {
            flex: 1;
            background: rgba(26, 26, 62, 0.6);
            border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: var(--radius-button);
            padding: 12px 16px;
            color: var(--heady-white);
            font-size: 14px;
            resize: none;
            max-height: 120px;
            font-family: inherit;
            transition: all 0.3s ease;
        }

        .input-field::placeholder {
            color: var(--heady-gray);
        }

        .input-field:focus {
            outline: none;
            background: rgba(26, 26, 62, 0.9);
            border-color: rgba(0, 217, 255, 0.5);
            box-shadow: 0 0 20px rgba(0, 217, 255, 0.2);
        }

        .send-button {
            background: linear-gradient(135deg, var(--heady-gold), var(--heady-gold-dark));
            border: none;
            border-radius: var(--radius-button);
            color: var(--heady-void);
            padding: 12px 20px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 50px;
            height: 46px;
        }

        .send-button:hover:not(:disabled) {
            background: linear-gradient(135deg, var(--heady-gold-light), var(--heady-gold));
            box-shadow: var(--glow-gold);
            transform: translateY(-2px);
        }

        .send-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Side Panel */
        .side-panel {
            width: 0;
            background: rgba(10, 10, 26, 0.95);
            border-left: 1px solid rgba(212, 175, 55, 0.2);
            overflow-y: auto;
            transition: width 0.3s ease;
            position: absolute;
            right: 0;
            top: 0;
            bottom: 0;
            z-index: 20;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .side-panel.open {
            width: 380px;
        }

        .panel-close {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            margin-bottom: 10px;
        }

        .close-button {
            background: none;
            border: none;
            color: var(--heady-gray);
            font-size: 24px;
            cursor: pointer;
            transition: color 0.3s ease;
        }

        .close-button:hover {
            color: var(--heady-white);
        }

        .panel-section {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .panel-section-title {
            font-size: 13px;
            font-weight: 600;
            color: var(--heady-gold);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .system-snapshot {
            background: rgba(26, 26, 62, 0.6);
            border: 1px solid rgba(0, 217, 255, 0.2);
            border-radius: var(--radius-card);
            padding: 16px;
            font-size: 13px;
            color: var(--heady-gray);
            line-height: 1.8;
        }

        .snapshot-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            padding-bottom: 8px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .snapshot-item:last-child {
            margin-bottom: 0;
            border-bottom: none;
            padding-bottom: 0;
        }

        .snapshot-label {
            color: var(--heady-cyan);
            font-weight: 500;
        }

        .snapshot-value {
            color: var(--heady-white);
            font-weight: 600;
        }

        .quick-action {
            background: linear-gradient(135deg, rgba(0, 217, 255, 0.1), rgba(212, 175, 55, 0.05));
            border: 1px solid rgba(0, 217, 255, 0.2);
            border-radius: var(--radius-button);
            padding: 12px 16px;
            color: var(--heady-white);
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: left;
        }

        .quick-action:hover {
            background: linear-gradient(135deg, rgba(0, 217, 255, 0.2), rgba(212, 175, 55, 0.1));
            border-color: rgba(0, 217, 255, 0.4);
            box-shadow: 0 0 15px rgba(0, 217, 255, 0.2);
            transform: translateX(-4px);
        }

        .system-narrative {
            background: rgba(26, 26, 62, 0.6);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: var(--radius-card);
            padding: 16px;
            font-size: 13px;
            color: var(--heady-gray);
            line-height: 1.6;
            max-height: 300px;
            overflow-y: auto;
        }

        .loading-text {
            font-size: 13px;
            color: var(--heady-gray);
            text-align: center;
            padding: 12px;
            animation: fadeInOut 1.5s ease-in-out infinite;
        }

        @keyframes fadeInOut {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .side-panel {
                width: 0 !important;
            }

            .side-panel.open {
                width: 100vw;
            }

            .message-content {
                max-width: 85%;
            }

            .chat-messages {
                padding: 16px;
            }

            .chat-input-area {
                padding: 12px 16px;
            }
        }
    </style>
</head>
<body>
    <script src="/nav-component.js"></script>
    <div class="container">
        <!-- Main Chat Area -->
        <div class="chat-main">
            <!-- Header -->
            <div class="chat-header">
                <div class="header-left">
                    <div class="header-logo">HeadyBuddy</div>
                    <div class="header-status">
                        <span class="status-dot" id="statusDot"></span>
                        <span id="statusText">Connecting...</span>
                    </div>
                </div>
                <div class="header-right">
                    <div class="header-version" id="versionDisplay">v0.0.0</div>
                    <button class="panel-toggle" id="panelToggleBtn" title="Toggle System Panel">☰</button>
                    <a href="/" class="back-button" title="Back to Home">←</a>
                </div>
            </div>

            <!-- Messages Area -->
            <div class="chat-messages" id="chatMessages">
                <div class="welcome-container">
                    <div class="welcome-orb"></div>
                    <div class="welcome-text">
                        <h1>Welcome to HeadyBuddy</h1>
                        <p>Hello! I'm HeadyBuddy, your AI operations assistant. I can help you manage the Heady pipeline, diagnose issues, check system health, and more. What would you like to do?</p>
                    </div>
                </div>
            </div>

            <!-- Suggestions -->
            <div class="suggestions-container" id="suggestionsContainer"></div>

            <!-- Input Area -->
            <div class="chat-input-area">
                <textarea
                    class="input-field"
                    id="messageInput"
                    placeholder="Ask HeadyBuddy anything..."
                    rows="1"
                ></textarea>
                <button class="send-button" id="sendButton">→</button>
            </div>
        </div>

        <!-- Side Panel -->
        <div class="side-panel" id="sidePanel">
            <div class="panel-close">
                <button class="close-button" id="closePanelBtn">×</button>
            </div>

            <!-- System Snapshot -->
            <div class="panel-section">
                <div class="panel-section-title">System Snapshot</div>
                <div class="system-snapshot" id="systemSnapshot">
                    <div class="loading-text">Loading...</div>
                </div>
            </div>

            <!-- Quick Actions -->
            <div class="panel-section">
                <div class="panel-section-title">Quick Actions</div>
                <button class="quick-action" id="actionPipeline">▶ Run Pipeline</button>
                <button class="quick-action" id="actionHealth">🏥 Check Health</button>
                <button class="quick-action" id="actionStatus">📊 System Status</button>
            </div>

            <!-- System Narrative -->
            <div class="panel-section">
                <div class="panel-section-title">System Narrative</div>
                <div class="system-narrative" id="systemNarrative">
                    <div class="loading-text">Loading...</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // API Configuration
        const API_BASE = resolveApi();
        const ENDPOINTS = {
            health: `${API_BASE}/api/health`,
            buddy: {
                chat: `${API_BASE}/api/buddy/chat`,
                suggestions: `${API_BASE}/api/buddy/suggestions`,
                health: `${API_BASE}/api/buddy/health`,
                orchestrator: `${API_BASE}/api/buddy/orchestrator`,
            },
            system: {
                status: `${API_BASE}/api/system/status`,
                stories: `${API_BASE}/api/stories/summary`,
            }
        };

        // State
        const state = {
            messages: [],
            isLoading: false,
            panelOpen: false,
            buddyVersion: 'v0.0.0',
            isOnline: false,
        };

        // Utility: Resolve API base
        function resolveApi() {
            if (typeof window !== 'undefined') {
                const isDev = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';
                const protocol = window.location.protocol;
                const host = window.location.hostname;
                const port = isDev ? 3300 : (window.location.port ? `:${window.location.port}` : '');
                return `${protocol}//${host}${port}`;
            }
            return 'http://localhost:3300';
        }

        // Utility: Get timestamp string
        function getTimeString() {
            const now = new Date();
            return now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: true });
        }

        // API: Check health on startup
        async function checkHealth() {
            try {
                const response = await fetch(ENDPOINTS.buddy.health);
                if (response.ok) {
                    const data = await response.json();
                    state.buddyVersion = data.version || 'v0.0.0';
                    state.isOnline = true;
                    updateStatusIndicator(true);
                    document.getElementById('versionDisplay').textContent = state.buddyVersion;
                } else {
                    state.isOnline = false;
                    updateStatusIndicator(false);
                }
            } catch (e) {
                console.error('Health check failed:', e);
                state.isOnline = false;
                updateStatusIndicator(false);
            }
        }

        // UI: Update status indicator
        function updateStatusIndicator(online) {
            const dot = document.getElementById('statusDot');
            const text = document.getElementById('statusText');
            if (online) {
                dot.classList.remove('offline');
                text.textContent = 'Connected';
            } else {
                dot.classList.add('offline');
                text.textContent = 'Offline';
            }
        }

        // API: Send chat message
        async function sendMessage(text) {
            if (!text.trim()) return;

            state.isLoading = true;

            // Add user message to UI
            addMessageToUI('user', text);
            document.getElementById('messageInput').value = '';
            document.getElementById('messageInput').style.height = 'auto';
            document.getElementById('sendButton').disabled = true;

            // Add typing indicator
            const typingEl = document.createElement('div');
            typingEl.className = 'message';
            typingEl.innerHTML = `<div class="message-content"><div class="typing-indicator"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div></div>`;
            document.getElementById('chatMessages').appendChild(typingEl);
            scrollChatToBottom();

            try {
                const response = await fetch(ENDPOINTS.buddy.chat, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message: text,
                        history: state.messages.map(m => ({ role: m.role, content: m.text }))
                    })
                });

                typingEl.remove();

                if (response.ok) {
                    const data = await response.json();
                    state.messages.push({ role: 'user', text });
                    state.messages.push({ role: 'assistant', text: data.reply });
                    addMessageToUI('assistant', data.reply);

                    // Refresh suggestions
                    await loadSuggestions();
                } else {
                    addMessageToUI('assistant', 'Error: Unable to process request. Please try again.');
                }
            } catch (e) {
                typingEl.remove();
                console.error('Chat error:', e);
                addMessageToUI('assistant', 'Connection error. Please check your network and try again.');
            } finally {
                state.isLoading = false;
                document.getElementById('sendButton').disabled = false;
                scrollChatToBottom();
            }
        }

        // UI: Add message to chat
        function addMessageToUI(role, text) {
            const messagesEl = document.getElementById('chatMessages');

            // Remove welcome container if still present
            const welcome = messagesEl.querySelector('.welcome-container');
            if (welcome && state.messages.length === 0) {
                welcome.remove();
            }

            const messageEl = document.createElement('div');
            messageEl.className = `message ${role}`;
            messageEl.innerHTML = `
                <div class="message-content">
                    <div class="message-bubble">${escapeHtml(text)}</div>
                    <div class="message-time">${getTimeString()}</div>
                </div>
            `;
            messagesEl.appendChild(messageEl);
            scrollChatToBottom();
        }

        // Utility: Escape HTML
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // UI: Scroll chat to bottom
        function scrollChatToBottom() {
            const messagesEl = document.getElementById('chatMessages');
            setTimeout(() => {
                messagesEl.scrollTop = messagesEl.scrollHeight;
            }, 0);
        }

        // API: Load suggestions
        async function loadSuggestions() {
            try {
                const response = await fetch(ENDPOINTS.buddy.suggestions);
                if (response.ok) {
                    const data = await response.json();
                    renderSuggestions(data.suggestions || []);
                }
            } catch (e) {
                console.error('Suggestions load error:', e);
            }
        }

        // UI: Render suggestion chips
        function renderSuggestions(suggestions) {
            const container = document.getElementById('suggestionsContainer');
            container.innerHTML = '';

            if (suggestions.length === 0) return;

            suggestions.slice(0, 4).forEach(suggestion => {
                const chip = document.createElement('button');
                chip.className = 'suggestion-chip';
                chip.textContent = suggestion;
                chip.onclick = () => sendMessage(suggestion);
                container.appendChild(chip);
            });
        }

        // API: Load system snapshot
        async function loadSystemSnapshot() {
            try {
                const response = await fetch(ENDPOINTS.buddy.orchestrator);
                if (response.ok) {
                    const data = await response.json();
                    renderSnapshot(data);
                }
            } catch (e) {
                console.error('Snapshot error:', e);
            }
        }

        // UI: Render system snapshot
        function renderSnapshot(data) {
            const snapshotEl = document.getElementById('systemSnapshot');
            snapshotEl.innerHTML = `
                <div class="snapshot-item">
                    <span class="snapshot-label">Active Nodes:</span>
                    <span class="snapshot-value">${data.nodeCount || 0}</span>
                </div>
                <div class="snapshot-item">
                    <span class="snapshot-label">Memory:</span>
                    <span class="snapshot-value">${(data.memory || 0).toFixed(1)}MB</span>
                </div>
                <div class="snapshot-item">
                    <span class="snapshot-label">Pipeline:</span>
                    <span class="snapshot-value">${data.pipelineState || 'Idle'}</span>
                </div>
                <div class="snapshot-item">
                    <span class="snapshot-label">Uptime:</span>
                    <span class="snapshot-value">${data.uptime || '0h'}</span>
                </div>
            `;
        }

        // API: Load system narrative
        async function loadSystemNarrative() {
            try {
                const response = await fetch(ENDPOINTS.system.stories);
                if (response.ok) {
                    const data = await response.json();
                    const narrativeEl = document.getElementById('systemNarrative');
                    narrativeEl.textContent = data.summary || 'No narrative available.';
                }
            } catch (e) {
                console.error('Narrative error:', e);
            }
        }

        // Panel Management
        document.getElementById('panelToggleBtn').addEventListener('click', () => {
            const panel = document.getElementById('sidePanel');
            state.panelOpen = !state.panelOpen;
            panel.classList.toggle('open');
            if (state.panelOpen) {
                loadSystemSnapshot();
                loadSystemNarrative();
            }
        });

        document.getElementById('closePanelBtn').addEventListener('click', () => {
            const panel = document.getElementById('sidePanel');
            state.panelOpen = false;
            panel.classList.remove('open');
        });

        // Quick Actions
        document.getElementById('actionPipeline').addEventListener('click', () => {
            sendMessage('Run the Heady pipeline now');
        });

        document.getElementById('actionHealth').addEventListener('click', () => {
            sendMessage('Check system health status');
        });

        document.getElementById('actionStatus').addEventListener('click', () => {
            sendMessage('Show me the system status');
        });

        // Input Handling
        const messageInput = document.getElementById('messageInput');
        const sendButton = document.getElementById('sendButton');

        messageInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage(messageInput.value);
            }
        });

        messageInput.addEventListener('input', () => {
            messageInput.style.height = 'auto';
            messageInput.style.height = Math.min(messageInput.scrollHeight, 120) + 'px';
        });

        sendButton.addEventListener('click', () => {
            sendMessage(messageInput.value);
        });

        // Initialize
        window.addEventListener('DOMContentLoaded', () => {
            checkHealth();
            loadSuggestions();
        });

        // Periodically check health
        setInterval(checkHealth, 30000);
    </script>
</body>
</html>
