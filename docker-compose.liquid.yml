# HEADY_BRAND:BEGIN
# Docker Compose — Liquid Microservice Architecture
# Full-stack: all services + Upstash + Neon + Sentry
# HEADY_BRAND:END

services:
  # ─── HOT TIER ──────────────────────────────────────────────────────────
  heady-manager:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3300:3300"
    environment:
      - NODE_ENV=production
      - PORT=3300
      - SERVICE_NAME=heady-manager
      - SERVICE_TIER=hot
      - DATABASE_URL=${DATABASE_URL:-}
      - REDIS_URL=${REDIS_URL:-}
      - UPSTASH_REDIS_REST_URL=${UPSTASH_REDIS_REST_URL:-}
      - UPSTASH_REDIS_REST_TOKEN=${UPSTASH_REDIS_REST_TOKEN:-}
      - SENTRY_DSN=${SENTRY_DSN:-}
      - HEADY_API_KEY=${HEADY_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3300/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      heady-liquid-mesh:
        aliases:
          - heady-manager
    volumes:
      - heady-data:/app/data
    restart: unless-stopped

  heady-brain:
    build:
      context: .
      dockerfile: services/heady-brain/Dockerfile
    ports:
      - "3311:3311"
    environment:
      - SERVICE_NAME=heady-brain
      - SERVICE_TIER=hot
      - PORT=3311
      - DATABASE_URL=${DATABASE_URL:-}
      - UPSTASH_REDIS_REST_URL=${UPSTASH_REDIS_REST_URL:-}
      - UPSTASH_REDIS_REST_TOKEN=${UPSTASH_REDIS_REST_TOKEN:-}
      - SENTRY_DSN=${SENTRY_DSN:-}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3311/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      heady-liquid-mesh:
        aliases:
          - heady-brain
    restart: unless-stopped

  auto-success-engine:
    build:
      context: .
      dockerfile: services/auto-success-engine/Dockerfile
    ports:
      - "3301:3301"
    environment:
      - SERVICE_NAME=auto-success-engine
      - SERVICE_TIER=hot
      - FULL_THROTTLE=true
      - PORT=3301
      - DATABASE_URL=${DATABASE_URL:-}
      - UPSTASH_REDIS_REST_URL=${UPSTASH_REDIS_REST_URL:-}
      - UPSTASH_REDIS_REST_TOKEN=${UPSTASH_REDIS_REST_TOKEN:-}
      - SENTRY_DSN=${SENTRY_DSN:-}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3301/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      heady-liquid-mesh:
        aliases:
          - auto-success-engine
    restart: unless-stopped

  hcfullpipeline:
    build:
      context: .
      dockerfile: services/hcfullpipeline-executor/Dockerfile
    ports:
      - "3330:3330"
    environment:
      - SERVICE_NAME=hcfullpipeline
      - SERVICE_TIER=hot
      - PIPELINE_MODE=event-driven
      - PORT=3330
      - DATABASE_URL=${DATABASE_URL:-}
      - UPSTASH_REDIS_REST_URL=${UPSTASH_REDIS_REST_URL:-}
      - UPSTASH_REDIS_REST_TOKEN=${UPSTASH_REDIS_REST_TOKEN:-}
      - SENTRY_DSN=${SENTRY_DSN:-}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3330/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      heady-liquid-mesh:
        aliases:
          - hcfullpipeline
    restart: unless-stopped

  # ─── WARM TIER (HeadyMC / HeadySims / HeadyBattle) ────────────────────
  heady-mc:
    build:
      context: .
      dockerfile: services/heady-mc/Dockerfile
    ports:
      - "3340:3340"
    environment:
      - SERVICE_NAME=heady-mc
      - SERVICE_TIER=warm
      - PORT=3340
      - DATABASE_URL=${DATABASE_URL:-}
      - UPSTASH_REDIS_REST_URL=${UPSTASH_REDIS_REST_URL:-}
      - UPSTASH_REDIS_REST_TOKEN=${UPSTASH_REDIS_REST_TOKEN:-}
      - SENTRY_DSN=${SENTRY_DSN:-}
      - HEADY_BRAIN_URL=http://heady-brain:3311
    depends_on:
      heady-brain:
        condition: service_healthy
    networks:
      heady-liquid-mesh:
        aliases:
          - heady-mc
    restart: unless-stopped

  heady-sims:
    build:
      context: .
      dockerfile: services/heady-sims/Dockerfile
    ports:
      - "3341:3341"
    environment:
      - SERVICE_NAME=heady-sims
      - SERVICE_TIER=warm
      - PORT=3341
      - DATABASE_URL=${DATABASE_URL:-}
      - UPSTASH_REDIS_REST_URL=${UPSTASH_REDIS_REST_URL:-}
      - UPSTASH_REDIS_REST_TOKEN=${UPSTASH_REDIS_REST_TOKEN:-}
      - SENTRY_DSN=${SENTRY_DSN:-}
      - HEADY_MC_URL=http://heady-mc:3340
      - HEADY_BRAIN_URL=http://heady-brain:3311
    depends_on:
      heady-mc:
        condition: service_started
      heady-brain:
        condition: service_healthy
    networks:
      heady-liquid-mesh:
        aliases:
          - heady-sims
    restart: unless-stopped

  heady-battle:
    build:
      context: .
      dockerfile: services/heady-battle/Dockerfile
    ports:
      - "3325:3325"
    environment:
      - SERVICE_NAME=heady-battle
      - SERVICE_TIER=warm
      - PORT=3325
      - DATABASE_URL=${DATABASE_URL:-}
      - UPSTASH_REDIS_REST_URL=${UPSTASH_REDIS_REST_URL:-}
      - UPSTASH_REDIS_REST_TOKEN=${UPSTASH_REDIS_REST_TOKEN:-}
      - SENTRY_DSN=${SENTRY_DSN:-}
      - HEADY_INFERENCE_GATEWAY_URL=http://heady-brain:3311
      - HEADY_BRAIN_URL=http://heady-brain:3311
    depends_on:
      heady-brain:
        condition: service_healthy
    networks:
      heady-liquid-mesh:
        aliases:
          - heady-battle
    restart: unless-stopped

networks:
  heady-liquid-mesh:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

volumes:
  heady-data:
