version: '3.8'

# Heady™ Systems - Local Development Stack
# Purpose: Run full Heady ecosystem locally

services:
  # API Gateway
  heady-api-gateway:
    build: ./services/heady-api-gateway
    ports:
      - "8000:8000"
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://heady:heady@postgres:5432/heady_dev
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=dev-secret-change-in-production
    depends_on:
      - postgres
      - redis
    volumes:
      - ./services/heady-api-gateway:/app
      - /app/node_modules

  # Cloud Orchestrator
  heady-cloud-orchestrator:
    build: ./services/heady-cloud-orchestrator
    ports:
      - "8001:8001"
    environment:
      - NODE_ENV=development
      - LIQUID_ARCH_MODE=dynamic
      - AUTO_SUCCESS_ENABLED=true
    depends_on:
      - redis
    volumes:
      - ./services/heady-cloud-orchestrator:/app
      - /app/node_modules

  # AI Router
  heady-ai-router:
    build: ./services/heady-ai-router
    ports:
      - "8002:8002"
    environment:
      - NODE_ENV=development
      - AI_FALLBACK_STRATEGY=cascade
      - AI_LOAD_BALANCER=round-robin
    depends_on:
      - redis
    volumes:
      - ./services/heady-ai-router:/app
      - /app/node_modules

  # Conductor (Auto-Success Engine)
  heady-conductor:
    build: ./services/heady-conductor
    ports:
      - "8003:8003"
    environment:
      - NODE_ENV=development
      - AUTO_SUCCESS_INTERVAL_MS=30000
      - AUTO_SUCCESS_TASKS=135
      - MONTE_CARLO_ENABLED=true
    depends_on:
      - redis
      - postgres
    volumes:
      - ./services/heady-conductor:/app
      - /app/node_modules

  # HeadyMe Web (Next.js)
  headyme-web:
    build: ./apps/headyme
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NEXT_PUBLIC_CLOUD_URL=http://localhost:8001
    depends_on:
      - heady-api-gateway
    volumes:
      - ./apps/headyme:/app
      - /app/node_modules
      - /app/.next

  # PostgreSQL
  postgres:
    image: postgres:16
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=heady
      - POSTGRES_PASSWORD=heady
      - POSTGRES_DB=heady_dev
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # Redis
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # Nginx (Reverse Proxy)
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - heady-api-gateway
      - headyme-web

volumes:
  postgres_data:
  redis_data:

networks:
  default:
    name: heady-network
