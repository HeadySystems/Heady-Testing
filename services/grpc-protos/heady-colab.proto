/**
 * HeadySystems Colab Runtime gRPC Protocol
 * 
 * Interface for 3 Colab Pro+ runtimes as latent space operators.
 * All constants φ-scaled per Heady Unbreakable Laws.
 * 
 * Founder: Eric Haywood | HeadySystems Inc. | 51+ Provisional Patents
 */

syntax = "proto3";

package heady.colab.v1;

option go_package = "github.com/HeadyMe/heady-protos/colab/v1";

// ColabRuntimeService — manage 3 Colab Pro+ runtimes
service ColabRuntimeService {
  // Get runtime status
  rpc GetStatus(RuntimeStatusRequest) returns (RuntimeStatusResponse);
  
  // Submit compute job to a runtime
  rpc SubmitJob(JobRequest) returns (JobResponse);
  
  // Stream job execution output
  rpc StreamJobOutput(JobOutputRequest) returns (stream JobOutput);
  
  // Health check for runtime
  rpc HealthCheck(HealthCheckRequest) returns (HealthCheckResponse);
  
  // Rebalance workload across runtimes
  rpc Rebalance(RebalanceRequest) returns (RebalanceResponse);
}

enum RuntimeRole {
  RUNTIME_ROLE_UNSPECIFIED = 0;
  RUNTIME_ROLE_EMBEDDING = 1;     // Runtime A: embedding generation
  RUNTIME_ROLE_INFERENCE = 2;     // Runtime B: model inference
  RUNTIME_ROLE_TRAINING = 3;      // Runtime C: fine-tuning / training
}

enum RuntimeHealth {
  RUNTIME_HEALTH_UNSPECIFIED = 0;
  RUNTIME_HEALTH_HEALTHY = 1;
  RUNTIME_HEALTH_DEGRADED = 2;
  RUNTIME_HEALTH_UNHEALTHY = 3;
  RUNTIME_HEALTH_OFFLINE = 4;
}

enum JobState {
  JOB_STATE_UNSPECIFIED = 0;
  JOB_STATE_QUEUED = 1;
  JOB_STATE_RUNNING = 2;
  JOB_STATE_COMPLETED = 3;
  JOB_STATE_FAILED = 4;
  JOB_STATE_CANCELLED = 5;
}

message RuntimeStatusRequest {
  RuntimeRole role = 1;           // Which runtime (0 = all)
}

message RuntimeStatusResponse {
  repeated RuntimeInfo runtimes = 1;
}

message RuntimeInfo {
  string runtime_id = 1;
  RuntimeRole role = 2;
  RuntimeHealth health = 3;
  double gpu_utilization = 4;      // 0.0-1.0
  double memory_utilization = 5;   // 0.0-1.0
  int64 uptime_ms = 6;
  int32 active_jobs = 7;
  int32 queued_jobs = 8;
  string gpu_type = 9;             // e.g., "A100", "V100", "T4"
  int32 gpu_memory_mb = 10;
  double pressure_level = 11;     // φ-scaled pressure
}

message JobRequest {
  RuntimeRole target_runtime = 1;
  string job_type = 2;             // "embedding", "inference", "training"
  bytes payload = 3;
  map<string, string> parameters = 4;
  int64 timeout_ms = 5;           // Default phiBackoff(5)≈11090ms
  string idempotency_key = 6;
  int32 batch_size = 7;           // Default FIB[6]=8
}

message JobResponse {
  string job_id = 1;
  RuntimeRole assigned_runtime = 2;
  JobState state = 3;
  int64 submitted_at = 4;
  int64 estimated_duration_ms = 5;
}

message JobOutputRequest {
  string job_id = 1;
}

message JobOutput {
  string job_id = 1;
  JobState state = 2;
  bytes data = 3;
  string log_line = 4;
  double progress = 5;            // 0.0-1.0
  int64 timestamp = 6;
}

message HealthCheckRequest {
  RuntimeRole role = 1;
}

message HealthCheckResponse {
  RuntimeRole role = 1;
  RuntimeHealth health = 2;
  string details = 3;
  int64 checked_at = 4;
  double csl_health_score = 5;    // CSL-gated health composite
}

message RebalanceRequest {
  // Optional: force specific workload distribution
  map<string, double> target_weights = 1;  // runtime_id → weight
}

message RebalanceResponse {
  bool rebalanced = 1;
  int32 jobs_migrated = 2;
  map<string, double> new_weights = 3;
}
