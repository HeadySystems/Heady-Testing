# All services use phi-scaled resource limits

version: '3.9'

x-heady-defaults: &heady-defaults
  restart: unless-stopped
  networks:
    - heady-mesh
  environment:
    NODE_ENV: production
    PHI: "1.618033988749895"
    PSI: "0.618033988749895"
    VECTOR_DIM: "384"
    CSL_THRESHOLD_MED: "0.809"
    LOG_FORMAT: json
  healthcheck:
    interval: 34s      # FIB[8]
    timeout: 8s         # FIB[5]
    retries: 5          # FIB[4]
    start_period: 21s   # FIB[7]
  deploy:
    resources:
      limits:
        memory: 512M
        cpus: '0.618'   # PSI
      reservations:
        memory: 256M
        cpus: '0.382'   # PSI^2

services:
  heady-cortex:
    <<: *heady-defaults
    build: ../new-services
    command: node heady-cortex-service.js
    ports: ["3401:3401"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3401/health"]

  heady-chronicle:
    <<: *heady-defaults
    build: ../new-services
    command: node heady-chronicle-service.js
    ports: ["3402:3402"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3402/health"]

  heady-nexus:
