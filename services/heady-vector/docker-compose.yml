version: '3.9'

# ─── HeadyVector Docker Compose ───────────────────────────────────────────────
# Services:
#   - postgres: PostgreSQL 16 with pgvector extension
#   - heady-vector: HeadyVector service (Node.js 20)
#
# Usage:
#   docker compose up -d
#   docker compose logs -f heady-vector
#   docker compose down -v  # also removes postgres data volume
# ────────────────────────────────────────────────────────────────────────────

services:
  # ── PostgreSQL with pgvector ───────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: heady-vector-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: heady
      POSTGRES_PASSWORD: heady
      POSTGRES_DB: heady_vector
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U heady -d heady_vector"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    shm_size: '256mb'
    # Performance tuning
    command: >
      postgres
        -c shared_preload_libraries=''
        -c max_connections=200
        -c shared_buffers=256MB
        -c effective_cache_size=1GB
        -c work_mem=16MB
        -c maintenance_work_mem=256MB
        -c max_wal_size=2GB
        -c checkpoint_completion_target=0.9
        -c wal_buffers=16MB
        -c random_page_cost=1.1
        -c effective_io_concurrency=200
    networks:
      - heady-vector-net

  # ── HeadyVector Service ────────────────────────────────────────────────────
  heady-vector:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: heady-vector-service
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      HEADY_VECTOR_PORT: 3103
      DATABASE_URL: postgresql://heady:heady@postgres:5432/heady_vector
      PG_POOL_SIZE: 16
      PG_SSL: "false"

      # HNSW defaults
      HNSW_M: 16
      HNSW_EF_CONSTRUCTION: 200
      HNSW_EF_SEARCH: 100

      # IVFFlat defaults
      IVFFLAT_LISTS: 100
      IVFFLAT_PROBES: 10

      # Search defaults
      BM25_WEIGHT: "0.3"
      SEMANTIC_WEIGHT: "0.7"
      DEFAULT_ALPHA: "0.7"
      DEFAULT_TOP_K: 10
      MAX_TOP_K: 1000

      # Batch
      BATCH_UPSERT_SIZE: 261

      # Graph RAG
      GRAPH_MAX_DEPTH: 3
      GRAPH_MAX_NODES: 100

      # Logging
      LOG_LEVEL: info
    ports:
      - "3103:3103"
    healthcheck:
      test: ["CMD", "node", "-e",
             "require('http').get('http://localhost:3103/health/live', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - heady-vector-net
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── pgAdmin (optional dev tool) ────────────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: heady-vector-pgadmin
    restart: unless-stopped
    profiles:
      - dev  # Only started with: docker compose --profile dev up
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@headyconnection.org
      PGADMIN_DEFAULT_PASSWORD: headyadmin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - heady-vector-net

volumes:
  postgres_data:
    driver: local

networks:
  heady-vector-net:
    driver: bridge
