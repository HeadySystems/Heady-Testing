version: '3.8'

services:
  heady-web:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: heady-web:3.1.0
    container_name: heady-web
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      - NODE_ENV=production
      - HEADY_VERSION=4.0.0
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - heady-net
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.heady-web.rule=Host(`headyme.com`) || Host(`headysystems.com`)"
      - "traefik.http.routers.heady-web.entrypoints=websecure"
      - "traefik.http.routers.heady-web.tls.certresolver=letsencrypt"

  # Local development static file server for remotes
  heady-remotes:
    image: nginx:1.25-alpine
    container_name: heady-remotes
    restart: unless-stopped
    ports:
      - "3001:80"
    volumes:
      - ./dist/remotes:/usr/share/nginx/html/remotes:ro
    networks:
      - heady-net
    profiles:
      - dev

networks:
  heady-net:
    driver: bridge
    name: heady-net
