    - "trading AI agents"
    - "risk analysis automation"
    - "FINRA compliance AI"
    - "portfolio optimization"
    - "Apex trading intelligence"
    - "quantitative finance AI"
  og_image: "/assets/finance-og.png"
  analytics_id: "G-FINANCE"
  canonical_url: "https://finance.headyme.com"

server:
  cache_ttl: 60
  rate_limit: 200
  cors_origins:
    - "https://headyme.com"
    - "https://finance.headyme.com"
    - "https://apex.headyme.com"
  health_check: "/_health"

