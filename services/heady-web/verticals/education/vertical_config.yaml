    - edu.headyme.com

brand:
  name: "Heady™ Education"
  tagline: "Adaptive AI Orchestration for Education"
  accent_color: "#f59e0b"
  logo_variant: education
  font_family: "Inter, sans-serif"
  icon: "◎"

content:
  hero:
    title: "Adaptive Learning Orchestration"
    subtitle: "FERPA-compliant AI agents for curriculum generation, student assessment, and personalized learning"
    cta_primary: "Start Free Pilot"
    cta_secondary: "View Curriculum Demo"

  features:
    - name: "Adaptive Tutoring"
      description: "Personalized learning paths that adapt in real-time based on student performance and learning style."
      icon: "tutor"
    - name: "Curriculum Generation"
      description: "AI-authored lesson plans, assessments, and rubrics aligned to Common Core, NGSS, or custom standards."
      icon: "curriculum"
    - name: "Student Assessment"
      description: "Automated formative and summative assessments with immediate, personalized feedback."
      icon: "assessment"
    - name: "Progress Tracking"
      description: "Longitudinal learning analytics with early intervention alerts and parent/guardian reporting."
      icon: "progress"
    - name: "Accessibility Support"
      description: "WCAG 2.1 AA compliant interfaces with multi-language support and IEP accommodations."
      icon: "accessibility"
    - name: "LMS Integration"
      description: "Native connectors for Canvas, Schoology, Blackboard, Google Classroom, and Moodle."
      icon: "lms"

  agent_templates:
    - name: "Adaptive Tutor"
      description: "Delivers personalized explanations, hints, and follow-up questions based on student responses"
      latency: "<300ms"
      integrations: ["Canvas", "Google Classroom", "Khan Academy", "Duolingo"]
    - name: "Curriculum Generator"
      description: "Generates standards-aligned lesson plans, activities, and assessments for any grade/subject"
      latency: "<5s"
      integrations: ["Common Core API", "NGSS", "State DOE standards feeds"]
    - name: "Assessment Creator"
      description: "Builds bloom's taxonomy-aligned quizzes, rubrics, and project prompts"
      latency: "<3s"
      integrations: ["Canvas Quizzes", "Schoology", "Formative", "Edulastic"]
    - name: "Progress Tracker"
      description: "Aggregates multi-source learning data into actionable insights for educators"
      latency: "<1s"
      integrations: ["PowerSchool", "Illuminate", "Renaissance", "FastBridge"]

  compliance_badges:
    - name: FERPA
      status: certified
      description: "Family Educational Rights and Privacy Act compliant"
    - name: COPPA
      status: certified
