vertical_id: government
domain: gov.headyme.com
fallback_path: /government
routing:
  type: subdomain
  aliases:
    - federal.headyme.com
    - fedramp.headyme.com

brand:
  name: "Heady™ Government"
  tagline: "FedRAMP-Ready AI Orchestration for Public Sector"
  accent_color: "#3b82f6"
  logo_variant: government
  font_family: "Inter, sans-serif"
  icon: "◉"

content:
  hero:
    title: "AI Orchestration for Government"
    subtitle: "FedRAMP-pathway, FISMA-compliant agent workflows for federal, state, and local government"
    cta_primary: "Request FedRAMP Briefing"
    cta_secondary: "View Grant Management Demo"

  features:
    - name: "Grant Management"
      description: "End-to-end grant lifecycle automation from application intake through compliance reporting."
      icon: "grant"
    - name: "Public Records Management"
      description: "Automated FOIA intake, routing, redaction, and response workflows with full audit trails."
      icon: "records"
    - name: "Compliance Auditing"
      description: "Continuous NIST 800-53 control monitoring, POA&M management, and ATO documentation."
      icon: "audit"
    - name: "FOIA Response"
      description: "Intelligent FOIA request classification, automated search, AI-assisted redaction, and response drafting."
      icon: "foia"
    - name: "Benefits Processing"
      description: "Eligibility determination, application routing, and case management for benefit programs."
      icon: "benefits"
    - name: "Constituent Communications"
      description: "Automated multi-channel constituent response with human-in-the-loop escalation."
      icon: "comms"

  agent_templates:
    - name: "Grant Processor"
      description: "Validates grant applications, checks eligibility, routes for review, and generates award packages"
      latency: "<1s"
      integrations: ["Grants.gov", "SAM.gov", "CAMS", "eCivis", "Fluxx"]
    - name: "Records Manager"
      description: "Classifies, indexes, and routes public records requests with retention policy enforcement"
      latency: "<500ms"
      integrations: ["GovQA", "NextRequest", "Laserfiche", "OpenGov"]
    - name: "Compliance Auditor"
      description: "Continuously monitors NIST 800-53 controls, generates audit evidence, and tracks POA&Ms"
      latency: "<2s"
      integrations: ["ServiceNow GRC", "XACTA 360", "AWS GovCloud", "FedRAMP PMO APIs"]
    - name: "FOIA Responder"
      description: "Classifies FOIA requests, searches records, assists with Exemption 5/6/7 redactions, drafts responses"
      latency: "<3s"
      integrations: ["GovQA", "NextRequest", "FOIAXpress", "Relativity"]

  compliance_badges:
    - name: FedRAMP (Pathway)
      status: in_progress
      description: "FedRAMP Moderate authorization in progress — targeting Q4 2026"
    - name: FISMA
      status: certified
      description: "Federal Information Security Modernization Act compliant"
    - name: NIST 800-53
      status: certified
      description: "NIST SP 800-53 Rev 5 moderate baseline controls implemented"
    - name: IL-4 (Planned)
      status: planned
      description: "Impact Level 4 DoD deployment planned"
    - name: SOC 2 Type II
      status: certified
      description: "Annual third-party security audit"
    - name: Section 508
      status: certified
      description: "Section 508 / WCAG 2.1 AA accessibility compliant"

  pricing:
    tiers:
      - name: Municipal
        price: "$199/mo"
        billing: monthly
        features:
          - "10 agent workflows"
          - "FOIA Responder included"
          - "Basic records management"
          - "Section 508 compliant"
          - "Email support"
      - name: State Agency
        price: "$799/mo"
        billing: monthly
        highlighted: true
        features:
          - "Unlimited workflows"
          - "All 4 agent templates"
          - "FISMA compliance package"
          - "Grant management module"
          - "Audit trail & reporting"
          - "Priority support"
          - "FedRAMP pathway documentation"
      - name: Federal
        price: "Custom"
        billing: annual
        features:
          - "FedRAMP Moderate ATO support"
          - "GovCloud deployment"
          - "IL-4 pathway"
          - "Dedicated ISSO support"
          - "Custom security controls"
          - "24/7 SOC support"
          - "On-premise / air-gap option"

  case_study:
    client: "State Department of Health Services (placeholder)"
    challenge: "FOIA backlog of 3,400 overdue requests, averaging 89-day response time"
    solution: "Deployed FOIA Responder + Records Manager with GovQA integration"
    result: "Backlog cleared in 6 weeks. Average response time reduced to 12 days."
    metrics:
      - label: "Response time reduction"
        value: "87%"
      - label: "Backlog cleared"
        value: "3,400 requests"
      - label: "Staff time recaptured/week"
        value: "80 hours"

  testimonial:
    quote: "We went from a three-month FOIA backlog to next-day responses. Heady Government transformed how we serve our constituents."
    author: "Records Officer, State Agency (placeholder)"

