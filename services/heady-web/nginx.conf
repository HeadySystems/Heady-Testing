# HeadyWeb Universal Shell — nginx Configuration
# SPA routing, /api proxy, /remotes/ static serving, security headers
#
# © 2026 HeadySystems Inc. PROPRIETARY AND CONFIDENTIAL.

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ── Security headers ────────────────────────────────────────────────────
    add_header X-Content-Type-Options   "nosniff" always;
    add_header X-Frame-Options          "SAMEORIGIN" always;
    add_header X-XSS-Protection         "1; mode=block" always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy       "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy  "default-src 'self'; script-src 'self' 'unsafe-eval' https://fonts.googleapis.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://fonts.gstatic.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob:; connect-src 'self' https:; worker-src blob:;" always;

    # ── CORS for Module Federation remotes ─────────────────────────────────
    # Dynamic origin matching via nginx map (see $cors_origin map block)
    add_header Access-Control-Allow-Origin  "$http_origin" always;
    add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Range" always;
    add_header Vary "Origin" always;

    # ── Compression ────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/manifest+json
        image/svg+xml
        font/woff2;

    # ── Health check endpoint ───────────────────────────────────────────────
    location = /health {
        access_log off;
        return 200 '{"status":"ok","service":"heady-web","version":"3.1.0"}';
        add_header Content-Type application/json;
    }

    # ── API proxy — proxies to heady-api backend ───────────────────────────
    location /api/ {
        proxy_pass         http://heady-api:8080;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300s;

        # Fallback for development (no backend available)
        error_page 502 503 504 = @api_fallback;
    }

    location @api_fallback {
        return 404 '{"error":"API unavailable","code":"API_OFFLINE"}';
        add_header Content-Type application/json;
    }

    # ── Remotes static serving (Module Federation entries) ─────────────────
    # e.g. /remotes/antigravity/remoteEntry.js
    location /remotes/ {
        alias /usr/share/nginx/html/remotes/;

        # Long-lived cache for content-hashed assets
        location ~* \.[0-9a-f]{8,}\.js$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # No cache for remoteEntry.js (fetched on every page load)
        location ~* remoteEntry\.js$ {
            expires -1;
            add_header Cache-Control "no-store, no-cache, must-revalidate";
            add_header Pragma "no-cache";
        }

        try_files $uri $uri/ =404;
    }

    # ── Static assets with long-lived cache ────────────────────────────────
    location ~* \.(js|css|woff2|woff|ttf|eot|ico|svg|png|jpg|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── SPA fallback — serve index.html for all non-file routes ───────────
    location / {
        try_files $uri $uri/ /index.html;

        # No cache for index.html
        location = /index.html {
            expires -1;
            add_header Cache-Control "no-store, no-cache, must-revalidate";
        }
    }

    # ── Error pages ─────────────────────────────────────────────────────────
    error_page 404 /index.html;
    error_page 500 502 503 504 /50x.html;

    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
    }
}
