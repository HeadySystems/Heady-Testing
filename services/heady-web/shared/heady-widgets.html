<!-- ══ Heady™ Cross-Site Navigation (shared component) ══ -->
<div class="cross-site-nav" id="cross-site-nav">
    <button class="csn-toggle" onclick="this.closest('.cross-site-nav').classList.toggle('open')">🌐 Heady
        Network</button>
    <div class="csn-links">
        <a href="https://headyme.com" class="csn-link" target="_blank">HeadyMe</a>
        <a href="https://headybuddy.org" class="csn-link" target="_blank">HeadyBuddy</a>
        <a href="https://headysystems.com" class="csn-link" target="_blank">HeadySystems</a>
        <a href="https://headyconnection.org" class="csn-link" target="_blank">HeadyConnection</a>
        <a href="https://headymcp.com" class="csn-link" target="_blank">HeadyMCP</a>
        <a href="https://headyio.com" class="csn-link" target="_blank">HeadyIO</a>
        <a href="https://headybot.com" class="csn-link" target="_blank">HeadyBot</a>
        <a href="https://headyos.com" class="csn-link" target="_blank">HeadyOS</a>
        <a href="https://headyapi.com" class="csn-link" target="_blank">HeadyAPI</a>
    </div>
</div>
<style>
    .cross-site-nav {
        position: fixed;
        bottom: 16px;
        left: 16px;
        z-index: 9998;
        font-family: 'Inter', system-ui, sans-serif;
    }

    .csn-toggle {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 8px 14px;
        border-radius: 20px;
        border: 1px solid rgba(255, 255, 255, .1);
        background: rgba(10, 14, 23, .9);
        backdrop-filter: blur(16px);
        color: #94a3b8;
        font-size: 12px;
        font-weight: 500;
        cursor: pointer;
        transition: all .2s;
        font-family: inherit;
    }

    .csn-toggle:hover {
        border-color: rgba(0, 212, 170, .3);
        color: #e2e8f0;
    }

    .csn-links {
        display: none;
        position: absolute;
        bottom: 44px;
        left: 0;
        background: rgba(17, 24, 39, .95);
        backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, .1);
        border-radius: 12px;
        padding: 8px;
        min-width: 180px;
    }

    .cross-site-nav.open .csn-links {
        display: block;
    }

    .csn-link {
        display: block;
        padding: 8px 12px;
        color: #94a3b8;
        text-decoration: none;
        font-size: 12px;
        border-radius: 6px;
        transition: all .15s;
    }

    .csn-link:hover {
        background: rgba(0, 212, 170, .08);
        color: #00d4aa;
    }
</style>

<!-- ══ HeadyBuddy Widget ══ -->
<div id="heady-buddy-fab" class="buddy-fab" onclick="this.classList.toggle('open')">
    <div class="buddy-icon">🤖</div>
    <div class="buddy-panel">
        <div class="buddy-header">
            <span>HeadyBuddy</span>
            <span class="buddy-status">● Online</span>
        </div>
        <div class="buddy-body">
            <div class="buddy-msg">Hey! I'm HeadyBuddy, your AI companion. Ask me anything about this site.</div>
            <input class="buddy-input" placeholder="Ask HeadyBuddy..."
                onkeydown="if(event.key==='Enter')this.value=''" />
        </div>
    </div>
</div>
<style>
    .buddy-fab {
        position: fixed;
        bottom: 16px;
        right: 16px;
        z-index: 9999;
    }

    .buddy-icon {
        width: 48px;
        height: 48px;
        border-radius: 50%;
        background: linear-gradient(135deg, #00d4aa, #3b82f6);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 22px;
        cursor: pointer;
        box-shadow: 0 4px 20px rgba(0, 212, 170, .3);
        transition: transform .2s;
    }

    .buddy-icon:hover {
        transform: scale(1.08);
    }

    .buddy-panel {
        display: none;
        position: absolute;
        bottom: 60px;
        right: 0;
        width: 320px;
        background: rgba(17, 24, 39, .97);
        backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, .1);
        border-radius: 16px;
        overflow: hidden;
    }

    .buddy-fab.open .buddy-panel {
        display: block;
    }

    .buddy-header {
        padding: 14px 16px;
        border-bottom: 1px solid rgba(255, 255, 255, .08);
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-size: 14px;
        font-weight: 600;
        color: #e2e8f0;
        font-family: 'Inter', system-ui, sans-serif;
    }

    .buddy-status {
        font-size: 11px;
        color: #00d4aa;
        font-weight: 500;
    }

    .buddy-body {
        padding: 16px;
    }

    .buddy-msg {
        font-size: 13px;
        color: #94a3b8;
        line-height: 1.6;
        margin-bottom: 12px;
        font-family: 'Inter', system-ui, sans-serif;
    }

    .buddy-input {
        width: 100%;
        padding: 10px 14px;
        border-radius: 8px;
        border: 1px solid rgba(255, 255, 255, .1);
        background: rgba(255, 255, 255, .04);
        color: #e2e8f0;
        font-size: 13px;
        outline: none;
        box-sizing: border-box;
        font-family: 'Inter', system-ui, sans-serif;
    }

    .buddy-input:focus {
        border-color: rgba(0, 212, 170, .4);
    }
</style>

<!-- ══ Auth Modal ══ -->
<div id="auth-overlay"
    style="display:none; position:fixed; inset:0; z-index:10000; background:rgba(0,0,0,.6); backdrop-filter:blur(8px); align-items:center; justify-content:center; font-family:'Inter',system-ui,sans-serif;">
    <div
        style="background:rgba(17,24,39,.98); border:1px solid rgba(255,255,255,.1); border-radius:20px; padding:32px; width:360px; max-width:90vw;">
        <h2 style="margin:0 0 8px; font-size:1.3rem; color:#e2e8f0;">Sign In to Heady™</h2>
        <p style="margin:0 0 20px; font-size:13px; color:#64748b;">Access your AI workspace, memory, and tools.</p>
        <label style="display:block; margin-bottom:12px;">
            <span style="font-size:12px; color:#94a3b8; display:block; margin-bottom:4px;">Email</span>
            <input id="auth-email" type="email" placeholder="you@example.com"
                style="width:100%; padding:10px 14px; border-radius:8px; border:1px solid rgba(255,255,255,.1); background:rgba(255,255,255,.04); color:#e2e8f0; font-size:14px; outline:none; box-sizing:border-box;">
        </label>
        <label style="display:block; margin-bottom:20px;">
            <span style="font-size:12px; color:#94a3b8; display:block; margin-bottom:4px;">Password</span>
            <input id="auth-password" type="password" placeholder="••••••••"
                style="width:100%; padding:10px 14px; border-radius:8px; border:1px solid rgba(255,255,255,.1); background:rgba(255,255,255,.04); color:#e2e8f0; font-size:14px; outline:none; box-sizing:border-box;">
        </label>
        <button onclick="document.getElementById('auth-overlay').style.display='none'"
            style="width:100%; padding:12px; border-radius:10px; border:none; background:linear-gradient(135deg,#00d4aa,#3b82f6); color:#fff; font-size:14px; font-weight:600; cursor:pointer; margin-bottom:12px;">Sign
            In</button>
        <p style="text-align:center; font-size:12px; color:#64748b; margin:0;">Don't have an account? <a
                href="https://headyme.com" style="color:#00d4aa;">Create one</a></p>
    </div>
</div>
<script>
    // Wire auth overlay toggle — any element with data-auth-trigger or class auth-trigger opens it
    document.addEventListener('DOMContentLoaded', () => {
        const overlay = document.getElementById('auth-overlay');
        if (!overlay) return;
        document.querySelectorAll('[data-auth-trigger], .auth-trigger, .nav-cta').forEach(el => {
            el.addEventListener('click', (e) => { e.preventDefault(); overlay.style.display = 'flex'; });
        });
        overlay.addEventListener('click', (e) => { if (e.target === overlay) overlay.style.display = 'none'; });
    });
</script>
