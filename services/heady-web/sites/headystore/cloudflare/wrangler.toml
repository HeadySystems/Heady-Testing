# HeadyStore Worker — headystore.com
# Reverse Marketplace — PPA #25 & #26

name = "heady-store-worker"
main = "worker.js"
compatibility_date = "2026-03-01"

routes = [
  { pattern = "headystore.com/*", zone_name = "headystore.com" },
  { pattern = "*.headystore.com/*", zone_name = "headystore.com" },
]

[vars]
HEADY_SERVICE = "heady-store"
HEADY_VERSION = "3.2.3"

[env.production]
routes = [
  { pattern = "headystore.com/*", zone_name = "headystore.com" },
  { pattern = "www.headystore.com/*", zone_name = "headystore.com" },
]

[site]
bucket = "./"
