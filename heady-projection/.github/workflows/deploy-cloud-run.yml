# Heady™ Projection Service — Cloud Run Deployment
# Triggered on push to main after CI passes.
# Uses Workload Identity Federation (no long-lived service account keys).

name: Deploy to Cloud Run

on:
  push:
    branches: [main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false    # never cancel an in-flight deploy

env:
  PROJECT_ID:     ${{ vars.GCP_PROJECT_ID }}
  REGION:         ${{ vars.GCP_REGION || 'us-central1' }}
  SERVICE_NAME:   heady-projection-service
  REGISTRY:       ${{ vars.GCP_REGION || 'us-central1' }}-docker.pkg.dev
  REPOSITORY:     heady-docker
  IMAGE_NAME:     projection-service
  NODE_VERSION:   "20"

jobs:
  # ── Build & Push Docker image ─────────────────────────────────────────────
  build-and-push:
    name: Build & Push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write    # required for Workload Identity Federation

    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      image-digest: ${{ steps.push.outputs.digest }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud (Workload Identity Federation)
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account:           ${{ secrets.WIF_SERVICE_ACCOUNT }}
          token_format:              access_token

      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}
          labels: |
            org.opencontainers.image.title=Heady Projection Service
            org.opencontainers.image.vendor=HeadySystems Inc.
            com.headysystems.phi=1.6180339887

      - name: Build and push Docker image
        id: push
        uses: docker/build-push-action@v5
        with:
          context:    .
          file:       ./Dockerfile
          push:       true
          tags:       ${{ steps.meta.outputs.tags }}
          labels:     ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max
          build-args: |
            NODE_VERSION=${{ env.NODE_VERSION }}
            BUILD_SHA=${{ github.sha }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}

  # ── Deploy to Cloud Run ───────────────────────────────────────────────────
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account:           ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v2
        with:
          version: latest

      - name: Deploy to Cloud Run
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service:  ${{ env.SERVICE_NAME }}
          region:   ${{ env.REGION }}
          image:    ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}@${{ needs.build-and-push.outputs.image-digest }}
          flags:    |
            --allow-unauthenticated
            --min-instances=1
            --max-instances=10
            --concurrency=80
            --cpu=1
            --memory=512Mi
            --timeout=300
            --port=3849
          env_vars: |
            NODE_ENV=production
            LOG_LEVEL=info
            PROJECTION_PORT=3849
          secrets:  |
            CONDUCTOR_URL=heady-conductor-url:latest
            PUBSUB_TOPIC=heady-pubsub-topic:latest

      - name: Show deployed URL
        run: echo "Service deployed to ${{ steps.deploy.outputs.url }}"

  # ── Post-deploy smoke test ────────────────────────────────────────────────
  smoke-test:
    name: Smoke Test
    runs-on: ubuntu-latest
    needs: deploy

    steps:
      - name: Health check
        run: |
          echo "Running post-deploy health check…"
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              "${{ needs.deploy.outputs.url }}/health" || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed (HTTP $STATUS)"
              exit 0
            fi
            echo "Attempt $i: HTTP $STATUS — retrying in 10s…"
            sleep 10
          done
          echo "Health check failed after 5 attempts"
          exit 1
