; ═══════════════════════════════════════════════════════════════════════════════
; PgBouncer Configuration — Heady Platform
; All pool sizes use Fibonacci numbers per Sacred Geometry v4.0
; ═══════════════════════════════════════════════════════════════════════════════

[databases]
; pgvector database for all 50 services
heady = host=localhost port=5432 dbname=heady auth_user=heady_pgbouncer

; Read replica for CQRS read models
heady_read = host=localhost port=5433 dbname=heady auth_user=heady_read

[pgbouncer]
; ─── Connection Settings ─────────────────────────────────────────────────────
listen_addr = 0.0.0.0
listen_port = 6432
unix_socket_dir = /var/run/pgbouncer

; ─── Pool Mode ───────────────────────────────────────────────────────────────
; Transaction mode: connections returned to pool after each transaction
; Best for high-concurrency services with short-lived queries
pool_mode = transaction

; ─── Pool Sizing (Fibonacci Numbers) ─────────────────────────────────────────
; default_pool_size: Base pool per database/user pair
default_pool_size = 34

; min_pool_size: Minimum connections kept warm
min_pool_size = 5

; reserve_pool_size: Extra connections for burst traffic
reserve_pool_size = 8

; reserve_pool_timeout: How long to wait before using reserve pool
reserve_pool_timeout = 3

; max_client_conn: Maximum number of client connections
max_client_conn = 233

; max_db_connections: Maximum connections to backend database
max_db_connections = 55

; max_user_connections: Maximum connections per user
max_user_connections = 34

; ─── Timeouts (φ-scaled) ────────────────────────────────────────────────────
; server_connect_timeout: Backend connection timeout (seconds)
server_connect_timeout = 5

; server_login_retry: Retry delay for failed backend connections
server_login_retry = 3

; query_timeout: Maximum time for a query (seconds, 0 = unlimited)
query_timeout = 21

; query_wait_timeout: How long client waits for a connection from pool
query_wait_timeout = 13

; client_idle_timeout: Close idle client connections after this (seconds)
client_idle_timeout = 89

; server_idle_timeout: Close idle server connections after this (seconds)
server_idle_timeout = 55

; server_lifetime: Maximum lifetime of a server connection (seconds)
server_lifetime = 3600

; ─── Authentication ──────────────────────────────────────────────────────────
auth_type = md5
auth_file = /etc/pgbouncer/userlist.txt

; ─── TLS/SSL ─────────────────────────────────────────────────────────────────
; Client-facing TLS
client_tls_sslmode = prefer
client_tls_key_file = /etc/pgbouncer/tls/server.key
client_tls_cert_file = /etc/pgbouncer/tls/server.crt

; Backend TLS (to PostgreSQL)
server_tls_sslmode = require
server_tls_ca_file = /etc/pgbouncer/tls/ca.crt

; ─── Logging ─────────────────────────────────────────────────────────────────
log_connections = 1
log_disconnections = 1
log_pooler_errors = 1
stats_period = 13

; ─── Admin Access ────────────────────────────────────────────────────────────
admin_users = heady_admin
stats_users = heady_monitor

; ─── DNS ─────────────────────────────────────────────────────────────────────
dns_max_ttl = 21
dns_nxdomain_ttl = 8

; ─── Misc ────────────────────────────────────────────────────────────────────
; Disallow ALTER SYSTEM, CREATE DATABASE, etc. in transaction mode
ignore_startup_parameters = extra_float_digits
application_name_add_host = 1
disable_pqexec = 1
