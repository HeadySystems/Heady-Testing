# Heady™ Full Platform — Docker Compose for Local Development
# Runs ALL 50 services, PostgreSQL + pgvector, Consul, OpenTelemetry, and Drupal CMS
# All services operate as concurrent equals — NO priority ordering.
# © 2024-2026 HeadySystems Inc. All Rights Reserved.

version: '3.8'

x-heady-service: &heady-service
  restart: unless-stopped
  networks:
    - heady-mesh
  environment:
    - NODE_ENV=development
    - CONSUL_HOST=consul
    - CONSUL_PORT=8500
    - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
    - PGHOST=postgres
    - PGPORT=5432
    - PGDATABASE=heady_vector
    - PGUSER=heady
    - PGPASSWORD=${PG_PASSWORD:-heady_dev_2026}
    - FIREBASE_PROJECT_ID=gen-lang-client-0920560496
    - VECTOR_DIM=384
  healthcheck:
    test: ["CMD", "curl", "-f", "http://localhost:${SERVICE_PORT:-3310}/health"]
    interval: 13s        # Fibonacci
    timeout: 5s          # Fibonacci
    retries: 5           # Fibonacci
    start_period: 21s    # Fibonacci

services:
  # ─── Infrastructure ────────────────────────────────────────────────────────

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: heady_vector
      POSTGRES_USER: heady
      POSTGRES_PASSWORD: ${PG_PASSWORD:-heady_dev_2026}
    ports:
      - "5432:5432"
    volumes:
      - heady-pgdata:/var/lib/postgresql/data
    networks:
      - heady-mesh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U heady"]
      interval: 8s
      timeout: 5s
      retries: 8

  consul:
    image: hashicorp/consul:1.18
    command: agent -dev -client=0.0.0.0
    ports:
      - "8500:8500"
    networks:
      - heady-mesh

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.100.0
    command: ["--config", "/etc/otel-config.yaml"]
    volumes:
      - ./shared/otel-config.yaml:/etc/otel-config.yaml:ro
    ports:
      - "4317:4317"   # gRPC
      - "4318:4318"   # HTTP
      - "8888:8888"   # Prometheus metrics
    networks:
      - heady-mesh

  # ─── Drupal CMS ────────────────────────────────────────────────────────────

  drupal:
    image: drupal:10
    ports:
      - "8080:80"
    environment:
      - DRUPAL_DB_HOST=postgres
      - DRUPAL_DB_PORT=5432
      - DRUPAL_DB_NAME=heady_drupal
      - DRUPAL_DB_USER=heady
      - DRUPAL_DB_PASS=${PG_PASSWORD:-heady_dev_2026}
    volumes:
      - ./drupal-config/web/modules:/opt/drupal/web/modules/custom:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - heady-mesh

  # ─── Core Intelligence Services ────────────────────────────────────────────

  heady-brain:
    <<: *heady-service
    build: ./services/heady-brain
    ports: ["3310:3310"]
    environment:
      - SERVICE_PORT=3310

