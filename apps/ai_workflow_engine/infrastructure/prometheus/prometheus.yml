global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "workflow_rules.yml"

scrape_configs:
  - job_name: 'ai-workflow-engine'
    static_configs:
      - targets: ['ai-workflow-engine:8000']
    metrics_path: '/metrics'
    scrape_interval: 5s
    scrape_timeout: 5s

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']

alerting:
  alertmanagers:
    - static_configs:
        - targets:
          - alertmanager:9093
