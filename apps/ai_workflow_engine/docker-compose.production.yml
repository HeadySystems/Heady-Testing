# HEADY_BRAND:END
version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: workflow-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=workflow_db
      - POSTGRES_USER=workflow_user
      - POSTGRES_PASSWORD=workflow_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U workflow_user -d workflow_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache and Message Broker
  redis:
    image: redis:7-alpine
    container_name: workflow-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # AI Workflow Engine
  ai-workflow-engine:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-workflow-engine
    ports:
      - "8001:8000"
    environment:
      - DATABASE_URL=postgresql://workflow_user:workflow_pass@postgres:5432/workflow_db
      - REDIS_URL=redis://redis:6379/0
      - LOG_LEVEL=INFO
      - ENVIRONMENT=production
      - MAX_CPU_CORES=16
      - MAX_MEMORY_MB=32768
      - MAX_GPU_MEMORY_MB=16384
      - ENABLE_AI_OPTIMIZATION=true
      - ENABLE_DYNAMIC_ALLOCATION=true
    volumes:
      - .:/app
      - workflow_logs:/app/logs
    depends_on:
      - postgres
      - redis
    restart: unless-stopped
    command: uvicorn app:app --host 0.0.0.0 --port 8000 --workers 4

  # Prometheus for Metrics Collection
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./infrastructure/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    restart: unless-stopped

  # Grafana for Visualization
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin123
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infrastructure/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./infrastructure/grafana/datasources:/etc/grafana/provisioning/datasources
    depends_on:
      - prometheus
    restart: unless-stopped

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf
      - nginx_logs:/var/log/nginx
    depends_on:
      - ai-workflow-engine
      - grafana
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  workflow_logs:
  prometheus_data:
  grafana_data:
  nginx_logs:
