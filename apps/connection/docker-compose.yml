version: '3.8'
services:
  lens:
    build: ./apps/lens
    container_name: heady_lens
    restart: always
    environment:
      CONTAINER_ROLE: lens
      INITIAL_STATE: provisioning
    ports:
    - 3000:3000
    - 3001:3001
    volumes:
    - ../HeadySystems/shared/state:/app/shared/state
    - ./config:/app/config
    depends_on:
    - ../HeadySystems/orchestrator
    healthcheck:
      test:
      - CMD
      - curl
      - -f
      - http://localhost:3000/health/lens
      interval: 30s
      timeout: 10s
      retries: 3
  admin_ui:
    build: ./apps/admin_ui
    container_name: heady_admin
    restart: always
    environment:
      CONTAINER_ROLE: admin_ui
      INITIAL_STATE: provisioning
    ports:
    - 3002:3002
    - 3003:3003
    volumes:
    - ../HeadySystems/shared/state:/app/shared/state
    - ./config:/app/config
    depends_on:
    - lens
    healthcheck:
      test:
      - CMD
      - curl
      - -f
      - http://localhost:3002/health/admin
      interval: 30s
      timeout: 10s
      retries: 3
  trust_indicators:
    build: ./apps/trust_indicators
    container_name: heady_trust
    restart: always
    environment:
      CONTAINER_ROLE: trust_indicators
      INITIAL_STATE: provisioning
    ports:
    - 3004:3004
    - 3005:3005
    volumes:
    - ../HeadySystems/shared/state:/app/shared/state
    - ./config:/app/config
    depends_on:
    - admin_ui
    healthcheck:
      test:
      - CMD
      - curl
      - -f
      - http://localhost:3004/health/trust
      interval: 30s
      timeout: 10s
      retries: 3
networks:
  heady_connection:
    driver: bridge
