<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HeadyWeb Workspace</title>
    <link rel="stylesheet" href="/workspace.css" />
</head>

<body>
    <main class="layout">
        <header>
            <h1>HeadyWeb Workspace</h1>
            <p>Auth + Persistent Vector Workspace + Chat-Driven File Ops + HeadyAI-IDE Panel</p>
        </header>

        <section class="card" id="auth-card">
            <h2>Authentication</h2>
            <form id="login-form">
                <label>Username <input id="username" value="heady-admin" /></label>
                <label>Password <input id="password" type="password" value="heady-dev-password" /></label>
                <button type="submit">Login</button>
            </form>
            <p id="auth-status">Not authenticated.</p>
        </section>

        <section class="grid">
            <article class="card">
                <h2>Persistent Vector Workspace</h2>
                <form id="vector-form">
                    <textarea id="vector-text" placeholder="Store memory/vector note..."></textarea>
                    <button type="submit">Add Vector Entry</button>
                </form>
                <ul id="vector-list"></ul>
            </article>

            <article class="card">
                <h2>HeadyAI Chat Interface</h2>
                <form id="chat-form">
                    <textarea id="chat-input" placeholder="Try: read README.md OR write docs/test.md\nhello"></textarea>
                    <button type="submit">Send</button>
                </form>
                <pre id="chat-output"></pre>
            </article>
        </section>

        <section class="card">
            <h2>HeadyAI-IDE File Panel</h2>
            <div class="row">
                <input id="file-path" value="README.md" />
                <button id="read-file">Read File</button>
                <button id="write-file">Write File</button>
            </div>
            <textarea id="file-content" class="editor"></textarea>
            <p id="file-status"></p>
        </section>
    </main>

    <script src="/workspace.js"></script>
</body>

</html>
