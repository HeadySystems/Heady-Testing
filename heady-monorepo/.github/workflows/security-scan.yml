# Heady™ AI Platform — Security Scanning
# CodeQL static analysis + dependency vulnerability scanning

name: Security Scan

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    # Run every Sunday at 2am UTC
    - cron: "0 2 * * 0"
  workflow_dispatch:

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

permissions:
  actions: read
  contents: read
  security-events: write
  pull-requests: write

jobs:
  # ── CodeQL Static Analysis ──────────────────────────────────────────
  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        language: [javascript]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: +security-and-quality
          config: |
            paths:
              - src
              - heady-manager.js
            paths-ignore:
              - "**/*.test.js"
              - "**/*.spec.js"
              - node_modules

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
          upload: true

  # ── Dependency Vulnerability Scanning ─────────────────────────────
  dependency-scan:
    name: Dependency Vulnerability Scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci --prefer-offline

      - name: npm audit
        run: |
          npm audit --audit-level=high --json > npm-audit.json 2>&1 || true
          cat npm-audit.json | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          vulns = data.get('vulnerabilities', {})
          high = sum(1 for v in vulns.values() if v.get('severity') in ['high', 'critical'])
          if high > 0:
              print(f'::warning::Found {high} high/critical vulnerabilities in dependencies')
              sys.exit(0)  # Don't fail CI but warn
          else:
              print('✓ No high/critical vulnerabilities found')
          " || echo "Audit completed with warnings"

      - name: Upload audit results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: npm-audit-${{ github.run_id }}
          path: npm-audit.json
          retention-days: 30

  # ── Secrets Scanning ───────────────────────────────────────────────
  secrets-scan:
    name: Secrets Detection
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan for secrets with truffleHog
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --debug --only-verified
        continue-on-error: true

      - name: Check for hardcoded secrets patterns
        run: |
          # Custom pattern check for common secret patterns
          FOUND=0

          # Check for AWS keys
          if grep -r "AKIA[0-9A-Z]{16}" src/ heady-manager.js --include="*.js" -l 2>/dev/null; then
            echo "::error::Found potential AWS access key"
            FOUND=1
          fi

          # Check for private key blocks
          if grep -r "BEGIN RSA PRIVATE KEY\|BEGIN PRIVATE KEY\|BEGIN EC PRIVATE KEY" src/ --include="*.js" -l 2>/dev/null; then
            echo "::error::Found private key in source"
            FOUND=1
          fi

          # Check for hardcoded JWT secrets (common pattern)
          if grep -r "jwt_secret.*=.*[\"'][a-zA-Z0-9]{20,}" src/ --include="*.js" -l 2>/dev/null; then
            echo "::warning::Possible hardcoded JWT secret"
          fi

          if [ $FOUND -eq 1 ]; then
            exit 1
          fi
          echo "✓ No hardcoded secrets detected"

  # ── Container Security Scanning ────────────────────────────────────
  container-scan:
    name: Container Image Scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t heady-scan:${{ github.sha }} .

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "heady-scan:${{ github.sha }}"
          format: "sarif"
          output: "trivy-results.sarif"
          severity: "CRITICAL,HIGH"
          exit-code: "0"

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: "trivy-results.sarif"

  # ── SAST with Semgrep ──────────────────────────────────────────────
  semgrep:
    name: Semgrep SAST
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          config: >-
            p/nodejs
            p/security-audit
            p/owasp-top-ten
          generateSarif: "1"
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}
        continue-on-error: true

      - name: Upload Semgrep results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: semgrep.sarif
        continue-on-error: true

  # ── License Compliance ─────────────────────────────────────────────
  license-check:
    name: License Compliance
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci --prefer-offline

      - name: Check licenses
        run: |
          npx license-checker --production --failOn "GPL-2.0;GPL-3.0;AGPL-3.0" --json > licenses.json 2>&1 || true
          echo "✓ License check complete"

      - name: Upload license report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: license-report-${{ github.run_id }}
          path: licenses.json
          retention-days: 30
