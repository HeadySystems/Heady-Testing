<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heady AI — Side Panel</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0d0d1a;
            color: #e8e8f0;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        .header {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            padding: 14px 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        .orb {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: radial-gradient(circle, #7c3aed, #4f46e5);
            animation: breathe 3s ease-in-out infinite;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            color: white;
        }

        @keyframes breathe {

            0%,
            100% {
                transform: scale(1);
                opacity: 0.9;
            }

            50% {
                transform: scale(1.08);
                opacity: 1;
            }
        }

        .header h1 {
            font-size: 15px;
            font-weight: 700;
        }

        .header .status {
            font-size: 10px;
            color: #6ee7b7;
        }

        .chat {
            flex: 1;
            padding: 12px 16px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .msg {
            padding: 10px 14px;
            border-radius: 14px;
            font-size: 13px;
            line-height: 1.6;
            max-width: 90%;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(4px);
            }

            to {
                opacity: 1;
                transform: none;
            }
        }

        .msg.user {
            background: linear-gradient(135deg, #7c3aed, #4f46e5);
            color: white;
            align-self: flex-end;
        }

        .msg.bot {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.06);
            color: #e8e8f0;
            align-self: flex-start;
        }

        .msg.system {
            font-size: 11px;
            color: #555;
            text-align: center;
            align-self: center;
            background: none;
            padding: 4px;
        }

        .typing {
            display: flex;
            gap: 4px;
            padding: 10px 14px;
            align-self: flex-start;
        }

        .typing span {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #7c3aed;
            animation: bounce 1.4s infinite;
        }

        .typing span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes bounce {

            0%,
            60%,
            100% {
                transform: none;
                opacity: 0.3;
            }

            30% {
                transform: translateY(-6px);
                opacity: 1;
            }
        }

        .input-bar {
            display: flex;
            gap: 8px;
            padding: 12px 16px;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            background: rgba(0, 0, 0, 0.2);
        }

        .input-bar input {
            flex: 1;
            padding: 10px 14px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            background: rgba(255, 255, 255, 0.05);
            color: #e8e8f0;
            font-size: 13px;
            outline: none;
            font-family: inherit;
        }

        .input-bar input:focus {
            border-color: #7c3aed;
        }

        .input-bar button {
            padding: 10px 16px;
            border-radius: 20px;
            border: none;
            background: linear-gradient(135deg, #7c3aed, #4f46e5);
            color: white;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
        }
    </style>
</head>

<body>
    <div class="header">
        <div class="orb">∞</div>
        <div>
            <h1>Heady AI</h1>
            <div class="status" id="status">Connected</div>
        </div>
    </div>
    <div class="chat" id="chat">
        <div class="msg system">Heady AI Side Panel — right-click text to ask, or type below</div>
    </div>
    <div class="input-bar">
        <input type="text" id="input" placeholder="Ask Heady..." />
        <button id="send">→</button>
    </div>
    <script>
        const chat = document.getElementById('chat');
        const input = document.getElementById('input');
        function addMsg(text, type) {
            const el = document.createElement('div');
            el.className = `msg ${type}`;
            el.textContent = text;
            chat.appendChild(el);
            chat.scrollTop = chat.scrollHeight;
        }
        function showTyping() {
            const el = document.createElement('div');
            el.className = 'typing'; el.id = 'typing';
            el.innerHTML = '<span></span><span></span><span></span>';
            chat.appendChild(el);
            chat.scrollTop = chat.scrollHeight;
        }
        function hideTyping() {
            const el = document.getElementById('typing');
            if (el) el.remove();
        }
        async function sendMessage(query) {
            if (!query.trim()) return;
            addMsg(query, 'user');
            input.value = '';
            showTyping();
            let context = '';
            try {
                const pageContent = await chrome.runtime.sendMessage({ type: 'GET_PAGE_CONTENT' });
                context = pageContent?.text?.slice(0, 4000) || '';
            } catch { }
            const result = await chrome.runtime.sendMessage({ type: 'CHAT', query, context });
            hideTyping();
            addMsg(result.ok ? result.reply : `⚠️ ${result.error || 'Connection failed'}`, result.ok ? 'bot' : 'system');
        }
        document.getElementById('send').addEventListener('click', () => sendMessage(input.value));
        input.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(input.value); });
        chrome.runtime.onMessage.addListener((msg) => {
            if (msg.type === 'SIDE_PANEL_QUERY' && msg.query) sendMessage(msg.query);
        });
        chrome.runtime.sendMessage({ type: 'HEALTH_CHECK' }).then(result => {
            document.getElementById('status').textContent = result?.ok ? 'Connected' : 'Offline';
            document.getElementById('status').style.color = result?.ok ? '#6ee7b7' : '#FF5722';
        });
    </script>
</body>

</html>
