<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Heady AI Companion</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 380px;
      min-height: 520px;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #0d0d1a;
      color: #e8e8f0;
      display: flex;
      flex-direction: column;
    }

    .header {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }

    .orb {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: radial-gradient(circle, #7c3aed, #4f46e5);
      animation: breathe 3s ease-in-out infinite;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }

    @keyframes breathe {

      0%,
      100% {
        transform: scale(1);
        opacity: 0.9;
      }

      50% {
        transform: scale(1.08);
        opacity: 1;
      }
    }

    .header-text h1 {
      font-size: 18px;
      font-weight: 700;
    }

    .status {
      font-size: 11px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #4CAF50;
      box-shadow: 0 0 6px rgba(76, 175, 80, 0.5);
    }

    .status-dot.offline {
      background: #FF5722;
    }

    .status-label {
      color: #6ee7b7;
    }

    .status-label.offline {
      color: #FF5722;
    }

    .endpoint-bar {
      padding: 10px 20px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
    }

    .endpoint-bar select {
      width: 100%;
      padding: 8px 12px;
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: rgba(255, 255, 255, 0.05);
      color: #e8e8f0;
      font-size: 13px;
      cursor: pointer;
    }

    .endpoint-bar select option {
      background: #16213e;
    }

    .quick-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      padding: 12px 20px;
    }

    .action-btn {
      padding: 12px;
      border-radius: 10px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(255, 255, 255, 0.04);
      color: #c4b5fd;
      cursor: pointer;
      font-size: 12px;
      font-weight: 500;
      text-align: left;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .action-btn:hover {
      background: rgba(124, 58, 237, 0.15);
      border-color: rgba(124, 58, 237, 0.3);
      transform: translateY(-1px);
    }

    .icon {
      font-size: 16px;
    }

    .chat {
      flex: 1;
      padding: 12px 20px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 8px;
      min-height: 150px;
    }

    .msg {
      padding: 10px 14px;
      border-radius: 12px;
      font-size: 13px;
      line-height: 1.5;
      max-width: 85%;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(4px);
      }

      to {
        opacity: 1;
        transform: none;
      }
    }

    .msg.user {
      background: linear-gradient(135deg, #7c3aed, #4f46e5);
      color: white;
      align-self: flex-end;
    }

    .msg.bot {
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.06);
      color: #e8e8f0;
      align-self: flex-start;
    }

    .msg.system {
      font-size: 11px;
      color: #666;
      text-align: center;
      align-self: center;
      background: none;
    }

    .input-bar {
      display: flex;
      gap: 8px;
      padding: 12px 20px;
      border-top: 1px solid rgba(255, 255, 255, 0.08);
    }

    .input-bar input {
      flex: 1;
      padding: 10px 16px;
      border-radius: 20px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: rgba(255, 255, 255, 0.05);
      color: #e8e8f0;
      font-size: 14px;
      outline: none;
    }

    .input-bar input:focus {
      border-color: #7c3aed;
    }

    .input-bar button {
      padding: 10px 18px;
      border-radius: 20px;
      border: none;
      background: linear-gradient(135deg, #7c3aed, #4f46e5);
      color: white;
      cursor: pointer;
      font-weight: 600;
      font-size: 13px;
    }

    .footer {
      padding: 8px 20px;
      font-size: 10px;
      color: #444;
      text-align: center;
      border-top: 1px solid rgba(255, 255, 255, 0.04);
    }

    .footer a {
      color: #7c3aed;
      text-decoration: none;
    }
  </style>
</head>

<body>
  <div class="header">
    <div class="orb">∞</div>
    <div class="header-text">
      <h1>Heady AI</h1>
      <div class="status">
        <div class="status-dot" id="statusDot"></div><span class="status-label" id="statusText">Connecting...</span>
      </div>
    </div>
  </div>
  <div class="endpoint-bar">
    <select id="endpoint">
      <option value="production">Cloud — Production</option>
      <option value="headyme">HeadyMe</option>
      <option value="headysystems">HeadySystems</option>
      <option value="headymcp">HeadyMCP</option>
      <option value="local">Local Dev (localhost:3300)</option>
    </select>
  </div>
  <div class="quick-actions">
    <button class="action-btn" id="summarize"><span class="icon">📋</span>Summarize Page</button>
    <button class="action-btn" id="explain"><span class="icon">💡</span>Explain Selection</button>
    <button class="action-btn" id="research"><span class="icon">🔍</span>Deep Research</button>
    <button class="action-btn" id="captureTab"><span class="icon">📸</span>Capture Tab</button>
    <button class="action-btn" id="openDashboard"><span class="icon">🏠</span>Dashboard</button>
    <button class="action-btn" id="refreshHealth"><span class="icon">🔄</span>Refresh</button>
  </div>
  <div class="chat" id="chat">
    <div class="msg system">Ask Heady anything or use quick actions above</div>
  </div>
  <div class="input-bar">
    <input type="text" id="input" placeholder="Ask Heady anything..." />
    <button id="send">Send</button>
  </div>
  <div class="footer"><a href="https://headysystems.com">HeadySystems</a> v3.1.0 · Sacred Geometry AI</div>
  <script src="popup.js"></script>
</body>

</html>
