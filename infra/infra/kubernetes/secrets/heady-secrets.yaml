# HEADY SECRETS — Use ExternalSecrets Operator or SealedSecrets
# DO NOT commit real credentials to this file
# See: https://external-secrets.io/
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: heady-secrets
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: gcp-secret-store
    kind: SecretStore
  target:
    name: heady-secrets
  data: []
  # Configure data mappings in your SecretStore, not here
