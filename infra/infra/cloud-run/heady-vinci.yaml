apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: heady-vinci
  annotations:
    run.googleapis.com/ingress: all
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "1"
        autoscaling.knative.dev/maxScale: "21"
    spec:
      containerConcurrency: 13
      containers:
        - image: gcr.io/${PROJECT_ID}/heady-vinci:latest
          ports:
            - containerPort: 4309
          env:
            - name: PORT
              value: "4309"
            - name: HEADY_ENV
              value: "prod"
          startupProbe:
            httpGet:
              path: /health/live
              port: 4309
          livenessProbe:
            httpGet:
              path: /health/live
              port: 4309
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 4309
