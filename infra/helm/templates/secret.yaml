{{/*
=============================================================================
HeadySystems Inc. — Helm Template: Secret
heady-platform v3.2.2
=============================================================================
SECURITY: This template generates a secret placeholder.
In production, use External Secrets Operator (ESO) with GCP Secret Manager
or Sealed Secrets with kubeseal.
DO NOT set real values in values.yaml or values-production.yaml.
=============================================================================
*/}}
---
# Secret placeholder — to be replaced by ESO or kubeseal in production
# See: infrastructure/kubernetes/secrets/heady-secrets.yaml for full docs
apiVersion: v1
kind: Secret
metadata:
  name: heady-secrets
  namespace: {{ .Values.global.namespace }}
  labels:
    app.kubernetes.io/name: heady-secrets
    app.kubernetes.io/component: secrets
    app.kubernetes.io/part-of: heady-platform
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    headysystems.com/phi: "1.618033988749895"
    helm.sh/chart: {{ include "heady-platform.chart" . }}
  annotations:
    headysystems.com/description: "Secret template — replace with ESO or Sealed Secret in production"
    headysystems.com/phi: "1.618033988749895"
    # Rotation schedules (Fibonacci days)
    headysystems.com/jwt-rotation-days: "89"       # fib(11)=89
    headysystems.com/api-keys-rotation-days: "144"  # fib(12)=144
    headysystems.com/db-rotation-days: "233"        # fib(13)=233
    # ESO provider hint
    external-secrets.io/provider: "gcpsm"
type: Opaque
data:
  # All values are PLACEHOLDER base64 strings.
  # Override via: helm upgrade --set-string key=value
  # Or use External Secrets Operator for production.
  DATABASE_URL: {{ "REPLACE_WITH_REAL_VALUE" | b64enc | quote }}
  POSTGRES_PASSWORD: {{ "REPLACE_WITH_REAL_VALUE" | b64enc | quote }}
  REDIS_URL: {{ "REPLACE_WITH_REAL_VALUE" | b64enc | quote }}
  REDIS_PASSWORD: {{ "REPLACE_WITH_REAL_VALUE" | b64enc | quote }}
  JWT_SECRET: {{ "REPLACE_WITH_REAL_VALUE" | b64enc | quote }}
  JWT_PUBLIC_KEY: {{ "REPLACE_WITH_REAL_VALUE" | b64enc | quote }}
  OPENAI_API_KEY: {{ "REPLACE_WITH_REAL_VALUE" | b64enc | quote }}
  ANTHROPIC_API_KEY: {{ "REPLACE_WITH_REAL_VALUE" | b64enc | quote }}
  SENTRY_DSN: {{ "REPLACE_WITH_REAL_VALUE" | b64enc | quote }}
  ENCRYPTION_KEY: {{ "REPLACE_WITH_REAL_VALUE" | b64enc | quote }}
  SESSION_SECRET: {{ "REPLACE_WITH_REAL_VALUE" | b64enc | quote }}
