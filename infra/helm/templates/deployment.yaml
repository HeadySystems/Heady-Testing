{{/*
=============================================================================
HeadySystems Inc. — Helm Template: Deployment
heady-platform v3.2.2
=============================================================================
φ = 1.618033988749895 (Golden Ratio)
Generates Deployments for all enabled heady-* services
=============================================================================
*/}}

{{- $services := list
  (dict "key" "headyBrain"      "name" "heady-brain"      "component" "brain"      "tier" "core"          "values" .Values.headyBrain)
  (dict "key" "headyConductor"  "name" "heady-conductor"  "component" "conductor"  "tier" "orchestration" "values" .Values.headyConductor)
  (dict "key" "headyMcp"        "name" "heady-mcp"        "component" "mcp"        "tier" "protocol"      "values" .Values.headyMcp)
  (dict "key" "headyWeb"        "name" "heady-web"        "component" "web"        "tier" "frontend"      "values" .Values.headyWeb)
-}}

{{- range $svc := $services }}
{{- if $svc.values.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $svc.name }}
  namespace: {{ $.Values.global.namespace }}
  labels:
    app.kubernetes.io/name: {{ $svc.name }}
    app.kubernetes.io/instance: {{ printf "%s-production" $svc.name }}
    app.kubernetes.io/version: {{ $.Chart.AppVersion | quote }}
    app.kubernetes.io/component: {{ $svc.component }}
    app.kubernetes.io/part-of: heady-platform
    app.kubernetes.io/managed-by: {{ $.Release.Service }}
    headysystems.com/tier: {{ $svc.tier }}
    headysystems.com/phi: "1.618033988749895"
    helm.sh/chart: {{ include "heady-platform.chart" $ }}
  annotations:
    headysystems.com/phi: "1.618033988749895"
    headysystems.com/service: {{ $svc.name | quote }}
    headysystems.com/replicas: {{ $svc.values.replicaCount | quote }}
    {{- with $.Values.global.commonAnnotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  # φ-scaled replicas — see values.yaml for Fibonacci derivation
  replicas: {{ $svc.values.replicaCount }}
  # revisionHistoryLimit: fib(5)=5
  revisionHistoryLimit: 5
  # progressDeadlineSeconds: fib(11)=89 × 10 = 890
  progressDeadlineSeconds: 890
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ $svc.name }}
      app.kubernetes.io/instance: {{ printf "%s-production" $svc.name }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      # maxSurge: fib(3)=2
      maxSurge: {{ $svc.values.rollingUpdate.maxSurge | default 2 }}
      # maxUnavailable: fib(2)=1
      maxUnavailable: {{ $svc.values.rollingUpdate.maxUnavailable | default 1 }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ $svc.name }}
        app.kubernetes.io/instance: {{ printf "%s-production" $svc.name }}
        app.kubernetes.io/version: {{ $.Chart.AppVersion | quote }}
        app.kubernetes.io/component: {{ $svc.component }}
        headysystems.com/tier: {{ $svc.tier }}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
        headysystems.com/phi: "1.618033988749895"
        {{- with $svc.values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      # Topology spread: distribute across zones and nodes
      topologySpreadConstraints:
        {{- range $svc.values.topologySpreadConstraints | default (list
          (dict "maxSkew" 1 "topologyKey" "topology.kubernetes.io/zone" "whenUnsatisfiable" "DoNotSchedule")
          (dict "maxSkew" 1 "topologyKey" "kubernetes.io/hostname" "whenUnsatisfiable" "ScheduleAnyway")
        ) }}
        - maxSkew: {{ .maxSkew }}
          topologyKey: {{ .topologyKey }}
          whenUnsatisfiable: {{ .whenUnsatisfiable }}
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: {{ $svc.name }}
        {{- end }}

      # Pod anti-affinity: no two pods of same service on same node
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchExpressions:
                  - key: app.kubernetes.io/name
                    operator: In
                    values:
                      - {{ $svc.name }}
              topologyKey: kubernetes.io/hostname
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 89  # fib(11)=89
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app.kubernetes.io/name
                      operator: In
                      values:
                        - {{ $svc.name }}
                topologyKey: topology.kubernetes.io/zone

      serviceAccountName: {{ $svc.name }}
      automountServiceAccountToken: false

      # φ-scaled termination grace period
      terminationGracePeriodSeconds: {{ $svc.values.terminationGracePeriodSeconds | default 42 }}

      # Security context
      securityContext:
        {{- toYaml $.Values.global.podSecurityContext | nindent 8 }}

      containers:
        - name: {{ $svc.name }}
          image: {{ printf "%s:%s" $svc.values.image.repository ($svc.values.image.tag | default $.Values.global.imageTag) }}
          imagePullPolicy: {{ $svc.values.image.pullPolicy | default $.Values.global.imagePullPolicy }}
          ports:
            - name: http
              containerPort: {{ $svc.values.service.port | default 8080 }}
              protocol: TCP
            - name: metrics
              containerPort: {{ $svc.values.service.metricsPort | default 9090 }}
              protocol: TCP
          {{- if $svc.values.service.grpcPort }}
            - name: grpc
              containerPort: {{ $svc.values.service.grpcPort }}
              protocol: TCP
          {{- end }}
          {{- if $svc.values.service.mcpSsePort }}
            - name: mcp-sse
              containerPort: {{ $svc.values.service.mcpSsePort }}
              protocol: TCP
          {{- end }}

          # Environment from ConfigMap and Secret refs
          envFrom:
            - configMapRef:
                name: heady-config
            - secretRef:
                name: heady-secrets
          env:
            - name: SERVICE_NAME
              value: {{ $svc.name | quote }}
            - name: SERVICE_VERSION
              value: {{ $.Chart.AppVersion | quote }}
            - name: PORT
              value: "8080"
            # φ constant available at runtime
            - name: PHI
              value: "1.618033988749895"
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            # Service-specific env vars from values
            {{- range $k, $v := $svc.values.env }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}

          # φ-scaled resource limits
          resources:
            {{- toYaml $svc.values.resources | nindent 12 }}

          # φ-scaled probe timing
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: {{ $svc.values.livenessProbe.initialDelaySeconds | default 13 }}
            periodSeconds: {{ $svc.values.livenessProbe.periodSeconds | default 8 }}
            timeoutSeconds: {{ $svc.values.livenessProbe.timeoutSeconds | default 3 }}
            failureThreshold: {{ $svc.values.livenessProbe.failureThreshold | default 3 }}
            successThreshold: 1

          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: {{ $svc.values.readinessProbe.initialDelaySeconds | default 5 }}
            periodSeconds: {{ $svc.values.readinessProbe.periodSeconds | default 3 }}
            timeoutSeconds: {{ $svc.values.readinessProbe.timeoutSeconds | default 2 }}
            failureThreshold: 3
            successThreshold: 1

          startupProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 8   # fib(6)=8
            periodSeconds: 3
            failureThreshold: 21     # fib(8)=21 — allows 63s startup
            timeoutSeconds: 5

          lifecycle:
            preStop:
              exec:
                # fib(6)=8s drain window
                command: ["/bin/sh", "-c", "sleep 8"]

          securityContext:
            {{- toYaml $.Values.global.containerSecurityContext | nindent 12 }}

          volumeMounts:
            - name: tmp
              mountPath: /tmp

      volumes:
        - name: tmp
          emptyDir:
            # fib(8)=21 × ~5Mi ≈ 100Mi
            sizeLimit: "100Mi"

      {{- include "heady-platform.imagePullSecrets" $ | nindent 6 }}

      dnsConfig:
        options:
          - name: ndots
            value: "2"
{{- end }}
{{- end }}
