; All constants are Fibonacci-derived. No magic numbers.
; © 2024-2026 HeadySystems Inc. All Rights Reserved.

[databases]
heady_vector = host=postgres port=5432 dbname=heady_vector
heady_drupal = host=postgres port=5432 dbname=heady_drupal

[pgbouncer]
; ─── Connection Pooling ─────────────────────────────────────────────────────
pool_mode = transaction
default_pool_size = 34          ; Fibonacci — FIB[8]
min_pool_size = 5               ; Fibonacci — FIB[4]
reserve_pool_size = 8           ; Fibonacci — FIB[5]
reserve_pool_timeout = 5        ; Fibonacci seconds — FIB[4]

; ─── Connection Limits ──────────────────────────────────────────────────────
max_client_conn = 233           ; Fibonacci — FIB[12]
max_db_connections = 89         ; Fibonacci — FIB[10]
max_user_connections = 55       ; Fibonacci — FIB[9]

; ─── Timeouts (Fibonacci Seconds) ──────────────────────────────────────────
server_idle_timeout = 89        ; Fibonacci — FIB[10]
server_connect_timeout = 13     ; Fibonacci — FIB[6]
server_login_retry = 5          ; Fibonacci — FIB[4]
client_idle_timeout = 144       ; Fibonacci — FIB[11]
client_login_timeout = 21       ; Fibonacci — FIB[7]
query_timeout = 89              ; Fibonacci — FIB[10]
query_wait_timeout = 34         ; Fibonacci — FIB[8]
idle_transaction_timeout = 55   ; Fibonacci — FIB[9]

; ─── Logging ────────────────────────────────────────────────────────────────
log_connections = 1
log_disconnections = 1
log_pooler_errors = 1
stats_period = 13               ; Fibonacci — FIB[6]

; ─── Network ────────────────────────────────────────────────────────────────
listen_addr = 0.0.0.0
listen_port = 6432
unix_socket_dir = /tmp

; ─── Authentication ─────────────────────────────────────────────────────────
auth_type = md5
auth_file = /etc/pgbouncer/userlist.txt

; ─── TLS ────────────────────────────────────────────────────────────────────
; server_tls_sslmode = require
; server_tls_ca_file = /etc/pgbouncer/ca.pem

; ─── Admin ──────────────────────────────────────────────────────────────────
admin_users = heady
stats_users = heady
