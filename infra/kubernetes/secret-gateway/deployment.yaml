apiVersion: apps/v1
kind: Deployment
metadata:
  name: secret-gateway
  labels:
    app: secret-gateway
    heady.io/domain: security
    heady.io/autocontext: "true"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: secret-gateway
  template:
    metadata:
      labels:
        app: secret-gateway
        heady.io/domain: security
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8906"
    spec:
      terminationGracePeriodSeconds: 34
      containers:
      - name: secret-gateway
        image: gcr.io/gen-lang-client-0920560496/secret-gateway:latest
        ports:
        - containerPort: 8906
          name: http
        envFrom:
        - configMapRef:
            name: heady-global-config
        - secretRef:
            name: heady-secrets
        env:
        - name: SERVICE_NAME
          value: "secret-gateway"
        - name: PORT
          value: "8906"
        - name: AUTOCONTEXT_URL
          value: "http://heady-auto-context:8907"
        - name: CONSUL_URL
          value: "http://consul:8500"
        - name: OTEL_ENDPOINT
          value: "http://otel-collector:4318"
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
        livenessProbe:
          httpGet:
            path: /health
            port: 8906
          initialDelaySeconds: 13
          periodSeconds: 21
          timeoutSeconds: 8
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 8906
          initialDelaySeconds: 8
          periodSeconds: 13
          timeoutSeconds: 5
          failureThreshold: 2
---
apiVersion: v1
kind: Service
metadata:
  name: secret-gateway
  labels:
    app: secret-gateway
    heady.io/domain: security
spec:
  selector:
    app: secret-gateway
  ports:
  - name: http
    port: 8906
    targetPort: 8906
