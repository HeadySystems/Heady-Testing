apiVersion: apps/v1
kind: Deployment
metadata:
  name: auto-success-engine
  labels:
    app: auto-success-engine
    heady.io/domain: pipeline
    heady.io/autocontext: "true"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auto-success-engine
  template:
    metadata:
      labels:
        app: auto-success-engine
        heady.io/domain: pipeline
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8600"
    spec:
      terminationGracePeriodSeconds: 34
      containers:
      - name: auto-success-engine
        image: gcr.io/gen-lang-client-0920560496/auto-success-engine:latest
        ports:
        - containerPort: 8600
          name: http
        envFrom:
        - configMapRef:
            name: heady-global-config
        - secretRef:
            name: heady-secrets
        env:
        - name: SERVICE_NAME
          value: "auto-success-engine"
        - name: PORT
          value: "8600"
        - name: AUTOCONTEXT_URL
          value: "http://heady-auto-context:8907"
        - name: CONSUL_URL
          value: "http://consul:8500"
        - name: OTEL_ENDPOINT
          value: "http://otel-collector:4318"
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
        livenessProbe:
          httpGet:
            path: /health
            port: 8600
          initialDelaySeconds: 13
          periodSeconds: 21
          timeoutSeconds: 8
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 8600
          initialDelaySeconds: 8
          periodSeconds: 13
          timeoutSeconds: 5
          failureThreshold: 2
---
apiVersion: v1
kind: Service
metadata:
  name: auto-success-engine
  labels:
    app: auto-success-engine
    heady.io/domain: pipeline
spec:
  selector:
    app: auto-success-engine
  ports:
  - name: http
    port: 8600
    targetPort: 8600
