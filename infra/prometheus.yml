# ─────────────────────────────────────────────────────────────────────────────
# Heady™ Prometheus Scrape Configuration
# Founded by Eric Haywood — HeadySystems Inc.
#
# Scrapes all 50 services at ports 3310–3372.
# scrape_interval: FIB[7]=21s
# evaluation_interval: FIB[8]=34s
# scrape_timeout: FIB[6]=13s
#
# ALL numeric constants from Fibonacci sequence.
# ─────────────────────────────────────────────────────────────────────────────

global:
  scrape_interval: 21s           # FIB[7]=21 seconds
  evaluation_interval: 34s       # FIB[8]=34 seconds
  scrape_timeout: 13s            # FIB[6]=13 seconds
  external_labels:
    cluster: heady-max-potential
    founder: eric-haywood
    gcp_project: gen-lang-client-0920560496
    region: us-east1

# ─── ALERTING ────────────────────────────────────────────────────────────────

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

# ─── RULES ───────────────────────────────────────────────────────────────────

rule_files: []

# ─── SCRAPE CONFIGS ──────────────────────────────────────────────────────────

scrape_configs:

  # ─── SELF-MONITORING ─────────────────────────────────────────────────────
  - job_name: prometheus
    scrape_interval: 21s
    static_configs:
      - targets: ["localhost:9090"]
        labels:
          domain: infrastructure
          ring: monitoring

  # ─── OTEL COLLECTOR ──────────────────────────────────────────────────────
  - job_name: otel-collector
    scrape_interval: 21s
    static_configs:
      - targets: ["otel-collector:8889"]
        labels:
          domain: infrastructure
          ring: monitoring

  # ─── INFRASTRUCTURE SERVICES ─────────────────────────────────────────────

  - job_name: consul
    scrape_interval: 21s
    consul_sd_configs:
      - server: consul:8500
    relabel_configs:
      - source_labels: [__meta_consul_service]
        target_label: service
      - source_labels: [__meta_consul_tags]
        regex: .*,csl-domain:([^,]+),.*
        target_label: heady_domain
      - source_labels: [__meta_consul_tags]
        regex: .*,ring:([^,]+),.*
        target_label: heady_ring

  - job_name: nats
    scrape_interval: 21s
    static_configs:
      - targets: ["nats:8222"]
        labels:
          domain: infrastructure
          ring: infra
          service: nats

  - job_name: redis
    scrape_interval: 21s
    static_configs:
      - targets: ["redis:6379"]
        labels:
          domain: infrastructure
          ring: infra
          service: redis

  - job_name: envoy
    scrape_interval: 21s
    static_configs:
      - targets: ["envoy:9901"]
        labels:
          domain: infrastructure
          ring: infra
          service: envoy

  # ─── GROUP 1: INFERENCE (3310–3317) ──────────────────────────────────────

  - job_name: heady-inference
    scrape_interval: 21s
    static_configs:
      - targets:
          - "heady-soul:3310"
          - "heady-brains:3311"
          - "heady-conductor:3312"
          - "heady-vinci:3313"
          - "llm-router:3314"
          - "embedding-router:3315"
          - "moe-csl-router:3316"
          - "prompt-executor:3317"
        labels:
          domain: inference

  # ─── GROUP 2: MEMORY (3318–3323) ────────────────────────────────────────

  - job_name: heady-memory
    scrape_interval: 21s
    static_configs:
      - targets:
          - "vector-memory:3318"
          - "graph-rag:3319"
          - "hybrid-search:3320"
