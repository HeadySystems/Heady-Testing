# =============================================================================
# Custom Metrics API — PodMonitor for all phi-scaled services
# Exposes: requests_per_second, queue_depth, active_agents
# =============================================================================
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: heady-phi-metrics
  namespace: heady-production
  labels:
    phi-scaled: "true"
spec:
  selector:
    matchLabels:
      phi-scaled: "true"
  podMetricsEndpoints:
    - port: metrics
      path: /metrics
      interval: 5s    # fib(5) = 5s scrape interval — aligns with scale-up window
      scrapeTimeout: 3s
  namespaceSelector:
    matchNames:
      - heady-production
      - heady-staging

---
# =============================================================================
# KEDA ScaledObject — queue-depth driven autoscaling via Redis
# Supplements HPA for queue-based workloads
# =============================================================================
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: heady-orchestration-keda
  namespace: heady-production
spec:
  scaleTargetRef:
    name: heady-orchestration
  minReplicaCount: 2      # fib(3) = 2
  maxReplicaCount: 21     # fib(8) = 21
  pollingInterval: 5      # fib(5) = 5s
  cooldownPeriod: 34      # fib(9) = 34s
  advanced:
    horizontalPodAutoscalerConfig:
      behavior:
        scaleUp:
          stabilizationWindowSeconds: 5
          policies:
            - type: Pods
              value: 3
              periodSeconds: 8
        scaleDown:
          stabilizationWindowSeconds: 34
          policies:
            - type: Pods
              value: 1
              periodSeconds: 34
  triggers:
    - type: redis
      metadata:
        address: redis-primary.heady-production.svc.cluster.local:6379
        listName: heady:task:queue:high
        listLength: "8"         # fib(6) = 8 — scale when queue > 8 tasks per pod
    - type: redis
      metadata:
        address: redis-primary.heady-production.svc.cluster.local:6379
        listName: heady:task:queue:normal
        listLength: "21"        # fib(8) = 21
    - type: prometheus
      metadata:
        serverAddress: http://prometheus.monitoring.svc.cluster.local:9090
        metricName: heady_active_agents_total
        query: sum(heady_active_agents_total{app="heady-orchestration"})
        threshold: "13"         # fib(7) = 13
