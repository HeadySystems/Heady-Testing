# Server identity
server_name: heady-nats-1

# Ports
port: 4222
http_port: 8222
cluster {
  port: 6222
}

# JetStream configuration
jetstream {
  # Storage directory for streams and consumers
  store_dir: "/data/jetstream"

  # Max memory storage (φ⁸ × 1MB ≈ 47MB)
  max_mem: 50MB

  # Max file storage (φ¹⁰ × 1MB ≈ 123MB)
  max_file: 128MB

  # Max outstanding acks per consumer (fib(13) = 233)
  max_ack_pending: 233
}

# Authentication
authorization {
  timeout: 5

  users = [
    { user: "heady-orchestrator", password: "$NATS_ORCHESTRATOR_PASS", permissions: { publish: ">", subscribe: ">" } }
    { user: "heady-agent",        password: "$NATS_AGENT_PASS",        permissions: { publish: "agent.>", subscribe: "agent.>" } }
    { user: "heady-monitor",      password: "$NATS_MONITOR_PASS",      permissions: { publish: "monitor.>", subscribe: { allow: ">" } } }
  ]
}

# Logging
logfile: "/var/log/nats/heady-nats.log"
logfile_size_limit: 10MB
debug: false
trace: false

# Limits
max_connections: 1024
max_payload: 1MB
max_control_line: 4096
write_deadline: "5s"

# Heady™ Streams (auto-created on first use)
# stream: heady-events     — all system events
# stream: heady-tasks      — pipeline task dispatch
# stream: heady-metrics    — observability data
# stream: heady-memory     — vector memory operations
