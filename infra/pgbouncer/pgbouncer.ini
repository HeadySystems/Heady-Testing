[databases]
; Primary database — vector memory + application data
heady = host=127.0.0.1 port=5432 dbname=heady auth_user=heady_app

; Read replica (when available)
heady_ro = host=127.0.0.1 port=5433 dbname=heady auth_user=heady_readonly

[pgbouncer]
; Connection settings
listen_addr = 0.0.0.0
listen_port = 6432
unix_socket_dir = /var/run/pgbouncer

; Authentication
auth_type = scram-sha-256
auth_file = /etc/pgbouncer/userlist.txt

; Pool mode — transaction pooling for best pgvector compatibility
pool_mode = transaction

; Pool sizes (φ-scaled)
; fib(5) = 5 default pool
default_pool_size = 5
; fib(6) = 8 min pool
min_pool_size = 3
; fib(8) = 21 reserve pool
reserve_pool_size = 8
reserve_pool_timeout = 3

; Connection limits (φ-derived)
; fib(10) = 55 max client connections
max_client_conn = 55
; fib(7) = 13 max db connections
max_db_connections = 13
; fib(6) = 8 max user connections
max_user_connections = 8

; Timeouts
server_lifetime = 3600
server_idle_timeout = 600
server_connect_timeout = 5
server_login_retry = 3
client_idle_timeout = 300
client_login_timeout = 30
query_timeout = 120
query_wait_timeout = 60

; DNS
dns_max_ttl = 60
dns_zone_check_period = 30

; Logging
log_connections = 1
log_disconnections = 1
log_pooler_errors = 1
logfile = /var/log/pgbouncer/pgbouncer.log
stats_period = 60

; TLS (when certs are available)
; client_tls_sslmode = require
; client_tls_key_file = /etc/pgbouncer/server.key
; client_tls_cert_file = /etc/pgbouncer/server.crt
; server_tls_sslmode = verify-ca
; server_tls_ca_file = /etc/pgbouncer/ca.crt

; Admin
admin_users = heady_admin
stats_users = heady_monitor, heady_admin
