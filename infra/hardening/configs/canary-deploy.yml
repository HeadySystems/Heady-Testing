# =============================================================================
# Headyâ„˘ Canary Deployment Workflow
# Progressive rollout: 5% â†’ 25% â†’ 50% â†’ 100%
# =============================================================================
name: Canary Deploy

on:
  workflow_dispatch:
    inputs:
      service:
        description: 'Service to deploy'
        required: true
        type: choice
        options:
          - heady-manager
          - heady-conductor
          - projection-service
      image_tag:
        description: 'Docker image tag'
        required: true

env:
  GCP_PROJECT: ${{ secrets.GCP_PROJECT_ID }}
  GCP_REGION: us-central1
  MAX_ERROR_RATE: 0.05
  MAX_LATENCY_P99: 10000

jobs:
  canary-5:
    runs-on: ubuntu-latest
    steps:
      - uses: google-github-actions/auth@v4
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}
      - name: Deploy canary (5%)
        run: |
          gcloud run services update-traffic ${{ inputs.service }} \
            --region=$GCP_REGION \
            --to-revisions=${{ inputs.image_tag }}=5
      - name: Wait and verify (3 min)
        run: |
          sleep 180
          ERROR_RATE=$(curl -s "https://${{ inputs.service }}.run.app/health" | jq '.errorRate // 0')
          if (( $(echo "$ERROR_RATE > $MAX_ERROR_RATE" | bc -l) )); then
            echo "âťŚ Error rate $ERROR_RATE exceeds threshold â€” rolling back"
            gcloud run services update-traffic ${{ inputs.service }} \
              --region=$GCP_REGION --to-latest
            exit 1
          fi
          echo "âś… Canary 5% healthy"

  canary-25:
    runs-on: ubuntu-latest
    needs: [canary-5]
    steps:
      - uses: google-github-actions/auth@v4
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}
      - name: Promote to 25%
        run: |
          gcloud run services update-traffic ${{ inputs.service }} \
            --region=$GCP_REGION \
            --to-revisions=${{ inputs.image_tag }}=25
      - name: Wait and verify (5 min)
        run: sleep 300

  canary-50:
    runs-on: ubuntu-latest
    needs: [canary-25]
    steps:
      - uses: google-github-actions/auth@v4
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}
      - name: Promote to 50%
        run: |
          gcloud run services update-traffic ${{ inputs.service }} \
            --region=$GCP_REGION \
            --to-revisions=${{ inputs.image_tag }}=50
      - name: Wait and verify (5 min)
        run: sleep 300

  promote-100:
    runs-on: ubuntu-latest
    needs: [canary-50]
    steps:
      - uses: google-github-actions/auth@v4
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}
      - name: Full rollout (100%)
        run: |
          gcloud run services update-traffic ${{ inputs.service }} \
            --region=$GCP_REGION --to-latest
          echo "âś… Full rollout complete"
