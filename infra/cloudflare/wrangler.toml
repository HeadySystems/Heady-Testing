# ═══════════════════════════════════════════════════════════════════════════════
# Heady™ Wrangler Configuration — Cloudflare Workers
# ═══════════════════════════════════════════════════════════════════════════════
# Deploy: wrangler deploy
# Dev:    wrangler dev
# Tail:   wrangler tail
# ═══════════════════════════════════════════════════════════════════════════════

name = "heady-edge"
main = "heady-edge-worker.js"
compatibility_date = "2026-03-01"
compatibility_flags = ["nodejs_compat"]

# ── Account & Zone ────────────────────────────────────────────────────────────
# Set via environment or wrangler secrets:
#   CLOUDFLARE_ACCOUNT_ID, CLOUDFLARE_ZONE_ID
# account_id = ""  # Set via CLOUDFLARE_ACCOUNT_ID env var

# ── Routes ────────────────────────────────────────────────────────────────────
# Each domain routes through this single Worker
routes = [
  # ── Primary product domains (verified Cloudflare zones) ──
  { pattern = "headyme.com/*", zone_name = "headyme.com" },
  { pattern = "www.headyme.com/*", zone_name = "headyme.com" },
  { pattern = "headysystems.com/*", zone_name = "headysystems.com" },
  { pattern = "www.headysystems.com/*", zone_name = "headysystems.com" },
  { pattern = "headyconnection.org/*", zone_name = "headyconnection.org" },
  { pattern = "www.headyconnection.org/*", zone_name = "headyconnection.org" },
  { pattern = "headyconnection.com/*", zone_name = "headyconnection.com" },
  { pattern = "headybuddy.org/*", zone_name = "headybuddy.org" },
  { pattern = "www.headybuddy.org/*", zone_name = "headybuddy.org" },
  { pattern = "headymcp.com/*", zone_name = "headymcp.com" },
  { pattern = "headyio.com/*", zone_name = "headyio.com" },
  { pattern = "headybot.com/*", zone_name = "headybot.com" },
  { pattern = "headyapi.com/*", zone_name = "headyapi.com" },
  { pattern = "heady-ai.com/*", zone_name = "heady-ai.com" },
  { pattern = "headyos.com/*", zone_name = "headyos.com" },
  { pattern = "headyfinance.com/*", zone_name = "headyfinance.com" },
  { pattern = "headymusic.com/*", zone_name = "headymusic.com" },
  { pattern = "headycloud.com/*", zone_name = "headycloud.com" },
  { pattern = "headystore.com/*", zone_name = "headystore.com" },
  { pattern = "headyex.com/*", zone_name = "headyex.com" },
]

# ── Environment: Production ───────────────────────────────────────────────────
[env.production]
name = "heady-edge"
routes = [
  { pattern = "headyme.com/*", zone_name = "headyme.com" },
  { pattern = "www.headyme.com/*", zone_name = "headyme.com" },
  { pattern = "headysystems.com/*", zone_name = "headysystems.com" },
  { pattern = "www.headysystems.com/*", zone_name = "headysystems.com" },
  { pattern = "headyconnection.org/*", zone_name = "headyconnection.org" },
  { pattern = "www.headyconnection.org/*", zone_name = "headyconnection.org" },
  { pattern = "headyconnection.com/*", zone_name = "headyconnection.com" },
  { pattern = "headybuddy.org/*", zone_name = "headybuddy.org" },
  { pattern = "www.headybuddy.org/*", zone_name = "headybuddy.org" },
  { pattern = "headymcp.com/*", zone_name = "headymcp.com" },
  { pattern = "headyio.com/*", zone_name = "headyio.com" },
  { pattern = "headybot.com/*", zone_name = "headybot.com" },
  { pattern = "headyapi.com/*", zone_name = "headyapi.com" },
  { pattern = "heady-ai.com/*", zone_name = "heady-ai.com" },
  { pattern = "headyos.com/*", zone_name = "headyos.com" },
  { pattern = "headyfinance.com/*", zone_name = "headyfinance.com" },
  { pattern = "headymusic.com/*", zone_name = "headymusic.com" },
  { pattern = "headycloud.com/*", zone_name = "headycloud.com" },
  { pattern = "headystore.com/*", zone_name = "headystore.com" },
  { pattern = "headyex.com/*", zone_name = "headyex.com" },
]

# ── Environment: Staging ──────────────────────────────────────────────────────
[env.staging]
name = "heady-edge-staging"
routes = [
  { pattern = "staging.headyme.com/*", zone_name = "headyme.com" },
]

# ── Vars (non-secret config) ─────────────────────────────────────────────────
[vars]
ENVIRONMENT = "production"
HEADY_VERSION = "3.1.0"
CLOUD_RUN_ORIGIN = "https://heady-manager-609590223909.us-central1.run.app"

# ── Secrets (set via: wrangler secret put SECRET_NAME) ────────────────────────
# Required secrets:
#   wrangler secret put HEADY_EDGE_AUTH_TOKEN
#   wrangler secret put ORIGIN_AUTH_HEADER

# ── Observability ─────────────────────────────────────────────────────────────
[observability]
enabled = true

[observability.logs]
enabled = true
invocation_logs = true
head_sampling_rate = 1   # 100% log sampling in production

# ── Limits ────────────────────────────────────────────────────────────────────
# Workers Paid plan limits
# CPU time: 50ms (standard), request size: 100MB
