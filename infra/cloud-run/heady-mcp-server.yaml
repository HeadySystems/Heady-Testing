apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: heady-mcp-server
  labels:
    app: heady-mcp-server
    tier: core
    ecosystem: heady
  annotations:
    run.googleapis.com/ingress: all
    run.googleapis.com/description: "Heady™ MCP Server — 42 tools, φ-scaled routing, CSL gates"
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "1"
        autoscaling.knative.dev/maxScale: "13"
        run.googleapis.com/cpu-throttling: "false"
        run.googleapis.com/startup-cpu-boost: "true"
    spec:
      containerConcurrency: 8
      timeoutSeconds: 300
      containers:
        - image: gcr.io/${PROJECT_ID}/heady-mcp-server:latest
          ports:
            - containerPort: 3310
          resources:
            limits:
              memory: "512Mi"
              cpu: "1000m"
          env:
            - name: PORT
              value: "3310"
            - name: NODE_ENV
              value: "production"
            - name: HEADY_MCP_TRANSPORT
              value: "http"
            - name: HEADY_LOG_LEVEL
              value: "info"
            - name: HEADY_SERVICE_HOST
              value: "0.0.0.0"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: database-url
                  key: latest
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: redis-url
                  key: latest
            - name: HEADY_API_KEY
              valueFrom:
                secretKeyRef:
                  name: heady-api-key
                  key: latest
          startupProbe:
            httpGet:
              path: /health
              port: 3310
            initialDelaySeconds: 5
            periodSeconds: 3
            failureThreshold: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3310
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 3310
            periodSeconds: 10
