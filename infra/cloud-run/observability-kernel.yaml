apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: observability-kernel
  annotations:
    run.googleapis.com/ingress: all
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "1"
        autoscaling.knative.dev/maxScale: "21"
    spec:
      containerConcurrency: 13
      containers:
        - image: gcr.io/${PROJECT_ID}/observability-kernel:latest
          ports:
            - containerPort: 4302
          env:
            - name: PORT
              value: "4302"
            - name: HEADY_ENV
              value: "prod"
          startupProbe:
            httpGet:
              path: /health/live
              port: 4302
          livenessProbe:
            httpGet:
              path: /health/live
              port: 4302
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 4302
