# Envoy sidecar proxy configuration for Heady microservices
# Provides: mTLS, phi-scaled timeouts, circuit breakers, distributed tracing
# NO priority-based routing — all traffic treated equally, routed by domain match

static_resources:

  listeners:
  # ── Egress listener (service → service calls) ─────────────────────────────
  - name: heady_egress
    address:
      socket_address:
        address: 0.0.0.0
        port_value: 9000
    filter_chains:
    - filters:
      - name: envoy.filters.network.http_connection_manager
        typed_config:
          "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
          stat_prefix: heady_egress
          access_log:
          - name: envoy.access_loggers.stdout
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.access_loggers.stream.v3.StdoutAccessLog
          tracing:
            provider:
              name: envoy.tracers.opentelemetry
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.tracers.opentelemetry.resource_detectors.v3.DynatraceResourceDetectorConfig
          http_filters:
          - name: envoy.filters.http.router
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router
          route_config:
            name: heady_routes
            virtual_hosts:
            # ── AutoContext service ───────────────────────────────────────────
            - name: heady-auto-context
              domains: ["heady-auto-context", "heady-auto-context:8907"]
              routes:
              - match: { prefix: "/" }
                route:
                  cluster: heady-auto-context
                  timeout: 4.236s   # φ³ seconds
                  retry_policy:
                    retry_on: "5xx,reset,connect-failure"
                    num_retries: 3
                    retry_back_off:
                      base_interval: 1.618s   # φ seconds
                      max_interval:  6.854s   # φ⁴ seconds
            # ── All other Heady services (CSL domain routing handled in app) ──
            - name: heady-services
              domains: ["*"]
              routes:
              - match: { prefix: "/" }
                route:
                  cluster: heady-services-dynamic
                  timeout: 13.090s   # fib(7) × φ ≈ 21.2s → capped at 13s fib
                  retry_policy:
                    retry_on: "5xx,reset,connect-failure"
                    num_retries: 3
                    retry_back_off:
                      base_interval: 1.618s
                      max_interval:  6.854s

  clusters:
  # ── HeadyAutoContext cluster ──────────────────────────────────────────────
  - name: heady-auto-context
    connect_timeout: 1.000s
    type: STRICT_DNS
    lb_policy: ROUND_ROBIN    # Equal distribution — no priority weighting
    circuit_breakers:
      thresholds:
      - max_connections:       144    # fib(12)
        max_pending_requests:  89     # fib(11)
        max_requests:          144    # fib(12)
        max_retries:           13     # fib(7)
    health_checks:
    - timeout: 2s
      interval: 21s            # fib(8)
      unhealthy_threshold: 3
      healthy_threshold: 2
      http_health_check:
        path: /health
    load_assignment:
      cluster_name: heady-auto-context
      endpoints:
      - lb_endpoints:
        - endpoint:
            address:
              socket_address:
                address: heady-auto-context
                port_value: 8907
    transport_socket:
      name: envoy.transport_sockets.tls
      typed_config:
        "@type": type.googleapis.com/envoy.extensions.transport_sockets.tls.v3.UpstreamTlsContext
        common_tls_context:
          tls_certificates:
          - certificate_chain:
              filename: /etc/envoy/certs/cert.pem
            private_key:
              filename: /etc/envoy/certs/key.pem
          validation_context:
            trusted_ca:
              filename: /etc/envoy/certs/ca.pem

  # ── Dynamic services cluster ──────────────────────────────────────────────
  - name: heady-services-dynamic
    connect_timeout: 1.000s
    type: EDS
    lb_policy: ROUND_ROBIN
    circuit_breakers:
      thresholds:
      - max_connections:       233    # fib(13)
        max_pending_requests:  144    # fib(12)
        max_requests:          233    # fib(13)
        max_retries:           21     # fib(8)
    eds_cluster_config:
      eds_config:
        resource_api_version: V3
        api_config_source:
          api_type: GRPC
          transport_api_version: V3
          grpc_services:
          - envoy_grpc:
              cluster_name: xds_cluster

  # ── xDS control plane (Consul EDS source) ────────────────────────────────
  - name: xds_cluster
    connect_timeout: 1s
    type: STRICT_DNS
    lb_policy: ROUND_ROBIN
    typed_extension_protocol_options:
      envoy.extensions.upstreams.http.v3.HttpProtocolOptions:
        "@type": type.googleapis.com/envoy.extensions.upstreams.http.v3.HttpProtocolOptions
        explicit_http_config:
          http2_protocol_options: {}
    load_assignment:
      cluster_name: xds_cluster
      endpoints:
      - lb_endpoints:
        - endpoint:
            address:
              socket_address:
                address: consul-esm
                port_value: 8502

admin:
  address:
    socket_address:
      address: 0.0.0.0
      port_value: 9901

layered_runtime:
  layers:
  - name: static_layer
    static_layer:
      # Phi-scaled circuit breaker overrides
      envoy.resource_limits.listener.heady_egress.connection_limit: 610   # fib(15)
