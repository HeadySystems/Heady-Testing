# Dead Letter Queue Policy:
# After 4 delivery attempts (rounded φ³ = 4.236), messages that cannot be
# processed are republished to heady.dlq.{original_subject} for manual review.
# DLQ stream retention: 987h (fib(16) hours), max 4181 messages (fib(19)).
