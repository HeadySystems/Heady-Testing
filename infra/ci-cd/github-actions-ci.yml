name: Heady CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"

jobs:
  lint-and-audit:
    name: Lint & Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 13 # FIB[7]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint --workspaces --if-present

      - name: Prettier check
        run: npx prettier --check "**/*.{js,json,yml,yaml,md}"

      - name: Security audit
        run: npm audit --audit-level=high

      - name: Scan for localhost references
        run: |
          FOUND=$(grep -rn \
            --include="*.js" --include="*.ts" --include="*.json" \
            --exclude-dir=node_modules --exclude-dir=.git \
            -E '(localhost|127\.0\.0\.1|0\.0\.0\.0)' \
            services/ shared/ packages/ || true)
          if [ -n "$FOUND" ]; then
            echo "::error::Found localhost/hardcoded IP references:"
            echo "$FOUND"
            exit 1
          fi
          echo "No localhost references found."

      - name: Scan for console.log
        run: |
          FOUND=$(grep -rn \
            --include="*.js" --include="*.ts" \
            --exclude-dir=node_modules --exclude-dir=.git \
            --exclude="*.test.js" --exclude="*.spec.js" \
            'console\.\(log\|debug\|info\|warn\|error\)' \
            services/ shared/ || true)
          if [ -n "$FOUND" ]; then
            echo "::error::Found console.log statements in production code:"
            echo "$FOUND"
            exit 1
          fi
          echo "No console.log statements found."

      - name: Scan for TODOs
        run: |
          FOUND=$(grep -rn \
            --include="*.js" --include="*.ts" \
            --exclude-dir=node_modules --exclude-dir=.git \
            'TODO\|FIXME\|HACK\|XXX' \
            services/ shared/ packages/ || true)
          if [ -n "$FOUND" ]; then
            echo "::warning::Found TODO/FIXME comments:"
            echo "$FOUND"
          fi

  test:
    name: Test (${{ matrix.service }})
    runs-on: ubuntu-latest
    timeout-minutes: 21 # FIB[8]
    strategy:
      fail-fast: false
      matrix:
        service:
          - packages/phi-math-foundation
          - packages/structured-logger
          - packages/health-probes
          - packages/schema-registry
          - services/auth-session-server
          - services/notification-service
          - services/analytics-service
          - services/billing-service
          - services/scheduler-service
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test --workspace=${{ matrix.service }} --if-present
        env:
          NODE_ENV: test

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ strategy.job-index }}
          path: ${{ matrix.service }}/test-results/
          retention-days: 8 # FIB[6]
          if-no-files-found: ignore

  build-check:
    name: Build Check
    runs-on: ubuntu-latest
    needs: [lint-and-audit, test]
    timeout-minutes: 13
    strategy:
      fail-fast: false
      matrix:
        service:
          - services/auth-session-server
          - services/notification-service
          - services/analytics-service
          - services/billing-service
          - services/scheduler-service
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Docker image (no push)
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.service }}
          push: false
          tags: heady/${{ matrix.service }}:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
